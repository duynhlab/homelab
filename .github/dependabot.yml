version: 2
updates:
  # Go modules - monitor services/go.mod
  - package-ecosystem: "gomod"
    directory: "/services"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions - monitor workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker - monitor base images in services/Dockerfile
  - package-ecosystem: "docker"
    directory: "/services"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
