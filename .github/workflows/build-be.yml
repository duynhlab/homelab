name: Build Docker Images

on:
  push:
    branches:
      - main
      - v5-refactor
    paths:
      - 'services/Dockerfile'
      - 'services/*/go.mod'
      - 'services/*/go.sum'
      - 'services/*/cmd/**'
      - 'services/*/internal/**'
      - 'services/*/middleware/**'
      - 'services/*/config/**'
      - '.github/workflows/build-be.yml'
  pull_request:
    branches:
      - main
      - v5-refactor
    paths:
      - 'services/Dockerfile'
      - 'services/*/go.mod'
      - 'services/*/go.sum'
      - 'services/*/cmd/**'
      - 'services/*/internal/**'
      - 'services/*/middleware/**'
      - 'services/*/config/**'
      - '.github/workflows/build-be.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - user
          - product
          - cart
          - order
          - review
          - notification
          - shipping
          - shipping-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Verify build (PR only)
        if: github.event_name == 'pull_request'
        working-directory: services/${{ matrix.service }}
        run: |
          echo "Building ${{ matrix.service }} service..."
          go mod tidy
          go mod verify
          go build -o /tmp/${{ matrix.service }} ./cmd/main.go
          go vet ./...

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=v5

      - name: Build and push Docker image
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./services
          file: ./services/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
