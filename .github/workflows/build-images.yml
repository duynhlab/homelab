name: Build Docker Images

on:
  push:
    branches:
      - v4
      - main
    paths:
      - 'services/Dockerfile'
      - 'services/go.mod'
      - 'services/go.sum'
      - 'services/cmd/**'
      - 'services/internal/**'
      - 'services/pkg/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches:
      - v4
      - main
    paths:
      - 'services/Dockerfile'
      - 'services/go.mod'
      - 'services/go.sum'
      - 'services/cmd/**'
      - 'services/internal/**'
      - 'services/pkg/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth
            path: auth-service
          - name: user
            path: user-service
          - name: product
            path: product-service
          - name: cart
            path: cart-service
          - name: order
            path: order-service
          - name: review
            path: review-service
          - name: notification
            path: notification-service
          - name: shipping
            path: shipping-service
          - name: shipping-v2
            path: shipping-service-v2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/go.sum

      - name: Run Go lint (PR only)
        if: github.event_name == 'pull_request'
        working-directory: services
        run: |
          echo "Running Go lint for ${{ matrix.name }}..."
          go vet ./cmd/${{ matrix.path }} || true
          gofmt -l ./cmd/${{ matrix.path }} || true
          echo "✓ Lint check completed for ${{ matrix.name }}"

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./services
          file: ./services/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
