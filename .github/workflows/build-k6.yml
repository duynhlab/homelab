name: Build K6 Image

on:
  push:
    branches:
      - v6
    paths:
      - 'services/k6/Dockerfile'
      - 'services/k6/*.js'
      - '.github/workflows/build-k6.yml'
  pull_request:
    branches:
      - v6
    paths:
      - 'services/k6/Dockerfile'
      - 'services/k6/*.js'
      - '.github/workflows/build-k6.yml'
  workflow_dispatch:

jobs:
  build-k6:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/k6
          tags: |
            type=raw,value=v6

      - name: Build and push K6 image
        id: build
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./services/k6
          file: ./services/k6/Dockerfile
          build-args: |
            SCRIPT_NAME=load-test-multiple-scenarios
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo ${{ steps.build.outputs.digest }}
