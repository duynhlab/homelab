name: Release Helm Charts

run-name: Release Helm Chart ${{ github.event.inputs.version || 'auto' }}

on:
  push:
    branches:
      - v5
      - v5-refactor
    paths:
      - 'charts/**'
      - '.github/workflows/helm-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to release (e.g., 0.3.0)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_NAME: microservice

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint charts/

  release:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Get chart version
        id: chart_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version:' charts/Chart.yaml | awk '{print $2}')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Chart version: ${VERSION}"
          if [ -z "${VERSION}" ]; then
            echo "ERROR: Chart version is empty"
            exit 1
          fi

      - name: Update chart version (if manual input)
        if: github.event.inputs.version != ''
        run: |
          sed -i "s/^version:.*/version: ${{ github.event.inputs.version }}/" charts/Chart.yaml
          echo "Updated Chart.yaml version to ${{ github.event.inputs.version }}"

      - name: Validate chart
        run: |
          helm lint charts/ || (echo "ERROR: Chart validation failed" && exit 1)
          echo "Chart validation passed"

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package charts/ --destination .helm-packages/
          CHART_FILE=".helm-packages/${{ env.CHART_NAME }}-${{ steps.chart_version.outputs.version }}.tgz"
          if [ ! -f "${CHART_FILE}" ]; then
            echo "ERROR: Chart package not found: ${CHART_FILE}"
            exit 1
          fi
          ls -lh .helm-packages/
          echo "Chart packaged successfully: ${CHART_FILE}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to OCI registry
        run: |
          CHART_FILE=".helm-packages/${{ env.CHART_NAME }}-${{ steps.chart_version.outputs.version }}.tgz"
          REGISTRY_URL="oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts"
          echo "Pushing ${CHART_FILE} to ${REGISTRY_URL}"
          helm push "${CHART_FILE}" "${REGISTRY_URL}" || (echo "ERROR: Failed to push chart" && exit 1)
          echo "Chart pushed successfully to ${REGISTRY_URL}/${{ env.CHART_NAME }}"

      - name: Cleanup
        if: always()
        run: |
          rm -rf .helm-packages/
          echo "Cleaned up temporary files"

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Helm Chart Released Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Chart:** \`${{ env.CHART_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.chart_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Usage" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Pull chart" >> $GITHUB_STEP_SUMMARY
          echo "helm pull oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }} --version ${{ steps.chart_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Install with values file" >> $GITHUB_STEP_SUMMARY
          echo "helm install auth oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/${{ env.CHART_NAME }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  --version ${{ steps.chart_version.outputs.version }} \\" >> $GITHUB_STEP_SUMMARY
          echo "  -f charts/values/auth.yaml \\" >> $GITHUB_STEP_SUMMARY
          echo "  -n auth" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

