name: Renovate

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - uses: renovatebot/github-action@v46.1.15
        with:
          configurationFile: .renovaterc.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
