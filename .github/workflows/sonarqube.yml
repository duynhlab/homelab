name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - v6
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: services/*/go.sum

      - name: Run Go tests with coverage
        run: |
          cd services
          # Run tests for all services and merge coverage
          echo "mode: atomic" > coverage.out
          for dir in */; do
            if [ -f "$dir/go.mod" ]; then
              echo "Testing $dir..."
              cd "$dir"
              go test -coverprofile=cover.out -covermode=atomic ./... 2>/dev/null || true
              if [ -f cover.out ]; then
                tail -n +2 cover.out >> ../coverage.out
                rm cover.out
              fi
              cd ..
            fi
          done

      # Triggering SonarQube analysis as results of it are required by Quality Gate check.
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          args: >
            -Dsonar.projectKey=duynhne_monitoring
            -Dsonar.organization=duynhne
            -Dsonar.sources=services,frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,**/build/**,**/*.min.js
            -Dsonar.go.coverage.reportPaths=services/coverage.out
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "Show SonarQube Quality Gate Status"
        run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
