apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pg-query-drilldown
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: grafana-dashboard-pg-query-drilldown
    key: pg-query-drilldown.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
