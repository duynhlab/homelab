apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: jaeger-datasource
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Jaeger
    type: jaeger
    access: proxy
    # Jaeger v2 uses jaeger-query service (not jaeger-all-in-one)
    url: http://jaeger-query.monitoring.svc.cluster.local:16686
    uid: jaeger
    jsonData:
      # Enable trace to logs correlation (if using Loki)
      tracesToLogsV2:
        datasourceUid: loki
        tags: ['trace_id']
      # Enable trace to metrics correlation
      tracesToMetrics:
        datasourceUid: prometheus
      # Node graph visualization
      nodeGraph:
        enabled: true
