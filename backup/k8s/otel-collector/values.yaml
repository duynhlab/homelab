# OpenTelemetry Collector Helm values
# Chart: open-telemetry/opentelemetry-collector
# Docs: https://github.com/open-telemetry/opentelemetry-helm-charts

# Deployment mode: deployment (not daemonset)
mode: deployment

# Number of replicas
replicaCount: 1

# Image configuration
image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.114.0"
  pullPolicy: IfNotPresent

# Resource limits
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Service configuration
service:
  type: ClusterIP

# Ports to expose
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# OpenTelemetry Collector configuration
config:
  # Receivers - where traces come from (applications)
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # Processors - transform/batch traces
  processors:
    batch:
      # Send traces in batches for efficiency
      timeout: 5s
      send_batch_size: 512
      send_batch_max_size: 1024
    
    # Memory limiter to prevent OOM
    memory_limiter:
      check_interval: 1s
      limit_mib: 200
      spike_limit_mib: 50

  # Exporters - where traces go to (backends)
  exporters:
    # Export to Tempo (existing backend)
    otlp/tempo:
      endpoint: tempo.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    
    # Export to Jaeger (new backend)
    # Jaeger v2 uses jaeger-collector service (not jaeger-all-in-one)
    otlp/jaeger:
      endpoint: jaeger-collector.monitoring.svc.cluster.local:4317
      tls:
        insecure: true
    
    # Debug exporter (optional - for troubleshooting)
    debug:
      verbosity: basic
      sampling_initial: 5
      sampling_thereafter: 200

  # Extensions
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    zpages:
      endpoint: 0.0.0.0:55679

  # Service - connect receivers, processors, and exporters
  service:
    extensions:
      - health_check
      - zpages
    
    pipelines:
      # Traces pipeline - fan-out to both Tempo and Jaeger
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp/tempo
          - otlp/jaeger
          # Uncomment for debugging:
          # - debug
    
    # Telemetry for the collector itself
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 13133
  initialDelaySeconds: 5
  periodSeconds: 5

# Service account
serviceAccount:
  create: true
  name: otel-collector

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
