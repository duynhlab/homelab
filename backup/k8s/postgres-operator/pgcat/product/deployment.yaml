# PgCat Deployment for Product Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgcat-product
  namespace: product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgcat-product
  template:
    metadata:
      labels:
        app: pgcat-product
    spec:
      containers:
      - name: pgcat
        image: ghcr.io/postgresml/pgcat:v1.2.0
        ports:
        - containerPort: 5432
          name: postgres
        - containerPort: 9930
          name: metrics  # Admin port (9930) serves both admin interface and Prometheus metrics endpoint (/metrics)
        volumeMounts:
        - name: config
          mountPath: /etc/pgcat
      volumes:
      - name: config
        configMap:
          name: pgcat-product-config
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
