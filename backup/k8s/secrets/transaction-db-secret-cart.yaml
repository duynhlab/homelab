# Transaction Database Secret (CloudNativePG) - Cart Namespace
# This secret is used by Cart service to connect to transaction-db cluster
# For learning/development, using simple password: postgres
# In production, use strong randomly generated passwords
apiVersion: v1
kind: Secret
metadata:
  name: transaction-db-secret
  namespace: cart
type: Opaque
stringData:
  username: cart  # Database user for cart database
  password: postgres  # ⚠️ Change this in production!
