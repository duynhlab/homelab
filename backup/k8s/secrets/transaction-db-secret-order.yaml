# Transaction Database Secret (CloudNativePG) - Order Namespace
# This secret is used by Order service to connect to transaction-db cluster
# Same credentials as cart namespace (shared database pattern)
# For learning/development, using simple password: postgres
# In production, use strong randomly generated passwords
apiVersion: v1
kind: Secret
metadata:
  name: transaction-db-secret
  namespace: order
type: Opaque
stringData:
  username: cart  # Database user (same as cart, owns both cart and order databases)
  password: postgres  # ⚠️ Change this in production!
