# Transaction Database Secret (CloudNativePG)
# Cart + Order services
# This file is gitignored - DO NOT commit passwords to git
# For learning/development, use simple password: postgres
apiVersion: v1
kind: Secret
metadata:
  name: transaction-db-secret
  namespace: cart
type: Opaque
stringData:
  username: cart  # Default user for cart database
  password: postgres  # ⚠️ Change this in production!

