apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.grafanaDashboard.configMapName }}
  namespace: {{ include "grafana.namespace" . }}
  {{- if or .Values.grafanaDashboard.labels }}
  labels:
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "grafana.labels" . | nindent 4 }}
  {{- else }}
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  {{- end }}
  {{- with .Values.grafanaDashboard.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{ .Values.grafanaDashboard.fileName }}: |-
{{ .Files.Get (printf "files/%s" .Values.grafanaDashboard.fileName) | indent 4 }}
