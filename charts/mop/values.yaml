# Default values for microservice chart
# This is a YAML-formatted file.
# See charts/README.md for complete documentation on configuration patterns.

# --- Core Service Configuration ---

# Service name (required when installing)
name: ""

# Number of replicas
replicaCount: 2

# --- Container Image Configuration ---

image:
  repository: ""  # Full image path (e.g., ghcr.io/duynhne/auth)
  tag: v6
  pullPolicy: IfNotPresent

# --- Service Configuration ---

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http  # Name of the port (http, grpc, metrics, etc.)

# Container port
containerPort: 8080

# --- Resource Configuration ---

resources:
  requests:
    memory: "24Mi"
    cpu: "20m"
  limits:
    memory: "64Mi"
    cpu: "50m"

# --- Health Checks ---

# Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

# Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# --- Environment Variables Configuration ---

# All environment variables (core + service-specific)
# Use for: SERVICE_NAME, PORT, ENV, OTEL_COLLECTOR_ENDPOINT, database config, secrets, etc.
# Supports Helm templating: {{ .Values.tracing.endpoint }}
# Supports secrets via valueFrom.secretKeyRef
env: []
# Example (see charts/values/auth.yaml for complete example):
# - name: SERVICE_NAME
#   value: "auth"
# - name: PORT
#   value: "8080"
# - name: ENV
#   value: "production"
# - name: OTEL_COLLECTOR_ENDPOINT
#   value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
# - name: OTEL_SAMPLE_RATE
#   value: "0.1"
# - name: PYROSCOPE_ENDPOINT
#   value: "http://pyroscope.monitoring.svc.cluster.local:4040"
# - name: LOG_LEVEL
#   value: "info"
# - name: DB_HOST
#   value: "db-host.svc.cluster.local"
# - name: DB_PASSWORD
#   valueFrom:
#     secretKeyRef:
#       name: db-secret
#       key: password

# --- Kubernetes Configuration ---

# Labels to add to all resources
labels:
  component: api

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 1000
  # runAsUser: 1000
  # runAsNonRoot: true

# Container security context
securityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # capabilities:
  #   drop:
  #     - ALL

# --- SLO Configuration ---
# Generates a PrometheusServiceLevel CRD for Sloth Operator.
# When enabled, Sloth auto-generates PrometheusRules (recording + alerting)
# following Google SRE multi-window multi-burn-rate pattern.
slo:
  enabled: false
  team: "platform"
  env: "monitoring"
  availability:
    objective: 99.5
  latency:
    objective: 95.0
    threshold: "0.5"
  errorRate:
    objective: 99.0

# --- Database Migrations Configuration ---

# Enable database migrations via Flyway init container
# When enabled, a Flyway init container will run migrations before the main container starts
migrations:
  enabled: false  # Set to true to enable migrations
  # Flyway migration Docker image (e.g., ghcr.io/duynhne/auth-service/auth-init:v6)
  # This image should contain the migration SQL files in /flyway/sql/
  image: ""  # e.g., ghcr.io/duynhne/auth-service/auth-init:v6
  imagePullPolicy: IfNotPresent
  # Environment variables for migration init container (key-value pairs)
  env: {}
  # Example:
  # env:
  #   DB_HOST: "postgres.example.com"
  #   DB_PORT: "5432"
  #   DB_NAME: "mydb"
  #   DB_USER: "user"
  #   DB_SSLMODE: "disable"
  # Environment variables from ConfigMap or Secret (optional)
  envFrom: {}
  # Example:
  # envFrom:
  #   configMapRef: "migration-config"
  #   secretRef: "db-secret"  # Will be used for DB_PASSWORD

