# Values for frontend service
name: frontend

# Frontend uses 1 replica (static files, no need for scaling)
replicaCount: 1

image:
  repository: ghcr.io/duynhne/frontend
  tag: v6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  portName: http

containerPort: 80

# No database configuration needed
# No migrations needed

# Minimal resources (static files)
resources:
  requests:
    memory: "32Mi"
    cpu: "25m"
  limits:
    memory: "64Mi"
    cpu: "50m"

# Health check via nginx /health endpoint (already configured in nginx.conf)
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

# No environment variables needed (API URL baked into build)
env: []

# No migrations
migrations:
  enabled: false
