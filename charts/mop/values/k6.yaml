# Values for k6
name: k6

replicaCount: 1

image:
  repository: ghcr.io/duynhne/k6
  tag: v5
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http

containerPort: 8080  # Dummy port (k6 không listen)

resources:
  requests:
    memory: "2Gi"      # Conservative: 250 VUs (50% of 500 VUs)
    cpu: "1000m"       # Conservative: 250 VUs
  limits:
    memory: "4Gi"      # Conservative: 250 VUs
    cpu: "2000m"       # Conservative: 250 VUs

livenessProbe:
  enabled: false  # k6 không có health endpoint

readinessProbe:
  enabled: false

labels:
  component: load-testing
  test-mode: multiple-scenarios

# Override command for k6 (distroless image doesn't have shell)
command: ["k6"]
args: ["run", "/scripts/script.js"]

# Environment variables for k6 configuration
# Allows external configuration of RPS targets and traffic patterns without code changes
env:
  # RPS Targets (requests per second)
  - name: BASELINE_RPS
    value: "30"              # Baseline traffic: 30 RPS (steady background)
  - name: PEAK_RPS
    value: "100"             # Peak traffic: 100 RPS (morning/evening peaks)
  - name: BURST_RPS
    value: "200"             # Burst traffic: 200 RPS (flash sales, spikes)
  
  # Traffic Pattern Timing
  - name: BURST_DURATION
    value: "5m"              # Duration to sustain burst traffic (default: 5 minutes)
  - name: BURST_TIMING
    value: "10:00-14:00"     # Timing window for burst scenarios (example: 10 AM - 2 PM)

