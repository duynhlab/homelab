# Values for order service
name: order

replicaCount: 2

image:
  repository: ghcr.io/duynhne/order
  tag: v6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http

containerPort: 8080

env:
  - name: SERVICE_NAME
    value: "order"
  - name: PORT
    value: "8080"
  - name: ENV
    value: "production"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  - name: OTEL_SAMPLE_RATE
    value: "0.1"
  - name: PYROSCOPE_ENDPOINT
    value: "http://pyroscope.monitoring.svc.cluster.local:4040"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"
  - name: TRACING_ENABLED
    value: "true"
  - name: PROFILING_ENABLED
    value: "true"
  - name: METRICS_ENABLED
    value: "true"
  # Database configuration
  - name: DB_HOST
    value: "pgcat.cart.svc.cluster.local"  # PgCat pooler endpoint - pgcat service is in cart namespace
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "order"
  - name: DB_USER
    value: "cart"  # Use cart user (same as cart service) - order database owned by cart user
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: transaction-db-secret
        key: password
  - name: DB_SSLMODE
    value: "disable"
  - name: DB_POOL_MAX_CONNECTIONS
    value: "30"
  - name: DB_POOLER_TYPE
    value: "pgcat"
  # Graceful shutdown configuration
  - name: SHUTDOWN_TIMEOUT
    value: "10s"  # Default shutdown timeout (can be overridden)

# Kubernetes graceful shutdown configuration
terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# Database migrations (Flyway init container)
migrations:
  enabled: true
  image: ghcr.io/duynhne/order:v6-init
  imagePullPolicy: Always #IfNotPresent
  env:
    DB_HOST: "transaction-db-rw.cart.svc.cluster.local"  # Direct connection, no pooler
    DB_PORT: "5432"
    DB_NAME: "order"
    DB_USER: "cart"  # Use cart user (same as cart service)
    DB_SSLMODE: "require"
  envFrom:
    secretRef: "transaction-db-secret"
