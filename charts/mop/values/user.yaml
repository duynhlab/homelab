# Values for user service
name: user

replicaCount: 2

image:
  repository: ghcr.io/duynhne/user
  tag: v6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http

containerPort: 8080

# Core configuration (chart-managed via env)
env:
  - name: SERVICE_NAME
    value: "user"
  - name: PORT
    value: "8080"
  - name: ENV
    value: "production"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  - name: OTEL_SAMPLE_RATE
    value: "0.1"
  - name: PYROSCOPE_ENDPOINT
    value: "http://pyroscope.monitoring.svc.cluster.local:4040"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"
  - name: TRACING_ENABLED
    value: "true"
  - name: PROFILING_ENABLED
    value: "true"
  - name: METRICS_ENABLED
    value: "true"
  # Auth service for token introspection (profile endpoints)
  - name: AUTH_SERVICE_URL
    value: "http://auth.auth.svc.cluster.local:8080"
  # Database configuration
  - name: DB_HOST
    value: "supporting-db.user.svc.cluster.local"  # Shared database - supporting-db is in user namespace
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "user"  # Different schema/database
  - name: DB_USER
    value: "user"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: user.supporting-db.credentials.postgresql.acid.zalan.do  # Zalando operator auto-generated secret
        key: password
  - name: DB_SSLMODE
    value: "require"
  - name: DB_POOL_MAX_CONNECTIONS
    value: "10"  # Low traffic, smaller pool
  # Graceful shutdown configuration
  - name: SHUTDOWN_TIMEOUT
    value: "10s"  # Default shutdown timeout (can be overridden)

# Kubernetes graceful shutdown configuration
terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# Database migrations (Flyway init container)
migrations:
  enabled: true
  image: ghcr.io/duynhne/user:v6-init
  imagePullPolicy: IfNotPresent
  env:
    DB_HOST: "supporting-db.user.svc.cluster.local"
    DB_PORT: "5432"
    DB_NAME: "user"
    DB_USER: "user"
    DB_SSLMODE: "require"
  envFrom:
    secretRef: "user.supporting-db.credentials.postgresql.acid.zalan.do"  # Zalando operator auto-generated secret
