# Default values for microservice chart
# This is a YAML-formatted file.
# See charts/README.md for complete documentation on configuration patterns.

# --- Core Service Configuration ---

# Service name (required when installing)
name: ""

# Number of replicas
replicaCount: 2

# --- Container Image Configuration ---

image:
  repository: ""  # Full image path (e.g., ghcr.io/duynhne/auth)
  tag: v5
  pullPolicy: IfNotPresent

# --- Service Configuration ---

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http  # Name of the port (http, grpc, metrics, etc.)

# Container port
containerPort: 8080

# --- Resource Configuration ---

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# --- Health Checks ---

# Liveness probe configuration
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

# Readiness probe configuration
readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# --- Environment Variables Configuration ---
# See charts/README.md for env vs extraEnv decision matrix

# Core application configuration (chart-managed)
# Use for: SERVICE_NAME, PORT, ENV, OTEL_COLLECTOR_ENDPOINT, PYROSCOPE_ENDPOINT, LOG_LEVEL
# Supports Helm templating: {{ .Values.tracing.endpoint }}
env: []
# Example (see charts/values/auth.yaml for complete example):
# - name: SERVICE_NAME
#   value: "auth"
# - name: PORT
#   value: "8080"
# - name: ENV
#   value: "production"
# - name: OTEL_COLLECTOR_ENDPOINT
#   value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
# - name: OTEL_SAMPLE_RATE
#   value: "0.1"
# - name: PYROSCOPE_ENDPOINT
#   value: "http://pyroscope.monitoring.svc.cluster.local:4040"
# - name: LOG_LEVEL
#   value: "info"

# Service-specific configuration (ad-hoc variables)
# Use for: REDIS_HOST, KAFKA_BROKER, feature flags, secrets (via valueFrom)
# No Helm templating support (just YAML passthrough)
extraEnv: []
# Example:
# - name: REDIS_HOST
#   value: "redis.auth.svc.cluster.local:6379"
# - name: ENABLE_2FA
#   value: "true"
# - name: JWT_SECRET
#   valueFrom:
#     secretKeyRef:
#       name: auth-secrets
#       key: jwt-secret

# --- Kubernetes Configuration ---

# Labels to add to all resources
labels:
  component: api

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 1000
  # runAsUser: 1000
  # runAsNonRoot: true

# Container security context
securityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # capabilities:
  #   drop:
  #     - ALL

# --- Database Migrations Configuration ---

# Enable database migrations via Flyway init container
# When enabled, a Flyway init container will run migrations before the main container starts
migrations:
  enabled: false  # Set to true to enable migrations
  # Flyway migration Docker image (e.g., ghcr.io/duynhne/init-auth:v5)
  # This image should contain the migration SQL files in /flyway/sql/
  image: ""  # e.g., ghcr.io/duynhne/init-auth:v5
  imagePullPolicy: IfNotPresent

