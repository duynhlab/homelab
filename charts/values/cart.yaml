# Values for cart service
name: cart

replicaCount: 2

image:
  repository: ghcr.io/duynhne/cart
  tag: v5
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http

containerPort: 8080

env:
  - name: SERVICE_NAME
    value: "cart"
  - name: PORT
    value: "8080"
  - name: ENV
    value: "production"
  - name: OTEL_COLLECTOR_ENDPOINT
    value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
  - name: OTEL_SAMPLE_RATE
    value: "0.1"
  - name: PYROSCOPE_ENDPOINT
    value: "http://pyroscope.monitoring.svc.cluster.local:4040"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "json"
  - name: TRACING_ENABLED
    value: "true"
  - name: PROFILING_ENABLED
    value: "true"
  - name: METRICS_ENABLED
    value: "true"

# Service-specific database configuration (via extraEnv)
# ⚠️ IMPORTANT: Tách riêng các env vars, KHÔNG dùng DATABASE_URL string
extraEnv:
  - name: DB_HOST
    value: "pgcat.transaction.svc.cluster.local"  # PgCat pooler endpoint
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: "cart"
  - name: DB_USER
    value: "cart"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: transaction-db-secret
        key: password
  - name: DB_SSLMODE
    value: "disable"
  - name: DB_POOL_MAX_CONNECTIONS
    value: "30"
  - name: DB_POOLER_TYPE
    value: "pgcat"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

# Database migrations (Flyway init container)
migrations:
  enabled: true
  image: ghcr.io/duynhne/init-cart:v5
  imagePullPolicy: IfNotPresent
