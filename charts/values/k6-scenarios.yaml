# Values for k6-scenarios
name: k6-scenarios
namespace: k6

replicaCount: 1

image:
  repository: ghcr.io/duynhne
  name: k6
  tag: scenarios
  pullPolicy: IfNotPresent

service:
  enabled: false  # k6 không cần service

containerPort: 8080  # Dummy port (k6 không listen)

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

livenessProbe:
  enabled: false  # k6 không có health endpoint

readinessProbe:
  enabled: false

labels:
  component: load-testing
  test-mode: multiple-scenarios

