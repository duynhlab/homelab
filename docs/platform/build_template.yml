# Build Template — Push-only workflow
#
# Triggers on: push to dev/staging/main, tag v*
# Purpose: build Docker images, scan before push, sign, notify
#
# This workflow only handles push events. By not mixing pull_request triggers,
# GitHub status check names stay clean (no "(push)" suffix).
#
# Security: Images are scanned with Trivy BEFORE pushing to GHCR.
# If vulnerabilities are found, the image is never pushed to the registry.
# This prevents FluxCD from auto-deploying vulnerable images.
#
# Staging optional: services not using staging simply never push to that branch.
#
# Dynamic naming: Uses ${{ github.event.repository.name }} so this file is
# identical across all service repos — no placeholders to replace for image names.
#
# Placeholders to replace:
#   {{SLACK_CHANNEL_ID}}   — Slack channel for build notifications
#   {{GSHEET_SPREADSHEET}} — Google Sheet ID for status tracking (optional)
#
# See docs/platform/gitflow.md for the full branching & release standard.

name: Build

on:
  push:
    branches: [dev, staging, main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  pull-requests: read
  id-token: write
  actions: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # 1. Test & Lint (gate before build)
  # Skipped on: tag pushes (code already tested on branch)
  # ──────────────────────────────────────────────────
  go-check:
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: duyhenryer/shared-workflows/.github/workflows/go-check.yml@main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true
    secrets: inherit

  # ──────────────────────────────────────────────────
  # 1b. Secret Detection (Gitleaks)
  # ──────────────────────────────────────────────────
  gitleaks:
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: duyhenryer/shared-workflows/.github/workflows/gitleaks.yml@main
    permissions:
      contents: read
      security-events: write

  # ──────────────────────────────────────────────────
  # 2. SonarCloud Analysis
  # ──────────────────────────────────────────────────
  sonar:
    needs: [go-check, gitleaks]
    uses: duyhenryer/shared-workflows/.github/workflows/sonarqube.yml@main
    with:
      project-key: 'duynhlab_${{ github.event.repository.name }}'
      organization: 'duynhlab'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────
  # 3a. Build, Scan & Push Docker Image
  # Image is built locally, scanned with Trivy, and
  # only pushed to GHCR if the scan passes.
  # NOT on: tags (no rebuild at release time)
  # ──────────────────────────────────────────────────
  docker-build:
    needs: [go-check, sonar]
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: ${{ github.event.repository.name }}
      push: true
      scan-before-push: true
      scan-severity: 'CRITICAL,HIGH'
      scan-exit-code: '1'
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  # ──────────────────────────────────────────────────
  # 3b. Trivy Report (optional, non-blocking)
  # Detailed SARIF + Google Sheets reporting after push.
  # This is NOT the security gate — that's in docker-build.
  # ──────────────────────────────────────────────────
  trivy-report:
    needs: [docker-build]
    if: needs.docker-build.outputs.scan-status == 'pass'
    uses: duyhenryer/shared-workflows/.github/workflows/trivy-scan.yml@main
    with:
      image-ref: ghcr.io/${{ github.repository }}/${{ github.event.repository.name }}@${{ needs.docker-build.outputs.digest }}
      severity: 'CRITICAL,HIGH,MEDIUM'
      exit-code: '0'
      ignore-unfixed: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      security-events: write

  # ──────────────────────────────────────────────────
  # 3c. Cosign Signing (only after build+scan passes)
  # ──────────────────────────────────────────────────
  docker-sign:
    needs: [docker-build]
    uses: duyhenryer/shared-workflows/.github/workflows/docker-sign.yml@main
    with:
      tags: ${{ needs.docker-build.outputs.tags }}
      digest: ${{ needs.docker-build.outputs.digest }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  # ──────────────────────────────────────────────────
  # 3d. Build Migration Image (optional)
  # Also scanned before push.
  # ──────────────────────────────────────────────────
  docker-db-init:
    needs: [go-check, sonar]
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: '${{ github.event.repository.name }}-init'
      dockerfile: 'db/migrations/Dockerfile'
      context: 'db/migrations'
      push: true
      scan-before-push: true
      scan-severity: 'CRITICAL,HIGH'
      scan-exit-code: '1'
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  # ──────────────────────────────────────────────────
  # 4. Final Status Notification
  # ──────────────────────────────────────────────────
  notify:
    if: always()
    needs: [go-check, gitleaks, sonar, docker-build, trivy-report, docker-sign, docker-db-init]
    uses: duyhenryer/shared-workflows/.github/workflows/status.yml@main
    with:
      slack_channel_id: "{{SLACK_CHANNEL_ID}}"
      gsheet_spreadsheet_id: "{{GSHEET_SPREADSHEET}}"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
      GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}
