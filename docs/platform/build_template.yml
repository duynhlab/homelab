# Build Template — Push-only workflow
#
# Triggers on: push to dev/uat/main, tag v*
# Purpose: build & sign Docker images; on a v* tag also build the versioned
# image (:X.Y.Z) and publish the keyless-signed binary release.
#
# This workflow only handles push events. By not mixing pull_request triggers,
# GitHub status check names stay clean (no "(push)" suffix).
#
# Image tags (see gha-workflows/docker-build-go.yml): branch push -> :sha-<short>;
# tag v* -> :X.Y.Z + :X.Y. No mutable :latest. A v* tag runs the FULL pipeline
# (test, scan, build, sign) so the released image is freshly verified.
#
# Security: Images are scanned with Trivy BEFORE pushing to GHCR.
# If vulnerabilities are found, the image is never pushed to the registry.
# This prevents FluxCD from auto-deploying vulnerable images.
#
# Binary release: set repo variable ENABLE_BINARY_RELEASE=true to also publish
# a GoReleaser binary release (keyless-signed) on v* tags.
#
# UAT optional: services not using uat simply never push to that branch.
#
# Dynamic naming: Uses ${{ github.event.repository.name }} so this file is
# identical across all service repos — no placeholders to replace for image names.
#
# Placeholders to replace:
#   {{SLACK_CHANNEL_ID}}   — Slack channel for build notifications
#   {{GSHEET_SPREADSHEET}} — Google Sheet ID for status tracking (optional)
#
# See docs/platform/gitflow.md for the full branching & release standard.

name: Build

on:
  push:
    branches: [dev, uat, main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  pull-requests: read
  id-token: write
  actions: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # 1. Test & Lint (gate before build) — runs on branches AND tags
  # (a v* tag re-verifies the code before cutting the release).
  # ──────────────────────────────────────────────────
  go-check:
    uses: duynhlab/gha-workflows/.github/workflows/go-check.yml@main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true
    secrets: inherit

  # ──────────────────────────────────────────────────
  # 1b. Secret Detection (Gitleaks)
  # ──────────────────────────────────────────────────
  gitleaks:
    uses: duynhlab/gha-workflows/.github/workflows/gitleaks.yml@main
    permissions:
      contents: read
      security-events: write

  # ──────────────────────────────────────────────────
  # 2. SonarCloud Analysis
  # ──────────────────────────────────────────────────
  sonar:
    needs: [go-check, gitleaks]
    uses: duynhlab/gha-workflows/.github/workflows/sonarqube.yml@main
    with:
      project-key: 'duynhlab_${{ github.event.repository.name }}'
      organization: 'duynhlab'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────
  # 3a. Build, Scan & Push Docker Image
  # Built locally, scanned with Trivy, pushed only if the scan passes.
  # Branch push -> :sha-<short>; tag v* -> :X.Y.Z + :X.Y (versioned release image).
  # ──────────────────────────────────────────────────
  docker-build:
    needs: [go-check, sonar]
    uses: duynhlab/gha-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: ${{ github.event.repository.name }}
      push: true
      scan-before-push: true
      scan-severity: 'CRITICAL,HIGH'
      scan-exit-code: '1'
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  # ──────────────────────────────────────────────────
  # 3b. Trivy Report (optional, non-blocking)
  # Detailed SARIF + Google Sheets reporting after push.
  # This is NOT the security gate — that's in docker-build.
  # ──────────────────────────────────────────────────
  trivy-report:
    needs: [docker-build]
    if: needs.docker-build.outputs.scan-status == 'pass'
    uses: duynhlab/gha-workflows/.github/workflows/trivy-scan.yml@main
    with:
      image-ref: ghcr.io/${{ github.repository }}/${{ github.event.repository.name }}@${{ needs.docker-build.outputs.digest }}
      severity: 'CRITICAL,HIGH,MEDIUM'
      exit-code: '0'
      ignore-unfixed: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      security-events: write

  # ──────────────────────────────────────────────────
  # 3c. Cosign Signing (only after build+scan passes)
  # ──────────────────────────────────────────────────
  docker-sign:
    needs: [docker-build]
    uses: duynhlab/gha-workflows/.github/workflows/docker-sign.yml@main
    with:
      tags: ${{ needs.docker-build.outputs.tags }}
      digest: ${{ needs.docker-build.outputs.digest }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  # ──────────────────────────────────────────────────
  # 3d. Build Migration Image (optional)
  # Also scanned before push.
  # ──────────────────────────────────────────────────
  docker-db-init:
    needs: [go-check, sonar]
    uses: duynhlab/gha-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: '${{ github.event.repository.name }}-init'
      dockerfile: 'db/migrations/Dockerfile'
      context: 'db/migrations'
      push: true
      scan-before-push: true
      scan-severity: 'CRITICAL,HIGH'
      scan-exit-code: '1'
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  # ──────────────────────────────────────────────────
  # 3e. Binary Release (GoReleaser, keyless-signed) — v* tags only
  # Gated by repo variable ENABLE_BINARY_RELEASE=true. Builds the Go binary,
  # publishes a GitHub Release with checksums.txt + cosign signature.
  # ──────────────────────────────────────────────────
  release-binary:
    needs: [go-check, sonar]
    if: startsWith(github.ref, 'refs/tags/v') && vars.ENABLE_BINARY_RELEASE == 'true'
    uses: duynhlab/gha-workflows/.github/workflows/goreleaser.yml@main
    secrets: inherit
    permissions:
      contents: write
      id-token: write

  # ──────────────────────────────────────────────────
  # 4. Final Status Notification
  # ──────────────────────────────────────────────────
  notify:
    if: always()
    needs: [go-check, gitleaks, sonar, docker-build, trivy-report, docker-sign, docker-db-init, release-binary]
    uses: duynhlab/gha-workflows/.github/workflows/status.yml@main
    with:
      slack_channel_id: "{{SLACK_CHANNEL_ID}}"
      gsheet_spreadsheet_id: "{{GSHEET_SPREADSHEET}}"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
      GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}
