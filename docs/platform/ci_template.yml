# CI Pipeline Template — Hybrid Enterprise Gitflow
#
# Branch behavior:
#   pull_request -> dev/staging/main : checks only (test, lint, sonar) — no build
#   push -> dev                      : build + scan + sign, image tagged sha-<short> + dev-<run>
#   push -> staging                  : build + scan + sign, image tagged sha-<short> + rc-<sha>
#   push -> main                     : build + scan + sign, image tagged sha-<short> + latest
#   push tag v*                      : release pipeline — retag digest with vX.Y.Z, notify
#
# Staging optional: services not using staging simply never push to that branch.
# The CI template works identically whether staging exists or not.
#
# See docs/platform/gitflow.md for the full branching & release standard.

name: CI Pipeline

on:
  push:
    branches: [dev, staging, main]
    tags: ['v*']
  pull_request:
    branches: [dev, staging, main]

permissions:
  contents: read
  packages: write
  pull-requests: read
  id-token: write
  actions: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # 1. PR Checks (Branch Name + Slack "PR Opened")
  # Runs on: pull_request only
  # ──────────────────────────────────────────────────
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: duyhenryer/shared-workflows/.github/workflows/pr-checks.yml@main
    with:
      slack_channel_id: "C0AD82A9A74"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # ──────────────────────────────────────────────────
  # 2. Test & Lint
  # Runs on: all events (PR + push to any branch)
  # Skipped on: tag pushes (code already tested on branch)
  # ──────────────────────────────────────────────────
  go-check:
    if: "!startsWith(github.ref, 'refs/tags/')"
    uses: duyhenryer/shared-workflows/.github/workflows/go-check.yml@main
    with:
      command-test: 'go test -race -coverprofile=coverage.out ./...'
      lint: true
    secrets: inherit

  # ──────────────────────────────────────────────────
  # 3. SonarCloud Analysis
  # Runs on: all events except tags
  # ──────────────────────────────────────────────────
  sonar:
    needs: go-check
    uses: duyhenryer/shared-workflows/.github/workflows/sonarqube.yml@main
    with:
      project-key: 'duynhne_{{SERVICE_NAME}}'
      organization: 'duynhne'
      fail-on-quality-gate: false
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────
  # 4a. Build & Push (push to dev/staging/main only)
  # NOT on: pull_request, tags
  # ──────────────────────────────────────────────────
  docker-build:
    needs: [go-check, sonar]
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: '{{SERVICE_NAME}}'
      push: true
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  # ──────────────────────────────────────────────────
  # 4b. Trivy Vulnerability Scan
  # Runs after: docker-build
  # ──────────────────────────────────────────────────
  trivy-scan:
    needs: [docker-build]
    uses: duyhenryer/shared-workflows/.github/workflows/trivy-scan.yml@main
    with:
      image-ref: ghcr.io/${{ github.repository }}/{{SERVICE_NAME}}@${{ needs.docker-build.outputs.digest }}
      severity: 'CRITICAL,HIGH'
      exit-code: '1'
      ignore-unfixed: true
    secrets: inherit
    permissions:
      contents: read
      packages: read
      security-events: write

  # ──────────────────────────────────────────────────
  # 4c. Cosign Signing (only after scan passes)
  # ──────────────────────────────────────────────────
  docker-sign:
    needs: [docker-build, trivy-scan]
    uses: duyhenryer/shared-workflows/.github/workflows/docker-sign.yml@main
    with:
      tags: ${{ needs.docker-build.outputs.tags }}
      digest: ${{ needs.docker-build.outputs.digest }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  # ──────────────────────────────────────────────────
  # 4d. Build Migration Image (push to dev/staging/main only)
  # ──────────────────────────────────────────────────
  docker-db-init:
    needs: [go-check, sonar]
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/')
    uses: duyhenryer/shared-workflows/.github/workflows/docker-build-go.yml@main
    with:
      image-name: '{{SERVICE_NAME}}-init'
      dockerfile: 'db/migrations/Dockerfile'
      context: 'db/migrations'
      push: true
    secrets: inherit
    permissions:
      contents: read
      packages: write
      actions: read

  ## ──────────────────────────────────────────────────────────────
  ## OPTIONAL: Scan + Sign the migration image
  ## Uncomment the two jobs below (and add them to notify.needs)
  ## to apply the same Trivy scan + Cosign sign pipeline to db-init.
  ## ──────────────────────────────────────────────────────────────
  #
  # trivy-scan-db-init:
  #   needs: [docker-db-init]
  #   uses: duyhenryer/shared-workflows/.github/workflows/trivy-scan.yml@main
  #   with:
  #     image-ref: ghcr.io/${{ github.repository }}/{{SERVICE_NAME}}-init@${{ needs.docker-db-init.outputs.digest }}
  #     severity: 'CRITICAL,HIGH'
  #     exit-code: '1'
  #     ignore-unfixed: true
  #   secrets: inherit
  #   permissions:
  #     contents: read
  #     packages: read
  #     security-events: write
  #
  # docker-sign-db-init:
  #   needs: [docker-db-init, trivy-scan-db-init]
  #   uses: duyhenryer/shared-workflows/.github/workflows/docker-sign.yml@main
  #   with:
  #     tags: ${{ needs.docker-db-init.outputs.tags }}
  #     digest: ${{ needs.docker-db-init.outputs.digest }}
  #   secrets: inherit
  #   permissions:
  #     contents: read
  #     packages: write
  #     id-token: write

  # ──────────────────────────────────────────────────
  # 5. Tag Release (v* tags on main only)
  # Promotes the existing digest — no rebuild.
  # Add deployment steps or GitHub Release creation here.
  # ──────────────────────────────────────────────────
  # release:
  #   if: startsWith(github.ref, 'refs/tags/v')
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Create GitHub Release
  #       uses: softprops/action-gh-release@v2
  #       with:
  #         generate_release_notes: true

  # ──────────────────────────────────────────────────
  # 6. Final Status Notification
  # Runs: always, regardless of branch or event type
  # ──────────────────────────────────────────────────
  notify:
    if: always()
    needs: [pr-checks, go-check, sonar, docker-build, trivy-scan, docker-sign, docker-db-init]
    uses: duyhenryer/shared-workflows/.github/workflows/status.yml@main
    with:
      slack_channel_id: "C0AD82A9A74"
      slack_thread_ts: ${{ needs.pr-checks.outputs.slack_thread_ts }}
      gsheet_spreadsheet_id: "1F2VUrAOyMGnETApp5yA-ldCW81ConiQXnWYZVxKas_0"
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
      GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}
