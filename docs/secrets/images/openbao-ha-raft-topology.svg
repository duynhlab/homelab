<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">OpenBAO HA cluster (Raft)</title>
  <desc id="desc">Load Balancer, three OpenBAO nodes (Leader and Followers), and persistent Raft storage on PVCs.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      .box { fill: #f8f9fc; stroke: #334155; stroke-width: 2; }
      .lb { fill: #ede9fe; stroke: #6d28d9; }
      .leader { fill: #dbeafe; stroke: #1d4ed8; }
      .follower { fill: #e0f2fe; stroke: #0369a1; }
      .storage { fill: #dcfce7; stroke: #15803d; }
      .text { font-family: system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; text-anchor: middle; }
      .title { font-size: 1.6rem; font-weight: 600; }
      .label { font-size: 0.95rem; font-weight: 500; }
      .small { font-size: 0.85rem; fill: #475569; }
      .arrow { stroke: #0f172a; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    ]]></style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="700" y="42" class="text title">OpenBAO HA cluster (Raft)</text>

  <!-- Load Balancer -->
  <rect x="520" y="64" width="360" height="100" rx="50" ry="50" class="box lb"/>
  <text x="700" y="125" class="text label">Load Balancer</text>

  <!-- Nodes -->
  <rect x="80" y="248" width="300" height="130" rx="65" ry="65" class="box leader"/>
  <text x="230" y="305" class="text label">OpenBAO Node 1</text>
  <text x="230" y="332" class="text small">(Leader)</text>

  <rect x="540" y="248" width="300" height="130" rx="65" ry="65" class="box follower"/>
  <text x="690" y="305" class="text label">OpenBAO Node 2</text>
  <text x="690" y="332" class="text small">(Follower)</text>

  <rect x="1000" y="248" width="300" height="130" rx="65" ry="65" class="box follower"/>
  <text x="1150" y="305" class="text label">OpenBAO Node 3</text>
  <text x="1150" y="332" class="text small">(Follower)</text>

  <!-- Storage -->
  <rect x="280" y="508" width="820" height="120" rx="60" ry="60" class="box storage"/>
  <text x="690" y="575" class="text label">Persistent Storage (Raft Data on PVCs)</text>

  <!-- Arrows LB -> nodes -->
  <path class="arrow" d="M 580 164 L 230 248"/>
  <path class="arrow" d="M 700 164 L 690 248"/>
  <path class="arrow" d="M 820 164 L 1150 248"/>
  <text x="700" y="200" class="text small">Raft</text>

  <!-- Arrows nodes -> storage -->
  <path class="arrow" d="M 230 378 L 400 508"/>
  <path class="arrow" d="M 690 378 L 690 508"/>
  <path class="arrow" d="M 1150 378 L 980 508"/>
  <text x="690" y="448" class="text small">Raft</text>
</svg>
