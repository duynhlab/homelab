apiVersion: v1
kind: Service
metadata:
  name: demo-go-api-v2
  namespace: monitoring-demo
  labels:
    app: demo-go-api-v2
spec:
  type: NodePort
  selector:
    app: demo-go-api-v2
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 8080
    nodePort: 30081

