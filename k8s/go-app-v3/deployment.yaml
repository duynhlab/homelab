apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-go-api-v3
  namespace: monitoring-demo
  labels:
    app: demo-go-api-v3
    version: v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-go-api-v3
  template:
    metadata:
      labels:
        app: demo-go-api-v3
        version: v3
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: demo-go-api-v3
        image: demo-go-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: APP_VERSION
          value: "v3"
        - name: APP_NAME
          value: "demo-go-api-v3"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

