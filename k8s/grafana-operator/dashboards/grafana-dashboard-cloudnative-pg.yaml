apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cloudnative-pg
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: cnpg-grafana-dashboard  # Created by Helm chart (cnpg-grafana-cluster)
    key: cnp.json  # Helm chart uses 'cnp.json' as the key
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
