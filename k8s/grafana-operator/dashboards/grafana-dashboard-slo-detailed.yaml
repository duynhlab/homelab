apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: slo-detailed
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "SLO"
  url: https://grafana.com/api/dashboards/14348/revisions/latest/download
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
      datasourceUid: prometheus

