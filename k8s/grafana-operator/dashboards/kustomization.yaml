apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-main
    files:
      - microservices-dashboard.json

resources:
  - grafana-dashboard-main.yaml
  - grafana-dashboard-slo-overview.yaml
  - grafana-dashboard-slo-detailed.yaml

