apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-main
    files:
      - microservices-dashboard.json
  - name: grafana-dashboard-tempo
    files:
      - tempo-observability-dashboard.json
  - name: grafana-dashboard-pgcat
    files:
      - pgcat.json

resources:
  - grafana-dashboard-main.yaml
  - grafana-dashboard-slo-overview.yaml
  - grafana-dashboard-slo-detailed.yaml
  - grafana-dashboard-vector.yaml
  - grafana-dashboard-tempo.yaml
  - grafana-dashboard-pgcat.yaml

