apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6-load-generator-legacy
  namespace: monitoring
  labels:
    app: k6-load-generator-legacy
    test-mode: legacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6-load-generator-legacy
  template:
    metadata:
      labels:
        app: k6-load-generator-legacy
        test-mode: legacy
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - k6 run /scripts/load-test.js
        volumeMounts:
        - name: k6-scripts
          mountPath: /scripts
        resources:
          requests:
            memory: 256Mi
            cpu: 200m
          limits:
            memory: 1Gi
            cpu: 1000m
      volumes:
      - name: k6-scripts
        configMap:
          name: k6-load-test
      restartPolicy: Always

