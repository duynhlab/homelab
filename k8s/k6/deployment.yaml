apiVersion: apps/v1
kind: Deployment
metadata:
  name: k6-load-generator
  namespace: monitoring-demo
  labels:
    app: k6-load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k6-load-generator
  template:
    metadata:
      labels:
        app: k6-load-generator
    spec:
      containers:
      - name: k6
        image: k6-prometheus:v4
        imagePullPolicy: IfNotPresent
        command:
        - k6
        - run
        - /scripts/load-test.js
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: 2000m
      restartPolicy: Always

