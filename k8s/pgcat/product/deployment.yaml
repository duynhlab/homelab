# PgCat Deployment for Product Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgcat-product
  namespace: product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgcat-product
  template:
    metadata:
      labels:
        app: pgcat-product
    spec:
      containers:
      - name: pgcat
        image: postgresml/pgcat:latest
        ports:
        - containerPort: 5432
          name: postgres
        - containerPort: 9930
          name: admin
        env:
        - name: PRODUCT_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: product-db-secret
              key: password
        volumeMounts:
        - name: config
          mountPath: /etc/pgcat
      volumes:
      - name: config
        configMap:
          name: pgcat-product-config
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
