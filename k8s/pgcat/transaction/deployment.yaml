# PgCat Deployment for Transaction Services
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgcat-transaction
  namespace: cart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgcat-transaction
  template:
    metadata:
      labels:
        app: pgcat-transaction
    spec:
      containers:
      - name: pgcat
        image: postgresml/pgcat:latest
        ports:
        - containerPort: 5432
          name: postgres
        - containerPort: 9930
          name: admin
        env:
        - name: CART_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: transaction-db-secret
              key: cart-password
        - name: ORDER_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: transaction-db-secret
              key: order-password
        volumeMounts:
        - name: config
          mountPath: /etc/pgcat
      volumes:
      - name: config
        configMap:
          name: pgcat-transaction-config
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
