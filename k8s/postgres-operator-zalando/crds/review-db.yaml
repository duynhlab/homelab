# Review Database Cluster (Zalando Operator)
# Direct connection, no pooler
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: review-db
  namespace: review
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 5Gi
  
  # Single instance (no HA)
  numberOfInstances: 1
  
  # Database and user configuration
  databases:
    review: review
  
  users:
    review:  # Database owner
      - createdb
  
  # No connection pooler (direct connection)
  # Note: To disable pooler, omit connectionPooler section entirely
  
  # PostgreSQL version and parameters
  postgresql:
    version: "15"
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
