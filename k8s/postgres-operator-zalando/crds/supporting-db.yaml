# Supporting Database Cluster (Zalando Operator)
# Shared database for User, Notification, and Shipping-v2 services
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: supporting-db
  namespace: user
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 5Gi
  
  # Single instance
  numberOfInstances: 1
  
  # Multiple databases (shared cluster)
  databases:
    user: user
    notification: notification
    shipping: shipping  # Database for shipping-v2 service
  
  # Multiple users (one per database)
  users:
    user:  # Database owner for user database
      - createdb
    notification:  # Database owner for notification database
      - createdb
    shipping:  # Database owner for shipping database
      - createdb
  
  # No connection pooler (direct connection, low traffic)
  # Note: To disable pooler, omit connectionPooler section entirely
  
  # PostgreSQL version and parameters
  postgresql:
    version: "15"
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
  
  # Patroni configuration for pg_hba.conf
  # Default Zalando operator requires SSL, but we allow unencrypted for simplicity
  # Note: Must include local entries for Patroni to connect via Unix socket
  patroni:
    pg_hba:
      - "local all all peer"              # Local Unix socket connections (required for Patroni)
      - "host all all 127.0.0.1/32 md5"   # Localhost TCP connections
      - "host all all 10.244.0.0/16 md5"  # Allow unencrypted connections from pod network (Kind default CIDR)
      - "host all all 172.19.0.0/16 md5"  # Allow unencrypted connections from Kind bridge network
