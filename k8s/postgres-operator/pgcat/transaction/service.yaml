# PgCat Service for Transaction Services
apiVersion: v1
kind: Service
metadata:
  name: pgcat
  namespace: cart
  labels:
    app: pgcat-transaction
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  - port: 9930
    targetPort: 9930
    protocol: TCP
    name: admin
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app: pgcat-transaction
