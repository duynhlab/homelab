# Supporting Database Cluster (Zalando Operator)
# Shared database for User, Notification, and Shipping-v2 services
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: supporting-db
  namespace: user
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 5Gi
  
  # Single instance
  numberOfInstances: 1
  
  # Multiple databases (shared cluster)
  databases:
    user: user
    notification: notification.notification  # namespace.username format for cross-namespace secret
    shipping: shipping.shipping  # namespace.username format for cross-namespace secret (Database for shipping-v2 service)
  
  # Multiple users (one per database)
  users:
    user:  # Database owner for user database
      - createdb
    notification.notification:  # Database owner for notification database (namespace.username format for cross-namespace secret)
      - createdb
    shipping.shipping:  # Database owner for shipping database (namespace.username format for cross-namespace secret, used by both shipping and shipping-v2 services)
      - createdb
  
  # No connection pooler (direct connection, low traffic)
  # Note: To disable pooler, omit connectionPooler section entirely
  
  # PostgreSQL version and parameters
  postgresql:
    version: "15"
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
  
  # Patroni configuration for pg_hba.conf
  # Default Zalando operator requires SSL, but we allow unencrypted for simplicity
  # Note: Must include local entries for Patroni to connect via Unix socket
  patroni:
    pg_hba:
      - "local all all peer"              # Local Unix socket connections (required for Patroni)
      - "host all all 127.0.0.1/32 md5"   # Localhost TCP connections
      - "host all all 10.244.0.0/16 md5"  # Allow unencrypted connections from pod network (Kind default CIDR)
      - "host all all 172.19.0.0/16 md5"  # Allow unencrypted connections from Kind bridge network

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: "1Gi"
  # Sidecar: postgres_exporter for Prometheus metrics collection
  sidecars:
    - name: exporter
      image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
      ports:
        - name: exporter
          containerPort: 9187
          protocol: TCP
      resources:
        limits:
          cpu: 500m
          memory: 256M
        requests:
          cpu: 100m
          memory: 256M
      env:
        - name: "DATA_SOURCE_URI"
          value: "localhost/postgres?sslmode=require"
        - name: "DATA_SOURCE_USER"
          value: "$(POSTGRES_USER)"
        - name: "DATA_SOURCE_PASS"
          value: "$(POSTGRES_PASSWORD)"
        - name: "PG_EXPORTER_AUTO_DISCOVER_DATABASES"
          value: "true"