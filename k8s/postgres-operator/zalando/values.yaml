# Zalando Postgres Operator Helm Values
# Chart: postgres-operator/postgres-operator
# Version: v1.15.1 (adjust as needed)
# Docs: https://github.com/zalando/postgres-operator

# Operator image configuration
image:
  registry: ghcr.io
  repository: zalando/postgres-operator
  tag: v1.15.1
  pullPolicy: "IfNotPresent"

# Operator configuration (flat structure - NOT nested under config:)
# Helm chart expects flat top-level keys: configKubernetes, configGeneral, configPostgresql, etc.

# Kubernetes API connection
configKubernetes:
  # Default DNS domain of K8s cluster where operator is running
  cluster_domain: cluster.local
  # Allow user secrets in other namespaces than the Postgres cluster
  enable_cross_namespace_secret: true  # Enable cross-namespace secret creation for supporting-db cluster

# Connection pooler (PgBouncer) configuration
configConnectionPooler:
  # db schema to install lookup function into
  connection_pooler_schema: "pooler"
  # db user for pooler to use
  connection_pooler_user: "pooler"
  # docker image
  connection_pooler_image: "registry.opensource.zalan.do/acid/pgbouncer:master-32"
  # max db connections the pooler should hold
  connection_pooler_max_db_connections: 60
  # default pooling mode
  connection_pooler_mode: "transaction"
  # number of pooler instances
  connection_pooler_number_of_instances: 2
  # default resources
  connection_pooler_default_cpu_request: 500m
  connection_pooler_default_memory_request: 100Mi
  connection_pooler_default_cpu_limit: "1"
  connection_pooler_default_memory_limit: 100Mi

# Backup configuration (AWS/GCP/Azure)
configAwsOrGcp:
  # AWS region used to store EBS volumes
  aws_region: eu-central-1
  # S3 bucket to use for shipping WAL segments with WAL-E
  wal_s3_bucket: ""  # Leave empty for no backup (learning project)
  # GCS bucket to use for shipping WAL segments with WAL-E
  # wal_gs_bucket: ""
  # Azure Storage Account to use for shipping WAL segments with WAL-G
  # wal_az_storage_account: ""

# General configuration
configGeneral:
  enable_pgversion_env_var: true

# Operator resources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# Service account
serviceAccount:
  create: true
  name: "postgres-operator"

# RBAC
rbac:
  create: true

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Operator needs write access
  capabilities:
    drop:
      - ALL
