apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-zalando-vector-config
  namespace: auth
data:
  vector.yaml: |
    sources:
      postgres_logs:
        type: file
        include:
          - /home/postgres/pgdata/pgroot/pg_log/*.log
        read_from: beginning
        multiline:
          start_pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} UTC'
          condition_pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} UTC'
          mode: continue_through
          timeout_ms: 3000

    transforms:
      add_labels:
        type: remap
        inputs: ["postgres_logs"]
        source: |
          .job = "postgres"
          .namespace = "auth"
          .container = "postgres"
          .cluster = "auth-db"
          .pod = get_env_var!("POD_NAME")

    sinks:
      loki:
        type: loki
        inputs: ["add_labels"]
        endpoint: http://loki.monitoring.svc.cluster.local:3100
        encoding:
          codec: json
        labels:
          job: "{{ job }}"
          namespace: "{{ namespace }}"
          pod: "{{ pod }}"
          container: "{{ container }}"
          cluster: "{{ cluster }}"
