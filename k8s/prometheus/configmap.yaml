apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'kind-monitoring-demo'

    # SLO recording rules and alerts (generated by Sloth)
    # All rule files are mounted from ConfigMaps via projected volume
    rule_files:
      - "/etc/prometheus/slo-rules/*.yaml"

    scrape_configs:
      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)

      # Microservices - Auto-discover pods with app label
      - job_name: 'microservices'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - auth
            - user
            - product
            - cart
            - order
            - review
            - notification
            - shipping
        relabel_configs:
        # Keep only pods with app label
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: keep
          regex: .+
        
        # Extract app name from pod label
        - source_labels: [__meta_kubernetes_pod_label_app]
          action: replace
          target_label: app
        
        # Extract namespace
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        
        # Use pod name as instance
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: instance
        
        # Extract pod IP and port for scraping
        - source_labels: [__meta_kubernetes_pod_ip]
          action: replace
          regex: (.+)
          target_label: __address__
          replacement: $1:8080
        
        # Set metrics path
        - target_label: __metrics_path__
          replacement: /metrics

      # cAdvisor for container metrics
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
        - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        - target_label: job
          replacement: kubernetes-cadvisor

      # kube-state-metrics
      - job_name: 'kube-state-metrics'
        static_configs:
        - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']

