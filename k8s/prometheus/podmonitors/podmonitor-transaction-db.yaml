# PodMonitor for transaction-db PostgreSQL cluster (CloudNativePG)
# Prometheus Operator will discover and scrape metrics from postgres_exporter sidecar
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: transaction-db
  namespace: cart
  labels:
    app: transaction-db
    operator: cloudnativepg
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: transaction-db  # CloudNativePG cluster label
  podTargetLabels:
    - cnpg.io/cluster
    - cnpg.io/instanceRole
    - cnpg.io/instanceName
  podMetricsEndpoints:
  - port: metrics  # CloudNativePG postgres_exporter port name
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
