apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-api
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
spec:
  # Select specific microservice namespaces
  namespaceSelector:
    matchNames:
      - auth
      - user
      - product
      - cart
      - order
      - review
      - notification
      - shipping
  
  # Match all services in selected namespaces (all microservices have app label from Helm chart)
  selector:
    matchExpressions:
      - key: app
        operator: Exists
  
  # Scrape configuration
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    relabelings:
      # Add namespace label from pod metadata
      - sourceLabels: [__meta_kubernetes_namespace]
        targetLabel: namespace
      # Add app label from service label
      - sourceLabels: [__meta_kubernetes_service_label_app]
        targetLabel: app



