apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: monitoring
  labels:
    app: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
      - name: pyroscope
        image: pyroscope/pyroscope:latest
        args:
          - server
          - --config-path=/etc/pyroscope/config.yaml
        ports:
        - name: http
          containerPort: 4040
        volumeMounts:
        - name: pyroscope-config
          mountPath: /etc/pyroscope
        - name: pyroscope-storage
          mountPath: /var/lib/pyroscope
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 4040
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 4040
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: pyroscope-config
        configMap:
          name: pyroscope-config
      - name: pyroscope-storage
        emptyDir: {}

