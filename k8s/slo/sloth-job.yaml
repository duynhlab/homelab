apiVersion: v1
kind: ConfigMap
metadata:
  name: sloth-slo-config
  namespace: monitoring
  labels:
    app: sloth
    component: slo-config
data:
  # Placeholder - will be populated from slo/definitions/*.yaml files
  # Use: kubectl create configmap sloth-slo-config --from-file=slo/definitions/ -n monitoring --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sloth-generate-slo
  namespace: monitoring
  labels:
    app: sloth
    component: slo-generator
spec:
  ttlSecondsAfterFinished: 3600  # Clean up after 1 hour
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: sloth
        component: slo-generator
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sloth
        image: ghcr.io/slok/sloth:v0.15.0
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting Sloth SLO generation for all services..."
          echo "Available definition files:"
          ls -la /config/*.yaml
          
          echo ""
          echo "Excluding all-services.yaml (legacy format)..."
          DEFINITION_FILES=$(ls /config/*.yaml | grep -v all-services.yaml)
          echo "Processing files:"
          echo "$DEFINITION_FILES"
          
          echo ""
          echo "Generating Prometheus rules for all services..."
          sloth generate \
            --input $DEFINITION_FILES \
            --out /output/slo-recording-rules.yaml \
            --slo-period 30d \
            --default-slo-period 30d
          
          if [ $? -eq 0 ]; then
            echo ""
            echo "✅ Successfully generated SLO recording rules!"
            echo ""
            echo "Generated rules preview (first 50 lines):"
            head -50 /output/slo-recording-rules.yaml
            echo ""
            echo "..."
            echo ""
            echo "Total lines: $(wc -l < /output/slo-recording-rules.yaml)"
            echo ""
            echo "📋 To apply these rules:"
            echo "   1. Extract rules: kubectl cp monitoring/$(hostname):/output/slo-recording-rules.yaml ./slo/generated/prometheus-rules.yaml"
            echo "   2. Apply to Prometheus ConfigMap"
            echo ""
            echo "✅ Done! Rules saved to /output/slo-recording-rules.yaml"
          else
            echo "❌ Error generating SLO rules!"
            exit 1
          fi
        volumeMounts:
        - name: slo-config
          mountPath: /config
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: slo-config
        configMap:
          name: sloth-slo-config
      - name: output
        emptyDir: {}
---
# Note: To run this job and capture output:
#
# 1. Create ConfigMap from all SLO definition files:
#    kubectl create configmap sloth-slo-config \
#      --from-file=slo/definitions/ \
#      -n monitoring \
#      --dry-run=client -o yaml | kubectl apply -f -
#
# 2. Run the job:
#    kubectl apply -f slo/k8s/sloth-job.yaml
#
# 3. Wait for job to complete:
#    kubectl wait --for=condition=complete job/sloth-generate-slo -n monitoring --timeout=300s
#
# 4. View logs to see generated rules:
#    kubectl logs job/sloth-generate-slo -n monitoring
#
# 5. Extract generated rules from pod:
#    POD=$(kubectl get pod -l app=sloth,component=slo-generator -n monitoring -o jsonpath='{.items[0].metadata.name}')
#    kubectl cp monitoring/$POD:/output/slo-recording-rules.yaml ./slo/generated/prometheus-rules.yaml
#
# Alternative: Use local script (recommended):
#    ./slo/scripts/generate-rules.sh

