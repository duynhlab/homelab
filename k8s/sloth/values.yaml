# Sloth Operator Helm Values
# Chart: sloth/sloth
# Version: v0.15.0
# Docs: https://github.com/slok/sloth/tree/main/deploy/kubernetes/helm/sloth

global:
  imageRegistry: ""  # Use default

image:
  registry: ghcr.io
  repository: slok/sloth
  tag: v0.15.0

resources:
  limits:
    cpu: 100m
    memory: 256Mi
  requests:
    cpu: 20m
    memory: 128Mi

sloth:
  resyncInterval: "5m"          # Controller resync interval
  workers: 2                     # Concurrent workers (2 services per worker)
  labelSelector: ""              # Process all PrometheusServiceLevel CRs
  namespace: "monitoring"        # Only watch monitoring namespace
  extraLabels:                   # Extra labels on generated rules
    team: platform
    managed-by: sloth-operator
  defaultSloPeriod: "30d"        # Default SLO period (30 days)
  debug:
    enabled: true
  logger: default                # Or "json" for structured logs

# Common SLI plugins (useful for standard SLIs)
commonPlugins:
  enabled: true
  image:
    repository: registry.k8s.io/git-sync/git-sync
    tag: v4.5.0
  gitRepo:
    url: https://github.com/slok/sloth-common-sli-plugins
    branch: main
    resources:
      limits:
        cpu: 50m
        memory: 100Mi
      requests:
        cpu: 10m
        memory: 50Mi

# Prometheus metrics for Sloth itself
metrics:
  enabled: true
  prometheusLabels:
    app: sloth
    component: slo-operator

# Custom SLO config (alert windows)
customSloConfig:
  enabled: false  # Use default windows

# Security context
# Note: Using Helm chart default (securityContext: null) to allow git-sync container
# to write temporary files to /tmp. The readOnlyRootFilesystem: true constraint
# prevents git-sync from creating gitconfig files, causing CrashLoopBackOff.
# securityContext:
#   pod:
#     runAsNonRoot: true
#     runAsUser: 65534
#     fsGroup: 65534
#   container:
#     allowPrivilegeEscalation: false
#     readOnlyRootFilesystem: true

