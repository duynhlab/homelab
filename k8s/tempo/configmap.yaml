apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317

    ingester:
      max_block_duration: 5m

    metrics_generator:
      # Enable metrics-generator processor
      processor:
        service_graphs:
          dimensions:
            - resource.service.name
            - resource.cluster
            - resource.namespace
            - resource.pod
        span_metrics:
          dimensions:
            - resource.service.name
            - resource.cluster
            - resource.namespace
            - resource.pod
            - http.method
            - http.status_code
      # Store metrics locally (no remote write needed for rate() queries)
      storage:
        path: /var/tempo/generator/wal
        remote_write: []
      # Enable trace-to-metrics correlation
      registry:
        external_labels:
          source: tempo
      # Optional: configure dimensions
      traces_storage:
        path: /var/tempo/generator/traces

    compactor:
      compaction:
        block_retention: 1h
        compacted_block_retention: 10m

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        pool:
          max_workers: 100
          queue_depth: 10000

