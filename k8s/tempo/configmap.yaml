apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317

    ingester:
      max_block_duration: 5m

    # Memberlist for single-instance mode
    memberlist:
      bind_port: 7946
      join_members:
        - localhost:7946

    metrics_generator:
      # Enable metrics-generator processor
      processor:
        service_graphs:
          dimensions:
            - resource.service.name
            - resource.cluster
            - resource.namespace
            - resource.pod
        span_metrics:
          dimensions:
            - resource.service.name
            - resource.cluster
            - resource.namespace
            - resource.pod
            - http.method
            - http.status_code
      # Store metrics locally and expose via /metrics endpoint
      storage:
        path: /var/tempo/generator/wal
        remote_write: []
      # Enable trace-to-metrics correlation and expose metrics via Prometheus endpoint
      registry:
        external_labels:
          source: tempo
        collection_interval: 15s
      # Optional: configure dimensions
      traces_storage:
        path: /var/tempo/generator/traces
      # CRITICAL: Expose generated metrics via HTTP metrics endpoint
      metrics_ingestion_time_range_slack: 30s

    compactor:
      compaction:
        block_retention: 1h
        compacted_block_retention: 10m

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        pool:
          max_workers: 100
          queue_depth: 10000

