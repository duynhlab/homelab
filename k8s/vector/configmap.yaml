apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: kube-system
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    api:
      enabled: true
      address: 0.0.0.0:8686
      playground: false

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_field_selector: ""
        extra_label_selector: ""

    transforms:
      add_labels:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          # Add service from pod label (use pod_name as fallback to avoid too many "unknown" streams)
          if exists(.pod_labels."app") {
            .service = .pod_labels."app"
          } else if exists(.pod_name) {
            .service = .pod_name
          } else {
            .service = "system"
          }
          
          # Add namespace (always use pod_namespace if available)
          if exists(.pod_namespace) {
            .namespace = .pod_namespace
          } else {
            .namespace = "kube-system"
          }
          
          # Ensure pod_name and container_name exist (use actual values, not "unknown")
          if !exists(.pod_name) {
            .pod_name = "unknown-pod"
          }
          
          if !exists(.container_name) {
            .container_name = "unknown-container"
          }

    sinks:
      loki:
        type: loki
        inputs:
          - add_labels
        endpoint: http://loki.monitoring.svc.cluster.local:3100
        encoding:
          codec: json
        labels:
          service: "{{service}}"
          namespace: "{{namespace}}"
          pod: "{{pod_name}}"
          container: "{{container_name}}"
        out_of_order_action: accept
        batch:
          max_bytes: 3145728
          timeout_secs: 5
        request:
          rate_limit_duration_secs: 1
          rate_limit_num: 100
        healthcheck:
          enabled: true

