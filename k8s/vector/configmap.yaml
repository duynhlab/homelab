apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: monitoring
data:
  vector.yaml: |
    data_dir: /vector-data-dir

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        extra_field_selector: ""
        extra_label_selector: ""

    transforms:
      parse_json:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          # Parse JSON logs
          if match(.message, r'^\s*\{') {
            parsed, err = parse_json(.message)
            if err == null {
              . = merge(., parsed)
            }
          }
          
          # Extract trace_id from log message or parsed JSON
          if exists(.trace_id) {
            .trace_id = string(.trace_id)
          } else if exists(.traceId) {
            .trace_id = string(.traceId)
          } else if exists(.traceid) {
            .trace_id = string(.traceid)
          }
          
          # Add service name from pod labels
          if exists(.pod_labels."app") {
            .service = .pod_labels."app"
          }
          
          # Add namespace
          if exists(.pod_namespace) {
            .namespace = .pod_namespace
          }

    sinks:
      loki:
        type: loki
        inputs:
          - parse_json
        endpoint: http://loki.monitoring.svc.cluster.local:3100
        encoding:
          codec: json
        labels:
          service: "{{ service }}"
          namespace: "{{ namespace }}"
          pod: "{{ pod_name }}"
          container: "{{ container_name }}"
          trace_id: "{{ trace_id }}"
        healthcheck:
          enabled: true

