kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: monitoring-demo
nodes:
  - role: control-plane
    image: kindest/node:v1.33.0
    extraPortMappings:
    - containerPort: 30080  # Go API
      hostPort: 8080
      protocol: TCP
    - containerPort: 30090  # Prometheus
      hostPort: 9090
      protocol: TCP
    - containerPort: 30300  # Grafana
      hostPort: 3000
      protocol: TCP
  - role: worker
    image: kindest/node:v1.33.0
  - role: worker
    image: kindest/node:v1.33.0