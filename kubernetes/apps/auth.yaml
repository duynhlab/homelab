---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth
  namespace: auth
spec:
  interval: 10m
  timeout: 5m
  
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  
  releaseName: auth
  
  # Local environment configuration (inline, no overlay needed)
  values:
    # Values for auth service
    name: auth

    replicaCount: 2

    image:
      repository: ghcr.io/duynhne/auth
      tag: v6
      pullPolicy: Always

    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http

    containerPort: 8080

    # Core configuration (chart-managed via env)
    # See charts/README.md for complete guide on env vs extraEnv
    env:
      - name: SERVICE_NAME
        value: "auth"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "0.1"  # 10% sampling for production
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      # Database configuration
      - name: DB_HOST
        value: "auth-db-pooler.auth.svc.cluster.local"  # PgBouncer pooler endpoint - auth-db is in auth namespace
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: "auth"
      - name: DB_USER
        value: "auth"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: auth.auth-db.credentials.postgresql.acid.zalan.do  # Zalando operator auto-generated secret
            key: password
      - name: DB_SSLMODE
        value: "require"  # PgBouncer requires SSL connections
      - name: DB_POOL_MAX_CONNECTIONS
        value: "25"  # PgBouncer pool size
      - name: DB_POOL_MODE
        value: "transaction"  # PgBouncer transaction pooling
      # Graceful shutdown configuration
      - name: SHUTDOWN_TIMEOUT
        value: "10s"  # Default shutdown timeout (can be overridden)

    # Kubernetes graceful shutdown configuration
    terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

    # Database migrations (Flyway init container)
    migrations:
      enabled: true
      image: ghcr.io/duynhne/auth:v6-init
      imagePullPolicy: Always #IfNotPresent
      env:
        DB_HOST: "auth-db.auth.svc.cluster.local"  # Direct connection for migrations - auth-db is in auth namespace
        DB_PORT: "5432"
        DB_NAME: "auth"
        DB_USER: "auth"
        DB_SSLMODE: "require"
      envFrom:
        secretRef: "auth.auth-db.credentials.postgresql.acid.zalan.do"  # Zalando operator auto-generated secret
