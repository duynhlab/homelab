# Cart Service - Local environment configuration (simplified structure)
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cart
  namespace: cart
spec:
  interval: 10m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  releaseName: cart
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3  
  values:
    name: cart

    replicaCount: 2

    image:
      repository: ghcr.io/duynhne/cart-service/cart
      tag: latest
      pullPolicy: Always

    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http

    containerPort: 8080

    env:
      - name: SERVICE_NAME
        value: "cart"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "0.1"
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      # Database configuration
      - name: DB_HOST
        value: "pgcat.cart.svc.cluster.local"  # PgCat pooler endpoint - pgcat service is in cart namespace
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: "cart"
      - name: DB_USER
        value: "cart"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: transaction-shared-db-secret
            key: password
      - name: DB_SSLMODE
        value: "disable"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "30"
      - name: DB_POOLER_TYPE
        value: "pgcat"
      # Graceful shutdown configuration
      - name: SHUTDOWN_TIMEOUT
        value: "10s"  # Default shutdown timeout (can be overridden)
      - name: READINESS_DRAIN_DELAY
        value: "5s"  # Delay after failing readiness, before HTTP shutdown

    # Kubernetes graceful shutdown configuration
    terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

    slo:
      enabled: true

    resources:
      requests:
        memory: "32Mi"
        cpu: "20m"
      limits:
        memory: "64Mi"
        cpu: "50m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

    # Database migrations (Flyway init container)
    migrations:
      enabled: true
      image: ghcr.io/duynhne/cart-service/cart-init:latest
      imagePullPolicy: Always #IfNotPresent
      env:
        DB_HOST: "transaction-shared-db-rw.cart.svc.cluster.local"  # Direct connection, no pooler
        DB_PORT: "5432"
        DB_NAME: "cart"
        DB_USER: "cart"
        DB_SSLMODE: "require"
      envFrom:
        secretRef: "transaction-shared-db-secret"
