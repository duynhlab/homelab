# Frontend Service - ResourceSet (learning example, simplified structure)
---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: frontend-config
  namespace: default
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "10m"
spec:
  type: Static
  
  defaultValues:
    service: frontend
    version: v6
    environment: local
    replicas: 1
    port: 80
---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: frontend
  namespace: default
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "10m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: ui
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: frontend
  
  inputsFrom:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSetInputProvider
      name: frontend-config
  
  resources:
    # HelmRelease for Frontend using templating
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: << inputs.service >>
        namespace: default
      spec:
        interval: 10m
        timeout: 5m
        
        chartRef:
          kind: OCIRepository
          name: mop-chart-oci
          namespace: flux-system
        
        releaseName: << inputs.service >>
        
        values:
          name: << inputs.service >>
          replicaCount: << inputs.replicas | int >>
          
          image:
            repository: ghcr.io/duynhne/<< inputs.service >>
            tag: << inputs.version | quote >>
            pullPolicy: Always
          
          service:
            type: ClusterIP
            port: << inputs.port | int >>
            targetPort: << inputs.port | int >>
            portName: http
          
          containerPort: << inputs.port | int >>
          
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
          
          livenessProbe:
            enabled: true
            httpGet:
              path: /health
              port: << inputs.port | int >>
            initialDelaySeconds: 10
            periodSeconds: 10
          
          readinessProbe:
            enabled: true
            httpGet:
              path: /health
              port: << inputs.port | int >>
            initialDelaySeconds: 5
            periodSeconds: 5
          
          migrations:
            enabled: false
