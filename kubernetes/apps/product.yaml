---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: product
  namespace: product
spec:
  interval: 10m
  timeout: 10m  
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  releaseName: product
  values:
    name: product

    replicaCount: 2

    image:
      repository: ghcr.io/duynhne/product
      tag: v6
      pullPolicy: Always

    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http

    containerPort: 8080

    env:
      - name: SERVICE_NAME
        value: "product"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "0.1"
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      # Database configuration (via PgDog pooler)
      - name: DB_HOST
        value: "pgdog-product.product.svc.cluster.local"  # PgDog pooler endpoint
      - name: DB_PORT
        value: "6432"  # PgDog port
      - name: DB_NAME
        value: "product"
      - name: DB_USER
        value: "product"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: product-db-secret
            key: password
      - name: DB_SSLMODE
        value: "disable"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "50"  # Higher for high traffic
      - name: DB_POOLER_TYPE
        value: "pgdog"  # Indicates PgDog pooler (for logging/monitoring)
      # Graceful shutdown configuration
      - name: SHUTDOWN_TIMEOUT
        value: "10s"  # Default shutdown timeout (can be overridden)
      # Review service URL for product details aggregation
      - name: REVIEW_SERVICE_URL
        value: "http://review.review.svc.cluster.local:8080"

    # Kubernetes graceful shutdown configuration
    terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

    # Database migrations (Flyway init container)
    migrations:
      enabled: true
      image: ghcr.io/duynhne/product:v6-init
      imagePullPolicy: Always #IfNotPresent
      env:
        DB_HOST: "product-db-rw.product.svc.cluster.local"  # Direct connection, no pooler
        DB_PORT: "5432"
        DB_NAME: "product"
        DB_USER: "product"
        DB_SSLMODE: "require"
      envFrom:
        secretRef: "product-db-secret"
