apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-auth
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: identity
spec:
  type: Static
  defaultValues:
    name: auth
    image_tag: "1.4.0" # {"$imagepolicy": "flux-system:auth:tag"}
    namespace: auth
    # Phase 5: auth is HTTP-only — the gRPC GetMe server was removed (services
    # verify JWTs locally against the JWKS), so no grpc_server input.
    jwt_signing: true # RFC-0009 Phase 4: inject RS256 signing key from OpenBAO (auth only)
    replicaCount: 1
    db_host: "platform-db-pooler-rw.platform.svc.cluster.local"
    db_port: "5432"
    db_migration_host: "platform-db-rw.platform.svc.cluster.local"
    db_secret: "platform-db-secret"
    db_sslmode: "disable"
    pool_max: "30"
