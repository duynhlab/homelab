apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-auth
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: identity
spec:
  type: Static
  defaultValues:
    name: auth
    image_tag: "1.0.1" # {"$imagepolicy": "flux-system:auth:tag"}
    namespace: auth
    # Phase 5: auth is HTTP-only — the gRPC GetMe server was removed (services
    # verify JWTs locally against the JWKS), so no grpc_server input.
    jwt_signing: true # RFC-0009 Phase 4: inject RS256 signing key from OpenBAO (auth only)
    replicaCount: 2
    db_host: "auth-db-pooler.auth.svc.cluster.local"
    db_migration_host: "auth-db.auth.svc.cluster.local"
    db_secret: "auth.auth-db.credentials.postgresql.acid.zalan.do"
    pool_max: "25"
