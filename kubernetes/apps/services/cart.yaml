apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-cart
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: checkout
spec:
  type: Static
  defaultValues:
    name: cart
    image_tag: "1.3.0" # {"$imagepolicy": "flux-system:cart:tag"}
    namespace: cart
    platform_backup_label: "cnpg"
    replicaCount: 2
    db_host: "pgdog-product.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "product-db-rw.product.svc.cluster.local"
    db_secret: "product-db-cart-secret"
    db_sslmode: "disable"
    pool_max: "30"
    # Internal gRPC server (:9090) — checkout reads the cart over cart.v1
    # (RFC-0015). The mop chart adds a grpc:9090 port to the cart Service.
    grpc_server: true
    # MUST stay the string "false": the template guard is truthiness-based,
    # so a boolean false would drop the env entirely — leaving reflection ON.
    grpc_reflection: "false"
