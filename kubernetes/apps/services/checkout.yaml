apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-checkout
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: checkout
spec:
  type: Static
  defaultValues:
    name: checkout
    image_tag: "0.2.0" # {"$imagepolicy": "flux-system:checkout:tag"}
    namespace: checkout
    # No platform_backup_label: checkout's data lives on product-db in the
    # product namespace, which is already backed up (same reasoning as
    # payment).
    # Two replicas deliberately: the confirm flow is multi-replica-safe by
    # design — idempotency claims, session↔claim binding, and stale-lock
    # takeover all live in the database (RFC-0015 P2), not in memory.
    replicaCount: 2
    db_host: "pgdog-product.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "product-db-rw.product.svc.cluster.local"
    db_secret: "product-db-checkout-secret"
    db_sslmode: "disable"
    pool_max: "25"
    # No grpc_server: checkout is a gRPC CLIENT only (cart/product/order/
    # shipping); its own API surface is HTTP behind Kong. The upstream
    # addresses and Temporal endpoint are NOT set here — the service's
    # config defaults are already the cluster DNS names (cart-grpc.cart,
    # order-grpc.order, …, temporal-frontend.temporal), and the platform
    # convention is to set inputs only where the default is wrong.
