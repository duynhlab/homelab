apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-notification
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhne.dev/domain: comms
spec:
  type: Static
  defaultValues:
    name: notification
    namespace: notification
    replicaCount: 1
    db_host: "supporting-shared-db-pooler.user.svc.cluster.local"
    db_migration_host: "supporting-shared-db.user.svc.cluster.local"
    db_secret: "notification.notification.supporting-shared-db.credentials.postgresql.acid.zalan.do"
    pool_max: "10"
    db_user: "notification.notification"
    auth_url: "http://auth.auth.svc.cluster.local:8080"
