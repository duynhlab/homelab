apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-order
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: checkout
spec:
  type: Static
  defaultValues:
    name: order
    image_tag: "1.3.0" # {"$imagepolicy": "flux-system:order:tag"}
    namespace: order
    platform_backup_label: "cnpg"
    replicaCount: 2
    db_host: "pgdog-product.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "product-db-rw.product.svc.cluster.local"
    db_secret: "product-db-order-secret"
    db_sslmode: "disable"
    pool_max: "30"
    # order calls shipping + publishes notifications over gRPC (headless :9090).
    shipping_grpc_addr: "dns:///shipping-grpc.shipping.svc.cluster.local:9090"
    notification_grpc_addr: "dns:///notification-grpc.notification.svc.cluster.local:9090"
    # The API dials payment for the order-details enrichment (GetPayment).
    # Explicit because the code default points at the plain `payment` Service
    # name, not the headless `payment-grpc` one. The saga's payment steps are
    # always on (no feature flag); the worker uses its own PAYMENT_GRPC_ADDR.
    payment_grpc_addr: "dns:///payment-grpc.payment.svc.cluster.local:9090"
    # Internal gRPC server (:9090) — checkout's confirm handoff calls
    # order.v1/CreateOrder (RFC-0015, ADR-018). The mop chart renders the
    # order-grpc Service from this.
    grpc_server: true
    # MUST stay the string "false": the template guard is truthiness-based,
    # so a boolean false would drop the env entirely — leaving reflection ON.
    grpc_reflection: "false"
