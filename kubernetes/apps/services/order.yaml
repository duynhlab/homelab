apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-order
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: checkout
spec:
  type: Static
  defaultValues:
    name: order
    image_tag: "1.0.1" # {"$imagepolicy": "flux-system:order:tag"}
    namespace: order
    platform_backup_label: "cnpg"
    replicaCount: 2
    db_host: "pgdog-cnpg.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "cnpg-db-rw.product.svc.cluster.local"
    db_secret: "cnpg-db-order-secret"
    db_sslmode: "disable"
    pool_max: "30"
    # order calls shipping + publishes notifications over gRPC (headless :9090).
    shipping_grpc_addr: "dns:///shipping-grpc.shipping.svc.cluster.local:9090"
    notification_grpc_addr: "dns:///notification-grpc.notification.svc.cluster.local:9090"
    # Turn the saga's payment steps on (authorize-early / capture-late +
    # void/refund compensations). The API stamps this on the workflow input;
    # the worker (PAYMENT_GRPC_ADDR) makes the calls. MUST stay a string —
    # the template guard is truthiness-based.
    payment_enabled: "true"
