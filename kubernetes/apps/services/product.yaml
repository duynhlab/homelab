apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-product
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: catalog
spec:
  type: Static
  defaultValues:
    name: product
    image_tag: "1.0.1" # {"$imagepolicy": "flux-system:product:tag"}
    namespace: product
    platform_backup_label: "cnpg"
    replicaCount: 2
    db_host: "pgdog-cnpg.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "cnpg-db-rw.product.svc.cluster.local"
    db_secret: "cnpg-db-secret"
    db_sslmode: "disable"
    pool_max: "50"
    cache_enabled: "true"
    # RFC-0014 P1 canary: product dual-emits semconv metrics over OTLP first;
    # the rest of the fleet keeps the template default ("false") until soak.
    otel_metrics_enabled: "true"
    review_grpc_addr: "dns:///review-grpc.review.svc.cluster.local:9090"
