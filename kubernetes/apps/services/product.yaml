apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-product
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhne.dev/domain: catalog
spec:
  type: Static
  defaultValues:
    name: product
    namespace: product
    replicaCount: 2
    db_host: "pgdog-product.product.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "product-db-rw.product.svc.cluster.local"
    db_secret: "product-db-secret"
    db_sslmode: "disable"
    pool_max: "50"
    cache_enabled: "true"
    review_url: "http://review.review.svc.cluster.local:8080"
