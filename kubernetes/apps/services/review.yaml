apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-review
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: catalog
spec:
  type: Static
  defaultValues:
    name: review
    image_tag: "1.4.0" # {"$imagepolicy": "flux-system:review:tag"}
    namespace: review
    grpc_server: true
    replicaCount: 1
    db_host: "pgdog-platform.platform.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "platform-db-rw.platform.svc.cluster.local"
    db_secret: "platform-db-review-secret"
    db_sslmode: "disable"
    pool_max: "30"
