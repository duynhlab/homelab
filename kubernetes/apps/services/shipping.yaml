apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-shipping
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: comms
spec:
  type: Static
  defaultValues:
    name: shipping
    image_tag: "1.2.0" # {"$imagepolicy": "flux-system:shipping:tag"}
    namespace: shipping
    grpc_server: true
    replicaCount: 1
    db_host: "pgdog-shared.user.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "shared-db-rw.user.svc.cluster.local"
    db_secret: "shared-db-shipping-secret"
    db_sslmode: "disable"
    pool_max: "30"
