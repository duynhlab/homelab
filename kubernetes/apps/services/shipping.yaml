apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-shipping
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: comms
spec:
  type: Static
  defaultValues:
    name: shipping
    image_tag: "1.2.0" # {"$imagepolicy": "flux-system:shipping:tag"}
    namespace: shipping
    grpc_server: true
    replicaCount: 1
    db_host: "supporting-shared-db-pooler.user.svc.cluster.local"
    db_migration_host: "supporting-shared-db.user.svc.cluster.local"
    db_secret: "shipping.shipping.supporting-shared-db.credentials.postgresql.acid.zalan.do"
    db_user: "shipping.shipping"
    pool_max: "10"
