apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSetInputProvider
metadata:
  name: rsip-user
  namespace: default
  labels:
    app.kubernetes.io/part-of: backend-services
    platform.duynhlab.dev/domain: identity
spec:
  type: Static
  defaultValues:
    name: user
    image_tag: "1.4.0" # {"$imagepolicy": "flux-system:user:tag"}
    namespace: user
    replicaCount: 1
    db_host: "pgdog-platform.platform.svc.cluster.local"
    db_port: "6432"
    db_migration_host: "platform-db-rw.platform.svc.cluster.local"
    db_secret: "platform-db-user-secret"
    db_sslmode: "disable"
    pool_max: "30"
