---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shipping-v2
  namespace: shipping
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  releaseName: shipping-v2
  values:
    # Values for shipping-v2 service (v2 only)
    name: shipping-v2

    replicaCount: 2

    image:
      repository: ghcr.io/duynhne/shipping-v2
      tag: v6
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http

    containerPort: 8080

    env:
      - name: SERVICE_NAME
        value: "shipping-v2"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "0.1"
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      # Database configuration (via PgBouncer pooler)
      - name: DB_HOST
        value: "supporting-db-pooler.user.svc.cluster.local"  # PgBouncer pooler service
      - name: DB_PORT
        value: "5432"  # PgBouncer port
      - name: DB_NAME
        value: "shipping"  # Same database as shipping service
      - name: DB_USER
        value: "shipping.shipping"  # Use namespace.username format for cross-namespace secret
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: shipping.shipping.supporting-db.credentials.postgresql.acid.zalan.do  # Zalando operator cross-namespace secret (in shipping namespace)
            key: password
      - name: DB_SSLMODE
        value: "require"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "10"  # Low traffic, smaller pool
      # Graceful shutdown configuration
      - name: SHUTDOWN_TIMEOUT
        value: "10s"  # Default shutdown timeout (can be overridden)

    # Kubernetes graceful shutdown configuration
    terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

    resources:
      requests:
        memory: "24Mi"
        cpu: "10m"
      limits:
        memory: "64Mi"
        cpu: "30m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

    # Database migrations (Flyway init container)
    # Disabled: shipping-v2 shares database "shipping" with shipping service
    # Schema already exists from shipping service migration, no new migration needed
    # This prevents Flyway checksum mismatch errors
    migrations:
      enabled: false
