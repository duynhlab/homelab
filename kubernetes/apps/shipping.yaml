---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shipping
  namespace: shipping
spec:
  interval: 10m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  releaseName: shipping
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    name: shipping

    replicaCount: 1

    image:
      repository: ghcr.io/duynhne/shipping
      tag: v6
      pullPolicy: Always

    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http

    containerPort: 8080

    env:
      - name: SERVICE_NAME
        value: "shipping"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "0.1"
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "info"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      # Database configuration (via PgBouncer pooler)
      - name: DB_HOST
        value: "supporting-db-pooler.user.svc.cluster.local"  # PgBouncer pooler service
      - name: DB_PORT
        value: "5432"  # PgBouncer port
      - name: DB_NAME
        value: "shipping"
      - name: DB_USER
        value: "shipping.shipping"  # Cross-namespace format: namespace.username
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: shipping.shipping.supporting-db.credentials.postgresql.acid.zalan.do  # Zalando operator cross-namespace secret (in shipping namespace)
            key: password
      - name: DB_SSLMODE
        value: "require"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "10"
      # Graceful shutdown configuration
      - name: SHUTDOWN_TIMEOUT
        value: "10s"  # Default shutdown timeout (can be overridden)

    # Kubernetes graceful shutdown configuration
    terminationGracePeriodSeconds: 30  # Shutdown timeout (10s) + buffer (20s)

    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5

    # Database migrations (Flyway init container)
    migrations:
      enabled: true
      image: ghcr.io/duynhne/shipping:v6-init
      imagePullPolicy: Always #IfNotPresent
      env:
        DB_HOST: "supporting-db.user.svc.cluster.local"  # Direct connection, no pooler - supporting-db is in user namespace
        DB_PORT: "5432"  # PostgreSQL port (direct connection)
        DB_NAME: "shipping"
        DB_USER: "shipping.shipping"  # Cross-namespace format: namespace.username
        DB_SSLMODE: "require"
      envFrom:
        secretRef: "shipping.shipping.supporting-db.credentials.postgresql.acid.zalan.do"  # Zalando operator cross-namespace secret (in shipping namespace)

