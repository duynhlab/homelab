---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: frontend
  namespace: default
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "10m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: ui
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/managed-by: flux-operator
  
  inputsFrom:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSetInputProvider
      name: frontend-config
  
  resources:
    # HelmRelease for Frontend using templating
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: << inputs.service >>
        namespace: default
      spec:
        interval: 10m
        timeout: 5m
        
        chartRef:
          kind: OCIRepository
          name: mop-chart-oci
          namespace: flux-system
        
        releaseName: << inputs.service >>
        
        values:
          replicaCount: << inputs.replicas | int >>
          
          image:
            repository: ghcr.io/duynhne/<< inputs.service >>
            tag: << inputs.version | quote >>
            pullPolicy: IfNotPresent
          
          service:
            type: ClusterIP
            port: << inputs.port | int >>
            targetPort: << inputs.port | int >>
          
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          
          livenessProbe:
            httpGet:
              path: /health
              port: << inputs.port | int >>
            initialDelaySeconds: 10
            periodSeconds: 30
          
          readinessProbe:
            httpGet:
              path: /health
              port: << inputs.port | int >>
            initialDelaySeconds: 5
            periodSeconds: 10
