---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k6
  namespace: k6
  labels:
    app.kubernetes.io/name: k6
    app.kubernetes.io/component: load-testing
    app.kubernetes.io/part-of: mop-platform
    app.kubernetes.io/managed-by: flux
spec:
  interval: 10m
  releaseName: k6
  
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  
  timeout: 5m
  
  values:
    name: k6
    replicaCount: 1
    
    image:
      repository: ghcr.io/duynhne/k6
      tag: v6
      pullPolicy: IfNotPresent
    
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
      portName: http
    
    containerPort: 8080
    
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    
    livenessProbe:
      enabled: false
    
    readinessProbe:
      enabled: false
    
    labels:
      component: load-testing
      test-mode: multiple-scenarios
    
    command: ["k6"]
    args: ["run", "/scripts/script.js"]
    
    env:
      - name: BASELINE_RPS
        value: "30"
      - name: PEAK_RPS
        value: "100"
      - name: BURST_RPS
        value: "200"
      - name: BURST_DURATION
        value: "5m"
      - name: BURST_TIMING
        value: "10:00-14:00"
