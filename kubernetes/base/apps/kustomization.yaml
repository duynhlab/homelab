---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 9 Backend Services (HelmRelease pattern)
resources:
  - auth/
  - user/
  - product/
  - cart/
  - order/
  - review/
  - notification/
  - shipping/
  - shipping-v2/
  
  # 1 Frontend Service (ResourceSet pattern - learning)
  - frontend/
  
  # 1 K6 Load Testing (HelmRelease pattern)
  - k6/

# Common labels for all apps
labels:
  - pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: mop-platform
