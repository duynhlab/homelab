---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: apm
spec:
  interval: 10m
  timeout: 10m
  
  chart:
    spec:
      chart: jaeger
      version: ">=3.0.0"
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
        namespace: flux-system
      interval: 10m
  
  releaseName: jaeger
  
  # Values from k8s/jaeger/values.yaml (simplified - Jaeger v2 all-in-one)
  values:
    provisionDataStore:
      cassandra: false
      elasticsearch: false
      kafka: false
    
    config:
      service:
        extensions: [jaeger_storage, jaeger_query, healthcheckv2]
        pipelines:
          traces:
            receivers: [otlp, jaeger, zipkin]
            processors: [batch]
            exporters: [jaeger_storage_exporter]
      
      extensions:
        healthcheckv2:
          use_v2: true
          http:
            endpoint: 0.0.0.0:13133
        
        jaeger_query:
          storage:
            traces: primary_store
        
        jaeger_storage:
          backends:
            primary_store:
              memory:
                max_traces: 100000
      
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
