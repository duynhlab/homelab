---
# ServiceMonitor for Pyroscope - Scrape profiling metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pyroscope
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: apm
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app: pyroscope
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scheme: http
