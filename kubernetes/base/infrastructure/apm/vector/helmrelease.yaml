---
# Vector HelmRelease - Log Collection DaemonSet
# Migrated from k8s/vector/ to use Helm chart for better maintainability
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: kube-system
  labels:
    app.kubernetes.io/name: vector
    app.kubernetes.io/component: apm
    app.kubernetes.io/part-of: apm-stack
    app.kubernetes.io/managed-by: flux
spec:
  interval: 10m
  timeout: 10m
  
  chart:
    spec:
      chart: vector
      version: "0.50.0"
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
      interval: 10m
  
  releaseName: vector
  
  # Values adapted from k8s/vector/daemonset.yaml + configmap.yaml
  values:
    # DaemonSet mode for collecting logs from all nodes
    role: Agent
    
    # Image configuration
    image:
      repository: timberio/vector
      tag: 0.34.0-distroless-libc
      pullPolicy: IfNotPresent
    
    # Service account for Kubernetes API access
    serviceAccount:
      create: true
      name: vector
    
    # RBAC for reading pod logs
    rbac:
      create: true
    
    # Pod configuration
    podLabels:
      app: vector
      app.kubernetes.io/component: apm
    
    # Resources (from old daemonset.yaml)
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    
    # Health probes
    livenessProbe:
      httpGet:
        path: /health
        port: 8686
      initialDelaySeconds: 30
      periodSeconds: 10
    
    readinessProbe:
      httpGet:
        path: /health
        port: 8686
      initialDelaySeconds: 10
      periodSeconds: 5
    
    # Tolerations for DaemonSet on all nodes
    tolerations:
      - effect: NoSchedule
        operator: Exists
    
    # Vector configuration (from k8s/vector/configmap.yaml)
    customConfig:
      data_dir: /vector-data-dir
      
      api:
        enabled: true
        address: 0.0.0.0:8686
        playground: false
      
      # Sources: Collect logs from Kubernetes pods
      sources:
        kubernetes_logs:
          type: kubernetes_logs
          extra_field_selector: ""
          extra_label_selector: ""
          exclude_paths_glob_patterns:
            - "**/*.gz"
            - "**/*.tmp"
            - "**/*.log.*"
            - "**/containers/*/checkpoints/**"
        
        internal_metrics:
          type: internal_metrics
      
      # Transforms: Add labels for better filtering in Loki
      transforms:
        add_labels:
          type: remap
          inputs:
            - kubernetes_logs
          source: |
            # Extract service from kubernetes.pod_labels.app
            if exists(.kubernetes.pod_labels."app") {
              .service = to_string!(.kubernetes.pod_labels."app")
            } else if exists(.kubernetes.pod_name) {
              .service = to_string!(.kubernetes.pod_name)
            } else {
              .service = "system"
            }
            
            # Extract namespace from kubernetes.pod_namespace
            if exists(.kubernetes.pod_namespace) {
              .namespace = to_string!(.kubernetes.pod_namespace)
            } else {
              .namespace = "kube-system"
            }
            
            # Extract pod_name from kubernetes.pod_name
            if exists(.kubernetes.pod_name) {
              .pod_name = to_string!(.kubernetes.pod_name)
            } else {
              .pod_name = "unknown-pod"
            }
            
            # Extract container_name from kubernetes.container_name
            if exists(.kubernetes.container_name) {
              .container_name = to_string!(.kubernetes.container_name)
            } else {
              .container_name = "unknown-container"
            }
            
            # Parse JSON message and extract level field
            if exists(.message) {
              parsed, err = parse_json(.message)
              if err == null && exists(parsed.level) {
                .level = to_string!(parsed.level)
              }
            }
      
      # Sinks: Send logs to Loki and expose metrics
      sinks:
        loki:
          type: loki
          inputs:
            - add_labels
          endpoint: http://loki.monitoring.svc.cluster.local:3100
          encoding:
            codec: json
          labels:
            service: "{{service}}"
            namespace: "{{namespace}}"
            pod: "{{pod_name}}"
            container: "{{container_name}}"
          out_of_order_action: accept
          batch:
            max_bytes: 3145728
            timeout_secs: 5
          request:
            rate_limit_duration_secs: 1
            rate_limit_num: 100
          healthcheck:
            enabled: false
        
        prometheus_exporter:
          type: prometheus_exporter
          inputs:
            - internal_metrics
          address: 0.0.0.0:9090
          default_namespace: vector
    
    # Service for metrics scraping
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: api
          port: 8686
          protocol: TCP
        - name: metrics
          port: 9090
          protocol: TCP
    
    # Persistence for data_dir
    persistence:
      enabled: false  # Use emptyDir for Kind cluster
