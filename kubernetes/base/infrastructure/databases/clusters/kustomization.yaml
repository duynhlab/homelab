---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Zalando PostgreSQL Clusters (3)
  - auth-db.yaml
  - review-db.yaml
  - supporting-db.yaml
  
  # CloudNativePG Clusters (2)
  - product-db.yaml
  - transaction-db.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/component: database
