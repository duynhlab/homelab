---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Operators (must be deployed first)
  - zalando-operator/
  - cnpg-operator/
  
  # Secrets (CloudNativePG pre-create requirement)
  - secrets/
  
  # Database Clusters (depend on operators + secrets)
  - clusters/
  
  # Connection Poolers (depend on clusters)
  - poolers/

labels:
  - pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: database-infrastructure
