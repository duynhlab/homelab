---
# Product Database Secret (CloudNativePG)
# Required by product-db cluster at bootstrap time
# ⚠️ For learning/development only - use External Secrets Operator in production
apiVersion: v1
kind: Secret
metadata:
  name: product-db-secret
  namespace: product
  labels:
    app.kubernetes.io/name: product-db
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  username: product
  password: postgres  # ⚠️ Change this in production! Use strong random password.
