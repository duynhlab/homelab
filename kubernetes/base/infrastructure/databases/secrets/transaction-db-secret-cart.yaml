---
# Transaction Database Secret (CloudNativePG) - Cart Namespace
# Required by transaction-db cluster (cart database) at bootstrap time
# ⚠️ For learning/development only - use External Secrets Operator in production
apiVersion: v1
kind: Secret
metadata:
  name: transaction-db-secret
  namespace: cart
  labels:
    app.kubernetes.io/name: transaction-db
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  username: cart  # Database owner user
  password: postgres  # ⚠️ Change this in production! Use strong random password.
