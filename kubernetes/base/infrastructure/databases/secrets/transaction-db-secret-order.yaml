---
# Transaction Database Secret (CloudNativePG) - Order Namespace
# Required by transaction-db cluster (order database) at bootstrap time
# Same credentials as cart namespace (shared cluster pattern)
# ⚠️ For learning/development only - use External Secrets Operator in production
apiVersion: v1
kind: Secret
metadata:
  name: transaction-db-secret
  namespace: order
  labels:
    app.kubernetes.io/name: transaction-db
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: flux
type: Opaque
stringData:
  username: cart  # Same user as cart (owns both databases in transaction-db cluster)
  password: postgres  # ⚠️ Change this in production! Use strong random password.
