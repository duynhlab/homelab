---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Infrastructure components
resources:
  - namespaces.yaml
  - monitoring/
  - apm/
  - databases/
  - slo/

labels:
  - pairs:
      app.kubernetes.io/managed-by: flux
      app.kubernetes.io/part-of: monitoring-platform

commonAnnotations:
  fluxcd.controlplane.io/reconcile: "true"
