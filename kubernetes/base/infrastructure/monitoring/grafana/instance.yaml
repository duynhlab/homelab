---
# Grafana Instance CR - Deploy actual Grafana pods
# Migrated from k8s/grafana-operator/grafana.yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: monitoring-stack
    app.kubernetes.io/managed-by: flux
spec:
  config:
    log:
      mode: console
      level: info
    
    # Anonymous auth enabled for demo/local development
    auth:
      disable_login_form: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Admin
    
    users:
      default_theme: dark
    
    server:
      root_url: "http://localhost:3000"
  
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: grafana
              image: grafana/grafana:11.4.0  # Pinned version for stability
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "200m"
  
  service:
    metadata:
      name: grafana-service
      labels:
        app: grafana
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
    spec:
      type: ClusterIP
      ports:
        - name: http
          port: 3000
          targetPort: 3000
          protocol: TCP
