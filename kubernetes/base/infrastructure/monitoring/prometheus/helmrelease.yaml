---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  interval: 10m
  timeout: 10m
  
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=60.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 10m
  
  releaseName: kube-prometheus-stack
  
  # Values from k8s/prometheus/values.yaml
  # Kept inline for simplicity - can be extracted to ConfigMap later
  values:
    grafana:
      enabled: false
    
    alertmanager:
      enabled: false
    
    prometheus:
      enabled: true
      
      prometheusSpec:
        retention: 7d
        retentionSize: "10GB"
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        
        podMonitorSelector: {}
        podMonitorNamespaceSelector: {}
        
        ruleSelector:
          matchLabels:
            prometheus: kube-prometheus
        ruleNamespaceSelector: {}

