---
# ServiceMonitor for All Microservices - Scrape application metrics
# Migrated from k8s/prometheus/servicemonitors/servicemonitor-microservices.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-api
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: microservices
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: flux
spec:
  # Select specific microservice namespaces
  namespaceSelector:
    matchNames:
      - auth
      - user
      - product
      - cart
      - order
      - review
      - notification
      - shipping
  
  # Match all services in selected namespaces (all microservices have app label from Helm chart)
  selector:
    matchExpressions:
      - key: app
        operator: Exists
  
  # Scrape configuration
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    relabelings:
      # Set job label to "microservices" for all targets (for dashboard queries)
      - targetLabel: job
        replacement: microservices
      # Preserve original service name in "service" label
      - sourceLabels: [__meta_kubernetes_service_name]
        targetLabel: service
      # Add namespace label from pod metadata
      - sourceLabels: [__meta_kubernetes_namespace]
        targetLabel: namespace
      # Add app label from service label
      - sourceLabels: [__meta_kubernetes_service_label_app]
        targetLabel: app
