---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-local
  namespace: flux-system
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: apps-oci
  
  path: ./
  
  prune: true
  wait: true
  
  # Apps depend on ALL infrastructure being ready
  dependsOn:
    - name: databases-local
    - name: monitoring-local
  
  # Health checks for apps (per-domain ResourceSets)
  healthChecks:
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: rs-identity
      namespace: default
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: rs-catalog
      namespace: default
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: rs-checkout
      namespace: default
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: rs-comms
      namespace: default
    - apiVersion: fluxcd.controlplane.io/v1
      kind: ResourceSet
      name: rs-frontend
      namespace: default
