---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./configs/cert-manager
  prune: true
  wait: true
  dependsOn:
    - name: controllers-local
    - name: secrets-local
  # LOCAL-ONLY: issue kong-proxy-tls from the self-signed `homelab-ca` instead of
  # `letsencrypt-prod`. Kind has no real duynh.me DNS zone / Cloudflare token, so
  # LE DNS-01 can't complete. Prod keeps letsencrypt-prod (its overlay has no such
  # patch). See debugs.md Bug 9.
  patches:
    - target:
        kind: Certificate
        name: kong-proxy-tls
        namespace: kong
      patch: |
        - op: replace
          path: /spec/issuerRef/name
          value: homelab-ca
