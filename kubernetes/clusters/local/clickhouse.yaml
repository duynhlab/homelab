# ClickHouse OLAP backend for OTel logs+traces SQL (RFC-0019 Phase B / ADR-023).
# Its own Kustomization so it can dependsOn secrets-local (the ESO-managed
# clickhouse-credentials Secret) without deadlocking controllers-local (wait:true)
# — same split as tracing-local / profiling-local. The Altinity operator + its
# CRDs are installed in the controllers wave, so this only needs controllers-local
# (CRDs) + secrets-local (credentials). Uses a local PVC, so no storage-local dep.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clickhouse-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: observability
spec:
  interval: 10m
  timeout: 15m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./controllers/clickhouse
  prune: true
  wait: true
  dependsOn:
    - name: controllers-local
    - name: secrets-local
  healthChecks:
    # StatefulSet generated by the operator: chi-<chi>-<cluster>-<shard>-<replica>
    - apiVersion: apps/v1
      kind: StatefulSet
      name: chi-clickhouse-otel-0-0
      namespace: monitoring
