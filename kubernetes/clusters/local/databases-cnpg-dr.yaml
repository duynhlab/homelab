---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases-cnpg-dr-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 15m
  retryInterval: 2m

  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci

  path: ./configs/databases-cnpg-dr

  prune: false
  wait: true

  dependsOn:
    - name: databases-local
    - name: secrets-local

  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: cnpg-db-replica
      namespace: product
