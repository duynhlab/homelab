---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 15m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./configs/databases
  
  prune: true
  wait: true
  
  dependsOn:
    - name: secrets-local
    - name: monitoring-local
  
  healthChecks:
    - apiVersion: acid.zalan.do/v1
      kind: postgresql
      name: auth-db
      namespace: auth
    - apiVersion: acid.zalan.do/v1
      kind: postgresql
      name: review-db
      namespace: review
    - apiVersion: acid.zalan.do/v1
      kind: postgresql
      name: supporting-shared-db
      namespace: user
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: transaction-shared-db
      namespace: cart
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: product-db
      namespace: product
