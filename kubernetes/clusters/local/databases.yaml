---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: databases-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 15m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./configs/databases
  
  prune: false
  wait: true
  
  dependsOn:
    - name: secrets-local
    - name: monitoring-local
    - name: cnpg-barman-plugin-local
    - name: storage-local
    # Ordering hygiene: bring DB namespaces up behind their NetworkPolicies so
    # operators never race an un-fenced namespace. NOTE: this does NOT fix Bug 20
    # — that turned out to be the Zalando operator's DB-connection retry window
    # expiring before a slow spilo cold boot (not an NP block); the real guard is
    # the idempotent ensure-databases Job in each Zalando cluster dir.
    - name: network-policies-local
  
  healthChecks:
    - apiVersion: acid.zalan.do/v1
      kind: postgresql
      name: auth-db
      namespace: auth
    - apiVersion: acid.zalan.do/v1
      kind: postgresql
      name: supporting-shared-db
      namespace: user
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: product-db
      namespace: product
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: temporal-db
      namespace: temporal
