# Homelab FluxInstance: sync from local OCI (`homelab-registry:5000`) over HTTP.
#
# Production checklist:
#   - Set `spec.sync.url` to your production OCI artifact URL (HTTPS registry).
#   - Remove the entire `spec.kustomize.patches` block below. That patch forces
#     `spec.insecure: true` on all OCIRepository objects generated for this instance;
#     production registries should use TLS (default insecure=false).
#   - If the cluster sync bundle also materializes OCIRepository CRs, ensure they
#     match your prod registry URLs and auth (`secretRef` on sources if private).
#   - Consider enabling Cosign verification on each OCIRepository (see
#     kubernetes/clusters/local/sources/oci/README.md).
---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcile: "enabled"
    fluxcd.controlplane.io/reconcileEvery: "1h"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  
  cluster:
    type: kubernetes
    size: medium
    multitenant: false
    networkPolicy: true
    domain: "cluster.local"
  
  storage:
    class: "standard"
    size: "10Gi"
  
  sync:
    kind: OCIRepository
    url: "oci://homelab-registry:5000/flux-cluster-sync"
    ref: local
    path: "./"
  
  # Homelab only: source-controller must pull from HTTP registry without TLS.
  # PRODUCTION: delete this whole `kustomize:` key so OCIRepository resources use TLS.
  kustomize:
    patches:
      - patch: |
          - op: add
            path: /spec/insecure
            value: true
        target:
          kind: OCIRepository
  
  # commonMetadata:
