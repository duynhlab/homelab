# Headless Services exposing each gRPC server's :9090 for east-west calls.
# The mop-chart Service is single-port (:8080); these add the :9090 surface that
# gRPC clients dial (dns:///<svc>-grpc.<ns>.svc.cluster.local:9090 + round_robin).
# Depends on apps-local so the target namespaces and pods exist.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grpc-services-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./configs/grpc-services
  prune: true
  wait: true
  dependsOn:
    - name: apps-local
