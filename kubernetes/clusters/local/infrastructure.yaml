---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./
  
  prune: true
  wait: true
  
  # Health checks for namespaces
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: auth
    - apiVersion: v1
      kind: Namespace
      name: monitoring
    - apiVersion: v1
      kind: Namespace
      name: apm
