# Kong API Gateway configuration — Ingress resources, plugins, routing rules.
# Depends on controllers-local (Kong CRDs) and cert-manager-local (TLS certificate).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kong-config-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./configs/kong
  prune: true
  wait: true
  dependsOn:
    - name: controllers-local
    - name: cert-manager-local
