---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - flux-system/
  - sources/
  - controllers.yaml     # Namespaces + operators (monitoring, databases, slo)
  - cert-manager-config.yaml
  - kong-config.yaml         # Kong Ingress routes + plugins (depends on controllers + cert-manager)
  - secrets.yaml         # Vault + ESO (Must be before databases)
  - databases.yaml       # DB Instances (Must be before apps)
  - databases-cnpg-dr.yaml  # CNPG DR replica (depends on databases-local)
  - monitoring.yaml      # Grafana + Prometheus Configs
  - mcp.yaml             # MCP servers (depends on monitoring)
  - apps.yaml            # Microservices