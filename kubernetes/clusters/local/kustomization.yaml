---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - flux-system/
  - sources/
  - controllers.yaml     # Namespaces + operators (monitoring, databases, slo)
  - cert-manager-config.yaml
  - cnpg-barman-plugin.yaml # Barman Cloud Plugin + ObjectStore CRD before CNPG clusters
  - kong.yaml               # Kong HelmRelease (depends on cert-manager-local for kong-proxy-tls Secret)
  - kong-config.yaml         # Kong Ingress routes + plugins (depends on kong + cert-manager)
  - secrets.yaml         # Vault + ESO (Must be before databases)
  - caching.yaml         # Valkey (depends on monitoring-local for ServiceMonitor CRD)
  - storage.yaml         # RustFS (depends on secrets-local for ESO-managed credentials)
  - databases.yaml       # DB Instances (Must be before apps)
  - databases-cnpg-dr.yaml  # CNPG DR replica (depends on databases-local)
  - monitoring.yaml      # Grafana + Prometheus Configs
  - kyverno.yaml         # Admission policies (depends on controllers + monitoring)
  - network-policies.yaml   # Ingress NetworkPolicies (inert on kindnet; depends on controllers)
  - mcp.yaml             # MCP servers (depends on monitoring)
  - temporal.yaml        # Temporal server (depends on controllers + databases + cert-manager + monitoring)
  - apps.yaml            # Microservices