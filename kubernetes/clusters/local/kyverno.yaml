# Kyverno admission policies — Tier 1 audit-mode rollout.
# See docs/platform/kyverno.md for adoption strategy.
#
# Depends on:
#   - controllers-local: Kyverno HelmRelease + CRDs
#   - monitoring-local: ServiceMonitor scrape target
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kyverno-policies-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./configs/kyverno
  prune: true
  wait: true
  dependsOn:
    - name: controllers-local
    - name: monitoring-local
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kyverno
      namespace: kyverno
