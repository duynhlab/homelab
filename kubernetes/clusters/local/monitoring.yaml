---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: monitoring
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./monitoring
  
  prune: true
  wait: true
  
  # Monitoring depends on infrastructure (namespaces)
  dependsOn:
    - name: infrastructure-local
  
  # Health checks for monitoring stack
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kube-prometheus-stack
      namespace: monitoring
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: grafana-operator
      namespace: monitoring
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: metrics-server
      namespace: kube-system
