---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./configs/monitoring
  
  prune: true
  wait: true
  
  dependsOn:
    - name: controllers-local
  
  healthChecks:
    - apiVersion: grafana.integreatly.org/v1beta1
      kind: Grafana
      name: grafana
      namespace: monitoring
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: loki
      namespace: monitoring
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: tempo
      namespace: monitoring
