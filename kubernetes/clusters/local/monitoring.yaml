---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./configs/observability
  
  prune: true
  wait: true
  
  dependsOn:
    - name: controllers-local
  
  healthChecks:
    - apiVersion: grafana.integreatly.org/v1beta1
      kind: Grafana
      name: grafana
      namespace: monitoring
    # Tempo readiness is gated by tracing-local now (it's a Deployment there, not a
    # HelmRelease in this wave). The old `HelmRelease/tempo` check was stale — it
    # referenced a resource that doesn't exist and would fail monitoring-local.
    # (debugs.md Bug 6 / Bug 7)
