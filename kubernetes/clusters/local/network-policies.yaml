# Ingress NetworkPolicies fencing internal routes per app namespace.
# LIVE on this Kind cluster — kindnet DOES enforce NetworkPolicy on K8s 1.30+
# (verified on 1.34.3). Depends on controllers-local for namespaces; databases-local
# depends on this so operators init behind an already-fenced network (see Bug 20).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-policies-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 5m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./configs/network-policies
  prune: true
  wait: true
  dependsOn:
    - name: controllers-local
