---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: slo-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: slo
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  
  path: ./slo
  
  prune: true
  wait: true
  
  # SLO depends on Monitoring (Prometheus Operator) being ready
  dependsOn:
    - name: monitoring-local
  
  # Health checks
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: sloth
      namespace: monitoring
