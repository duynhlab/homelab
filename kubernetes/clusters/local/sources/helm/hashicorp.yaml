---
# HashiCorp Helm Repository
# Contains: Vault, Consul, etc.
# Docs: https://developer.hashicorp.com/vault/docs/deploy/kubernetes/helm
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: flux-system
  labels:
    app.kubernetes.io/component: helm-repository
spec:
  interval: 1h
  url: https://helm.releases.hashicorp.com
