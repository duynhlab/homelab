# Homelab (Kind): HTTP registry in-cluster (homelab-registry:5000). `insecure: true` is required.
#
# Production: same guidance as `infrastructure-oci.yaml` — TLS registry URL, omit `insecure`, pin refs, optional `spec.verify`.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: apps-oci
  namespace: flux-system
spec:
  interval: 5m
  url: oci://homelab-registry:5000/flux-apps-sync
  ref:
    tag: local
  insecure: true
  # verify:
  #   provider: cosign
  #   secretRef:
  #     name: flux-oci-cosign-public
