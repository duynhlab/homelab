---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mop-chart-oci
  namespace: flux-system
  labels:
    app.kubernetes.io/component: helm-chart
spec:
  interval: 10m
  url: oci://ghcr.io/duynhlab/helm-charts/mop
  ref:
    # >=0.12.0: the chart's reworked value shape (service.enabled, service.http.*,
    # service.grpc.*, top-level args/command). The domain ResourceSets emit this
    # shape; older charts are incompatible.
    semver: ">=0.12.0"
