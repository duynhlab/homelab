---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: storage-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 10m
  retryInterval: 2m
  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci
  path: ./controllers/storage
  prune: true
  wait: true
  # RustFS HelmRelease references existingSecret rustfs-credentials, which is
  # created by an ExternalSecret reconciled after ESO + OpenBAO are ready.
  dependsOn:
    - name: controllers-local
    - name: secrets-local
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: rustfs
      namespace: rustfs
