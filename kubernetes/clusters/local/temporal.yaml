---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: temporal-local
  namespace: flux-system
  labels:
    app.kubernetes.io/component: infrastructure
spec:
  interval: 10m
  timeout: 15m
  retryInterval: 2m

  sourceRef:
    kind: OCIRepository
    name: infrastructure-oci

  path: ./configs/temporal

  prune: true
  wait: true

  dependsOn:
    - name: controllers-local      # operator + TemporalCluster CRD
    - name: cert-manager-local     # operator webhook certificate
    - name: databases-local        # platform-db Ready (+ platform-db-temporal-secret in temporal ns)
    - name: monitoring-local       # ServiceMonitor CRD + Grafana/VM stack

  healthChecks:
    - apiVersion: temporal.io/v1beta1
      kind: TemporalCluster
      name: temporal
      namespace: temporal
    # Wait for the `mop` namespace to be REGISTERED in Temporal (not just the
    # cluster Ready) so apps-local (order-worker dials namespace `mop` at
    # startup) doesn't deploy before it exists (debugs BUGS-4).
    - apiVersion: temporal.io/v1beta1
      kind: TemporalNamespace
      name: mop
      namespace: temporal
