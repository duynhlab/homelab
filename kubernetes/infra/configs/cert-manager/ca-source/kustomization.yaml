# Static copy of the homelab-ca root certificate, committed to git on purpose.
# Decouples the trust-manager Bundle from cert-manager-issued Secret rotation
# so CA rollover can be staged via PR (add new CA -> migrate -> remove old).
# Public CA cert only — never commit tls.key. See docs/security/trust-distribution.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager
configMapGenerator:
  - name: homelab-ca-source
    files:
      - ca.crt=homelab-ca.crt
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/component: trust-source
    app.kubernetes.io/managed-by: gitops
