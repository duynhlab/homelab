# TLS certificate for Kong API Gateway — single wildcard cert for *.duynh.me.
# Kong terminates TLS at the edge with this default cert (mounted via
# secretVolumes in the HelmRelease) — no per-Ingress TLS section required.
#
# Issued by Let's Encrypt (DNS-01 via Cloudflare). Wildcard *.duynh.me covers
# all single-label subdomains (gateway.duynh.me, grafana.duynh.me, …).
# A second SAN local.duynh.me is included explicitly to make intent obvious
# (it is already covered by the wildcard, but the redundancy documents it).
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-proxy-tls
  namespace: kong
spec:
  secretName: kong-proxy-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: duynh.me
  dnsNames:
    - duynh.me
    - "*.duynh.me"
    - local.duynh.me
