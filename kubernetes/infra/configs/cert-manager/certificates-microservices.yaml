# TLS certificate for Kong API Gateway — single wildcard cert for *.duynh.me.
# Kong terminates TLS at the edge with this default cert (mounted via
# secretVolumes in the HelmRelease) — no per-Ingress TLS section required.
#
# Issued by Let's Encrypt (DNS-01 via Cloudflare) on prod. The LOCAL cluster
# overlay patches issuerRef → the self-signed `homelab-ca` (Kind has no real
# duynh.me DNS zone / Cloudflare token) — see clusters/local/cert-manager-config.yaml.
# Wildcard *.duynh.me covers all single-label subdomains (gateway.duynh.me, …).
# Do NOT add a redundant explicit SAN already covered by the wildcard (e.g.
# local.duynh.me): ACME RFC 8555 §7.1.3 → CA rejects it (LE 400 "malformed").
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-proxy-tls
  namespace: kong
spec:
  secretName: kong-proxy-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: duynh.me
  dnsNames:
    - duynh.me
    - "*.duynh.me"
