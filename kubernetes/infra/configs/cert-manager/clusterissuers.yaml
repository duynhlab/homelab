# ClusterIssuers for the homelab cluster.
#
# Two coexisting PKIs:
#   - selfsigned-bootstrap -> homelab-ca Certificate -> homelab-ca ClusterIssuer
#     (self-signed, 10y, ECDSA P-256; for future internal mTLS; CA cert
#     distributed via trust-manager `homelab-ca-bundle`).
#   - letsencrypt-staging / letsencrypt-prod (ACME DNS-01 via Cloudflare;
#     used by `kong-proxy-tls` for browser-facing *.duynh.me).
#
# Cloudflare API token is synced from OpenBAO by the ExternalSecret at
# kubernetes/infra/configs/secrets/cluster-external-secrets/cloudflare.yaml
# (operator-supplied, bootstrap-only). DNS-01 works without exposing the
# Kind cluster to the public internet, and wildcard certs require DNS-01.

# Step 1: Bootstrap issuer — generates the root CA
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: CA certificate — signed by the bootstrap issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-ca
  duration: 87600h # 10 years
  secretName: homelab-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-bootstrap
    group: cert-manager.io
---
# Step 3: CA issuer — signs all service certificates using the CA cert
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca
spec:
  ca:
    secretName: homelab-ca-secret
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: duyhenry250897@gmail.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - duynh.me
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: duyhenry250897@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
        selector:
          dnsZones:
            - duynh.me
