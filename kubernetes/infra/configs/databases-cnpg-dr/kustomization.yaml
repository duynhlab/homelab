apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DR replica only — applied after configs/databases (Flux Kustomization databases-cnpg-dr-local dependsOn databases-local).
# Ensures cnpg-db + backups + secrets exist before cnpg-db-replica bootstrap.
resources:
  - ../databases/clusters/cnpg-db-replica/
