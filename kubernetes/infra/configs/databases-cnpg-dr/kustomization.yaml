apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DR replica only — applied after configs/databases (Flux Kustomization databases-cnpg-dr-local dependsOn databases-local).
# Ensures product-db + backups + secrets exist before product-db-replica bootstrap.
resources:
  - ../databases/clusters/product-db-replica/
