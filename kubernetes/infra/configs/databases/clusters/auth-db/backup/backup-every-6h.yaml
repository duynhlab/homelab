apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: auth-db-every-6h
  namespace: auth
  labels:
    backup-frequency: every-6h
spec:
  schedule: "0 0 */6 * * *"
  cluster:
    name: auth-db
  backupOwnerReference: self
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
