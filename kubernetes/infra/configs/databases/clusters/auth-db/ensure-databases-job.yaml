# Idempotent Job that guarantees the `auth` database exists on auth-db,
# independent of the Zalando operator's fragile first-init. See the twin Job in
# supporting-shared-db/ensure-databases-job.yaml for the full rationale (Bug 20).
# auth-db runs 3 instances so its spilo cold boot is the slowest — most exposed
# to the operator's DB-connection-retry timeout that leaves databases uncreated.
#
# Keep the (database → owner) list in sync with spec.databases in instance.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-ensure-databases
  namespace: auth
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-db-ensure-databases
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ensure-databases
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PGHOST
              value: auth-db
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres.auth-db.credentials.postgresql.acid.zalan.do
                  key: password
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              echo "=== Waiting for auth-db to accept connections ==="
              for i in $(seq 1 60); do
                if psql -tAc 'SELECT 1' >/dev/null 2>&1; then
                  echo "postgres is ready."
                  break
                fi
                echo "attempt $i: not ready, retrying in 10s..."
                sleep 10
              done
              ensure_db() {
                db="$1"; owner="$2"
                if psql -tAc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1; then
                  echo "database '$db' already exists"
                else
                  echo "creating database '$db' owner '$owner'"
                  psql -c "CREATE DATABASE \"$db\" OWNER \"$owner\""
                fi
              }
              ensure_db auth auth
              echo "=== Done ==="
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
