# auth-db Primary Database Cluster (CloudNativePG)
# Single database: auth — defined as a per-service triplet under services/
# (RFC-0012, ADR-013); this file is infrastructure only.
# The bootstrap.initdb database/owner/secret are structural placeholders on
# a fresh cluster — the auth triplet adopts them declaratively.
# HA: 3 instances (1 primary, 1 sync replica, 1 async replica)
# DR: WAL archived to RustFS for continuous recovery
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: auth
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: auth-db-backup-store
        serverName: auth-db-cluster

  replicationSlots:
    highAvailability:
      synchronizeLogicalDecoding: true

  postgresql:
    shared_preload_libraries:
      - pgaudit
      - pg_stat_statements
      - auto_explain

    # Connection isolation (RFC-0012 P4, ADR-015): the auth role connects
    # only to its own database. CNPG inserts these BETWEEN its fixed rules
    # (local peer for instance manager/exporter, cert-based hostssl for
    # streaming_replica) and its default host-all catch-all — so the trailing
    # reject preempts the catch-all without touching operator paths.
    # First match wins. `host` (not hostssl) for the pgdog/migration pairs:
    # those clients connect without TLS today; tighten to hostssl once pooler
    # upstream TLS lands. Applied by reload, not restart.
    # Adding a service? Add its allow line ABOVE the reject (the one
    # exception to "never touch instance.yaml" — HBA is cluster infra).
    pg_hba:
      - host auth auth all scram-sha-256
      - host all  all  all reject

    synchronous:
      method: any
      number: 1
      dataDurability: required

    parameters:
      # Connection settings
      max_connections: "200"

      # Memory settings (production-tuned)
      shared_buffers: "256MB"
      effective_cache_size: "1.5GB"
      maintenance_work_mem: "512MB"
      work_mem: "32MB"

      # Query planner (SSD optimization)
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"

      # Checkpoint settings
      checkpoint_completion_target: "0.9"
      checkpoint_timeout: "15min"

      # WAL settings (optimized for backup + replication)
      wal_buffers: "16MB"
      wal_level: "logical"
      wal_compression: "on"
      archive_timeout: "5min"
      max_wal_senders: "10"
      wal_keep_size: "1GB"
      min_wal_size: "2GB"
      max_wal_size: "8GB"

      # Parallelism settings
      max_worker_processes: "8"
      max_parallel_workers_per_gather: "4"
      max_parallel_workers: "8"
      max_parallel_maintenance_workers: "4"

      # Autovacuum tuning (high-write workloads)
      autovacuum: "on"
      autovacuum_max_workers: "3"
      autovacuum_vacuum_scale_factor: "0.1"
      autovacuum_analyze_scale_factor: "0.05"
      autovacuum_vacuum_cost_delay: "10ms"
      autovacuum_vacuum_cost_limit: "200"

      # Logging
      log_statement: "mod"
      log_min_duration_statement: "1000"
      log_checkpoints: "on"
      log_lock_waits: "on"
      log_temp_files: "0"
      log_autovacuum_min_duration: "1000"
      log_connections: "on"
      log_disconnections: "on"
      logging_collector: "on"

      # Security
      password_encryption: "scram-sha-256"

      # pgAudit configuration
      pgaudit.log: "ddl, write"
      pgaudit.log_catalog: "off"
      pgaudit.log_parameter: "on"
      pgaudit.log_statement_once: "off"
      pgaudit.log_relation: "on"
      pgaudit.log_rows: "on"

      # Performance monitoring
      track_io_timing: "on"

      # pg_stat_statements
      pg_stat_statements.track: "all"
      pg_stat_statements.max: "10000"

      # auto_explain
      auto_explain.log_min_duration: "1s"
      auto_explain.log_analyze: "on"

      # Replication slot sync (PostgreSQL 18 native)
      hot_standby_feedback: "on"
      sync_replication_slots: "on"

  monitoring:
    customQueriesConfigMap:
      - name: auth-db-monitoring-queries
        key: custom-queries

  bootstrap:
    initdb:
      database: auth
      owner: auth
      secret:
        name: auth-db-secret
      dataChecksums: true
      walSegmentSize: 64
      encoding: "UTF8"
      localeCType: "C"
      localeCollate: "C"

  # Roles live in per-service DatabaseRole CRs under services/ (RFC-0012,
  # ADR-013) — do not re-add an inline managed.roles entry except as the
  # deliberate rollback lever: an inline entry with the same role name takes
  # precedence and flips the DatabaseRole to applied: false.

  storage:
    size: 5Gi
    storageClass: standard

  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
