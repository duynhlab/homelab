# Auth Database Cluster (Zalando Operator)
# With PgBouncer connection pooler
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: auth-db
  namespace: auth
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 5Gi
    # storageClass: "ssd"
  
  # Inject Vault-backed credentials for WAL-G backups
  # Secret: pg-backup-rustfs-credentials (managed by ExternalSecret)
  env:
    - name: WALG_S3_PREFIX
      value: s3://pg-backups-zalando/auth-db/
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: pg-backup-rustfs-credentials
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: pg-backup-rustfs-credentials
          key: AWS_SECRET_ACCESS_KEY
    - name: AWS_ENDPOINT
      value: http://rustfs-svc.rustfs.svc.cluster.local:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_REGION
      value: "us-east-1"
  
  # High Availability: 3 nodes (1 leader + 2 standbys)
  numberOfInstances: 3
  
  # Database and user configuration
  databases:
    auth: auth
  
  users:
    auth:  # Database owner
      - createdb
  
  # Connection pooler (PgBouncer) configuration - Keep existing
  connectionPooler:
    numberOfInstances: 2
    schema: pooler
    user: pooler
    mode: transaction  # Transaction pooling for short-lived connections
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: "128Mi"
    maxDBConnections: 240
    # max database connections for 2 poolers will be 240 * 2 = 480, so the free connections will be 20
    # max client connections per pooler is always 10 000!!!

  # PostgreSQL version and production-ready parameters
  postgresql:
    version: "17"
    parameters:
      # Connection settings
      port: "5432"
      max_connections: "200"
      password_encryption: scram-sha-256  # More secure than MD5
      
      # Memory settings for performance (small)
      shared_buffers: "512MB"  # 25% of 2GB pod memory (small limit)
      work_mem: "8MB"  # Conservative for small workload
      maintenance_work_mem: "128MB"
      effective_cache_size: "1536MB"  # 75% of 2GB pod memory
      
      # Write-Ahead Log (WAL) settings
      wal_buffers: "16MB"
      wal_level: "replica"  # For HA (use "logical" if replication needed)
      checkpoint_timeout: "15min"
      checkpoint_completion_target: "0.9"
      max_wal_size: "2GB"  # Adjusted for small workload
      min_wal_size: "512MB"
      
      # Query planner settings (SSD assumed - default tuning)
      random_page_cost: "1.1"  # Lower for SSD
      effective_io_concurrency: "200"  # Higher for SSD
      default_statistics_target: "100"
      
      # Parallelism settings 
      max_worker_processes: "4"
      max_parallel_workers_per_gather: "2"
      max_parallel_workers: "4"
      
      # # Autovacuum settings
      autovacuum: "on"
      autovacuum_max_workers: "2"
      autovacuum_vacuum_scale_factor: "0.1"  # Trigger vacuum more frequently
      autovacuum_analyze_scale_factor: "0.1"

      # Logging settings
      log_destination: "stderr"
      log_connections: "off"
      log_disconnections: "off"
      log_min_duration_statement: "100ms"
      log_statement: "ddl"
      log_lock_waits: "on"
      log_temp_files: "0"
      # log_filename: 'postgresql-%Y-%m-%d_%H%M%S.log'
      # log_rotation_age: "1d"
      # log_rotation_size: "128MB"
      # logging_collector: "on"

      # enable the extentions, pg_stat_statements is a must-have for production
      shared_preload_libraries: "pg_stat_statements,pg_cron,pg_trgm,pgcrypto,pg_stat_kcache"
      track_io_timing: "on"
      pg_stat_statements.max: "1000"
      pg_stat_statements.track: "all"
      cron.database_name: "postgres"
      synchronous_commit: "local"

  # Production-ready resource limits (small, conservative)
  resources:
    requests:
      cpu: 100m  # Minimum CPU
      memory: 512Mi  # Small memory request (conservative)
    limits:
      cpu: "1"  # Small CPU limit (not large)
      memory: 2Gi  # Small memory limit (conservative)
  
  # Sidecars: postgres_exporter for Prometheus metrics collection and Vector for log collection
  sidecars:
    - name: exporter
      image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
      ports:
        - name: exporter
          containerPort: 9187
          protocol: TCP
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      env:
        - name: "DATA_SOURCE_URI"
          value: "localhost/postgres?sslmode=require"
        - name: "DATA_SOURCE_USER"
          value: "$(POSTGRES_USER)"
        - name: "DATA_SOURCE_PASS"
          value: "$(POSTGRES_PASSWORD)"
        - name: "PG_EXPORTER_EXTEND_QUERY_PATH"
          value: "/etc/postgres-exporter/queries.yaml"
      volumeMounts:
        - name: postgres-monitoring-queries
          mountPath: /etc/postgres-exporter
          readOnly: true
    - name: vector
      image: timberio/vector:0.54.0-alpine
      args:
        - "--config"
        - "/etc/vector/vector.yaml"
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: pg-zalando-vector-config
          mountPath: /etc/vector
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
  
  # Additional volumes for sidecars
  additionalVolumes:
    - name: pg-zalando-vector-config
      targetContainers:
        - vector
      mountPath: /etc/vector
      volumeSource:
        configMap:
          name: pg-zalando-vector-config
    - name: postgres-monitoring-queries
      targetContainers:
        - exporter
      mountPath: /etc/postgres-exporter
      volumeSource:
        configMap:
          name: postgres-monitoring-queries
