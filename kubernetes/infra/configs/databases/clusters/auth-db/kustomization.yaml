apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# auth-db cluster (CloudNativePG)
# Single database: auth — a services/ triplet (RFC-0012)
# The auth service runs in the same namespace (auth) as the cluster, so it
# reads auth-db-secret directly — no cross-namespace app-ns Secret copies.
# Order: instance -> services (triplet) -> configmaps -> poolers -> monitoring -> backup
resources:
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - objectstore.yaml
  - instance.yaml
  - services/
  - configmaps/monitoring-queries.yaml
  - poolers/
  - monitoring/podmonitor.yaml
  - backup/backup-daily.yaml
  - backup/backup-every-6h.yaml
  - backup/backup-initial.yaml
