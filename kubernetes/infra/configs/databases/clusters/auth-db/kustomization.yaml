apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# auth-db cluster (Zalando Postgres Operator)
# Order: secrets → configmaps → instance
resources:
  - secrets/pg-backup-rustfs-credentials.yaml
  - configmaps/monitoring-queries.yaml
  - configmaps/vector-sidecar.yaml
  - instance.yaml
  - monitoring/pgbouncer-exporter.yaml
