apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# auth-db cluster (Zalando Postgres Operator)
# Order: secrets → configmaps → instance
resources:
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - configmaps/monitoring-queries.yaml
  - configmaps/vector-sidecar.yaml
  - instance.yaml
  - monitoring/pgbouncer-exporter.yaml
  # Idempotent guard that creates the `auth` DB if the operator's first-init
  # skipped it (Bug 20). databases-local waits for this Job to Complete.
  - ensure-databases-job.yaml
