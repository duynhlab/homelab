# DR Replica Cluster (CloudNativePG)
# Single-node designated primary that continuously recovers from cnpg-db WAL archive
# Promotable to standalone primary for disaster recovery
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-db-replica
  namespace: product
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  replica:
    enabled: true
    source: cnpg-db-primary

  externalClusters:
    - name: cnpg-db-primary
      barmanObjectStore:
        destinationPath: s3://pg-backups-cnpg/cnpg-db/
        endpointURL: http://rustfs-svc.rustfs.svc.cluster.local:9000
        serverName: cnpg-db-cluster
        s3Credentials:
          accessKeyId:
            name: pg-backup-rustfs-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: pg-backup-rustfs-credentials
            key: ACCESS_SECRET_KEY
        wal:
          maxParallel: 4

  backup:
    retentionPolicy: "7d"
    barmanObjectStore:
      destinationPath: s3://pg-backups-cnpg/cnpg-db-replica/
      endpointURL: http://rustfs-svc.rustfs.svc.cluster.local:9000
      serverName: cnpg-db-replica-cluster
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
        jobs: 2
        immediateCheckpoint: false
      s3Credentials:
        accessKeyId:
          name: pg-backup-rustfs-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-rustfs-credentials
          key: ACCESS_SECRET_KEY

  storage:
    size: 10Gi
    storageClass: standard

  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"
