# DR Replica Cluster (CloudNativePG)
# Single-node designated primary that continuously recovers from cnpg-db WAL archive
# Promotable to standalone primary for disaster recovery
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-db-replica
  namespace: product
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: cnpg-db-replica-backup-store
        serverName: cnpg-db-replica-cluster

  # Must match or exceed cnpg-db primary for recovery-critical GUCs.
  # PostgreSQL refuses recovery when replica values < primary pg_controldata.
  postgresql:
    parameters:
      max_connections: "200"
      max_worker_processes: "8"
      max_wal_senders: "10"
      wal_level: "logical"
      min_wal_size: "2GB"
      max_wal_size: "8GB"
      wal_buffers: "16MB"
      wal_compression: "on"

  bootstrap:
    recovery:
      source: cnpg-db-primary

  replica:
    enabled: true
    source: cnpg-db-primary

  externalClusters:
    - name: cnpg-db-primary
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: cnpg-db-backup-store
          serverName: cnpg-db-cluster

  storage:
    size: 10Gi
    storageClass: standard

  resources:
    requests:
      memory: "256Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "250m"
