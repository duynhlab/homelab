# One-shot physical backup — useful for:
# - kubectl wait --for=condition=ready backup/cnpg-db-initial -n product (before relying on DR bootstrap)
# - First base backup in object store when paired with ScheduledBackup (every-6h has immediate: true)
#
# Safe to keep in Git: once phase=completed, re-reconciliation does not re-run the backup.
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: cnpg-db-initial
  namespace: product
  labels:
    app.kubernetes.io/name: cnpg-db-backup
    app.kubernetes.io/component: on-demand-backup
spec:
  cluster:
    name: cnpg-db
  method: barmanObjectStore
