# Product Database extensions
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: product-database
  namespace: product
spec:
  name: product
  owner: product
  cluster:
    name: cnpg-db
  extensions:
    - name: pgaudit
    - name: pg_stat_statements
    # auto_explain is a preload-only module (loaded via shared_preload_libraries in
    # instance.yaml) — it has no SQL extension / control file, so `CREATE EXTENSION
    # auto_explain` always fails "extension is not available". Not listed here.
    - name: pgcrypto
    - name: uuid-ossp
---
# Cart Database extensions
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
