# ExternalSecret for cnpg-db cart credentials — deployed to cart namespace
# Same Vault path as product-namespace copy; apps in cart ns need local secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-db-cart-secret
  namespace: cart
  labels:
    app.kubernetes.io/name: cnpg-db-cart-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cnpg-db-cart-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cnpg-db-cart-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/cnpg-db/cart
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/cnpg-db/cart
        property: password
