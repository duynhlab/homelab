# ExternalSecret for cnpg-db payment database credentials — product namespace.
# OpenBAO path: secret/data/local/databases/cnpg-db/payment
#
# Rendered as kubernetes.io/basic-auth (not Opaque like the older cart/order
# copies): this secret doubles as the passwordSecret for the CNPG managed role
# `payment` (instance.yaml `managed.roles`), and CNPG requires basic-auth there.
# The username/password keys stay compatible with app-style secretKeyRef use.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-db-payment-secret
  namespace: product
  labels:
    app.kubernetes.io/name: cnpg-db-payment-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cnpg-db-payment-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          app.kubernetes.io/name: cnpg-db-payment-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/cnpg-db/payment
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/cnpg-db/payment
        property: password
