# ExternalSecret for cnpg-db bootstrap credentials (product DB owner)
# The cnpg.io/reload label triggers CNPG to reload password on secret rotation
# OpenBAO path: secret/data/local/databases/cnpg-db/product
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-db-secret
  namespace: product
  labels:
    app.kubernetes.io/name: cnpg-db-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cnpg-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: cnpg-db-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
          cnpg.io/reload: "true"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/cnpg-db/product
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/cnpg-db/product
        property: password
