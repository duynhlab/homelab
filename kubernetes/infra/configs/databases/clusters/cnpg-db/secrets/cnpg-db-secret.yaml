# ExternalSecret for cnpg-db bootstrap credentials (product DB owner)
# The cnpg.io/reload label triggers CNPG to reload password on secret rotation
# OpenBAO path: secret/data/local/databases/cnpg-db/product
#
# basic-auth (was Opaque): required by CNPG bootstrap/app secrets and by the
# product DatabaseRole (P3); also feeds the PgDog valuesFrom (users[0]).
# Secret type is immutable — on a live cluster the old Opaque Secret must be
# deleted so ESO recreates it (see runbooks/rotate-cnpg-service-password.md).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-db-secret
  namespace: product
  labels:
    app.kubernetes.io/name: cnpg-db-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cnpg-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          app.kubernetes.io/name: cnpg-db-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/cnpg-db/product
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/cnpg-db/product
        property: password
