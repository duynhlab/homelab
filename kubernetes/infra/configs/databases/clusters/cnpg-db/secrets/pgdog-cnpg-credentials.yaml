# ExternalSecret for PgDog pooler credentials (cnpg-db)
# PgDog chart does NOT currently support passwordFromSecret.
# This ExternalSecret is created for future chart support.
# Current workaround: Inline passwords in HelmRelease (dev-only)
# OpenBAO path: secret/data/local/databases/pgdog-cnpg/credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgdog-cnpg-credentials
  namespace: product
  labels:
    app.kubernetes.io/name: pgdog-cnpg-credentials
    app.kubernetes.io/component: pooler
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: pgdog-cnpg-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: pgdog-cnpg-credentials
          app.kubernetes.io/component: pooler
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/pgdog-cnpg/credentials
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/pgdog-cnpg/credentials
        property: password
