apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-db-monitoring-queries
  namespace: platform
  labels:
    cnpg.io/reload: ""
data:
  custom-queries: |
    # Scope pg_stat_statements to current_database() for each target DB.
    # Joining pg_database and scanning all dbids on every target connection can
    # produce duplicate labelsets and make exporter /metrics fail with HTTP 500.
    pg_stat_statements:
      query: "SELECT pg_get_userbyid(userid) as user, current_database() as datname, pg_stat_statements.queryid, SUBSTRING(pg_stat_statements.query,1,2000) as query,
               pg_stat_statements.calls, pg_stat_statements.total_exec_time as time_milliseconds, pg_stat_statements.rows,
               pg_stat_statements.shared_blks_hit, pg_stat_statements.shared_blks_read, pg_stat_statements.shared_blks_dirtied,
               pg_stat_statements.shared_blks_written, pg_stat_statements.local_blks_hit, pg_stat_statements.local_blks_read,
               pg_stat_statements.local_blks_dirtied, pg_stat_statements.local_blks_written, pg_stat_statements.temp_blks_read,
               pg_stat_statements.temp_blks_written, pg_stat_statements.shared_blk_read_time as blk_read_time, pg_stat_statements.shared_blk_write_time as blk_write_time
               FROM pg_stat_statements
               WHERE pg_stat_statements.dbid = (SELECT oid FROM pg_database WHERE datname = current_database())
               and pg_stat_statements.query not like '%pg_stat_statements%' and current_database() != 'postgres'
               and pg_stat_statements.query not like 'SET %' and pg_stat_statements.query != 'COMMIT' and pg_stat_statements.query != 'BEGIN'
               and pg_stat_statements.query not like '%SAVEPOINT%'
               ORDER BY pg_stat_statements.total_exec_time DESC LIMIT 100"
      target_databases:
        - "auth"
        - "user"
        - "notification"
        - "shipping"
        - "review"
      metrics:
        - user:
            usage: "LABEL"
            description: "The user who executed the statement"
        - datname:
            usage: "LABEL"
            description: "The database in which the statement was executed"
        - queryid:
            usage: "LABEL"
            description: "Internal hash code, computed from the statement's parse tree"
        - query:
            usage: "LABEL"
            description: "Processed query"
        - calls:
            usage: "COUNTER"
            description: "Number of times executed"
        - time_milliseconds:
            usage: "COUNTER"
            description: "Total time spent in the statement, in milliseconds"
        - rows:
            usage: "COUNTER"
            description: "Total number of rows retrieved or affected by the statement"
        - shared_blks_hit:
            usage: "COUNTER"
            description: "Total number of shared block cache hits by the statement"
        - shared_blks_read:
            usage: "COUNTER"
            description: "Total number of shared blocks read by the statement"
        - shared_blks_dirtied:
            usage: "COUNTER"
            description: "Total number of shared blocks dirtied by the statement"
        - shared_blks_written:
            usage: "COUNTER"
            description: "Total number of shared blocks written by the statement"
        - local_blks_hit:
            usage: "COUNTER"
            description: "Total number of local block cache hits by the statement"
        - local_blks_read:
            usage: "COUNTER"
            description: "Total number of local blocks read by the statement"
        - local_blks_dirtied:
            usage: "COUNTER"
            description: "Total number of local blocks dirtied by the statement"
        - local_blks_written:
            usage: "COUNTER"
            description: "Total number of local blocks written by the statement"
        - temp_blks_read:
            usage: "COUNTER"
            description: "Total number of temp blocks read by the statement"
        - temp_blks_written:
            usage: "COUNTER"
            description: "Total number of temp blocks written by the statement"
        - blk_read_time:
            usage: "COUNTER"
            description: "Total time spent reading shared blocks, in milliseconds (PG17+: shared_blk_read_time)"
        - blk_write_time:
            usage: "COUNTER"
            description: "Total time spent writing shared blocks, in milliseconds (PG17+: shared_blk_write_time)"

    pg_stat_activity_count:
      query: "SELECT datname, state, COALESCE(usename, '') as usename, count(*) as count FROM pg_stat_activity WHERE pid <> pg_backend_pid() GROUP BY datname, state, usename"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - state:
            usage: "LABEL"
            description: "Connection state"
        - usename:
            usage: "LABEL"
            description: "User name"
        - count:
            usage: "GAUGE"
            description: "Number of connections"

    pg_connection_limits:
      query: "SELECT current_setting('max_connections')::int as max_connections, (SELECT count(*) FROM pg_stat_activity WHERE backend_type = 'client backend') as current_connections"
      metrics:
        - max_connections:
            usage: "GAUGE"
            description: "Maximum number of connections"
        - current_connections:
            usage: "GAUGE"
            description: "Current number of client connections"

    pg_locks_count:
      query: "SELECT COALESCE(d.datname, 'shared') as datname, l.mode, count(*) as count FROM pg_locks l LEFT JOIN pg_database d ON l.database = d.oid GROUP BY COALESCE(d.datname, 'shared'), l.mode"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - mode:
            usage: "LABEL"
            description: "Lock mode"
        - count:
            usage: "GAUGE"
            description: "Number of locks"

    pg_blocking_queries:
      query: "SELECT count(*) as blocked_queries FROM pg_stat_activity WHERE wait_event_type = 'Lock'"
      metrics:
        - blocked_queries:
            usage: "GAUGE"
            description: "Number of queries waiting on locks"

    pg_stat_user_tables_autovacuum:
      query: "SELECT current_database() AS datname, schemaname, relname, n_dead_tup, n_live_tup, autovacuum_count, autoanalyze_count FROM pg_stat_user_tables"
      target_databases:
        - "auth"
        - "user"
        - "notification"
        - "shipping"
        - "review"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - n_dead_tup:
            usage: "GAUGE"
            description: "Estimated number of dead tuples"
        - n_live_tup:
            usage: "GAUGE"
            description: "Estimated number of live tuples"
        - autovacuum_count:
            usage: "COUNTER"
            description: "Number of times autovacuum ran"
        - autoanalyze_count:
            usage: "COUNTER"
            description: "Number of times autoanalyze ran"

    pg_table_size:
      query: "SELECT current_database() AS datname, schemaname, tablename, pg_total_relation_size(format('%I.%I', schemaname, tablename)) as total_bytes, pg_relation_size(format('%I.%I', schemaname, tablename)) as table_bytes FROM pg_tables WHERE schemaname NOT IN ('pg_catalog','information_schema') ORDER BY pg_total_relation_size(format('%I.%I', schemaname, tablename)) DESC LIMIT 30"
      target_databases:
        - "auth"
        - "user"
        - "notification"
        - "shipping"
        - "review"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - tablename:
            usage: "LABEL"
            description: "Table name"
        - total_bytes:
            usage: "GAUGE"
            description: "Total size including indexes and TOAST"
        - table_bytes:
            usage: "GAUGE"
            description: "Table-only size"

    pg_stat_user_indexes:
      query: "SELECT current_database() AS datname, schemaname, relname, indexrelname, idx_scan, idx_tup_read, idx_tup_fetch, pg_relation_size(indexrelid) as index_bytes FROM pg_stat_user_indexes"
      target_databases:
        - "auth"
        - "user"
        - "notification"
        - "shipping"
        - "review"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - indexrelname:
            usage: "LABEL"
            description: "Index name"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans"
        - idx_tup_read:
            usage: "COUNTER"
            description: "Number of index entries read"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Number of live table rows fetched by index scans"
        - index_bytes:
            usage: "GAUGE"
            description: "Index size in bytes"

    # pg_database_size + pg_stat_checkpointer removed 2026-07-18 — redundant with CNPG
    # built-in default queries (disableDefaultQueries: false): built-in `pg_database` emits
    # cnpg_pg_database_size_bytes (+ xid_age/mxid_age), and built-in `pg_stat_checkpointer`
    # emits checkpoints_timed/req + write_time/sync_time/buffers_written/restartpoints_* (superset).
    # See docs/observability/metrics/postgresql/builtin-metrics.md.

    # Oldest open transaction + idle-in-transaction age, instance-wide via
    # pg_stat_activity (runs once per instance, not per database). Long or idle
    # transactions pin dead tuples (bloat) and hold back xid freezing
    # (wraparound). Feeds the long-running-txn panels and alert.
    pg_long_running_transactions:
      query: "SELECT
                 coalesce(max(extract(epoch from (clock_timestamp() - xact_start))), 0) AS oldest_transaction_seconds,
                 coalesce(max(extract(epoch from (clock_timestamp() - state_change))) FILTER (WHERE state = 'idle in transaction'), 0) AS oldest_idle_in_transaction_seconds,
                 count(*) FILTER (WHERE state = 'idle in transaction') AS idle_in_transaction_count,
                 coalesce(max(extract(epoch from (clock_timestamp() - query_start))) FILTER (WHERE state = 'active'), 0) AS longest_active_query_seconds
               FROM pg_stat_activity
               WHERE backend_type = 'client backend' AND pid <> pg_backend_pid()"
      metrics:
        - oldest_transaction_seconds:
            usage: "GAUGE"
            description: "Age of the oldest open client transaction, in seconds"
        - oldest_idle_in_transaction_seconds:
            usage: "GAUGE"
            description: "Age of the longest session sitting idle in an open transaction, in seconds"
        - idle_in_transaction_count:
            usage: "GAUGE"
            description: "Number of client sessions idle inside an open transaction"
        - longest_active_query_seconds:
            usage: "GAUGE"
            description: "Runtime of the longest currently-executing query, in seconds"

    # Live progress of running VACUUM / autovacuum operations. Rows exist only
    # while a vacuum runs (usually none). Per-database so relid resolves in the
    # connected database.
    pg_stat_progress_vacuum:
      query: "SELECT current_database() AS datname, p.pid::text AS pid, p.relid::regclass::text AS relname, p.phase,
                 p.heap_blks_total, p.heap_blks_scanned, p.heap_blks_vacuumed, p.index_vacuum_count, p.num_dead_item_ids
               FROM pg_stat_progress_vacuum p
               WHERE p.datid = (SELECT oid FROM pg_database WHERE datname = current_database())"
      target_databases:
        - "auth"
        - "user"
        - "notification"
        - "shipping"
        - "review"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database the vacuumed table lives in"
        - pid:
            usage: "LABEL"
            description: "Process ID of the vacuum worker"
        - relname:
            usage: "LABEL"
            description: "Table currently being vacuumed"
        - phase:
            usage: "LABEL"
            description: "Current vacuum phase (scanning heap, vacuuming indexes, ...)"
        - heap_blks_total:
            usage: "GAUGE"
            description: "Total heap blocks in the table"
        - heap_blks_scanned:
            usage: "GAUGE"
            description: "Heap blocks scanned so far (progress = scanned/total)"
        - heap_blks_vacuumed:
            usage: "GAUGE"
            description: "Heap blocks vacuumed so far"
        - index_vacuum_count:
            usage: "GAUGE"
            description: "Number of completed index vacuum cycles"
        - num_dead_item_ids:
            usage: "GAUGE"
            description: "Dead item identifiers collected since the last index vacuum cycle"
