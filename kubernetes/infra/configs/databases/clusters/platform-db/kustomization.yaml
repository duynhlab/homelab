apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# platform-db cluster (CloudNativePG) — RFC-0018
# Databases: auth, user, notification, shipping, review, temporal, temporal_visibility
# Order: secrets (app-ns copies) -> instance -> services (triplets) -> configmaps -> poolers -> monitoring -> backup
resources:
  - secrets/platform-db-secret-auth-ns.yaml
  - secrets/platform-db-user-secret-user-ns.yaml
  - secrets/platform-db-notification-secret-notification-ns.yaml
  - secrets/platform-db-shipping-secret-shipping-ns.yaml
  - secrets/platform-db-review-secret-review-ns.yaml
  - secrets/platform-db-temporal-secret-temporal-ns.yaml
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - objectstore.yaml
  - instance.yaml
  - services/
  - configmaps/monitoring-queries.yaml
  - poolers/
  - monitoring/podmonitor.yaml
  - backup/backup-daily.yaml
  - backup/backup-every-6h.yaml
  - backup/backup-initial.yaml
