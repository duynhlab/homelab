apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: platform-db
  namespace: platform
  labels:
    app: platform-db
    operator: cloudnativepg
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: platform-db
  podMetricsEndpoints:
  - port: metrics
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
  podTargetLabels:
    - cnpg.io/cluster
    - cnpg.io/instanceRole
    - cnpg.io/instanceName
