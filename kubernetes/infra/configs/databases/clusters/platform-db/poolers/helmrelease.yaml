# PgDog Connection Pooler for platform-db (auth, user, notification, shipping, review)
# R/W splitting: SELECTs routed to replicas, writes to primary
# LSN monitoring: detects replication lag, bans lagging replicas
# Prepared statements: extended mode (no prefer_simple_protocol needed)
#
# User passwords come from the per-service ESO basic-auth Secrets via Flux
# valuesFrom targetPath (RFC-0012 P2, ADR-014) — no credentials in values.
# helm-controller re-reads valuesFrom only at reconcile time: after a
# password rotation, run `flux reconcile helmrelease pgdog-platform -n platform`.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgdog-platform
  namespace: platform
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: pgdog
      interval: 5m
      version: "v0.39"
      sourceRef:
        kind: HelmRepository
        name: pgdogdev
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # Indices are positional against values.users below — keep both lists in
  # the same order: [0]=auth, [1]=user, [2]=notification, [3]=shipping, [4]=review.
  valuesFrom:
    - kind: Secret
      name: platform-db-secret
      valuesKey: password
      targetPath: "users[0].password"
    - kind: Secret
      name: platform-db-user-secret
      valuesKey: password
      targetPath: "users[1].password"
    - kind: Secret
      name: platform-db-notification-secret
      valuesKey: password
      targetPath: "users[2].password"
    - kind: Secret
      name: platform-db-shipping-secret
      valuesKey: password
      targetPath: "users[3].password"
    - kind: Secret
      name: platform-db-review-secret
      valuesKey: password
      targetPath: "users[4].password"
  values:
    replicas: 3
    port: 6432
    openMetricsPort: 9090
    openMetricsNamespace: "pgdog_"

    lsnCheckDelay: 0
    lsnCheckInterval: 5000

    databases:
      # auth DB -- primary
      - name: auth
        host: platform-db-rw.platform.svc.cluster.local
        port: 5432
        database: auth
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: platform-db-r.platform.svc.cluster.local
            port: 5432
            poolSize: 30
      # user DB -- primary
      - name: user
        host: platform-db-rw.platform.svc.cluster.local
        port: 5432
        database: user
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: platform-db-r.platform.svc.cluster.local
            port: 5432
            poolSize: 30
      # notification DB -- primary
      - name: notification
        host: platform-db-rw.platform.svc.cluster.local
        port: 5432
        database: notification
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: platform-db-r.platform.svc.cluster.local
            port: 5432
            poolSize: 30
      # shipping DB -- primary
      - name: shipping
        host: platform-db-rw.platform.svc.cluster.local
        port: 5432
        database: shipping
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: platform-db-r.platform.svc.cluster.local
            port: 5432
            poolSize: 30
      # review DB -- primary
      - name: review
        host: platform-db-rw.platform.svc.cluster.local
        port: 5432
        database: review
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: platform-db-r.platform.svc.cluster.local
            port: 5432
            poolSize: 30

    # Passwords injected per-user by spec.valuesFrom (order must match the
    # targetPath indices above).
    users:
      - name: auth
        database: auth
      - name: user
        database: user
      - name: notification
        database: notification
      - name: shipping
        database: shipping
      - name: review
        database: review

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 10s

    podAntiAffinity:
      enabled: true
      type: soft

    podDisruptionBudget:
      enabled: true
      minAvailable: 2
