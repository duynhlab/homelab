# ExternalSecret for platform-db notification credentials — deployed to notification namespace
# Same Vault path as platform-namespace copy; apps in notification ns need local secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-notification-secret
  namespace: notification
  labels:
    app.kubernetes.io/name: platform-db-notification-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  # RFC-0008 / ADR-025 pilot: OpenBAO database static-role (openbao-db store).
  refreshInterval: 1m
  secretStoreRef:
    name: openbao-db
    kind: ClusterSecretStore
  target:
    name: platform-db-notification-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-notification-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: database/static-creds/notification
        property: username
    - secretKey: password
      remoteRef:
        key: database/static-creds/notification
        property: password
