# ExternalSecret for platform-db review credentials — deployed to review namespace
# Same Vault path as platform-namespace copy; apps in review ns need local secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-review-secret
  namespace: review
  labels:
    app.kubernetes.io/name: platform-db-review-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-db-review-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-review-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/shared-db/review
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/shared-db/review
        property: password
