# ExternalSecret for platform-db auth credentials — deployed to auth namespace.
# Same Vault path as platform-namespace copy; apps in auth ns need local secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-secret
  namespace: auth
  labels:
    app.kubernetes.io/name: platform-db-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/auth-db/auth
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/auth-db/auth
        property: password
