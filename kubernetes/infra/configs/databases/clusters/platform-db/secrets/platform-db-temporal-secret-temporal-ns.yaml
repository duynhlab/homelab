# ExternalSecret for platform-db temporal credentials — deployed to temporal namespace.
# Same Vault path as platform-namespace copy; TemporalCluster needs local secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-temporal-secret
  namespace: temporal
  labels:
    app.kubernetes.io/name: platform-db-temporal-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-db-temporal-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-temporal-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/platform-db/temporal
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/platform-db/temporal
        property: password
