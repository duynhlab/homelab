apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Per-service database triplets (RFC-0012, ADR-013): one file per service —
# ExternalSecret + DatabaseRole + Database. Adding a service database means
# adding one file here, never editing instance.yaml.
resources:
  - auth.yaml
  - user.yaml
  - notification.yaml
  - shipping.yaml
  - review.yaml
  - temporal.yaml
