# notification — per-service database triplet (RFC-0012, ADR-013).
#
# ExternalSecret for platform-db notification database credentials — platform namespace.
# OpenBAO path: secret/data/local/databases/shared-db/notification (compat — pre-merge path)
#
# Rendered as kubernetes.io/basic-auth: this secret doubles as the
# passwordSecret for the DatabaseRole below, and CNPG requires basic-auth
# there. Secret `type` is immutable — migrating a live cluster requires
# deleting the old Secret so ESO recreates it
# (see docs/databases/runbooks/rotate-cnpg-service-password.md).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-notification-secret
  namespace: platform
  labels:
    app.kubernetes.io/name: platform-db-notification-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-db-notification-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-notification-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/shared-db/notification
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/shared-db/notification
        property: password
---
# Written out IN FULL — adoption resets omitted attributes.
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: platform-db-role-notification
  namespace: platform
spec:
  cluster:
    name: platform-db
  name: notification
  comment: "notification-service application role (RFC-0012)"
  login: true
  superuser: false
  createdb: false
  createrole: false
  inherit: true
  replication: false
  bypassrls: false
  connectionLimit: -1
  inRoles: []
  passwordSecret:
    name: platform-db-notification-secret
  databaseRoleReclaimPolicy: retain
---
# notification Database extensions.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: notification-database
  namespace: platform
spec:
  name: notification
  owner: notification
  cluster:
    name: platform-db
  extensions:
    - name: pgaudit
    - name: pg_stat_statements
  databaseReclaimPolicy: retain
