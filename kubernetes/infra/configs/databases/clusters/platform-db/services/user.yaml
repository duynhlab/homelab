# user — per-service database triplet (RFC-0012, ADR-013).
#
# user is special in exactly one way: its Secret and role/database are
# ALSO what bootstrap.initdb (instance.yaml) uses on a fresh cluster. The
# initdb fields are structural placeholders; this triplet adopts the
# initdb-created role and database declaratively, so a from-scratch build
# and a backup restore converge to the same state. The DatabaseRole and
# bootstrap.initdb.secret MUST keep pointing at the SAME Secret
# (platform-db-user-secret) — two sources for one password would fight.
#
# ExternalSecret for platform-db bootstrap credentials (user DB owner).
# OpenBAO path: secret/data/local/databases/shared-db/user (compat — pre-merge path)
# basic-auth: required by CNPG bootstrap/app secrets and the DatabaseRole;
# also feeds the PgDog valuesFrom (users[1]).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-db-user-secret
  namespace: platform
  labels:
    app.kubernetes.io/name: platform-db-user-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-db-user-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          app.kubernetes.io/name: platform-db-user-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
          cnpg.io/reload: "true"
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/shared-db/user
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/shared-db/user
        property: password
---
# Written out IN FULL — adoption resets omitted attributes.
# Adopts the role initdb created; CNPG's app-secret sync and this CR read
# the same Secret, so they can never disagree.
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: platform-db-role-user
  namespace: platform
spec:
  cluster:
    name: platform-db
  name: user
  comment: "user-service application role (RFC-0012)"
  login: true
  superuser: false
  createdb: false
  createrole: false
  inherit: true
  replication: false
  bypassrls: false
  connectionLimit: -1
  inRoles: []
  passwordSecret:
    name: platform-db-user-secret
  databaseRoleReclaimPolicy: retain
---
# user Database extensions.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: user-database
  namespace: platform
spec:
  name: user
  owner: user
  cluster:
    name: platform-db
  extensions:
    - name: pgaudit
    - name: pg_stat_statements
  databaseReclaimPolicy: retain
