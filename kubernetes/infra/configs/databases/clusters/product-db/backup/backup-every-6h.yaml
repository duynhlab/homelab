# ScheduledBackup for product-db - every 6 hours base backups to RustFS
# Uses cluster's backup.barmanObjectStore config (WAL archiving + base backup)
# Every 6 hours (improved RTO)
# Reference: docs/databases/backup.md
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: product-db-every-6h
  namespace: product
  labels:
    backup-frequency: every-6h
spec:
  # Schedule: every 6 hours at minute 0
  # Times: 00:00, 06:00, 12:00, 18:00 UTC
  schedule: "0 0 */6 * * *"
  cluster:
    name: product-db
  # Backup ownership (self = ScheduledBackup owns the Backup)
  backupOwnerReference: self
  
  # Don't run backup immediately on creation
  immediate: true
  
  # Backup method (barmanObjectStore = use Barman Cloud)
  method: barmanObjectStore
  
  # Optional: override cluster's backup target
  # target: primary  # or: prefer-standby
  
  # Optional: online backup configuration
  # online: true
  # onlineConfiguration:
  #   waitForArchive: true  # Wait for WAL archiving to complete
  #   immediateCheckpoint: false
