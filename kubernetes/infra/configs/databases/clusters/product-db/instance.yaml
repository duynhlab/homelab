# Product Database Cluster (CloudNativePG Operator)
# With read replicas for high traffic
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: product-db
  namespace: product
spec:
  # Number of instances (1 primary + 2 replica)
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
  
  # PostgreSQL parameters
  postgresql:
    # # This is LOADING libraries into PostgreSQL PROCESS to use
    # PostgreSQL 18 has built-in pgaudit - NO need extension image!
    # Only need to enable in shared_preload_libraries
    # Preload libraries required by extensions
    shared_preload_libraries:
      - pgaudit #  Load binary into PostgreSQL server process
      - pg_stat_statements # Load into memory to track queries
      - auto_explain # Load to automatically explain queries
      # - pglogical # Logical replication

    parameters:
      max_connections: "200"

      # Memory settings
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      maintenance_work_mem: "128MB"
      work_mem: "8MB"

      # Query planner settings
      default_statistics_target: "100"
      random_page_cost: "4.0"
      effective_io_concurrency: "2"
      
      # Checkpoint settings
      checkpoint_completion_target: "0.9"

      # WAL settings (optimized for backup)
      wal_buffers: "16MB"  # Increased from 16MB for better WAL performance
      min_wal_size: "1GB"
      max_wal_size: "4GB"
      wal_compression: "on"  # Compress WAL segments (saves ~70% storage)
      archive_timeout: "5min"  # Force WAL switch every 5 min (ensures low RPO even with low write activity)
      max_wal_senders: "10"  # Increased for 3 replicas + backup streams
      wal_keep_size: "1GB"  # Keep WAL locally for replica catch-up

      # pgAudit configuration
      pgaudit.log: "ddl, write"  # Only log DDL and write (less noise than "all" includes ddl, read, write, function, misc)
      pgaudit.log_catalog: "off"  # Don't log system catalog queries (reduces noise)
      pgaudit.log_parameter: "on"  # Include query parameters in logs
      pgaudit.log_statement_once: "off"  # Log each statement (not just once per session)
      pgaudit.log_relation: "on"  # Log relation (table) access
      pgaudit.log_rows: "on"  # Log number of rows affected

      # Performance monitoring
      track_io_timing: "on"

      # Config for pg_stat_statements
      pg_stat_statements.track: "all"
      pg_stat_statements.max: "10000"

      # Config for auto_explain
      auto_explain.log_min_duration: "1s"
      auto_explain.log_analyze: "on"

      # Config for pglogical
      # pglogical.database_name: "product"
      # pglogical.database_user: "product"
      # pglogical.database_password: "product"
      # pglogical.database_host: "product-db.product.svc.cluster.local"
      # pglogical.database_port: "5432"
      # pglogical.database_sslmode: "disable"

    # High Availability configuration
    # Allow async replicas for read scaling (no sync replication)
    syncReplicaElectionConstraint:
      enabled: false  # Allow async replicas for read scaling
  
  # Bootstrap configuration
  bootstrap:
    initdb:
      database: product # Create default database before bootstrap
      owner: product # Set owner for the database
      secret:
        name: product-db-secret-vault  # Vault-backed (ExternalSecret)
      dataChecksums: true # Enable data checksums for data integrity
      encoding: "UTF8" # Set encoding for the database
      localeCType: "C" # Set locale for the database
      localeCollate: "C" # Set locale for the database
  
  # Backup configuration (RustFS S3-compatible)
  # Reference: docs/databases/backup.md
  backup:
    retentionPolicy: "30d"
    # Volume snapshot backups (optional, requires CSI driver support)
    # volumeSnapshot:
    #   className: csi-snapshot-class
    #   online: true
    #   onlineConfiguration:
    #     waitForArchive: true
    #     immediateCheckpoint: false

    # Barman Object Store backup to RustFS (S3-compatible object storage)
    barmanObjectStore:
      destinationPath: s3://pg-backups/product-db/
      endpointURL: http://rustfs-svc.rustfs.svc.cluster.local:9000

      # Server name for Barman (must be unique across all clusters)
      serverName: product-db-cluster
      
      # WAL archiving configuration (for PITR)
      wal:
        compression: gzip  # Compress WAL segments (reduces storage by ~70%)
        maxParallel: 4     # Upload 4 WAL segments in parallel (faster archiving)
      
      # Base backup configuration
      data:
        compression: gzip  # Compress base backup (reduces storage significantly)
        jobs: 4            # Parallel base backup (requires CNPG >= 1.23)
        immediateCheckpoint: false  # Don't force checkpoint (reduces I/O impact)

      s3Credentials:
        accessKeyId:
          name: pg-backup-rustfs-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-rustfs-credentials
          key: ACCESS_SECRET_KEY

      # Optional: S3-specific settings
      # tags:
      #   environment: production
      #   cluster: product-db
      # historyTags:
      #   environment: production
      #   type: wal-archive
  
  # Storage configuration
  storage:
    size: 10Gi
    storageClass: standard  # Use default storage class for Kind

  # WAL storage (optional: separate WAL to different disk for better I/O)
  # walStorage:
  #   size: 5Gi
  #   storageClass: fast-ssd

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
