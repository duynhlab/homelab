apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: product-db
  namespace: product
  labels:
    app: product-db
    operator: cloudnativepg
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: product-db
  podMetricsEndpoints:
  - port: metrics
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
  podTargetLabels:
    - cnpg.io/cluster
    - cnpg.io/instanceRole
    - cnpg.io/instanceName
