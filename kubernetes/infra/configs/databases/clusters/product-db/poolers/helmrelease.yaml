# PgDog Connection Pooler for Product Database
#
# SECURITY NOTE (Phase 4 - Secrets Management):
# This HelmRelease uses INLINE passwords (dev-only).
# The PgDog chart does NOT currently support passwordFromSecret.
#
# Vault-backed secrets are available at:
#   - Secret: pgdog-product-credentials-vault (namespace: product)
#   - Vault path: secret/data/poolers/pgdog-product
#
# Future options to eliminate inline passwords:
# 1. Upstream: Request passwordFromSecret support in PgDog chart
# 2. InitContainer: Render values.yaml from Secret before Helm install
# 3. Kustomize: Use secretGenerator with Helm post-renderer
#
# For production: Implement one of the above or use a pooler that
# supports secretRef (e.g., CNPG's built-in PgBouncer).
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgdog-product
  namespace: product
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: pgdog
      interval: 5m
      version: "v0.39"
      sourceRef:
        kind: HelmRepository
        name: pgdogdev
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicas: 1  # Single replica for dev
    
    port: 6432
    openMetricsPort: 9090
    openMetricsNamespace: "pgdog_"
    
    # Single database configuration
    databases:
      - name: product
        host: product-db-rw.product.svc.cluster.local
        port: 5432
        database: product
        poolSize: 30
        poolMode: transaction
        replicas:
          - host: product-db-r.product.svc.cluster.local
            port: 5432
            poolSize: 30
      - name: product_ro
        host: product-db-r.product.svc.cluster.local
        port: 5432
        database: product
        databaseName: product  # Actual PostgreSQL DB (defaults to name if unset)
        poolSize: 30
        poolMode: transaction
    
    # User authentication (inline password - matches product-db-secret)
    # Note: passwordFromSecret is NOT supported by this chart
    users:
      - name: product
        database: product
        password: postgres  # Must match product-db-secret
      - name: product
        database: product_ro
        password: postgres  # Must match product-db-secret
    
    # Resources
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 128Mi
    
    serviceMonitor:
      enabled: true
      interval: 15s
      scrapeTimeout: 10s
    
    podAntiAffinity:
      enabled: false
      type: soft
    
    podDisruptionBudget:
      enabled: false
      minAvailable: 1
