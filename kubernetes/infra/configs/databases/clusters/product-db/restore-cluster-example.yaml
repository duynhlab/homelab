# Example: Restore product-db from RustFS backup to new cluster
# Use for DR drill or PITR. Apply manually - NOT part of default kustomization.
# Reference: docs/runbooks/troubleshooting/POSTGRES_BACKUP_RESTORE.md
#
# Prerequisites:
# - At least one successful base backup + WAL archiving
# - Bucket pg-backups exists in RustFS
# - Secret pg-backup-rustfs-credentials in product namespace
#
# Usage:
#   kubectl apply -f restore-cluster-example.yaml -n product
#   kubectl get cluster -n product -w
#
# For PITR: Add recoveryTarget under bootstrap.recovery:
#   recoveryTarget:
#     targetTime: "2025-01-28 10:29:00+00"
#
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: product-db-restore
  namespace: product
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie
  bootstrap:
    recovery:
      source: product-db-backup
      database: product
      owner: product
      secret:
        name: product-db-secret
  externalClusters:
    - name: product-db-backup
      barmanObjectStore:
        destinationPath: s3://pg-backups/product-db/
        endpointURL: http://rustfs-svc.rustfs.svc.cluster.local:9000
        serverName: product-db
        s3Credentials:
          accessKeyId:
            name: pg-backup-rustfs-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: pg-backup-rustfs-credentials
            key: ACCESS_SECRET_KEY
        wal:
          maxParallel: 4
  storage:
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
