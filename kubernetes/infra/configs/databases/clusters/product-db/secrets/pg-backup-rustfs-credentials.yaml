# S3 credentials for PostgreSQL backup to RustFS (product-db)
# Used by CloudNativePG barmanObjectStore for base backup + WAL archiving
# Reference: docs/databases/backup.md
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-rustfs-credentials
  namespace: product
type: Opaque
stringData:
  # CNPG/Barman expects ACCESS_KEY_ID and ACCESS_SECRET_KEY
  ACCESS_KEY_ID: rustfsadmin
  ACCESS_SECRET_KEY: rustfsadmin
