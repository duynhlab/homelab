# ExternalSecret for product-db checkout credentials — deployed to checkout namespace
# Same OpenBAO path as the product-namespace copy; apps in checkout ns need a local secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: product-db-checkout-secret
  namespace: checkout
  labels:
    app.kubernetes.io/name: product-db-checkout-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: product-db-checkout-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: product-db-checkout-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/product-db/checkout
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/product-db/checkout
        property: password
