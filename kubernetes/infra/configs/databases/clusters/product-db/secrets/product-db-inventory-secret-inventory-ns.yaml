# ExternalSecret for product-db inventory credentials — deployed to inventory
# namespace. Same OpenBAO path as the product-namespace copy; apps in the
# inventory ns need a local secret (RFC-0021 P1).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: product-db-inventory-secret
  namespace: inventory
  labels:
    app.kubernetes.io/name: product-db-inventory-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: product-db-inventory-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: product-db-inventory-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/product-db/inventory
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/product-db/inventory
        property: password
