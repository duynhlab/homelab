apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-monitoring-queries
  namespace: review
data:
  queries.yaml: |
    pg_stat_statements:
      query: "SELECT pg_get_userbyid(userid) as user, pg_database.datname, pg_stat_statements.queryid, SUBSTRING(pg_stat_statements.query,1,2000) as query,
               pg_stat_statements.calls, pg_stat_statements.total_exec_time as time_milliseconds, pg_stat_statements.rows,
               pg_stat_statements.shared_blks_hit, pg_stat_statements.shared_blks_read, pg_stat_statements.shared_blks_dirtied,
               pg_stat_statements.shared_blks_written, pg_stat_statements.local_blks_hit, pg_stat_statements.local_blks_read,
               pg_stat_statements.local_blks_dirtied, pg_stat_statements.local_blks_written, pg_stat_statements.temp_blks_read,
               pg_stat_statements.temp_blks_written, pg_stat_statements.blk_read_time, pg_stat_statements.blk_write_time
               FROM pg_stat_statements JOIN pg_database ON pg_database.oid = pg_stat_statements.dbid
               WHERE pg_stat_statements.query not like '%pg_stat_statements%' and pg_database.datname != 'postgres'
               and pg_stat_statements.query not like 'SET %' and pg_stat_statements.query != 'COMMIT' and pg_stat_statements.query != 'BEGIN'
               and pg_stat_statements.query not like '%SAVEPOINT%'
               ORDER BY pg_stat_statements.total_exec_time DESC LIMIT 100"
      metrics:
        - user:
            usage: "LABEL"
            description: "The user who executed the statement"
        - datname:
            usage: "LABEL"
            description: "The database in which the statement was executed"
        - queryid:
            usage: "LABEL"
            description: "Internal hash code, computed from the statement's parse tree"
        - query:
            usage: "LABEL"
            description: "Processed query"
        - calls:
            usage: "COUNTER"
            description: "Number of times executed"
        - time_milliseconds:
            usage: "COUNTER"
            description: "Total time spent in the statement, in milliseconds"
        - rows:
            usage: "COUNTER"
            description: "Total number of rows retrieved or affected by the statement"
        - shared_blks_hit:
            usage: "COUNTER"
            description: "Total number of shared block cache hits by the statement"
        - shared_blks_read:
            usage: "COUNTER"
            description: "Total number of shared blocks read by the statement"
        - shared_blks_dirtied:
            usage: "COUNTER"
            description: "Total number of shared blocks dirtied by the statement"
        - shared_blks_written:
            usage: "COUNTER"
            description: "Total number of shared blocks written by the statement"
        - local_blks_hit:
            usage: "COUNTER"
            description: "Total number of local block cache hits by the statement"
        - local_blks_read:
            usage: "COUNTER"
            description: "Total number of local blocks read by the statement"
        - local_blks_dirtied:
            usage: "COUNTER"
            description: "Total number of local blocks dirtied by the statement"
        - local_blks_written:
            usage: "COUNTER"
            description: "Total number of local blocks written by the statement"
        - temp_blks_read:
            usage: "COUNTER"
            description: "Total number of temp blocks read by the statement"
        - temp_blks_written:
            usage: "COUNTER"
            description: "Total number of temp blocks written by the statement"
        - blk_read_time:
            usage: "COUNTER"
            description: "Total time spent reading blocks by the statement, in milliseconds"
        - blk_write_time:
            usage: "COUNTER"
            description: "Total time spent writing blocks by the statement, in milliseconds"
    
    pg_replication:
      query: "SELECT CASE WHEN NOT pg_is_in_recovery() THEN 0 ELSE GREATEST (0, EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp()))) END AS lag"
      master: true
      metrics:
        - lag:
            usage: "GAUGE"
            description: "Replication lag behind master in seconds"
    
    pg_postmaster:
      query: "SELECT pg_postmaster_start_time as start_time_seconds from pg_postmaster_start_time()"
      master: true
      metrics:
        - start_time_seconds:
            usage: "GAUGE"
            description: "Time at which postmaster started"

    custom_connection_limits:
      query: "SELECT current_setting('max_connections')::int as max_connections, (SELECT count(*) FROM pg_stat_activity WHERE backend_type = 'client backend') as current_connections"
      master: true
      metrics:
        - max_connections:
            usage: "GAUGE"
            description: "Maximum number of connections"
        - current_connections:
            usage: "GAUGE"
            description: "Current number of client connections"

    pg_locks_count:
      query: "SELECT COALESCE(d.datname, 'shared') as datname, l.mode, count(*) as count FROM pg_locks l LEFT JOIN pg_database d ON l.database = d.oid GROUP BY COALESCE(d.datname, 'shared'), l.mode"
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - mode:
            usage: "LABEL"
            description: "Lock mode"
        - count:
            usage: "GAUGE"
            description: "Number of locks"

    custom_blocking_queries:
      query: "SELECT count(*) as blocked_queries FROM pg_stat_activity WHERE wait_event_type = 'Lock'"
      master: true
      metrics:
        - blocked_queries:
            usage: "GAUGE"
            description: "Number of queries waiting on locks"

    custom_autovacuum_stats:
      query: "SELECT schemaname, relname, n_dead_tup, n_live_tup, autovacuum_count, autoanalyze_count FROM pg_stat_user_tables"
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - n_dead_tup:
            usage: "GAUGE"
            description: "Estimated number of dead tuples"
        - n_live_tup:
            usage: "GAUGE"
            description: "Estimated number of live tuples"
        - autovacuum_count:
            usage: "COUNTER"
            description: "Number of times autovacuum ran"
        - autoanalyze_count:
            usage: "COUNTER"
            description: "Number of times autoanalyze ran"

    custom_table_size:
      query: "SELECT schemaname, tablename, pg_total_relation_size(format('%I.%I', schemaname, tablename)) as total_bytes, pg_relation_size(format('%I.%I', schemaname, tablename)) as table_bytes FROM pg_tables WHERE schemaname NOT IN ('pg_catalog','information_schema') ORDER BY pg_total_relation_size(format('%I.%I', schemaname, tablename)) DESC LIMIT 30"
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - tablename:
            usage: "LABEL"
            description: "Table name"
        - total_bytes:
            usage: "GAUGE"
            description: "Total size including indexes and TOAST"
        - table_bytes:
            usage: "GAUGE"
            description: "Table-only size"

    custom_stat_user_indexes:
      query: "SELECT schemaname, relname, indexrelname, idx_scan, idx_tup_read, idx_tup_fetch, pg_relation_size(indexrelid) as index_bytes FROM pg_stat_user_indexes"
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - indexrelname:
            usage: "LABEL"
            description: "Index name"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans"
        - idx_tup_read:
            usage: "COUNTER"
            description: "Number of index entries read"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Number of live table rows fetched by index scans"
        - index_bytes:
            usage: "GAUGE"
            description: "Index size in bytes"
