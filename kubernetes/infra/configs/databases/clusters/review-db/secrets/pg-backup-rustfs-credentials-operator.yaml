# ExternalSecret for RustFS backup credentials (Review namespace) - FOR OPERATOR
# Creates secret: pg-backup-rustfs-credentials (no vault suffix)
# Required by Postgres Operator PodEnvironmentSecret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pg-backup-rustfs-credentials-operator
  namespace: review
  labels:
    app.kubernetes.io/name: pg-backup-rustfs-credentials
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: pg-backup-rustfs-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: pg-backup-rustfs-credentials
          app.kubernetes.io/component: backup
          app.kubernetes.io/managed-by: external-secrets
  data:
    # WAL-G format
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: secret/data/backups/rustfs
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/data/backups/rustfs
        property: secret_access_key
