apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: shared-db-every-6h
  namespace: user
  labels:
    backup-frequency: every-6h
spec:
  schedule: "0 0 */6 * * *"
  cluster:
    name: shared-db
  backupOwnerReference: self
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
