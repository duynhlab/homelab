# One-shot physical backup — useful for:
# - kubectl wait --for=condition=ready backup/shared-db-initial -n user (before relying on DR bootstrap)
# - First base backup in object store when paired with ScheduledBackup (every-6h has immediate: true)
#
# Safe to keep in Git: once phase=completed, re-reconciliation does not re-run the backup.
apiVersion: postgresql.cnpg.io/v1
kind: Backup
metadata:
  name: shared-db-initial
  namespace: user
  labels:
    app.kubernetes.io/name: shared-db-backup
    app.kubernetes.io/component: on-demand-backup
spec:
  cluster:
    name: shared-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
