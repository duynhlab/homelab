apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# shared-db cluster (CloudNativePG)
# Databases: user, notification, shipping, review — each a services/ triplet (RFC-0012)
# Order: secrets (app-ns copies) -> instance -> services (triplets) -> poolers -> monitoring -> backup
resources:
  - secrets/shared-db-notification-secret-notification-ns.yaml
  - secrets/shared-db-shipping-secret-shipping-ns.yaml
  - secrets/shared-db-review-secret-review-ns.yaml
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - objectstore.yaml
  - instance.yaml
  - services/
  - configmaps/monitoring-queries.yaml
  - poolers/
  - monitoring/podmonitor.yaml
  - backup/backup-daily.yaml
  - backup/backup-every-6h.yaml
  - backup/backup-initial.yaml
