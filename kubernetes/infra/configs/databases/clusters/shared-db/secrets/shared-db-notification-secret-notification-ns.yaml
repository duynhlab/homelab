# ExternalSecret for shared-db notification credentials — deployed to notification namespace
# Same Vault path as user-namespace copy; apps in notification ns need local secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shared-db-notification-secret
  namespace: notification
  labels:
    app.kubernetes.io/name: shared-db-notification-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: shared-db-notification-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: shared-db-notification-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/local/databases/shared-db/notification
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/local/databases/shared-db/notification
        property: password
