# S3 credentials for PostgreSQL backup to RustFS (supporting-db)
# Used by Zalando Spilo WAL-G for base backup + WAL archiving
# Reference: docs/databases/backup.md
apiVersion: v1
kind: Secret
metadata:
  name: pg-backup-rustfs-credentials
  namespace: user
type: Opaque
stringData:
  # WAL-G expects AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY
  AWS_ACCESS_KEY_ID: rustfsadmin
  AWS_SECRET_ACCESS_KEY: rustfsadmin
