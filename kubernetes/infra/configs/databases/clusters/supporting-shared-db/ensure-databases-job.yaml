# Idempotent Job that guarantees the per-service databases exist on
# supporting-shared-db, independent of the Zalando operator's fragile first-init.
#
# Why this exists (Bug 20): the Zalando operator only creates the databases from
# spec.databases during a *successful first-time* init. On a slow spilo cold boot
# the operator's DB-connection retry window expires first → PostgresClusterStatus
# CreateFailed → later syncs bring up Patroni + roles but never (re)create the
# databases → app migrations fail "database does not exist". This Job connects as
# the superuser and creates any missing database (guarded — Postgres has no
# CREATE DATABASE IF NOT EXISTS), so it is safe to re-run and self-heals.
#
# Keep the (database → owner) list below in sync with spec.databases in
# instance.yaml. Owner roles are created reliably by the operator; if a role is
# not present yet the CREATE fails and the Job retries (backoffLimit).
apiVersion: batch/v1
kind: Job
metadata:
  name: supporting-shared-db-ensure-databases
  namespace: user
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supporting-shared-db-ensure-databases
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ensure-databases
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PGHOST
              value: supporting-shared-db
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGDATABASE
              value: postgres
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres.supporting-shared-db.credentials.postgresql.acid.zalan.do
                  key: password
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              echo "=== Waiting for supporting-shared-db to accept connections ==="
              for i in $(seq 1 60); do
                if psql -tAc 'SELECT 1' >/dev/null 2>&1; then
                  echo "postgres is ready."
                  break
                fi
                echo "attempt $i: not ready, retrying in 10s..."
                sleep 10
              done
              ensure_db() {
                db="$1"; owner="$2"
                if psql -tAc "SELECT 1 FROM pg_database WHERE datname = '$db'" | grep -q 1; then
                  echo "database '$db' already exists"
                else
                  echo "creating database '$db' owner '$owner'"
                  psql -c "CREATE DATABASE \"$db\" OWNER \"$owner\""
                fi
              }
              ensure_db user user
              ensure_db notification "notification.notification"
              ensure_db shipping "shipping.shipping"
              ensure_db review "review.review"
              echo "=== Databases present ==="
              psql -tAc "SELECT datname FROM pg_database WHERE datname IN ('user','notification','shipping','review')"
              echo "=== Done ==="
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
