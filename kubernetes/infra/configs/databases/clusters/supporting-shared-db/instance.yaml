# Supporting Database Cluster (Zalando Operator)
# Shared database for User, Notification, and Shipping services
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: supporting-shared-db
  namespace: user
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 2Gi
    # storageClass: "ssd"
  
  # Inject Vault-backed credentials for WAL-G backups
  # Secret: pg-backup-rustfs-credentials-vault (managed by ExternalSecret)
  env:
    - name: WALG_S3_PREFIX
      value: s3://pg-backups/user-db/
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: pg-backup-rustfs-credentials-vault
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: pg-backup-rustfs-credentials-vault
          key: AWS_SECRET_ACCESS_KEY
    - name: AWS_ENDPOINT
      value: http://rustfs-svc.rustfs.svc.cluster.local:9000
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_REGION
      value: "us-east-1"
  # Single instance
  numberOfInstances: 1
  
  # Multiple databases (shared cluster)
  databases:
    user: user
    notification: notification.notification  # namespace.username format for cross-namespace secret
    shipping: shipping.shipping  # namespace.username format for cross-namespace secret (Database for shipping service)
  
  # Multiple users (one per database)
  users:
    user:  # Database owner for user database
      - createdb
    notification.notification:  # Database owner for notification database (namespace.username format for cross-namespace secret)
      - createdb
    shipping.shipping:  # Database owner for shipping database (namespace.username format for cross-namespace secret)
      - createdb
  
  # Connection pooler (PgBouncer sidecar) configuration
  # Services connect via: supporting-shared-db-pooler.user.svc.cluster.local:5432
  # Note: PgBouncer requires SSL connections (sslmode=require)
  connectionPooler:
    numberOfInstances: 2
    schema: pooler
    user: pooler
    mode: transaction  # Transaction pooling for short-lived connections
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi
    maxDBConnections: 240
  
  # PostgreSQL version and parameters
  postgresql:
    version: "16"
    parameters:
      # set the default autovacuum parameters
      autovacuum_analyze_scale_factor: "0.1"
      autovacuum_vacuum_scale_factor: "0.2"
      # setup logs for future debugging of the most aspects of the database
      log_destination: "stderr"
      log_connections: "off"
      log_disconnections: "off"
      log_min_duration_statement: "100ms"
      log_statement: "ddl"
      log_lock_waits: "on"
      log_temp_files: "0"
      # limit the connections
      max_connections: "500"
      superuser_reserved_connections: "5"
      # set the maximum delay for the standby
      # after this timeout all queries on replica will be canceled until the standby will be up to date
      max_standby_archive_delay: "3600s"
      max_standby_streaming_delay: "3600s"
      wal_level: "replica"
      max_wal_senders: "6"
      max_replication_slots: "6"
      max_worker_processes: "16"
      max_parallel_workers: "8"
      max_parallel_workers_per_gather: "4"
      max_parallel_maintenance_workers: "2"
      max_wal_size: "4GB"
      min_wal_size: "2GB"
      wal_keep_size: "2GB"
      # Memory tuning for 256MB container limit:
      # - shared_buffers: 25% of RAM (64MB)
      # - effective_cache_size: 75% of RAM (192MB) - helps planner knowing FS cache size
      # - work_mem: 4MB (conservative to avoid OOM with max_connections=500)
      # - maintenance_work_mem: 64MB (max safe value for vacuuming without OOM)
      effective_cache_size: "192MB"
      shared_buffers: "64MB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"
      # we're on ssd
      effective_io_concurrency: "100"
      random_page_cost: "1.1"
      # enable the extentions, pg_stat_statements is a must-have for production
      shared_preload_libraries: "pg_stat_statements,pg_cron,pg_trgm,pgcrypto,pg_stat_kcache"
      track_io_timing: "on"
      pg_stat_statements.max: "1000"
      pg_stat_statements.track: "all"
      cron.database_name: "postgres"
      synchronous_commit: "local"
  
      # Patroni configuration for pg_hba.conf
      # Default Zalando operator requires SSL, but we allow unencrypted for simplicity
      # Note: Must include local entries for Patroni to connect via Unix socket
      # patroni:
      #   pg_hba:
      #     - "local all all peer"              # Local Unix socket connections (required for Patroni)
      #     - "host all all 127.0.0.1/32 md5"   # Localhost TCP connections
      #     - "host all all 10.244.0.0/16 md5"  # Allow unencrypted connections from pod network (Kind default CIDR)
      #     - "host all all 172.19.0.0/16 md5"  # Allow unencrypted connections from Kind bridge network

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "100m"
      memory: "256Mi"
  # Sidecars: pg_exporter (Pigsty) for Prometheus metrics + Vector for log collection
  # pg_exporter pilot: 600+ built-in metrics, auto-discovery for 3 databases, per-query caching/timeout
  sidecars:
    - name: exporter
      image: pgsty/pg_exporter:latest
      ports:
        - name: exporter
          containerPort: 9630
          protocol: TCP
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
      env:
        - name: PG_EXPORTER_URL
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@localhost:5432/postgres?sslmode=require"
        - name: PG_EXPORTER_AUTO_DISCOVERY
          value: "true"
        - name: PG_EXPORTER_CONNECT_TIMEOUT
          value: "200"
        - name: PG_EXPORTER_TAG
          value: "cls=supporting-shared-db"
    - name: vector
      image: timberio/vector:0.52.0-alpine
      args:
        - "--config"
        - "/etc/vector/vector.yaml"
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: pg-zalando-vector-config
          mountPath: /etc/vector
          readOnly: true
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
  
  # Additional volumes for sidecars
  additionalVolumes:
    - name: pg-zalando-vector-config
      targetContainers:
        - vector
      mountPath: /etc/vector
      volumeSource:
        configMap:
          name: pg-zalando-vector-config
