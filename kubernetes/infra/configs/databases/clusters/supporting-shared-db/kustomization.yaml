apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# supporting-shared-db cluster (Zalando Postgres Operator)
# Order: secrets → configmaps → instance
resources:
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - configmaps/monitoring-queries.yaml
  - configmaps/vector-sidecar.yaml
  - instance.yaml
  # Idempotent guard that creates user/notification/shipping/review DBs if the
  # operator's first-init skipped them (Bug 20). databases-local waits for Complete.
  - ensure-databases-job.yaml
