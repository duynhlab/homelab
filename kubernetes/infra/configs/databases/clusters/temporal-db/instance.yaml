# Temporal persistence (CloudNativePG).
# Backs the Temporal server's two SQL stores:
#   - temporal             (default store: workflow/history/matching state)
#   - temporal_visibility  (advanced visibility / list-filter store)
# The `temporal` app role + its `temporal-db-app` secret are generated by CNPG;
# the TemporalCluster CR references that secret (see configs/temporal/).
# Single instance for the homelab (Temporal's own HA is at the service layer);
# scale `instances` + add Barman backups as a follow-up.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-db
  namespace: temporal
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.1-system-trixie

  postgresql:
    shared_preload_libraries:
      - pg_stat_statements
    parameters:
      max_connections: "200"
      shared_buffers: "128MB"
      effective_cache_size: "512MB"
      work_mem: "16MB"
      random_page_cost: "1.1"
      password_encryption: "scram-sha-256"
      log_min_duration_statement: "1000"
      pg_stat_statements.track: "all"

  monitoring:
    enablePodMonitor: true

  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      dataChecksums: true
      encoding: "UTF8"
      # Second logical store for Temporal advanced visibility. CREATE DATABASE
      # must run as superuser against the postgres DB, hence postInitSQL.
      postInitSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal;

  storage:
    size: 5Gi
    storageClass: standard

  # 500m was pinned (~499m live) by Temporal server's constant DB polling, starving
  # the CNPG readiness probe → intermittent 0/1. Raised to 1 CPU (memory is fine at
  # ~120Mi). CPU, not RAM, was the cause.
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "1000m"
