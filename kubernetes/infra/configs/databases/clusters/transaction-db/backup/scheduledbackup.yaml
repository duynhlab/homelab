# ScheduledBackup for transaction-db - daily base backups to RustFS
# Uses cluster's backup.barmanObjectStore config (WAL archiving + base backup)
# Reference: docs/databases/backup.md
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: transaction-db-daily
  namespace: cart
spec:
  schedule: "0 0 2 * * *"
  cluster:
    name: transaction-db