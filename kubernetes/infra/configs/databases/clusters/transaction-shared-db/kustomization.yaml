apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# transaction-shared-db cluster (CloudNativePG)
# Order: secrets → instance → extensions → poolers → monitoring
resources:
  - secrets/transaction-shared-db-secret-cart.yaml
  - secrets/pgcat-transaction-creds.yaml
  # pg-backup-rustfs-credentials: managed by ClusterExternalSecret (configs/secrets/cluster-external-secrets/)
  - backup/scheduledbackup.yaml
  - secrets/transaction-shared-db-secret-order.yaml
  - instance.yaml
  - configmaps/monitoring-queries.yaml
  # - extensions-cart.yaml
  # - extensions-order.yaml
  - poolers/
  - monitoring/podmonitor-cloudnativepg-transaction-shared-db.yaml
  - monitoring/servicemonitor-pgcat-transaction-shared.yaml
