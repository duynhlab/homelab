# PgCat Configuration for Transaction Services (Cart + Order)
# Multi-database routing
#
# SECURITY NOTE (Phase 4 - Secrets Management):
# This ConfigMap contains INLINE passwords (dev-only).
# PgCat requires config file with passwords embedded.
#
# Vault-backed secrets are available at:
#   - Secret: pgcat-transaction-credentials-vault (namespace: cart)
#   - Vault path: secret/data/local/databases/pgcat-transaction/credentials
#
# Future options to eliminate inline passwords:
# 1. InitContainer: Render pgcat.toml from Secret + template
# 2. Sidecar: Use envsubst or gomplate to inject secrets at runtime
# 3. Alternative: Switch to pooler that supports secretRef
#
# For production: Implement InitContainer-based config rendering.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgcat-transaction-config
  namespace: cart
data:
  pgcat.toml: |
    # PgCat Configuration for Transaction Databases
    [general]
    host = "0.0.0.0"
    port = 5432
    pool_mode = "transaction"
    log_level = "debug"
    admin_username = "admin"
    admin_password = "admin"
    enable_prometheus_exporter = true
    # Port at which prometheus exporter listens on.
    prometheus_exporter_port = 9930
    
    # Read/Write splitting: route writes to primary, reads to replicas
    query_parser_enabled = true
    query_parser_read_write_splitting = true
    primary_reads_enabled = false
    
    [admin]
    host = "0.0.0.0"
    port = 9930
    
    # Cart database pool
    [pools.cart]
    pool_size = 30
    
    [pools.cart.users]
    cart = { username = "cart", password = "postgres", pool_size = 30 }
    
    [pools.cart.shards.0]
    database = "cart"
    
    [[pools.cart.shards.0.servers]]
    host = "transaction-shared-db-rw.cart.svc.cluster.local"
    port = 5432
    user = "cart"
    password = "postgres"
    role = "primary"
    
    # Replica server for read queries
    [[pools.cart.shards.0.servers]]
    host = "transaction-shared-db-r.cart.svc.cluster.local"
    port = 5432
    user = "cart"
    password = "postgres"
    role = "replica"
    
    # Order database pool
    [pools.order]
    pool_size = 30
    
    [pools.order.users]
    cart = { username = "cart", password = "postgres", pool_size = 30 }
    
    [pools.order.shards.0]
    database = "order"
    
    [[pools.order.shards.0.servers]]
    host = "transaction-shared-db-rw.cart.svc.cluster.local"
    port = 5432
    user = "cart"
    password = "postgres"
    role = "primary"
    
    # Replica server for read queries
    [[pools.order.shards.0.servers]]
    host = "transaction-shared-db-r.cart.svc.cluster.local"
    port = 5432
    user = "cart"
    password = "postgres"
    role = "replica"