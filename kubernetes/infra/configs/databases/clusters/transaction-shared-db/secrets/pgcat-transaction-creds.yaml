# ExternalSecret for PgCat pooler credentials (Cart namespace)
# Creates secret: pgcat-transaction-credentials
#
# NOTE: PgCat uses raw ConfigMap for configuration.
# This ExternalSecret is created for:
# 1. InitContainer-based config rendering (if implemented)
# 2. Reference for password values in Vault
#
# Current workaround: Inline passwords in ConfigMap (dev-only, documented)
# See: kubernetes/infra/configs/databases/clusters/transaction-shared-db/poolers/configmap.yaml
#
# Vault path: secret/data/local/databases/pgcat-transaction/credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgcat-transaction-credentials
  namespace: cart
  labels:
    app.kubernetes.io/name: pgcat-transaction-credentials
    app.kubernetes.io/component: pooler
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: pgcat-transaction-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: pgcat-transaction-credentials
          app.kubernetes.io/component: pooler
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: admin_username
      remoteRef:
        key: secret/data/local/databases/pgcat-transaction/credentials
        property: admin_username
    - secretKey: admin_password
      remoteRef:
        key: secret/data/local/databases/pgcat-transaction/credentials
        property: admin_password
    - secretKey: db_username
      remoteRef:
        key: secret/data/local/databases/pgcat-transaction/credentials
        property: db_username
    - secretKey: db_password
      remoteRef:
        key: secret/data/local/databases/pgcat-transaction/credentials
        property: db_password
