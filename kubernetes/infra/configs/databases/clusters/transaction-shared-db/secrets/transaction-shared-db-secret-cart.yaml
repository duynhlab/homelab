# ExternalSecret for Transaction DB credentials (Cart service)
# Creates shadow secret: transaction-shared-db-secret
#
# After verification, update kubernetes/apps/cart.yaml to reference
# this secret instead of the plaintext transaction-shared-db-secret
#
# Vault path: secret/data/cart/db
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: transaction-shared-db-secret
  namespace: cart
  labels:
    app.kubernetes.io/name: transaction-shared-db-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  # Refresh interval (how often ESO checks Vault for changes)
  refreshInterval: 1h

  # Reference to ClusterSecretStore
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore

  # Target Kubernetes Secret configuration
  target:
    name: transaction-shared-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: transaction-shared-db-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets

  # Data mappings from Vault to Secret keys
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/cart/db
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/cart/db
        property: password
