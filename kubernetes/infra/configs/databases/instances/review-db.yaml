# Review Database Cluster (Zalando Operator)
# Direct connection, no pooler
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: review-db
  namespace: review
spec:
  teamId: "platform"
  
  # Volume configuration
  volume:
    size: 5Gi
  
  # Single instance (no HA)
  numberOfInstances: 1
  
  # Database and user configuration
  databases:
    review: review
  
  users:
    review:  # Database owner
      - createdb
  
  # No connection pooler (direct connection)
  # Note: To disable pooler, omit connectionPooler section entirely
  
  # PostgreSQL version and parameters
  postgresql:
    version: "16"
    parameters:
      # set the default autovacuum parameters
      autovacuum_analyze_scale_factor: "0.1"
      autovacuum_vacuum_scale_factor: "0.2"
      # setup logs for future debugging of the most aspects of the database
      log_destination: "stderr"
      log_connections: "off"
      log_disconnections: "off"
      log_min_duration_statement: "100ms"
      log_statement: "ddl"
      log_lock_waits: "on"
      log_temp_files: "0"
      # limit the connections
      max_connections: "500"
      superuser_reserved_connections: "5"
      # set the maximum delay for the standby
      # after this timeout all queries on replica will be canceled until the standby will be up to date
      max_standby_archive_delay: "3600s"
      max_standby_streaming_delay: "3600s"
      wal_level: "replica"
      max_wal_senders: "6"
      max_replication_slots: "6"
      max_worker_processes: "16"
      max_parallel_workers: "8"
      max_parallel_workers_per_gather: "4"
      max_parallel_maintenance_workers: "2"
      max_wal_size: "4GB"
      min_wal_size: "2GB"
      wal_keep_size: "2GB"
      effective_cache_size: "8GB"
      shared_buffers: "4GB"
      work_mem: "256MB"
      maintenance_work_mem: "1024MB"
      # we're on ssd
      effective_io_concurrency: "100"
      random_page_cost: "1.1"
      # enable the extentions, pg_stat_statements is a must-have for production
      shared_preload_libraries: "pg_stat_statements,pg_cron,pg_trgm,pgcrypto,pg_stat_kcache"
      track_io_timing: "on"
      pg_stat_statements.max: "1000"
      pg_stat_statements.track: "all"
      cron.database_name: "postgres"
      synchronous_commit: "local"
  
  # Patroni configuration for pg_hba.conf
  # Default Zalando operator requires SSL, but we allow unencrypted for simplicity
  # Note: Must include local entries for Patroni to connect via Unix socket
  # patroni:
  #   pg_hba:
  #     - "local all all peer"              # Local Unix socket connections (required for Patroni)
  #     - "host all all 127.0.0.1/32 md5"   # Localhost TCP connections
  #     - "host all all 10.244.0.0/16 md5"  # Allow unencrypted connections from pod network (Kind default CIDR)
  #     - "host all all 172.19.0.0/16 md5"  # Allow unencrypted connections from Kind bridge network

  resources:
    requests:
      cpu: 100m  # Minimum CPU
      memory: 512Mi
    limits:
      cpu: "500m"
      memory: "1Gi"
  # Sidecars: postgres_exporter for Prometheus metrics collection and Vector for log collection
  sidecars:
    - name: exporter
      image: quay.io/prometheuscommunity/postgres-exporter:v0.18.1
      ports:
        - name: exporter
          containerPort: 9187
          protocol: TCP
      resources:
        limits:
          cpu: 500m
          memory: 256M
        requests:
          cpu: 100m
          memory: 256M
      env:
        - name: "DATA_SOURCE_URI"
          value: "localhost/postgres?sslmode=require"
        - name: "DATA_SOURCE_USER"
          value: "$(POSTGRES_USER)"
        - name: "DATA_SOURCE_PASS"
          value: "$(POSTGRES_PASSWORD)"
        - name: "PG_EXPORTER_EXTEND_QUERY_PATH"
          value: "/etc/postgres-exporter/queries.yaml"
      volumeMounts:
        - name: postgres-monitoring-queries
          mountPath: /etc/postgres-exporter
          readOnly: true
    - name: vector
      image: timberio/vector:0.52.0-alpine
      args:
        - "--config"
        - "/etc/vector/vector.yaml"
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
      volumeMounts:
        - name: pg-zalando-vector-config
          mountPath: /etc/vector
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
  
  # Additional volumes for sidecars
  additionalVolumes:
    - name: pg-zalando-vector-config
      targetContainers:
        - vector
      mountPath: /etc/vector
      volumeSource:
        configMap:
          name: pg-zalando-vector-config
    - name: postgres-monitoring-queries
      targetContainers:
        - exporter
      mountPath: /etc/postgres-exporter
      volumeSource:
        configMap:
          name: postgres-monitoring-queries
