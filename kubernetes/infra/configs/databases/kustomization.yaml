apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Database clusters organized by cluster name
# Each cluster folder contains: instance, secrets, poolers (if any), monitoring
resources:
  - clusters/auth-db/
  - clusters/review-db/
  - clusters/supporting-db/
  - clusters/product-db/
  - clusters/transaction-db/
