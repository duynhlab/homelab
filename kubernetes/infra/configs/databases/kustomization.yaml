apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Database clusters organized by cluster name
# Each cluster folder contains: instance, secrets, poolers (if any), monitoring
resources:
  - clusters/auth-db/
  - clusters/supporting-shared-db/
  - clusters/cnpg-db/
  # cnpg-db-replica: see configs/databases-cnpg-dr/ (Flux databases-cnpg-dr-local, dependsOn databases-local)
