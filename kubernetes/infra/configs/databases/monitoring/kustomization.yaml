apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CloudNativePG PodMonitors deploy AFTER database clusters
# This ensures PodMonitors reference existing database pods (not NotFound)
# Kustomize processes resources in order within the same kustomization
resources:
  - podmonitor-cloudnativepg-product-db.yaml
  - podmonitor-cloudnativepg-transaction-db.yaml
