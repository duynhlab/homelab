apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev-only demo seeds (auth demo users incl. alice, product catalog, shipping
# tracking rows). Applied ONLY by the local cluster's demo-seed-local
# Kustomization — production clusters simply never reference this path.
resources:
  - auth-seed.yaml
  - product-seed.yaml
  - shipping-seed.yaml
