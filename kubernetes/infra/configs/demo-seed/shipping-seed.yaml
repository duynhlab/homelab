# shipping demo seed — dev-only data, deployed ONLY via the local cluster's
# demo-seed-local Kustomization (prod never seeds; same stance as
# local-stack, where seeding lives outside the migration chain). The seed
# subcommand ships inside the service image and is idempotent
# (ON CONFLICT DO NOTHING), so re-runs after Job re-creation are no-ops.
apiVersion: batch/v1
kind: Job
metadata:
  name: shipping-seed
  namespace: shipping
  labels:
    app.kubernetes.io/name: shipping-seed
    app.kubernetes.io/component: demo-seed
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shipping-seed
        app.kubernetes.io/component: demo-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: ghcr.io/duynhlab/shipping-service/shipping-service:1.3.0
          args: ["seed"]
          env:
            - name: DB_HOST
              value: shared-db-rw.user.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: shipping
            - name: DB_USER
              value: shipping
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-db-shipping-secret
                  key: password
            - name: DB_SSLMODE
              value: require
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
