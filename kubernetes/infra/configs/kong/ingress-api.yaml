# API routes on the public gateway (gateway.duynh.me).
#
# URL shape: /{service}/v1/{audience}/{resource...}  — Variant A
# (see docs/api/api-naming-convention.md). Services mount these paths
# directly; Kong does NOT rewrite — pure pass-through.
#
# Only `public` and `private` audiences are exposed on the gateway.
# `internal` routes (service-to-service) are deliberately excluded
# and reachable only via in-cluster Service DNS.
#
# EDGE AUTH (RFC-0009 Phase 4, ADR-006): `/private/` Ingresses carry the
# `jwt-edge` plugin — Kong rejects signature-invalid / expired RS256 tokens at
# the edge. `/public/` Ingresses stay anonymous (login/register/jwks/catalog).
# Services STILL validate JWTs (pkg/authmw, authoritative) — defense-in-depth.
# Services with both audiences are split into `-public` / `-private` Ingresses so
# the plugin applies to private paths only.
#
# TLS is terminated by Kong using the default proxy certificate
# (kong-proxy-tls secret, mounted via the HelmRelease secretVolumes).

---
# Auth Service — public (login, register, refresh, logout, jwks): anonymous.
# Phase 5: auth has no /private/ routes any more — /me was removed (services
# verify JWTs locally) and logout moved to /public/ (it authenticates by the
# refresh token in the body, so an expired access token can still revoke).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth-public
  namespace: auth
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/protocols: "https"
    konghq.com/https-redirect-status-code: "301"
    konghq.com/plugins: rate-limiting-api,request-size-limiting-api
spec:
  ingressClassName: kong
  rules:
    - host: gateway.duynh.me
      http:
        paths:
          - path: /auth/v1/public/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
