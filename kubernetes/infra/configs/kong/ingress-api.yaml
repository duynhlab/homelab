# API routes on the public gateway (gateway.duynhne.me).
#
# Edge naming: /{service}/v1/{audience}/{resource...}  (Variant A; see
# docs/api/api-naming-convention.md — adopted).
#
# Kong keeps the original path (strip-path: false) and the per-namespace
# KongPlugin `rewrite-edge-to-cluster` (pre-function) rewrites to
# /api/v1/{resource...} before proxying to the service. Services continue to
# mount /api/v1/* and validate JWTs themselves — nothing in this file is
# coupled to handler code.
#
# Internal endpoints (service-to-service: notify/email, POST /products,
# POST /users, shipping/orders/:orderId) are intentionally NOT routed here;
# they remain reachable only via in-cluster service DNS.
#
# TLS is terminated by Kong using the default proxy certificate (kong-proxy-tls
# secret mounted via HelmRelease). Switch to cert-manager ClusterIssuer
# annotations + tls: block when moving past homelab.

---
# Auth Service — public (login, register) + private (me)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth
  namespace: auth
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/plugins: rewrite-edge-to-cluster,rate-limiting-api,request-size-limiting-api
spec:
  ingressClassName: kong
  rules:
    - host: gateway.duynhne.me
      http:
        paths:
          - path: /auth/v1/
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
