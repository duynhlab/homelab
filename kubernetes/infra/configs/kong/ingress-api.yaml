# API routes — Kong routes /api/v1/{resource} to the correct backend service.
# Each service handles its own /api/v1/* routes internally.
# Kong passes the full path through (strip-path: false).

# Auth Service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-auth
  namespace: auth
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: gateway.duynhne.me
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
---
