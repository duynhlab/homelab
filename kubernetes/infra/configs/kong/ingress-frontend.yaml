# Frontend SPA — served at duynhne.me
# Kong routes all non-API traffic to the frontend Nginx container (static files + SPA fallback).
# TLS terminated by Kong using the default proxy certificate (kong-proxy-tls secret mounted via HelmRelease).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: default
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: duynhne.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
