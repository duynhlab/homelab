# Infrastructure service Ingress routes
# Accessible via /etc/hosts → Kong NodePort (80/443)
# TLS terminated by Kong using the default proxy certificate (kong-proxy-tls).

# Flux Web UI — ui.duynhne.me
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flux-ui
  namespace: flux-system
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: ui.duynhne.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flux-operator
                port:
                  number: 9080
---
