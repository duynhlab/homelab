# MCP Server Ingress routes
# Accessible via /etc/hosts → Kong NodePort (80/443)
# Used by AI clients (Crush, Claude Desktop, VS Code) via Streamable HTTP
# TLS terminated by Kong using the default proxy certificate (kong-proxy-tls).

# VictoriaMetrics MCP — vm-mcp.duynhne.me
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: victoria-metrics-mcp
  namespace: monitoring
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: vm-mcp.duynhne.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: victoria-metrics-mcp-vmm
                port:
                  number: 8080
---
