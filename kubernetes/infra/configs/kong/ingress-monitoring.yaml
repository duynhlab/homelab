# Monitoring & Infrastructure Ingress routes
# Each service gets a dedicated subdomain under *.duynhne.me
# Accessible via /etc/hosts → Kong NodePort (80/443)
# TLS terminated by Kong using the default proxy certificate (kong-proxy-tls).

# Grafana — grafana.duynhne.me
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    konghq.com/strip-path: "false"
spec:
  ingressClassName: kong
  rules:
    - host: grafana.duynhne.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
---
