# Monitoring & Infrastructure Ingress routes
# Each service gets a dedicated subdomain under *.duynh.me
# Accessible via /etc/hosts → Kong NodePort (80/443)
# TLS terminated by Kong using the default proxy certificate (kong-proxy-tls).

# Grafana — grafana.duynh.me
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    konghq.com/strip-path: "false"
    konghq.com/protocols: "https"
    konghq.com/https-redirect-status-code: "301"
spec:
  ingressClassName: kong
  rules:
    - host: grafana.duynh.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3000
---
