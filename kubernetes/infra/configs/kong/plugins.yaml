# Kong gateway plugins (DB-less, OSS bundled).
#
# Global (all routes):   cors-policy, prometheus-metrics, correlation-id, security-headers
# Per-route (API only):  rate-limiting-api, request-size-limiting-api
#                        (attached via `konghq.com/plugins` on the api-* Ingresses)
#
# NO authentication plugin here — by design. JWT is validated in the SERVICES
# (`pkg/authmw`, fail-closed, identity via `auth.GetMe` over gRPC), not at the
# gateway. Adding Kong's `jwt` plugin would be redundant with the in-service
# check, create a second source of truth that drifts, and (under HS256) hand
# the signing key to Kong. Decision + revisit criteria (RS256/ES256):
#   docs/proposals/adr/ADR-003-jwt-validation-in-services-not-kong/
# Do not add a jwt/openid-connect/key-auth plugin without superseding ADR-003.
---
# Global CORS plugin — allows frontend (local.duynh.me) to call APIs (gateway.duynh.me)
---
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: cors-policy
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "true"
plugin: cors
config:
  origins:
    - "https://local.duynh.me"
    - "https://duynh.me"
    - "http://localhost:3001"
    - "http://localhost:8000"
  methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  headers:
    - Content-Type
    - Authorization
    - X-Request-ID
  exposed_headers:
    - X-Request-ID
    - RateLimit-Limit
    - RateLimit-Remaining
    - RateLimit-Reset
  credentials: true
  max_age: 3600
---
# Global Prometheus plugin — expose metrics for VictoriaMetrics scraping
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: prometheus-metrics
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "true"
plugin: prometheus
config:
  status_code_metrics: true
  latency_metrics: true
  bandwidth_metrics: true
  upstream_health_metrics: true
---
# API rate limiting — protects backend services from abuse.
# Applied per-consumer (if authenticated) or per-IP (anonymous).
#
# Policy `local` = each Kong pod keeps its own in-memory counter. Kong runs
# 2 replicas (see controllers/kong/helmrelease.yaml), and the Service
# load-balances without affinity, so the effective cluster limit is up to
# ~2x these numbers and is approximate. DB-less mode does NOT support the
# `cluster` policy; a true cluster-wide counter would require `policy: redis`
# (the platform has Valkey) at the cost of a request-path dependency.
# For a homelab we keep `local` and halve the numbers so the ~2x lands near
# the intended ceiling — this is abuse hygiene, not exact accounting.
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: rate-limiting-api
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "false"
plugin: rate-limiting
config:
  second: 5
  minute: 100
  hour: 2500
  policy: local
  fault_tolerant: true
  hide_client_headers: false
  error_code: 429
  error_message: "Rate limit exceeded. Please slow down."
---
# Request size limiting — prevents oversized payloads (DoS protection).
# Applied to API routes only (same as rate-limiting).
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: request-size-limiting-api
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "false"
plugin: request-size-limiting
config:
  allowed_payload_size: 10
  size_unit: megabytes
  require_content_length: false
---
# Global correlation ID — generate X-Request-ID per request, forward it
# upstream, and echo it back to the client. This makes the X-Request-ID that
# the CORS plugin already exposes real (nothing was generating it before) and
# gives Kong access logs ↔ a client-visible request handle.
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: correlation-id
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "true"
plugin: correlation-id
config:
  header_name: X-Request-ID
  generator: uuid
  echo_downstream: true
---
# Global security response headers — applied to every proxied response.
# `add` only sets a header if the upstream did not already send it.
# HSTS is safe because Kong terminates TLS (https-only ingress).
apiVersion: configuration.konghq.com/v1
kind: KongClusterPlugin
metadata:
  name: security-headers
  annotations:
    kubernetes.io/ingress.class: kong
  labels:
    global: "true"
plugin: response-transformer
config:
  add:
    headers:
      - "X-Content-Type-Options:nosniff"
      - "Referrer-Policy:strict-origin-when-cross-origin"
      - "X-Frame-Options:DENY"
      - "Strict-Transport-Security:max-age=31536000; includeSubDomains"
  remove:
    headers:
      - "Server"
