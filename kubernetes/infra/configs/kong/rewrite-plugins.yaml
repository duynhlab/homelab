# Edge-to-cluster path rewrite plugins.
#
# Translates Variant A edge URLs (/{service}/v1/{audience}/{resource...}) to
# cluster paths (/api/v1/{resource...}) so service handlers remain unchanged.
# See docs/api/api-naming-convention.md for the convention.
#
# One KongPlugin per service namespace. Attached to the service's Ingress via
# annotation konghq.com/plugins: rewrite-edge-to-cluster,... Each plugin uses
# pre-function (bundled OSS plugin) with a small Lua gsub.
#
# Two rewrite patterns:
#   A. Service name != cluster collection name -> strip edge prefix, keep rest
#      e.g. /user/v1/private/users/profile -> /api/v1/users/profile
#   B. Edge resource segment omits the collection -> strip + prepend collection
#      e.g. /auth/v1/public/login        -> /api/v1/auth/login
#           /shipping/v1/public/track    -> /api/v1/shipping/track

---
# auth: /auth/v1/{audience}/{verb}  ->  /api/v1/auth/{verb}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rewrite-edge-to-cluster
  namespace: auth
plugin: pre-function
config:
  access:
    - |
      local p = kong.request.get_path()
      local new, n = p:gsub("^/auth/v1/[%w]+", "/api/v1/auth")
      if n > 0 then kong.service.request.set_path(new) end
---
