---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: loki-logs-explorer
  namespace: monitoring
spec:
  folder: Logs
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  datasources:
    - inputName: "DS_LOKI"
      datasourceName: "Loki"
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  url: "https://grafana.com/api/dashboards/15141/revisions/1/download"
  contentCacheDuration: 48h