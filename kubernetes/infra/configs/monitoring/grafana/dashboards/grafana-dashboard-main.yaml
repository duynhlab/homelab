apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: microservices-monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Observability"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  url: "https://raw.githubusercontent.com/duynhlab/grafana-dashboards/main/dashboard/microservices-dashboard-otel.json" # canonical since RFC-0014 P3
  contentCacheDuration: 48h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics

