apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pg-monitoring
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: grafana-dashboard-pg-monitoring
    key: pg-monitoring.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
