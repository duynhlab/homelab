apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pg-query-overview
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: grafana-dashboard-pg-query-overview
    key: pg-query-overview.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
    - inputName: DS_LOKI
      datasourceName: Loki