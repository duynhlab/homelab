apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pgbouncer
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: grafana-dashboard-pgbouncer
    key: pgbouncer.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
