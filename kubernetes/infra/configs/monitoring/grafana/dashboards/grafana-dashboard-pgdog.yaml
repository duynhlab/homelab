apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pgdog
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  configMapRef:
    name: pgdog
    key: pgdog.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
