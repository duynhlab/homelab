apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pgdog
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Databases"
  url: https://grafana.com/api/dashboards/24583/revisions/latest/download
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus


