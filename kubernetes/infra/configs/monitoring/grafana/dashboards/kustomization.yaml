apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboard-main
    files:
      - microservices-dashboard.json
  - name: grafana-dashboard-tempo
    files:
      - tempo-observability-dashboard.json
  # - name: grafana-dashboard-pgcat
  #   files:
  #     - pgcat.json
  - name: grafana-dashboard-pg-monitoring
    files:
      - pg-monitoring.json
  - name: grafana-dashboard-pg-query-drilldown
    files:
      - pg-query-drilldown.json
  - name: grafana-dashboard-pg-query-overview
    files:
      - pg-query-overview.json
  - name: grafana-dashboard-pgbouncer
    files:
      - pgbouncer.json
  - name: grafana-dashboard-postgres-replication-lag
    files:
      - postgres-replication-lag.json
  - name: grafana-dashboard-redis
    files:
      - redis.json
  - name: grafana-dashboard-pg-exporter-instance
    files:
      - pg-exporter-instance.json
  - name: grafana-dashboard-pg-exporter-self
    files:
      - pg-exporter-self.json
  - name: grafana-dashboard-cloudnative-pg
    files:
      - cloudnative-pg-cluster.json
  - name: grafana-dashboard-kubernetes-cluster-overview
    files:
      - kubernetes-cluster-overview.json

resources:
  - grafana-dashboard-main.yaml
  - grafana-dashboard-slo-overview.yaml
  - grafana-dashboard-slo-detailed.yaml
  - grafana-dashboard-vector.yaml
  - grafana-dashboard-tempo.yaml
  # - grafana-dashboard-pgcat.yaml
  - grafana-dashboard-cloudnative-pg.yaml
  - grafana-dashboard-pg-monitoring.yaml
  - grafana-dashboard-pg-query-drilldown.yaml
  - grafana-dashboard-pg-query-overview.yaml
  - grafana-dashboard-pgbouncer.yaml
  - grafana-dashboard-postgres-replication-lag.yaml
  - grafana-dashboard-pgdog.yaml
  - grafana-dashboard-loki.yaml
  - grafana-dashboard-redis.yaml
  - grafana-dashboard-pg-exporter-instance.yaml
  - grafana-dashboard-pg-exporter-self.yaml
  - grafana-dashboard-kubernetes-cluster-overview.yaml
