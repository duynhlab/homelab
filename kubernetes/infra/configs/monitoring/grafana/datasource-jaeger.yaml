apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: jaeger-datasource
  namespace: monitoring
spec:
  datasource:
    access: proxy
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: victorialogs
        tags:
        - trace_id
      tracesToMetrics:
        datasourceUid: prometheus
    name: Jaeger
    type: jaeger
    uid: jaeger
    url: http://jaeger-query.monitoring.svc.cluster.local:16686
  instanceSelector:
    matchLabels:
      dashboards: grafana
