apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki-datasource
  namespace: monitoring
spec:
  datasource:
    access: proxy
    jsonData:
      derivedFields:
      - datasourceUid: tempo
        matcherRegex: trace_id=(\w+)
        name: TraceID
        url: $${__value.raw}
    name: Loki
    type: loki
    uid: loki
    url: http://loki.monitoring.svc.cluster.local:3100
  instanceSelector:
    matchLabels:
      dashboards: grafana
