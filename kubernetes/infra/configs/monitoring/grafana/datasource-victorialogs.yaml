apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victorialogs-datasource
  namespace: monitoring
spec:
  datasource:
    access: proxy
    isDefault: false
    name: VictoriaLogs
    type: victoriametrics-logs-datasource
    uid: victorialogs
    url: http://vlsingle-victoria-logs.monitoring.svc.cluster.local:9428
  plugins:
    - name: victoriametrics-logs-datasource
      version: "0.26.3"
  instanceSelector:
    matchLabels:
      dashboards: grafana
