# VictoriaTraces datasource — queried via the Grafana Jaeger datasource type
# (VictoriaTraces exposes the Jaeger query API at /select/jaeger on :10428;
# there is no native VictoriaTraces datasource plugin). Pilot 3rd backend.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoriatraces-datasource
  namespace: monitoring
spec:
  datasource:
    access: proxy
    jsonData:
      nodeGraph:
        enabled: true
      tracesToLogsV2:
        datasourceUid: victorialogs
        tags:
        - trace_id
      tracesToMetrics:
        datasourceUid: prometheus
    name: VictoriaTraces
    type: jaeger
    uid: victoriatraces
    url: http://vtsingle-victoria-traces.monitoring.svc.cluster.local:10428/select/jaeger
  instanceSelector:
    matchLabels:
      dashboards: grafana
