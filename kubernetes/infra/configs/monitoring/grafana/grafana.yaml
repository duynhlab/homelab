apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
spec:
  config:
    auth:
      disable_login_form: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Admin
    log:
      level: info
      mode: console
    plugins:
      allow_loading_unsigned_plugins: victoriametrics-metrics-datasource,victoriametrics-logs-datasource
    server:
      root_url: http://localhost:3000
    users:
      default_theme: dark
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
          - image: grafana/grafana:12.4.3
            imagePullPolicy: IfNotPresent
            name: grafana
            env:
            - name: GF_INSTALL_PLUGINS
              value: "https://github.com/VictoriaMetrics/victoriametrics-datasource/releases/download/v0.23.1/victoriametrics-metrics-datasource-v0.23.1.zip;victoriametrics-metrics-datasource,https://github.com/VictoriaMetrics/victorialogs-datasource/releases/download/v0.26.3/victoriametrics-logs-datasource-v0.26.3.zip;victoriametrics-logs-datasource"
            resources:
              limits:
                cpu: 100m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi
  service:
    metadata:
      labels:
        app: grafana
    spec:
      type: ClusterIP
      ports:
      - name: http
        port: 3000
        targetPort: 3000
        protocol: TCP
