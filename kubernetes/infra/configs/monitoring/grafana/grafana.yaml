apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: monitoring
  labels:
    dashboards: grafana
spec:
  config:
    auth:
      disable_login_form: "true"
    auth.anonymous:
      enabled: "true"
      org_role: Admin
    log:
      level: info
      mode: console
    server:
      root_url: http://localhost:3000
    users:
      default_theme: dark
  deployment:
    spec:
      replicas: 1
      template:
        spec:
          containers:
          - image: grafana/grafana:11.4.0
            imagePullPolicy: IfNotPresent
            name: grafana
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 100m
                memory: 64Mi
  service:
    metadata:
      labels:
        app: grafana
    spec:
      type: ClusterIP
      ports:
      - name: http
        port: 3000
        targetPort: 3000
        protocol: TCP
