apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - victoriametrics/
  - servicemonitors/microservices.yaml
  - servicemonitors/external-secrets.yaml
  - servicemonitors/tempo.yaml
  - grafana/
  # Note: CloudNativePG PodMonitors moved to configs/databases/monitoring/ to deploy AFTER database clusters
  - podmonitors/podmonitor-zalando-auth-db.yaml
  - podmonitors/podmonitor-zalando-supporting-shared-db.yaml
  # SLO definitions: now auto-generated by mop Helm chart (slo.enabled: true)
  # PostgreSQL alerts
  - prometheusrules/postgres-backup-alerts.yaml
  - prometheusrules/postgres-alerts.yaml
  # pg_exporter recording rules (required by Pigsty dashboards)
  - prometheusrules/pg-exporter-recording-rules.yaml