apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - victoriametrics/
  - karma/
  - servicemonitors/microservices.yaml
  - servicemonitors/external-secrets.yaml
  - servicemonitors/tempo.yaml
  - servicemonitors/kong.yaml
  - servicemonitors/kube-apiserver.yaml
  - grafana/
  # Note: CloudNativePG PodMonitors moved to configs/databases/monitoring/ to deploy AFTER database clusters
  - podmonitors/podmonitor-zalando-auth-db.yaml
  - podmonitors/podmonitor-zalando-supporting-shared-db.yaml
  # SLO definitions: now auto-generated by mop Helm chart (slo.enabled: true)
  # PostgreSQL alerts (CNPG chart rules + Zalando split; see prometheusrules/postgres/README.md)
  - prometheusrules/postgres-backup-alerts.yaml
  - prometheusrules/postgres
  # pg_exporter recording rules (required by Pigsty dashboards)
  - prometheusrules/pg-exporter-recording-rules.yaml
  # Microservices application alerts (RED/Golden Signals)
  - prometheusrules/microservices-alerts.yaml
  - prometheusrules/microservices-recording-rules.yaml
  # Kubernetes infrastructure alerts (USE Method)
  - prometheusrules/kubernetes-pod-resources-alerts.yaml
  - prometheusrules/kubernetes-workload-alerts.yaml
  - prometheusrules/kubernetes-node-alerts.yaml
  # Valkey/Redis alerts and recording rules (USE Method)
  - prometheusrules/valkey-alerts.yaml
  - prometheusrules/valkey-recording-rules.yaml
  # Kong API Gateway alerts and recording rules (RED/Golden Signals)
  - prometheusrules/kong-recording-rules.yaml
  - prometheusrules/kong-alerts.yaml
  # Kubernetes API server alerts (Golden Signals: Control Plane)
  - prometheusrules/kube-apiserver-alerts.yaml
  # Kubernetes network recording rules and alerts (USE Method)
  - prometheusrules/kubernetes-network-rules.yaml