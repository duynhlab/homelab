# PodMonitor for review-db PostgreSQL cluster
# Prometheus Operator will discover and scrape metrics from postgres_exporter sidecar
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgresql-review-db
  namespace: review
spec:
  selector:
    matchLabels:
      application: spilo  # Zalando operator default label
      cluster-name: review-db  # Cluster-specific label
  podTargetLabels:
    - spilo-role
    - cluster-name
    - team
  podMetricsEndpoints:
    - port: exporter
      interval: 15s
      scrapeTimeout: 10s
