# PodMonitor for supporting-shared-db PostgreSQL cluster
# pg_exporter pilot: scrapes pg_exporter sidecar (port 9630) instead of postgres_exporter (port 9187)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: postgresql-supporting-shared-db
  namespace: user
  labels:
    exporter: pg-exporter
spec:
  selector:
    matchLabels:
      application: spilo
      cluster-name: supporting-shared-db
  podTargetLabels:
    - spilo-role
    - cluster-name
    - team
  podMetricsEndpoints:
    - port: exporter
      interval: 15s
      scrapeTimeout: 14s
