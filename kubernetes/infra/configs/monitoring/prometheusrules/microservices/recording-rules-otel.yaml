# RFC-0014 P2: new-name (semconv/OTLP) copies of the microservice recording
# rules. Evaluate side-by-side with recording-rules.yaml during the dual-emit
# soak; records are re-minted under the `app:` prefix (no job on the push
# path — vmagent D-3 relabeling provides app/namespace). At P3 the old
# `job_app:*` records retire; consumers (Grafana, Sloth) migrate in P2.
#
# Label renames vs the legacy scrape: path→http_route, method→
# http_request_method, code→http_response_status_code.
#
# Deviation (verified against live series 2026-07-09): requests_in_flight has
# no otelgin equivalent (http.server.active_requests not emitted in v0.69) —
# `job_app:requests_in_flight:sum` keeps its legacy source until cutover, so
# it has no copy here.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: microservices-recording-rules-otel
  namespace: monitoring
  labels:
    app.kubernetes.io/component: recording-rules
spec:
  groups:
    # ---------------------------------------------------------------
    # RED signals -- per-service aggregations (5m window)
    # Naming convention: level:metric:operation_window
    # ---------------------------------------------------------------
    - name: microservices-red-5m-otel
      interval: 30s
      rules:
        # --- Rate (requests per second) ---
        - record: app:http_server_request_duration_seconds:rate5m
          expr: sum by (app, namespace) (rate(http_server_request_duration_seconds_count{app!=""}[5m]))

        # --- Error rate (5xx per second) ---
        - record: app:http_server_request_duration_seconds:error_rate5m
          expr: sum by (app, namespace) (rate(http_server_request_duration_seconds_count{app!="", http_response_status_code=~"5.."}[5m]))

        # --- Client error rate (4xx per second) ---
        - record: app:http_server_request_duration_seconds:client_error_rate5m
          expr: sum by (app, namespace) (rate(http_server_request_duration_seconds_count{app!="", http_response_status_code=~"4.."}[5m]))

        # --- Error ratio (0-1, 5xx / total) ---
        - record: app:http_server_request_duration_seconds:error_ratio5m
          expr: |
            app:http_server_request_duration_seconds:error_rate5m
            / (app:http_server_request_duration_seconds:rate5m > 0)

        # --- Success rate (0-1, 2xx / total) ---
        - record: app:http_server_request_duration_seconds:success_ratio5m
          expr: |
            sum by (app, namespace) (rate(http_server_request_duration_seconds_count{app!="", http_response_status_code=~"2.."}[5m]))
            / (app:http_server_request_duration_seconds:rate5m > 0)

    # ---------------------------------------------------------------
    # Latency percentiles -- per-service (5m window)
    # ---------------------------------------------------------------
    - name: microservices-latency-5m-otel
      interval: 30s
      rules:
        - record: app:http_server_request_duration_seconds:p50_5m
          expr: |
            histogram_quantile(0.50,
              sum by (app, namespace, le) (rate(http_server_request_duration_seconds_bucket{app!=""}[5m]))
            )

        - record: app:http_server_request_duration_seconds:p95_5m
          expr: |
            histogram_quantile(0.95,
              sum by (app, namespace, le) (rate(http_server_request_duration_seconds_bucket{app!=""}[5m]))
            )

        - record: app:http_server_request_duration_seconds:p99_5m
          expr: |
            histogram_quantile(0.99,
              sum by (app, namespace, le) (rate(http_server_request_duration_seconds_bucket{app!=""}[5m]))
            )

    # ---------------------------------------------------------------
    # Apdex -- per-service (5m window)
    # ---------------------------------------------------------------
    - name: microservices-quality-5m-otel
      interval: 30s
      rules:
        # Apdex score: satisfied (<0.5s) + 0.5 * tolerating (0.5s-2s) / total.
        # le=0.5 and le=2 exist only because obsx pins the 13-bucket View (D-7).
        - record: app:http_server_request_duration_seconds:apdex5m
          expr: |
            (
              sum by (app, namespace) (rate(http_server_request_duration_seconds_bucket{app!="", le="0.5"}[5m]))
              + 0.5 * (
                sum by (app, namespace) (rate(http_server_request_duration_seconds_bucket{app!="", le="2"}[5m]))
                - sum by (app, namespace) (rate(http_server_request_duration_seconds_bucket{app!="", le="0.5"}[5m]))
              )
            )
            / (app:http_server_request_duration_seconds:rate5m > 0)

    # ---------------------------------------------------------------
    # Per-endpoint breakdown (5m window) -- for drill-down dashboards
    # ---------------------------------------------------------------
    - name: microservices-endpoint-5m-otel
      interval: 30s
      rules:
        - record: app_route:http_server_request_duration_seconds:rate5m
          expr: sum by (app, namespace, http_route, http_request_method) (rate(http_server_request_duration_seconds_count{app!=""}[5m]))

        - record: app_route:http_server_request_duration_seconds:error_rate5m
          expr: sum by (app, namespace, http_route, http_request_method) (rate(http_server_request_duration_seconds_count{app!="", http_response_status_code=~"5.."}[5m]))

        - record: app_route:http_server_request_duration_seconds:p95_5m
          expr: |
            histogram_quantile(0.95,
              sum by (app, namespace, http_route, http_request_method, le) (rate(http_server_request_duration_seconds_bucket{app!=""}[5m]))
            )

    # ---------------------------------------------------------------
    # Bandwidth -- per-service (5m window)
    # ---------------------------------------------------------------
    - name: microservices-bandwidth-5m-otel
      interval: 30s
      rules:
        - record: app:http_server_request_body_size_bytes:rate5m
          expr: sum by (app, namespace) (rate(http_server_request_body_size_bytes_sum{app!=""}[5m]))

        - record: app:http_server_response_body_size_bytes:rate5m
          expr: sum by (app, namespace) (rate(http_server_response_body_size_bytes_sum{app!=""}[5m]))

    # ---------------------------------------------------------------
    # NEW (RFC-0014): gRPC east-west RED -- per-callee (5m window)
    # The transport finally gets pre-aggregation, on the names that
    # survive the cutover (feeds the new dashboard row + alert pair).
    # ---------------------------------------------------------------
    - name: microservices-grpc-5m-otel
      interval: 30s
      rules:
        - record: app:rpc_server_call_duration_seconds:rate5m
          expr: sum by (app, namespace) (rate(rpc_server_call_duration_seconds_count{app!=""}[5m]))

        - record: app:rpc_server_call_duration_seconds:error_rate5m
          expr: sum by (app, namespace) (rate(rpc_server_call_duration_seconds_count{app!="", rpc_response_status_code!="OK"}[5m]))

        - record: app:rpc_server_call_duration_seconds:p95_5m
          expr: |
            histogram_quantile(0.95,
              sum by (app, namespace, le) (rate(rpc_server_call_duration_seconds_bucket{app!=""}[5m]))
            )
