# PrometheusRule for PostgreSQL alerts across all exporter types:
#   - postgres_exporter v0.18 (Zalando: auth-db) -- built-in + custom_ prefixed queries
#   - pg_exporter (Zalando: supporting-shared-db pilot) -- pg_* built-in collectors
#   - CNPG built-in exporter (product-db, transaction-shared-db) -- cnpg_* prefixed custom queries
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postgres-alerts
  namespace: monitoring
spec:
  groups:
    # --- Availability ---
    - name: postgres-availability
      interval: 1m
      rules:
        - alert: PostgresDown
          expr: pg_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL is down ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "PostgreSQL instance has been unreachable for more than 1 minute."

        - alert: CnpgDown
          expr: cnpg_collector_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "CNPG cluster down ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "CloudNativePG instance has been unreachable for more than 1 minute."

        - alert: PostgresReplicationLagHigh
          expr: pg_replication_lag > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL replication lag high ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Replication lag is {{ $value }}s (threshold: 30s)."

        - alert: PostgresReplicationLagCritical
          expr: pg_replication_lag > 120
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL replication lag critical ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Replication lag is {{ $value }}s (threshold: 120s). Risk of data loss on failover."

        - alert: CnpgClusterFenced
          expr: cnpg_collector_fencing_on == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "CNPG cluster fenced ({{ $labels.namespace }}/{{ $labels.cluster }})"
            description: "CloudNativePG cluster is fenced. All write operations are blocked."

    # --- Performance ---
    - name: postgres-performance
      interval: 1m
      rules:
        # Zalando custom query (custom_connection_limits_*)
        - alert: PostgresConnectionSaturation
          expr: |
            custom_connection_limits_current_connections / custom_connection_limits_max_connections > 0.8
            or cnpg_pg_connection_limits_current_connections / cnpg_pg_connection_limits_max_connections > 0.8
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connection saturation ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Connection usage is {{ $value | humanizePercentage }} of max_connections."

        - alert: PostgresConnectionSaturationCritical
          expr: |
            custom_connection_limits_current_connections / custom_connection_limits_max_connections > 0.95
            or cnpg_pg_connection_limits_current_connections / cnpg_pg_connection_limits_max_connections > 0.95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL connections nearly exhausted ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Connection usage is {{ $value | humanizePercentage }} of max_connections. New connections may be refused."

        - alert: PostgresLockContention
          expr: |
            custom_blocking_queries_blocked_queries > 5
            or cnpg_pg_blocking_queries_blocked_queries > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL lock contention ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "{{ $value }} queries are blocked waiting on locks for more than 5 minutes."

    # --- Storage ---
    - name: postgres-storage
      interval: 5m
      rules:
        - alert: PostgresDatabaseSizeLarge
          expr: |
            pg_database_size_bytes > 5e+9
            or cnpg_pg_database_size_size_bytes > 5e+9
            or pg_size_bytes > 5e+9
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL database large ({{ $labels.namespace }}/{{ $labels.datname }})"
            description: "Database {{ $labels.datname }} is {{ $value | humanize1024 }}B."

        - alert: PostgresWALSizeHigh
          expr: cnpg_collector_pg_wal{value="size"} > 2e+9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CNPG WAL size high ({{ $labels.namespace }}/{{ $labels.cluster }})"
            description: "WAL directory size is {{ $value | humanize1024 }}B (threshold: 2GB)."

    # --- Maintenance ---
    - name: postgres-maintenance
      interval: 5m
      rules:
        - alert: PostgresDeadTuplesHigh
          expr: |
            pg_stat_user_tables_n_dead_tup > 100000
            or custom_autovacuum_stats_n_dead_tup > 100000
            or cnpg_pg_stat_user_tables_autovacuum_n_dead_tup > 100000
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL dead tuples high ({{ $labels.namespace }}/{{ $labels.relname }})"
            description: "Table {{ $labels.relname }} has {{ $value }} dead tuples. Autovacuum may be falling behind."

        - alert: PostgresCheckpointsTooFrequent
          expr: |
            rate(pg_stat_bgwriter_checkpoints_req_total[5m]) > 0.5
            or rate(cnpg_pg_stat_bgwriter_checkpoints_checkpoints_req[5m]) > 0.5
            or rate(pg_bgwriter_checkpoints_req[5m]) > 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL requested checkpoints too frequent ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Requested checkpoints rate is {{ $value }}/s. Consider increasing max_wal_size."
