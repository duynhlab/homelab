# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=cnpg-db, namespace=product.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cnpg-db-cluster-ha-critical
  namespace: product
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: cnpg-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/cnpg-db
    rules:
    - alert: CNPGClusterHACritical
      annotations:
        summary: CNPG Cluster has no standby replicas!
        description: 'CloudNativePG Cluster "{{ $labels.job }}" has no ready standby replicas. Your cluster at a severe

          risk of data loss and downtime if the primary instance fails.


          The primary instance is still online and able to serve queries, although connections to the `-ro` endpoint

          will fail. The `-r` endpoint os operating at reduced capacity and all traffic is being served by the main.


          This can happen during a normal fail-over or automated minor version upgrades in a cluster with 2 or less

          instances. The replaced instance may need some time to catch-up with the cluster primary instance.


          This alarm will be always trigger if your cluster is configured to run with only 1 instance. In this

          case you may want to silence it.'
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterHACritical.md
      expr: max by (job) (cnpg_pg_replication_streaming_replicas{namespace="product"} - cnpg_pg_replication_is_wal_receiver_up{namespace="product"}) < 1
      for: 5m
      labels:
        severity: critical
        namespace: product
        cnpg_cluster: cnpg-db
