apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Do not set namespace here: CNPG chart rules use namespace product; Zalando rules use monitoring.

resources:
  - backup-alerts.yaml
  - cnpg/cluster-fenced.yaml
  - cnpg/cluster-ha-critical.yaml
  - cnpg/cluster-ha-warning.yaml
  - cnpg/cluster-high_connection-critical.yaml
  - cnpg/cluster-high_connection-warning.yaml
  - cnpg/cluster-high_replication_lag.yaml
  - cnpg/cluster-logical_replication_errors-critical.yaml
  - cnpg/cluster-logical_replication_errors.yaml
  - cnpg/cluster-logical_replication_lagging-critical.yaml
  - cnpg/cluster-logical_replication_lagging.yaml
  - cnpg/cluster-logical_replication_stopped-critical.yaml
  - cnpg/cluster-logical_replication_stopped.yaml
  - cnpg/cluster-offline.yaml
  - cnpg/cluster-physical_replication_lag-critical.yaml
  - cnpg/cluster-physical_replication_lag-warning.yaml
  - cnpg/cluster-wal-size-high.yaml
  # Homelab default: gated — uncomment when production-ready (KSM zone labels for spread; kube_pod_info for colocation). See cnpg/README.md.
  # - cnpg/cluster-instances_on_same_node.yaml
  # - cnpg/cluster-zone_spread-warning.yaml
  - cnpg/cluster-low_disk_space-critical.yaml
  - cnpg/cluster-low_disk_space-warning.yaml
  - cnpg/operator-health.yaml
  # auth-db (ns auth, 3-node HA): full rule set mirrored from cnpg/. operator-health is a global
  # singleton (ns cloudnative-pg) — not duplicated per cluster.
  - cnpg-auth-db/cluster-fenced.yaml
  - cnpg-auth-db/cluster-ha-critical.yaml
  - cnpg-auth-db/cluster-ha-warning.yaml
  - cnpg-auth-db/cluster-high_connection-critical.yaml
  - cnpg-auth-db/cluster-high_connection-warning.yaml
  - cnpg-auth-db/cluster-high_replication_lag.yaml
  - cnpg-auth-db/cluster-logical_replication_errors-critical.yaml
  - cnpg-auth-db/cluster-logical_replication_errors.yaml
  - cnpg-auth-db/cluster-logical_replication_lagging-critical.yaml
  - cnpg-auth-db/cluster-logical_replication_lagging.yaml
  - cnpg-auth-db/cluster-logical_replication_stopped-critical.yaml
  - cnpg-auth-db/cluster-logical_replication_stopped.yaml
  - cnpg-auth-db/cluster-offline.yaml
  - cnpg-auth-db/cluster-physical_replication_lag-critical.yaml
  - cnpg-auth-db/cluster-physical_replication_lag-warning.yaml
  - cnpg-auth-db/cluster-wal-size-high.yaml
  # Homelab default: gated — same rules as cnpg/ block above. See cnpg/README.md.
  # - cnpg-auth-db/cluster-instances_on_same_node.yaml
  # - cnpg-auth-db/cluster-zone_spread-warning.yaml
  - cnpg-auth-db/cluster-low_disk_space-critical.yaml
  - cnpg-auth-db/cluster-low_disk_space-warning.yaml
  # shared-db (ns user, single-node): only rules that fire on 1 instance; HA/replication omitted.
  - cnpg-shared-db/cluster-offline.yaml
  - cnpg-shared-db/cluster-high_connection-critical.yaml
  - cnpg-shared-db/cluster-high_connection-warning.yaml
  - cnpg-shared-db/cluster-wal-size-high.yaml
  - cnpg-shared-db/cluster-low_disk_space-critical.yaml
  - cnpg-shared-db/cluster-low_disk_space-warning.yaml
