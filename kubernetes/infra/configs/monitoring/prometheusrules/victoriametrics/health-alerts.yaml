apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: victoriametrics-health-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: victoriametrics-health
      rules:
        - alert: VMTooManyRestarts
          expr: changes(process_start_time_seconds{job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth).*"}[15m]) > 2
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.job }} too many restarts (instance {{ $labels.instance }})"
            description: "Job {{ $labels.job }} (instance {{ $labels.instance }}) has restarted more than twice in the last 15 minutes. It might be crashlooping."

        - alert: VMServiceDown
          expr: up{job=~".*(victoriametrics|vmselect|vminsert|vmstorage|vmagent|vmalert|vmsingle|vmalertmanager|vmauth).*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down on {{ $labels.instance }}"
            description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

        - alert: VMProcessNearFDLimits
          expr: (process_max_fds - process_open_fds) < 100
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Number of free file descriptors is less than 100 for {{ $labels.job }} ({{ $labels.instance }})"
            description: "Exhausting OS file descriptors limit can cause severe degradation of the process."

        - alert: VMTooHighMemoryUsage
          expr: (min_over_time(process_resident_memory_anon_bytes[10m]) / vm_available_memory_bytes) > 0.8
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "More than 80% of memory used by {{ $labels.job }} ({{ $labels.instance }})"
            description: "Too high memory usage may result into multiple issues such as OOMs or degraded performance."

        - alert: VMTooHighCPUUsage
          expr: rate(process_cpu_seconds_total[5m]) / process_cpu_cores_available > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "More than 90% of CPU is used by {{ $labels.job }} ({{ $labels.instance }})"
            description: "Too high CPU usage may be a sign of insufficient resources and make process unstable."

        - alert: VMTooManyLogs
          expr: sum(increase(vm_log_messages_total{level!="info"}[5m])) without (app_version, location, is_printed) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Too many logs generated for job {{ $labels.job }} ({{ $labels.instance }})"
            description: "The job {{ $labels.job }} ({{ $labels.instance }}) generated {{ $value }} log messages with the level higher than info for the last 5 minutes."

        - alert: VMTooManyTSIDMisses
          expr: increase(vm_missing_tsids_for_metric_id_total[5m]) > 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Unexpected TSID misses for {{ $labels.job }} ({{ $labels.instance }})"
            description: "If this happens after unclean shutdown (kill -9, OOM or power off), this is OK and should resolve. Otherwise this may point to corruption of index data."

        - alert: VMConcurrentInsertsHitTheLimit
          expr: avg_over_time(vm_concurrent_insert_current[1m]) >= vm_concurrent_insert_capacity
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "{{ $labels.job }} on {{ $labels.instance }} is constantly hitting concurrent inserts limit"
            description: "The limit of concurrent inserts depends on the number of CPUs. When component constantly hits the limit it is likely overloaded."

        - alert: VMRowsRejectedOnIngestion
          expr: rate(vm_rows_ignored_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Some rows are rejected on {{ $labels.instance }} on ingestion attempt"
            description: "Ingested rows are rejected due to the following reason: {{ $labels.reason }}"

        - alert: VMTooHighQueryLoad
          expr: increase(vm_concurrent_select_limit_timeout_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Read queries fail with timeout for {{ $labels.job }} on {{ $labels.instance }}"
            description: "Concurrency limit -search.maxConcurrentRequests was reached and extra queries could not be served within -search.maxQueueDuration."
