apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: victoriametrics-vmagent-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: victoriametrics-vmagent
      interval: 30s
      rules:
        - alert: VMAgentPersistentQueueIsDroppingData
          expr: sum(increase(vm_persistentqueue_bytes_dropped_total[5m])) without (path) > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "VMAgent {{ $labels.instance }} is dropping data from persistent queue"
            description: "Vmagent dropped {{ $value | humanize1024 }} from persistent queue for the last 10m."

        - alert: VMAgentTooManyScrapeErrors
          expr: increase(vm_promscrape_scrapes_failed_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "VMAgent fails to scrape one or more targets"
            description: "Job {{ $labels.job }} on instance {{ $labels.instance }} fails to scrape targets for last 15m."

        - alert: VMAgentScrapePoolHasNoTargets
          expr: sum(vm_promscrape_scrape_pool_targets) without (status, instance, pod) == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "VMAgent has scrape_pool {{ $labels.scrape_job }} with 0 configured/discovered targets"
            description: "This is likely a misconfiguration."

        - alert: VMAgentTooManyRemoteWriteErrors
          expr: rate(vmagent_remotewrite_retries_count_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "VMAgent {{ $labels.instance }} fails to push to remote storage"
            description: "VMAgent fails to push data to destination {{ $labels.url }}. Ensure that destination is up and reachable."

        - alert: VMAgentRemoteWriteConnectionIsSaturated
          expr: |
            (
              rate(vmagent_remotewrite_send_duration_seconds_total[5m])
              / vmagent_remotewrite_queues
            ) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Remote write connection from {{ $labels.instance }} to {{ $labels.url }} is saturated"
            description: "The remote write connection is saturated by more than 90%. Consider increasing -remoteWrite.queues."

        - alert: VMAgentConfigurationReloadFailure
          expr: |
            vm_promscrape_config_last_reload_successful != 1
            or
            vmagent_relabel_config_last_reload_successful != 1
          labels:
            severity: warning
          annotations:
            summary: "Configuration reload failed for VMAgent {{ $labels.instance }}"
            description: "Configuration hot-reload failed. Check vmagent's logs for detailed error message."

        - alert: VMAgentPersistentQueueRunsOutOfSpaceIn12Hours
          expr: |
            (
              (sum(vm_persistentqueue_free_disk_space_bytes) by (job, instance, path))
              /
              (sum(deriv(vm_persistentqueue_bytes_pending[1m])) by (job, instance, path) > 0)
            )
            * on(job, instance, path) group_left(url)
            (vmagent_remotewrite_pending_data_bytes * 0 + 1)
            < 12 * 3600 > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Persistent Queue for {{ $labels.url }} will run out of space in 12 hours"
            description: "RemoteWrite destination {{ $labels.url }} is unavailable or unable to receive data in a timely manner."

        - alert: VMAgentPersistentQueueRunsOutOfSpaceIn4Hours
          expr: |
            (
              (sum(vm_persistentqueue_free_disk_space_bytes) by (job, instance, path))
              /
              (sum(deriv(vm_persistentqueue_bytes_pending[1m])) by (job, instance, path) > 0)
            )
            * on(job, instance, path) group_left(url)
            (vmagent_remotewrite_pending_data_bytes * 0 + 1)
            < 4 * 3600 > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Persistent Queue for {{ $labels.url }} will run out of space in 4 hours"
            description: "RemoteWrite destination {{ $labels.url }} is unavailable. Once the available space is exhausted, samples will be discarded."
