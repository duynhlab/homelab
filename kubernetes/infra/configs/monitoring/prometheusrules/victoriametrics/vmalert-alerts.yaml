apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: victoriametrics-vmalert-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: victoriametrics-vmalert
      interval: 30s
      rules:
        - alert: VMAlertConfigurationReloadFailure
          expr: vmalert_config_last_reload_successful != 1
          labels:
            severity: warning
          annotations:
            summary: "Configuration reload failed for VMAlert {{ $labels.instance }}"
            description: "Configuration hot-reload failed. Check vmalert's logs for detailed error message."

        - alert: VMAlertAlertingRulesError
          expr: sum(increase(vmalert_alerting_rules_errors_total[5m])) without(id) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Alerting rules are failing for VMAlert {{ $labels.instance }}"
            description: "Alerting rules execution is failing for {{ $labels.alertname }} from group {{ $labels.group }} in file {{ $labels.file }}."

        - alert: VMAlertRecordingRulesError
          expr: sum(increase(vmalert_recording_rules_errors_total[5m])) without(id) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Recording rules are failing for VMAlert {{ $labels.instance }}"
            description: "Recording rules execution is failing for {{ $labels.recording }} from group {{ $labels.group }} in file {{ $labels.file }}."

        - alert: VMAlertTooManyMissedIterations
          expr: increase(vmalert_iteration_missed_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "VMAlert {{ $labels.instance }} is missing rules evaluations"
            description: "Group evaluation time takes longer than the configured evaluation interval. This may result in missed alerting notifications."

        - alert: VMAlertRemoteWriteErrors
          expr: increase(vmalert_remotewrite_errors_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "VMAlert {{ $labels.instance }} is failing to push metrics to remote write URL"
            description: "Check vmalert's logs for detailed error message."

        - alert: VMAlertRemoteWriteDroppingData
          expr: increase(vmalert_remotewrite_dropped_rows_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "VMAlert {{ $labels.instance }} is dropping data sent to remote write URL"
            description: "This may result in gaps in recording rules or alerts state."

        - alert: VMAlertAlertmanagerErrors
          expr: increase(vmalert_alerts_send_errors_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "VMAlert {{ $labels.instance }} is failing to send notifications to Alertmanager"
            description: "VMAlert is failing to send alert notifications to {{ $labels.addr }}."
