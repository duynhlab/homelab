# cert-manager metrics (controller/cainjector/webhook) on :9402 — cert-expiry
# (certmanager_certificate_expiration_timestamp_seconds) + issuance failures.
# cert-manager ns has no NetworkPolicy (infra tier). debugs §N.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cert-manager
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - cert-manager
  selector:
    matchLabels:
      app.kubernetes.io/instance: cert-manager
  endpoints:
    - port: tcp-prometheus-servicemonitor
      interval: 60s
      scrapeTimeout: 30s
