# ServiceMonitor for Kong API Gateway — scrapes Prometheus plugin metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kong-gateway
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - kong
  selector:
    matchLabels:
      app.kubernetes.io/name: kong
  endpoints:
    - port: status
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - replacement: kong
          targetLabel: job
