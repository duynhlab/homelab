# RFC-0014 P3 (D-13): the legacy-checkout fence. After the metrics cutover the
# nine platform services push OTLP (no scrape); this ServiceMonitor keeps the
# legacy pull pipeline alive ONLY for the exempt checkout-service (namespace
# "checkout", not deployed yet — the fence pre-exists its arrival), preserving
# job="microservices" so the legacy-checkout rule group keeps working with
# zero changes in that repo.
#
# Retirement condition (RFC-0014 D-13): delete this object plus the
# legacy-checkout rule group when checkout-service either adopts pkg obsx
# SetupObservability or is decommissioned.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: legacy-checkout
  namespace: monitoring
spec:
  endpoints:
  - interval: 15s
    path: /metrics
    port: http
    relabelings:
    - replacement: microservices
      targetLabel: job
    - sourceLabels:
      - __meta_kubernetes_service_name
      targetLabel: service
    - sourceLabels:
      - __meta_kubernetes_namespace
      targetLabel: namespace
    - sourceLabels:
      - __meta_kubernetes_service_label_app
      targetLabel: app
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - checkout
  selector:
    matchLabels:
      app.kubernetes.io/component: api
