---
# ServiceMonitor for PgDog (supporting-db pooler)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pgdog-supporting
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - user  # PgDog service is in user namespace
  selector:
    matchLabels:
      app: pgdog-supporting
  endpoints:
  - port: metrics  # Port 9090 (OpenMetrics)
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    relabelings:
      - targetLabel: job
        replacement: pgdog-supporting
      - sourceLabels: [__meta_kubernetes_service_name]
        targetLabel: service
      - sourceLabels: [__meta_kubernetes_namespace]
        targetLabel: namespace
