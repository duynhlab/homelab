apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  selectAllByDefault: true
  replicaCount: 1

  configRawYaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '<SLACK_WEBHOOK_URL>'

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-default'
      routes:
        - receiver: 'slack-critical'
          matchers:
            - severity="critical"
          continue: true
        - receiver: 'watchdog-null'
          matchers:
            - alertname="Watchdog"

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'namespace']
      - source_matchers:
          - alertname="KubeNodeNotReady"
        target_matchers:
          - severity=~"warning|critical"
        equal: ['node']
      - source_matchers:
          - alertname="VMServiceDown"
        target_matchers:
          - severity="warning"
        equal: ['job']

    receivers:
      - name: 'slack-default'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
      - name: 'slack-critical'
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            title: ':rotating_light: [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
      - name: 'watchdog-null'

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
