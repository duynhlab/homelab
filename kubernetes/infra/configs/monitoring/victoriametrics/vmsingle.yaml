# VMSingle - VictoriaMetrics single-node metrics storage
# Replaces the Prometheus server from kube-prometheus-stack.
# Provides Prometheus-compatible API at :8428 for Grafana queries.
# Docs: https://docs.victoriametrics.com/operator/resources/vmsingle/
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  retentionPeriod: "7d"
  removePvcAfterDelete: true
  port: "8428"

  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

  extraArgs:
    # Enable deduplication for metrics scraped by multiple agents
    dedup.minScrapeInterval: "15s"
