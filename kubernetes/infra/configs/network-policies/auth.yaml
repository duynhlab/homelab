# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Phase 5: the gRPC GetMe server (:9090) was removed — JWTs are verified
    # locally, so the east-west :9090 allow is gone. Every service still
    # fetches the JWKS DIRECTLY from auth over HTTP
    # (http://auth.auth.svc:8080/auth/v1/public/jwks, cached + background
    # refresh), so the app namespaces keep :8080 alongside kong.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: user
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: product
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cart
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: review
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: notification
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipping
      ports:
        - protocol: TCP
          port: 8080
    # Zalando Postgres operator (postgres-operator ns) → auth-db: Patroni REST (8008)
    # + SQL role/db init (5432). Without this the operator can't finish the DB →
    # databases-local times out. (Bug 13)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres-operator
      ports:
        - protocol: TCP
          port: 8008
        - protocol: TCP
          port: 5432
    # Metrics scrape (VMAgent, monitoring ns) → postgres-exporter sidecar.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
    # Intra-namespace: Patroni peer coordination + PgBouncer → Postgres.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8008
        - protocol: TCP
          port: 5432
