# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
# auth namespace hosts: the auth service (HTTP :8080 incl. the JWKS endpoint),
# the CNPG auth-db cluster (3-node HA), and the pgdog-auth pooler.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: auth
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Phase 5: the gRPC GetMe server (:9090) was removed — JWTs are verified
    # locally, so the east-west :9090 allow is gone. Every service still
    # fetches the JWKS DIRECTLY from auth over HTTP
    # (http://auth.auth.svc:8080/auth/v1/public/auth/jwks, cached + background
    # refresh), so the app namespaces keep :8080 alongside kong.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: user
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: product
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cart
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: review
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: notification
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipping
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: payment
      ports:
        - protocol: TCP
          port: 8080
    # CloudNativePG operator → auth-db instance manager (status/health probes that
    # drive Cluster readiness — without this databases-local times out) + SQL mgmt.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
    # Metrics scrape (VMAgent, monitoring ns) → cnpg postgres_exporter (9187)
    # + pgdog-auth pooler openmetrics (9090).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9090
    # Intra-namespace: CNPG HA replica WAL streaming (5432) + auth-service/migration
    # → PgDog (6432) + PgDog → Postgres (5432) + operator status probe (8000).
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6432
        - protocol: TCP
          port: 8000
