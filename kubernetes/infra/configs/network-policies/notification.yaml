# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: notification
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: notification
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # callers unconfirmed — conservative allowlist, verify
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipping
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
