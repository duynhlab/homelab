# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
# platform namespace hosts: the CNPG platform-db cluster (3-node HA), and the
# CNPG PgBouncer pooler platform-db-pooler-rw (×2, ADR-026 — replaced pgdog-platform).
# Temporal connects directly to platform-db-rw:5432.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # CloudNativePG operator → platform-db instance manager (status/health probes that
    # drive Cluster readiness — without this databases-local times out) + SQL mgmt.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
    # Metrics scrape (VMAgent, monitoring ns) → cnpg postgres_exporter (9187)
    # + platform-db PgBouncer pooler exporter (9127, ADR-026).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9127
    # Intra-namespace: CNPG HA replica WAL streaming + PgBouncer pooler → Postgres
    # (5432) + operator status probe (8000).
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000
    # Platform app services → PgBouncer pooler (5432, runtime) + platform-db-rw
    # migration initContainers (5432). ADR-026: pooler port is 5432, not PgDog's 6432.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: auth
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: user
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: notification
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipping
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: review
      ports:
        - protocol: TCP
          port: 5432
    # Temporal server → platform-db direct (5432, no PgDog).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: temporal
      ports:
        - protocol: TCP
          port: 5432
