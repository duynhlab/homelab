# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: product
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: product
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
    # CloudNativePG operator → cnpg-db instance manager (status/health probes that
    # drive Cluster readiness — without this databases-local times out) + SQL mgmt. (Bug 13)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 5432
    # Metrics scrape (VMAgent, monitoring ns) → cnpg postgres_exporter (9187)
    # + PgDog pooler openmetrics (9090).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9090
    # Intra-namespace: CNPG replica WAL streaming + product-service → PgDog (6432)
    # + PgDog → Postgres (5432) + operator status probe (8000).
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6432
        - protocol: TCP
          port: 8000
    # App services in sibling namespaces (cart, order) → PgDog pooler (6432) for
    # runtime + cnpg-db-rw for migration initContainers (5432). Without this the
    # migration initContainer stalls in Init → apps-local times out. (Bug 13)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cart
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
      ports:
        - protocol: TCP
          port: 6432
        - protocol: TCP
          port: 5432
