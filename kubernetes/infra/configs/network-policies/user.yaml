# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: user
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: user
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
    # Zalando Postgres operator (postgres-operator ns) → supporting-shared-db:
    # Patroni REST (8008) + SQL init (5432). Unblocks databases-local. (Bug 13)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: postgres-operator
      ports:
        - protocol: TCP
          port: 8008
        - protocol: TCP
          port: 5432
    # Metrics scrape (VMAgent, monitoring ns) → the Pigsty pg_exporter sidecar
    # (supporting-shared-db uses :9630, not the CNPG :9187 default). Without 9630
    # the scrape times out → 0 pg_* series + 44 recording rules empty (debugs §I/§N #6).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9630
    # Intra-namespace: Patroni peer coordination + PgBouncer → Postgres.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8008
        - protocol: TCP
          port: 5432
    # App services in sibling namespaces (review, notification, shipping) →
    # supporting-shared-db-pooler (PgBouncer, 5432) for runtime + supporting-shared-db
    # for migration initContainers (5432). Without this the migration initContainer
    # stalls in Init → apps-local times out. (Bug 13)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: review
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: notification
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shipping
      ports:
        - protocol: TCP
          port: 5432
