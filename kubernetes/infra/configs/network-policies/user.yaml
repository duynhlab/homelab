# NOTE: kindnet DOES enforce NetworkPolicy on Kind K8s 1.34+ (verified round 7) —
# these rules are LIVE. Any ingress not explicitly allowed below is dropped.
# user namespace hosts the user service (HTTP :8080).
# Database traffic moved to platform-db / pgdog-platform (RFC-0018).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: user
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-callers
  namespace: user
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Kong edge → user service HTTP.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 8080
