apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: microservices-business-kpis
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Observability"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  # RFC-0017 Business KPIs — one row per domain, from the fleet's
  # hand-declared business instruments (grafana-dashboards chart).
  configMapRef:
    name: grafana-dashboards-business-otel
    key: business-otel.json
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
