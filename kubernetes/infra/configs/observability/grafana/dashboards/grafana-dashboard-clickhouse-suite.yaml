# Standard ClickHouse OTel dashboard suite (RFC-0019): the three-tier
# navigation — Overview (which service is in trouble?) → Logs Explorer
# (what errors are happening?) → Trace Explorer (where did the request
# break?). JSON via the configMapGenerator entries in this directory's
# kustomization; $ds defaults to datasource uid `clickhouse`.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: clickhouse-otel-overview
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "ClickHouse"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  configMapRef:
    name: grafana-dashboard-clickhouse-otel-overview
    key: clickhouse-otel-overview.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: clickhouse-logs-explorer
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "ClickHouse"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  configMapRef:
    name: grafana-dashboard-clickhouse-logs-explorer
    key: clickhouse-logs-explorer.json
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: clickhouse-traces-explorer
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "ClickHouse"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  configMapRef:
    name: grafana-dashboard-clickhouse-traces-explorer
    key: clickhouse-traces-explorer.json
