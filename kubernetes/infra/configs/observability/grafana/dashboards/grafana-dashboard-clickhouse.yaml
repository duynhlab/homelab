# ClickHouse — OTel logs+traces SQL (RFC-0019 Phase B). SQL/OLAP over the
# otel_logs / otel_traces MergeTree tables via the grafana-clickhouse-datasource.
# JSON is generated into a ConfigMap by configMapGenerator (see kustomization.yaml)
# and imported by the grafana-operator. The board's $ds datasource variable
# defaults to the ClickHouse datasource (uid: clickhouse), so no __inputs mapping
# is needed.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: clickhouse-otel-sql
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Observability"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  configMapRef:
    name: grafana-dashboard-clickhouse-otel-sql
    key: clickhouse-otel-sql.json
