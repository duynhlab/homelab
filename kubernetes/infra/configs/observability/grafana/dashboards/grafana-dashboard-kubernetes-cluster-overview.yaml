apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubernetes-cluster-overview
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Observability"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  url: "https://raw.githubusercontent.com/duynhlab/grafana-dashboards/main/dashboard/kubernetes/kubernetes-cluster-overview.json"
  contentCacheDuration: 48h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
