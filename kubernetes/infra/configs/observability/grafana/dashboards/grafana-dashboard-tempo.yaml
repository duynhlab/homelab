apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: tempo-observability
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: "Observability"
  allowCrossNamespaceImport: true
  resyncPeriod: 30s
  url: "https://raw.githubusercontent.com/duynhlab/grafana-dashboards/main/dashboard/observability/tempo-observability-dashboard.json"
  contentCacheDuration: 48h
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: VictoriaMetrics
    - inputName: DS_TEMPO
      datasourceName: Tempo
    - inputName: DS_LOKI
      datasourceName: VictoriaLogs

