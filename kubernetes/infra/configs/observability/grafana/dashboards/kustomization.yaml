apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

resources:
  - grafana-dashboard-main.yaml
  - grafana-dashboard-business.yaml
  - grafana-dashboard-slo-overview.yaml
  - grafana-dashboard-slo-detailed.yaml
  - grafana-dashboard-vector.yaml
  - grafana-dashboard-tempo.yaml
  - grafana-dashboard-temporal.yaml
  - grafana-dashboard-cloudnative-pg.yaml
  - grafana-dashboard-pg-query-performance.yaml
  - grafana-dashboard-pg-maintenance.yaml
  - grafana-dashboard-pgdog.yaml
  - grafana-dashboard-redis.yaml
  - grafana-dashboard-kubernetes-cluster-overview.yaml
  - grafana-dashboard-kong.yaml
  # ClickHouse OTel logs+traces SQL (RFC-0019 Phase B) — JSON via configMapGenerator below
  - grafana-dashboard-clickhouse.yaml
  # VictoriaMetrics stack dashboards
  - grafana-dashboard-vmsingle.yaml
  - grafana-dashboard-vmagent.yaml
  - grafana-dashboard-vmalert.yaml
  # Flux GitOps dashboards
  - grafana-dashboard-flux-cluster.yaml
  - grafana-dashboard-flux-controlplane.yaml

# ClickHouse dashboard JSON → ConfigMap (referenced by grafana-dashboard-clickhouse.yaml
# via configMapRef; stable name, so the hash suffix is disabled).
configMapGenerator:
  - name: grafana-dashboard-clickhouse-otel-sql
    files:
      - clickhouse-otel-sql.json

generatorOptions:
  disableNameSuffixHash: true
