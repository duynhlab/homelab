# Grafana ClickHouse datasource (RFC-0019 Phase B) — SQL over the OTel
# otel_logs / otel_traces MergeTree tables (native protocol :9000). The password
# is injected from the ESO-managed clickhouse-credentials Secret via valuesFrom,
# never inlined.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: clickhouse-datasource
  namespace: monitoring
spec:
  valuesFrom:
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: clickhouse-credentials
          key: password
  datasource:
    access: proxy
    name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    jsonData:
      host: clickhouse-clickhouse.monitoring.svc.cluster.local
      port: 9000
      protocol: native
      defaultDatabase: otel
      username: default
      # OTel mapping (plugin >= 4.20.0): enables the Logs/Traces query builders,
      # Explore views, and trace<->log linking. Schema version stays on the
      # default auto (latest) selector — the plugin detects 1.3.0 vs 1.2.9 from
      # the table's columns (collector contrib >= 0.151.0 drops TimestampTime).
      logs:
        defaultDatabase: otel
        defaultTable: otel_logs
        otelEnabled: true
      traces:
        defaultDatabase: otel
        defaultTable: otel_traces
        otelEnabled: true
    secureJsonData:
      password: ${password}
  instanceSelector:
    matchLabels:
      dashboards: grafana
