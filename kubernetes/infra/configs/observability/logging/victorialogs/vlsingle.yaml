# VLSingle - VictoriaLogs single-node log storage (Operator-managed)
# Replaces the VictoriaLogs Helm chart HelmRelease.
# Log ingestion is handled by the cluster-wide Vector Agent (kube-system/vector).
# Docs: https://docs.victoriametrics.com/operator/resources/vlsingle/
apiVersion: operator.victoriametrics.com/v1
kind: VLSingle
metadata:
  name: victoria-logs
  namespace: monitoring
spec:
  retentionPeriod: "7d"
  removePvcAfterDelete: true

  storage:
    resources:
      requests:
        storage: 20Gi

  # 128Mi was OOMKilled repeatedly (exit 137) once the fleet-wide log volume grew
  # (all CNPG postgres/pgaudit streams after the Zalando->CNPG migration). Each OOM
  # restart drops Vector's sink connection and loses in-flight logs (e.g. sparse
  # pgaudit records). Bumped for a homelab-scale single-node log store.
  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 768Mi
