apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-pyroscope-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    # Health of the continuous-profiling backend. Pyroscope is scraped via the
    # ServiceMonitor created by its Helm chart (serviceMonitor.enabled); the job
    # label is matched by substring so it survives the operator's job-naming.
    - name: observability-profiling
      interval: 30s
      rules:
        - alert: PyroscopeDown
          expr: up{job=~".*pyroscope.*"} == 0
          for: 5m
          labels:
            severity: warning
            category: observability
          annotations:
            summary: "Pyroscope is down ({{ $labels.instance }})"
            description: "Pyroscope profiling backend target {{ $labels.instance }} (job {{ $labels.job }}) has been down for more than 5 minutes — continuous profiles are not being ingested or queryable."
