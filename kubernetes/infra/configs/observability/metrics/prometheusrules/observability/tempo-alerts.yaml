apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: observability-tempo-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    # Health of the APM/tracing backend. Tempo is scraped via
    # servicemonitors/tempo.yaml (selector app=tempo, /metrics); the VM-stack
    # VMServiceDown rule only matches VictoriaMetrics jobs, so Tempo had no
    # down-alert. The job label is matched by substring so it survives the
    # operator's job-naming (service name "tempo").
    #
    # Note: Pyroscope and Vector are scraped (Pyroscope has its own
    # PyroscopeDown alert; Vector via the chart-enabled PodMonitor). The OTel
    # Collector's :8888 self-telemetry gets its scrape + OtelCollectorDown in
    # the alert-audit scrape wave (2026-07).
    - name: observability-tracing
      interval: 30s
      rules:
        - alert: TempoDown
          expr: up{job=~".*tempo.*"} == 0
          for: 5m
          labels:
            severity: warning
            category: observability
          annotations:
            summary: "Tempo is down ({{ $labels.instance }})"
            description: "Tempo tracing backend target {{ $labels.instance }} (job {{ $labels.job }}) has been down for more than 5 minutes — distributed traces are not being ingested or queryable."

        # Arms once the otel-collector :8888 self-telemetry ServiceMonitor
        # lands (scrape wave of the same audit). The collector is the single
        # OTLP funnel — when it is down, every app metric/trace/log stops.
        - alert: OtelCollectorDown
          expr: up{job=~".*otel-collector.*"} == 0
          for: 5m
          labels:
            severity: critical
            category: observability
          annotations:
            summary: "OTel collector is down ({{ $labels.instance }})"
            description: "The OpenTelemetry collector target has been down for more than 5 minutes — application metrics, traces and logs (the whole OTLP path) are not being ingested."
