# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=auth-db, namespace=auth.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: auth-db-cluster-physical-replication-lag-warning
  namespace: auth
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: auth-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/auth-db
    rules:
    - alert: CNPGClusterPhysicalReplicationLagWarning
      annotations:
        summary: CNPG Cluster high physical replication lag
        description: 'CloudNativePG Cluster "auth/auth-db" is experiencing a high physical replication lag of {{ $value }}ms.


          High replication lag indicates network issues, busy instances, slow queries or suboptimal configuration.'
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterPhysicalReplicationLag.md
      expr: max(cnpg_pg_replication_lag{namespace="auth",pod=~"auth-db-([1-9][0-9]*)$"}) > 1
      for: 5m
      labels:
        severity: warning
        namespace: auth
        cnpg_cluster: auth-db
