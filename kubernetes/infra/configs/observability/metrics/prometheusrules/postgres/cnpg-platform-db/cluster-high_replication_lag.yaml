# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=platform-db, namespace=platform.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-db-cluster-high-replication-lag
  namespace: platform
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: platform-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/platform-db
    rules:
    - alert: CNPGClusterHighReplicationLag
      annotations:
        summary: CNPG Cluster high replication lag
        description: 'CloudNativePG Cluster "platform/platform-db" is experiencing a high replication lag of

          {{ $value }}s.


          High replication lag indicates network issues, busy instances, slow queries or suboptimal configuration.'
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterHighReplicationLag.md
      expr: max(cnpg_pg_replication_lag{namespace="platform",pod=~"platform-db-([1-9][0-9]*)$"}) > 1
      for: 5m
      labels:
        severity: warning
        namespace: platform
        cnpg_cluster: platform-db
