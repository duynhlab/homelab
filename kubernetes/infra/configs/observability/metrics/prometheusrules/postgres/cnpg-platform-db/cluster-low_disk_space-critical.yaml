# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=platform-db, namespace=platform.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-db-cluster-low-disk-space-critical
  namespace: platform
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: platform-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/platform-db
    rules:
    - alert: CNPGClusterLowDiskSpaceCritical
      annotations:
        summary: CNPG Instance is running out of disk space!
        description: CloudNativePG Cluster "platform/platform-db" is running extremely low on disk space. Check attached PVCs!
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterLowDiskSpaceCritical.md
      expr: "max(max by(persistentvolumeclaim) (1 - kubelet_volume_stats_available_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$\"} / kubelet_volume_stats_capacity_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$\"})) * 100 > 90 OR\nmax(max by(persistentvolumeclaim) (1 - kubelet_volume_stats_available_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$-wal\"} / kubelet_volume_stats_capacity_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$-wal\"})) * 100 > 90 OR\nmax(sum by (namespace,persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$-tbs.*\"})\n    /\n    sum by (namespace,persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace=\"auth\", persistentvolumeclaim=~\"platform-db-([1-9][0-9]*)$-tbs.*\"})\n    *\n    on(namespace, persistentvolumeclaim) group_left(volume)\n    kube_pod_spec_volumes_persistentvolumeclaims_info{pod=~\"\
        platform-db-([1-9][0-9]*)$\"}\n) * 100 > 90"
      for: 5m
      labels:
        severity: critical
        namespace: platform
        cnpg_cluster: platform-db
