# CNPG-only: WAL directory size (legacy split from postgres-alerts).
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-db-cluster-wal-size-high
  namespace: platform
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: platform-db
spec:
  groups:
    - name: cloudnative-pg/platform-db-wal
      interval: 5m
      rules:
        - alert: PostgresWALSizeHigh
          expr: cnpg_collector_pg_wal{value="size", namespace="platform"} > 2e+9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "CNPG WAL size high ({{ $labels.namespace }}/{{ $labels.cluster }})"
            description: "WAL directory size is {{ $value | humanize1024 }}B (threshold: 2GB)."
            runbook_url: "https://github.com/duynhlab/homelab/blob/main/docs/observability/runbooks/postgresql/PostgresWALSizeHigh.md"
