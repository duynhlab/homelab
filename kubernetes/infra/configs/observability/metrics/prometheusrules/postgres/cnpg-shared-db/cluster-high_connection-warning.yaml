# Single-node cluster (shared-db, ns user): HA/replication rules intentionally omitted — they never fire on 1 instance.
# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=shared-db, namespace=user.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shared-db-cluster-high-connection-warning
  namespace: user
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: shared-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/shared-db
    rules:
    - alert: CNPGClusterHighConnectionsWarning
      annotations:
        summary: CNPG Instance is approaching the maximum number of connections.
        description: 'CloudNativePG Cluster "user/shared-db" instance {{ $labels.pod }} is using {{ $value }}% of

          the maximum number of connections.'
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterHighConnectionsWarning.md
      expr: sum by (pod) (cnpg_backends_total{namespace="user", pod=~"shared-db-([1-9][0-9]*)$"}) / max by (pod) (cnpg_pg_settings_setting{name="max_connections", namespace="user", pod=~"shared-db-([1-9][0-9]*)$"}) * 100 > 80
      for: 5m
      labels:
        severity: warning
        namespace: user
        cnpg_cluster: shared-db
