# Single-node cluster (shared-db, ns user): HA/replication rules intentionally omitted — they never fire on 1 instance.
# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=shared-db, namespace=user.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shared-db-cluster-offline
  namespace: user
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: shared-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/shared-db
    rules:
    - alert: CNPGClusterOffline
      annotations:
        summary: CNPG Cluster has no running instances!
        description: 'CloudNativePG Cluster "user/shared-db" has no ready instances.


          Having an offline cluster means your applications will not be able to access the database, leading to

          potential service disruption and/or data loss.'
        runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterOffline.md
      expr: (count(cnpg_collector_up{namespace="user",pod=~"shared-db-([1-9][0-9]*)$"}) OR on() vector(0)) == 0
      for: 5m
      labels:
        severity: critical
        namespace: user
        cnpg_cluster: shared-db
