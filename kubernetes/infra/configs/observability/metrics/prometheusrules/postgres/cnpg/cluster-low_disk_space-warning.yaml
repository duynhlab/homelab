# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=product-db, namespace=product.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: product-db-cluster-low-disk-space-warning
  namespace: product
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: product-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/product-db
    rules:
    - alert: CNPGClusterLowDiskSpaceWarning
      annotations:
        summary: CNPG Instance is running out of disk space.
        description: CloudNativePG Cluster "product/product-db" is running low on disk space. Check attached PVCs.
        runbook_url: https://github.com/duynhlab/homelab/blob/main/docs/observability/runbooks/postgresql/CNPGClusterLowDiskSpaceWarning.md
      expr: "max(max by(persistentvolumeclaim) (1 - kubelet_volume_stats_available_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$\"} / kubelet_volume_stats_capacity_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$\"})) * 100 > 70 OR\nmax(max by(persistentvolumeclaim) (1 - kubelet_volume_stats_available_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$-wal\"} / kubelet_volume_stats_capacity_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$-wal\"})) * 100 > 70 OR\nmax(sum by (namespace,persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$-tbs.*\"})\n    /\n    sum by (namespace,persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace=\"product\", persistentvolumeclaim=~\"product-db-([1-9][0-9]*)$-tbs.*\"})\n    *\n    on(namespace, persistentvolumeclaim) group_left(volume)\n    kube_pod_spec_volumes_persistentvolumeclaims_info{pod=~\"\
        product-db-([1-9][0-9]*)$\"}\n) * 100 > 70"
      for: 5m
      labels:
        severity: warning
        namespace: product
        cnpg_cluster: product-db
