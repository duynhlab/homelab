# Generated from cnpg/cluster chart v0.6.0 (helm template) with fullnameOverride=product-db, namespace=product.
# Do not edit expr by hand; re-render from chart and split, or bump chart version in README.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: product-db-cluster-physical-replication-lag-critical
  namespace: product
  labels:
    app.kubernetes.io/part-of: cnpg-chart-rules
    cnpg.io/cluster: product-db
    platform.duynhlab.dev/source: cloudnative-pg-charts-cluster
    platform.duynhlab.dev/chart-version: 0.6.0
spec:
  groups:
  - name: cloudnative-pg/product-db
    rules:
    - alert: CNPGClusterPhysicalReplicationLagCritical
      annotations:
        summary: CNPG Cluster very high physical replication lag
        description: 'CloudNativePG Cluster "product/product-db" is experiencing a very high physical replication lag of {{ $value }}ms.


          High replication lag indicates network issues, busy instances, slow queries or suboptimal configuration.'
        runbook_url: https://github.com/duynhlab/homelab/blob/main/docs/observability/runbooks/postgresql/CNPGClusterPhysicalReplicationLagCritical.md
      expr: max(cnpg_pg_replication_lag{namespace="product",pod=~"product-db-([1-9][0-9]*)$"}) > 15
      for: 5m
      labels:
        severity: critical
        namespace: product
        cnpg_cluster: product-db
