apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: victoriametrics-vmsingle-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: victoriametrics-vmsingle
      interval: 30s
      rules:
        - alert: VMSingleDiskRunsOutOfSpaceIn3Days
          expr: |
            sum(vm_free_disk_space_bytes) without(path)
            /
            (
              (rate(vm_rows_added_to_storage_total[1d]) - sum(rate(vm_deduplicated_samples_total[1d])) without(type))
              *
              (
                sum(vm_data_size_bytes{type!~"indexdb.*"}) without(type)
                / sum(vm_rows{type!~"indexdb.*"}) without(type)
              )
              + rate(vm_new_timeseries_created_total[1d])
              *
              (
                sum(vm_data_size_bytes{type="indexdb/file"}) without(type)
                / sum(vm_rows{type="indexdb/file"}) without(type)
              )
            ) < 3 * 24 * 3600 > 0
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "VMSingle {{ $labels.instance }} will run out of disk space in 3 days"
            description: "Taking into account current ingestion rate, free disk space will be enough only for {{ $value | humanizeDuration }}."

        - alert: VMSingleDiskRunsOutOfSpace
          expr: |
            sum(vm_data_size_bytes) by(job, instance)
            /
            (
              sum(vm_free_disk_space_bytes) by(job, instance)
              + sum(vm_data_size_bytes) by(job, instance)
            ) > 0.8
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "VMSingle {{ $labels.instance }} disk utilization is above 80%"
            description: "Disk utilisation on instance {{ $labels.instance }} is more than 80%. Having less than 20% of free disk space could cripple merge processes and overall performance."

        - alert: VMSingleRequestErrorsToAPI
          expr: increase(vm_http_request_errors_total[5m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Too many errors served for path {{ $labels.path }} (instance {{ $labels.instance }})"
            description: "Requests to path {{ $labels.path }} are receiving errors. Please verify if clients are sending correct requests."

        - alert: VMSingleTooHighChurnRate
          expr: |
            (
              sum(rate(vm_new_timeseries_created_total[5m])) by(instance)
              / sum(rate(vm_rows_inserted_total[5m])) by(instance)
            ) > 0.1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Churn rate is more than 10% on {{ $labels.instance }}"
            description: "VM constantly creates new time series. High Churn Rate is tightly connected with database performance and may result in unexpected OOMs or slow queries."

        - alert: VMSingleTooHighSlowInsertsRate
          expr: |
            (
              sum(rate(vm_slow_row_inserts_total[5m])) by(instance)
              / sum(rate(vm_rows_inserted_total[5m])) by(instance)
            ) > 0.05
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Percentage of slow inserts is more than 5% on {{ $labels.instance }}"
            description: "High rate of slow inserts may be a sign of resource exhaustion. It is likely more RAM is needed for optimal handling of the current number of active time series."

        - alert: VMSingleMetadataCacheUtilizationIsTooHigh
          expr: |
            vm_metrics_metadata_storage_size_bytes
            / vm_metrics_metadata_storage_max_size_bytes > 0.95
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Metadata cache on {{ $labels.instance }} is utilized for more than 95%"
            description: "When cache is overutilized, the oldest entries will be dropped out automatically. It may result into incomplete response for /api/v1/metadata API calls."
