# ServiceMonitor for External Secrets Operator
# Scrapes ESO controller metrics for sync failure alerting and dashboarding.
# Key metrics:
#   - externalsecret_sync_calls_total / _error_total (sync success/failure rate)
#   - externalsecret_status_condition (Ready/NotReady per ExternalSecret)
#   - externalsecret_reconcile_duration (reconcile latency)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: external-secrets
  namespace: monitoring
spec:
  endpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - external-secrets-system
  selector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
