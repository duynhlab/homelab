# ServiceMonitor for CoreDNS (:9153 metrics port on the kube-dns Service).
# Without it CoreDNS had no scrape target at all: CoreDNSDown false-fired
# forever (absent() always true) and CoreDNSHighErrorRate could never fire
# (alert-ruler audit 2026-07-16, finding #3). The job relabel pins
# job="kube-dns" to match those rules, same pattern as kube-apiserver.yaml.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-dns
  namespace: monitoring
spec:
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      relabelings:
        - replacement: kube-dns
          targetLabel: job
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      k8s-app: kube-dns
