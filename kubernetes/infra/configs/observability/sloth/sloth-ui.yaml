# Sloth Web UI (v0.16.0+)
#
# Stateless read-only viewer for Sloth-generated SLOs.
# Reads SLI/error-budget series from VMSingle (Prometheus-compatible API)
# — does NOT need access to PrometheusServiceLevel CRDs.
#
# The Sloth Helm chart in `infra/controllers/metrics/sloth-operator.yaml`
# only deploys the `kubernetes-controller`. The `server` sub-command is shipped
# in the same image but is NOT exposed by the chart, so we run it as a separate
# Deployment here.
#
# Image is pinned to the same tag as the controller HelmRelease values.
# Bump both together when upgrading.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sloth-ui
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sloth-ui
    app.kubernetes.io/part-of: sloth
    app.kubernetes.io/component: ui
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sloth-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sloth-ui
        app.kubernetes.io/part-of: sloth
        app.kubernetes.io/component: ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sloth
          image: ghcr.io/slok/sloth:v0.16.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --app-listen-address=:8080
            - --status-listen-address=:8081
            - --prometheus-address=http://vmsingle-victoria-metrics.monitoring.svc:8428
            - --prometheus-cache-refresh-interval=1m
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /status
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: sloth-ui
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sloth-ui
    app.kubernetes.io/part-of: sloth
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sloth-ui
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 8081
      targetPort: metrics
      protocol: TCP
---
# Scrape the UI's own Prometheus metrics (request latency, prom client cache, etc.)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: sloth-ui
  namespace: monitoring
  labels:
    app.kubernetes.io/name: sloth-ui
    app.kubernetes.io/part-of: sloth
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sloth-ui
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
