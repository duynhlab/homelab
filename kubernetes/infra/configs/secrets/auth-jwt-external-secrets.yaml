# RFC-0009 Phase 4 — RS256 signing key material from OpenBAO (secret/local/auth/jwt-signing).
# Two consumers of the same OpenBAO secret:
#   - private_key -> auth namespace, injected as JWT_PRIVATE_KEY_PEM (auth signs access JWTs).
#   - public_key  -> kong namespace, as a KIC `jwt` credential (Kong verifies edge JWTs).
# Splitting the key this way keeps the private half only in the auth pod; Kong holds public only.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-jwt-signing
  namespace: auth
  labels:
    app.kubernetes.io/name: auth-jwt-signing
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: auth-jwt-signing
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: private-key
      remoteRef:
        key: secret/data/local/auth/jwt-signing
        property: private_key
---
# Kong Ingress Controller consumer credential (type: jwt). The `jwt` plugin matches
# a token's `iss` claim to `key`, then verifies the signature with `rsa_public_key`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-issuer-jwt
  namespace: kong
  labels:
    app.kubernetes.io/name: auth-issuer-jwt
    app.kubernetes.io/component: kong
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: auth-issuer-jwt
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          konghq.com/credential: jwt
      data:
        key: "https://gateway.duynh.me"
        algorithm: "RS256"
        rsa_public_key: "{{ .publicKey }}"
  data:
    - secretKey: publicKey
      remoteRef:
        key: secret/data/local/auth/jwt-signing
        property: public_key
