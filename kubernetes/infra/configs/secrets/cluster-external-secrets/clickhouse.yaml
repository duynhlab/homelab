# ClusterExternalSecret for the ClickHouse OLAP backend (RFC-0019 Phase B).
# Creates an ExternalSecret + `clickhouse-credentials` Secret in any namespace
# labeled:
#   platform.duynhlab/clickhouse: "true"   (currently: monitoring)
#
# Sources the admin username/password from OpenBAO (secret/local/infra/clickhouse/admin).
# Consumed by: the ClickHouseInstallation default user (key: password), the OTel
# Collector clickhouse exporter (CLICKHOUSE_PASSWORD env), and the Grafana
# ClickHouse datasource (secureJsonData.password via valuesFrom).
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: clickhouse-credentials
  labels:
    app.kubernetes.io/name: clickhouse-credentials
    app.kubernetes.io/component: olap
    app.kubernetes.io/managed-by: external-secrets
spec:
  namespaceSelector:
    matchLabels:
      platform.duynhlab/clickhouse: "true"

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: openbao
      kind: ClusterSecretStore
    target:
      name: clickhouse-credentials
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: Opaque
        metadata:
          labels:
            app.kubernetes.io/name: clickhouse-credentials
            app.kubernetes.io/component: olap
            app.kubernetes.io/managed-by: external-secrets
    data:
      - secretKey: username
        remoteRef:
          key: secret/data/local/infra/clickhouse/admin
          property: username
      - secretKey: password
        remoteRef:
          key: secret/data/local/infra/clickhouse/admin
          property: password
