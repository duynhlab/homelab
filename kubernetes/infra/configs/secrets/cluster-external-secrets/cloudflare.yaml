# Cloudflare API token for cert-manager DNS-01 solver.
# Synced from OpenBAO into cert-manager namespace as a regular ExternalSecret
# (cert-manager only needs it in its own namespace, not cluster-wide).
#
# OpenBAO path: secret/data/local/infra/cloudflare/api-token
# Token scope: Zone:Read + DNS:Edit on zone duynh.me
#
# To rotate the token:
#   kubectl exec -n openbao openbao-0 -- sh -c \
#     "BAO_TOKEN=\$(...) bao kv put secret/local/infra/cloudflare/api-token api_token=<NEW>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cloudflare-api-token
    app.kubernetes.io/component: dns-solver
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    - secretKey: api-token
      remoteRef:
        key: secret/data/local/infra/cloudflare/api-token
        property: api_token
