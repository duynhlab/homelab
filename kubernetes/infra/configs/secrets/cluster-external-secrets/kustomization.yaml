apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ClusterExternalSecret resources for shared secrets across namespaces.
# Uses namespaceSelector to auto-deploy ExternalSecrets to labeled namespaces.
# Add new shared secrets here; DB-specific secrets stay near their clusters.
resources:
  - pg-backup-rustfs-cnpg.yaml
  - pg-backup-rustfs-walg.yaml
  - cloudflare.yaml
