# ClusterExternalSecret for RustFS backup credentials (CNPG/Barman format)
# Automatically creates ExternalSecret in all namespaces labeled:
#   platform.duynhlab/backup: "cnpg"
#
# Target namespaces: product, cart (CloudNativePG clusters)
# Key format: ACCESS_KEY_ID, ACCESS_SECRET_KEY (CNPG/Barman format)
# OpenBAO path: secret/data/local/infra/rustfs/backup-cnpg
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: pg-backup-rustfs-cnpg
  labels:
    app.kubernetes.io/name: pg-backup-rustfs-credentials
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: external-secrets
spec:
  namespaceSelector:
    matchLabels:
      platform.duynhlab/backup: "cnpg"

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: openbao
      kind: ClusterSecretStore
    target:
      name: pg-backup-rustfs-credentials
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: Opaque
        metadata:
          labels:
            app.kubernetes.io/name: pg-backup-rustfs-credentials
            app.kubernetes.io/component: backup
            app.kubernetes.io/managed-by: external-secrets
    data:
      - secretKey: ACCESS_KEY_ID
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: access_key_id
      - secretKey: ACCESS_SECRET_KEY
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: secret_access_key
