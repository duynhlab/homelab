# ClusterExternalSecret for RustFS backup credentials (WAL-G format)
# Automatically creates ExternalSecret in all namespaces labeled:
#   platform.duynhlab/backup: "walg"
#
# Target namespaces: auth, user, review (Zalando Postgres Operator clusters)
# Key format: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (WAL-G format)
# Vault path: secret/data/local/infra/rustfs/backup-zalando
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: pg-backup-rustfs-walg
  labels:
    app.kubernetes.io/name: pg-backup-rustfs-credentials
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: external-secrets
spec:
  namespaceSelector:
    matchLabels:
      platform.duynhlab/backup: "walg"

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: vault-dev
      kind: ClusterSecretStore
    target:
      name: pg-backup-rustfs-credentials
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: Opaque
        metadata:
          labels:
            app.kubernetes.io/name: pg-backup-rustfs-credentials
            app.kubernetes.io/component: backup
            app.kubernetes.io/managed-by: external-secrets
    data:
      - secretKey: AWS_ACCESS_KEY_ID
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-zalando
          property: access_key_id
      - secretKey: AWS_SECRET_ACCESS_KEY
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-zalando
          property: secret_access_key
