# ClusterExternalSecret for Pyroscope's RustFS (S3) profile-block storage.
# Creates an ExternalSecret in any namespace labeled:
#   platform.duynhlab/s3-pyroscope: "true"   (currently: monitoring)
#
# Reuses the existing RustFS credentials in OpenBAO (same access keys work for
# any bucket); Pyroscope writes profile blocks to the `pyroscope-profiles` bucket.
# Key format: ACCESS_KEY_ID, ACCESS_SECRET_KEY (consumed as env by the Pyroscope pod).
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: pyroscope-rustfs
  labels:
    app.kubernetes.io/name: pyroscope-rustfs-credentials
    app.kubernetes.io/component: profiling
    app.kubernetes.io/managed-by: external-secrets
spec:
  namespaceSelector:
    matchLabels:
      platform.duynhlab/s3-pyroscope: "true"

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: openbao
      kind: ClusterSecretStore
    target:
      name: pyroscope-rustfs-credentials
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: Opaque
        metadata:
          labels:
            app.kubernetes.io/name: pyroscope-rustfs-credentials
            app.kubernetes.io/component: profiling
            app.kubernetes.io/managed-by: external-secrets
    data:
      - secretKey: ACCESS_KEY_ID
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: access_key_id
      - secretKey: ACCESS_SECRET_KEY
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: secret_access_key
