# ClusterExternalSecret for Tempo's RustFS (S3) trace storage.
# Creates an ExternalSecret in any namespace labeled:
#   platform.duynhlab/s3: "tempo"   (currently: monitoring)
#
# Reuses the existing RustFS credentials in OpenBAO (same access keys work for
# any bucket); Tempo writes trace blocks to the `tempo-traces` bucket.
# Key format: ACCESS_KEY_ID, ACCESS_SECRET_KEY (consumed as env by the Tempo Deployment).
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: tempo-rustfs
  labels:
    app.kubernetes.io/name: tempo-rustfs-credentials
    app.kubernetes.io/component: tracing
    app.kubernetes.io/managed-by: external-secrets
spec:
  namespaceSelector:
    matchLabels:
      platform.duynhlab/s3: "tempo"

  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: openbao
      kind: ClusterSecretStore
    target:
      name: tempo-rustfs-credentials
      creationPolicy: Owner
      deletionPolicy: Retain
      template:
        type: Opaque
        metadata:
          labels:
            app.kubernetes.io/name: tempo-rustfs-credentials
            app.kubernetes.io/component: tracing
            app.kubernetes.io/managed-by: external-secrets
    data:
      - secretKey: ACCESS_KEY_ID
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: access_key_id
      - secretKey: ACCESS_SECRET_KEY
        remoteRef:
          key: secret/data/local/infra/rustfs/backup-cnpg
          property: secret_access_key
