# ClusterSecretStore for the OpenBAO DATABASE secrets engine (RFC-0008 / ADR-025).
#
# The default `openbao` store is pinned to the KV v2 mount (path: secret) and
# therefore cannot read the `database/` engine. This second store leaves `path`
# unset so the vault provider reads raw engine paths like
# `database/static-creds/<role>`. Same Kubernetes auth as `openbao` (role
# eso-reader, whose eso-read policy grants read on database/static-creds/notification).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-db
  labels:
    app.kubernetes.io/name: openbao-db
    app.kubernetes.io/component: secret-store
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      # No `path`/`version`: read the database engine paths directly (not KV v2).
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-reader"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
