# ClusterSecretStore for OpenBAO (replaces vault-dev)
# Cluster-wide secret store accessible from all namespaces
#
# Authentication: Kubernetes auth method
# - ESO uses its ServiceAccount token to authenticate with OpenBAO
# - OpenBAO validates the token via K8s TokenReview API
# - ESO uses the returned OpenBAO token to read secrets
#
# Usage in ExternalSecret:
#   secretStoreRef:
#     name: openbao
#     kind: ClusterSecretStore
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/component: secret-store
spec:
  provider:
    vault:
      # OpenBAO server address (in-cluster)
      server: "http://openbao.openbao.svc.cluster.local:8200"

      # KV v2 secrets engine path
      path: "secret"
      version: "v2"

      # Kubernetes authentication
      auth:
        kubernetes:
          # OpenBAO Kubernetes auth mount path
          mountPath: "kubernetes"

          # OpenBAO role created by bootstrap Job
          role: "eso-reader"

          # ServiceAccount to use for authentication
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
