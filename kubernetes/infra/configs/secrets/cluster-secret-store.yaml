# ClusterSecretStore for Vault (dev mode)
# Cluster-wide secret store accessible from all namespaces
#
# Authentication: Kubernetes auth method
# - ESO uses its ServiceAccount token to authenticate with Vault
# - Vault validates the token and returns a Vault token
# - ESO uses the Vault token to read secrets
#
# Usage in ExternalSecret:
#   secretStoreRef:
#     name: vault-dev
#     kind: ClusterSecretStore
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-dev
  labels:
    app.kubernetes.io/name: vault-dev
    app.kubernetes.io/component: secret-store
spec:
  provider:
    vault:
      # Vault server address (in-cluster)
      server: "http://vault.vault.svc.cluster.local:8200"

      # KV v2 secrets engine path
      path: "secret"
      version: "v2"

      # Kubernetes authentication
      auth:
        kubernetes:
          # Vault Kubernetes auth mount path
          mountPath: "kubernetes"

          # Vault role created by bootstrap Job
          role: "external-secrets"

          # ServiceAccount to use for authentication
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
