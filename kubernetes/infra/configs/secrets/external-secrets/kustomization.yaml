apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ExternalSecret resources for secrets migration (shadow-first approach)
# These create shadow secrets with -vault suffix
# Apps/DBs can be updated to use these secrets after verification

resources:
  # Phase 2: DB credentials
  - product-db-secret.yaml
  - transaction-shared-db-secret-cart.yaml
  - transaction-shared-db-secret-order.yaml
  # Phase 3: Backup credentials (RustFS S3)
  - pg-backup-rustfs-product.yaml
  - pg-backup-rustfs-cart.yaml
  - pg-backup-rustfs-auth.yaml
  - pg-backup-rustfs-user.yaml
  - pg-backup-rustfs-review.yaml
  # Phase 4: Pooler credentials (for future secretRef support)
  - pgdog-product-creds.yaml
  - pgcat-transaction-creds.yaml
