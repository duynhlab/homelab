# ExternalSecret for RustFS backup credentials (Cart namespace)
# Creates shadow secret: pg-backup-rustfs-credentials-vault
#
# Used by CloudNativePG barmanObjectStore for transaction-db backups
# Key format: ACCESS_KEY_ID, ACCESS_SECRET_KEY (CNPG/Barman format)
#
# Vault path: secret/data/backups/rustfs
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pg-backup-rustfs-credentials-vault
  namespace: cart
  labels:
    app.kubernetes.io/name: pg-backup-rustfs-credentials
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: pg-backup-rustfs-credentials-vault
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: pg-backup-rustfs-credentials
          app.kubernetes.io/component: backup
          app.kubernetes.io/managed-by: external-secrets
  data:
    # CNPG/Barman format
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: secret/data/backups/rustfs
        property: access_key_id
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: secret/data/backups/rustfs
        property: secret_access_key
