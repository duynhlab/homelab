# ExternalSecret for PgDog pooler credentials (Product namespace)
# Creates shadow secret: pgdog-product-credentials-vault
#
# NOTE: PgDog Helm chart does NOT currently support passwordFromSecret.
# This ExternalSecret is created for:
# 1. Future chart support for secretRef
# 2. InitContainer-based config rendering (if implemented)
#
# Current workaround: Inline passwords in HelmRelease (dev-only, documented)
# See: kubernetes/infra/configs/databases/clusters/product-db/poolers/helmrelease.yaml
#
# Vault path: secret/data/poolers/pgdog-product
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pgdog-product-credentials-vault
  namespace: product
  labels:
    app.kubernetes.io/name: pgdog-product-credentials
    app.kubernetes.io/component: pooler
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: pgdog-product-credentials-vault
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: pgdog-product-credentials
          app.kubernetes.io/component: pooler
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/poolers/pgdog-product
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/poolers/pgdog-product
        property: password
