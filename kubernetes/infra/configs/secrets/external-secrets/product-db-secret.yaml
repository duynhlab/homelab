# ExternalSecret for Product DB credentials
# Creates shadow secret: product-db-secret-vault
#
# After verification, update kubernetes/apps/product.yaml to reference
# this secret instead of the plaintext product-db-secret
#
# Vault path: secret/data/product/db
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: product-db-secret-vault
  namespace: product
  labels:
    app.kubernetes.io/name: product-db-secret
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: external-secrets
spec:
  # Refresh interval (how often ESO checks Vault for changes)
  refreshInterval: 1h

  # Reference to ClusterSecretStore
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore

  # Target Kubernetes Secret configuration
  target:
    name: product-db-secret-vault
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: product-db-secret
          app.kubernetes.io/component: database
          app.kubernetes.io/managed-by: external-secrets

  # Data mappings from Vault to Secret keys
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/product/db
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/product/db
        property: password
