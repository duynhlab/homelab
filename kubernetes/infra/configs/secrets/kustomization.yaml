apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Secrets management configuration:
# - OpenBAO bootstrap (init, unseal, configure HA cluster)
# - ClusterSecretStore for ESO → OpenBAO connection
# - ClusterExternalSecrets for shared secrets (backup creds via namespaceSelector)
# - DB-specific ExternalSecrets are co-located with their clusters in configs/databases/
resources:
  - openbao-bootstrap/
  - cluster-secret-store.yaml
  - cluster-external-secrets/
