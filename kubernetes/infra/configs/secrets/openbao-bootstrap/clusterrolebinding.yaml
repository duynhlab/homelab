# ClusterRoleBinding: system:auth-delegator
# Allows bootstrap Job to call K8s TokenReview API
# Required for configuring OpenBAO Kubernetes auth method
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-bootstrap-auth-delegator
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openbao-bootstrap
    namespace: openbao
