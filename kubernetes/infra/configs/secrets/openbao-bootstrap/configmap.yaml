# OpenBAO Bootstrap Script ConfigMap
# Idempotent: safe to re-run after pod restarts (Raft storage persists configuration)
#
# Phases (RFC-0008 / ADR-024 — awskms auto-unseal via floci):
#   1. Wait — wait for openbao-0 to be reachable
#   2. KMS + Init — ensure floci KMS key + alias/openbao-unseal, then init with a
#      recovery key (awskms auto-unseal; no Shamir unseal key)
#   3. Auto-unseal — wait for openbao-0 sealed:false (nodes self-unseal via KMS)
#   4. Configure — enable engines, auth, policies, seed KV secrets; then revoke root
#
# Path convention: secret/{env}/{category}/{service}/{resource}
# KV v2 engine mounted at: secret/
#
# Key storage: openbao-init-keys Secret in openbao namespace
#   Keys: recovery_key (base64, break-glass) + root_token (base64, transient — revoked
#   at the end of a successful run, leaving the copy inert). No Shamir unseal key.
#   Day-2 admin: `bao operator generate-root` from the recovery key.
#
# Note: policies written via printf to avoid heredoc indentation conflicts with YAML.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-bootstrap-script
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    BAO_ADDR="http://openbao.openbao.svc.cluster.local:8200"
    export BAO_ADDR
    export VAULT_ADDR="$BAO_ADDR"

    K8S_API="https://kubernetes.default.svc"
    SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    NAMESPACE="openbao"
    INIT_SECRET="openbao-init-keys"
    WORK_DIR="/home/openbao"

    echo "============================================"
    echo " OpenBAO Bootstrap"
    echo " Addr : $BAO_ADDR"
    echo " Date : $(date -Iseconds)"
    echo "============================================"

    # ------------------------------------------------------------------ #
    # Phase 1 - wait for openbao-0 to answer HTTP                         #
    # ------------------------------------------------------------------ #
    echo ""
    echo "=== Phase 1: Waiting for OpenBAO pod openbao-0 ==="
    POD0="http://openbao-0.openbao-internal.openbao.svc.cluster.local:8200"
    # OpenBAO 2.5.2: use *code=N params (uninitcode, sealedcode, standbycode), NOT *ok=true (Vault syntax)
    until wget -qO- --timeout=5 "$POD0/v1/sys/health?uninitcode=200&sealedcode=200" > /dev/null 2>&1; do
      echo "  openbao-0 not ready, retrying in 5s..."
      sleep 5
    done
    echo "  openbao-0 reachable!"

    # ------------------------------------------------------------------ #
    # Phase 2 - floci KMS alias, then init (awskms auto-unseal) or read  #
    # RFC-0008 / ADR-024: OpenBAO wraps its root key with a KMS key held  #
    # by the floci emulator, so pods self-unseal at boot (no Shamir key). #
    # ------------------------------------------------------------------ #
    echo ""
    echo "=== Phase 2: floci KMS alias + initialize (auto-unseal) ==="

    # floci is zero-auth → unsigned AWS-JSON calls over wget are accepted.
    FLOCI="http://floci.openbao.svc.cluster.local:4566"
    kms() { wget -qO- --timeout=10 \
      --header="X-Amz-Target: TrentService.$1" \
      --header="Content-Type: application/x-amz-json-1.1" \
      --post-data="$2" "$FLOCI/" 2>/dev/null; }

    echo "  Waiting for floci KMS + ensuring alias/openbao-unseal..."
    n=0
    until kms DescribeKey '{"KeyId":"alias/openbao-unseal"}' | grep -q '"KeyId"'; do
      KEYID=$(kms CreateKey '{}' | sed -n 's/.*"KeyId"[": ]*"\([^"]*\)".*/\1/p' | head -1)
      if [ -n "$KEYID" ]; then
        kms CreateAlias "{\"AliasName\":\"alias/openbao-unseal\",\"TargetKeyId\":\"$KEYID\"}" >/dev/null 2>&1
        echo "  Created KMS key $KEYID + alias/openbao-unseal."
        break
      fi
      n=$((n + 1)); [ "$n" -ge 30 ] && { echo "ERROR: floci KMS not ready after 90s."; exit 1; }
      echo "    floci not ready, retry 3s..."; sleep 3
    done

    SECRET_RESPONSE=$(wget -qO- --timeout=10 \
      --header="Authorization: Bearer $SA_TOKEN" \
      --no-check-certificate \
      "$K8S_API/api/v1/namespaces/$NAMESPACE/secrets/$INIT_SECRET" 2>/dev/null || echo "NOT_FOUND")

    # Auto-unseal: ask the cluster if it is initialized (not the Secret).
    INITED=$(wget -qO- --timeout=5 \
      "$POD0/v1/sys/health?uninitcode=200&sealedcode=200&standbycode=200" 2>/dev/null \
      | grep -o '"initialized":[a-z]*' | cut -d: -f2)

    ROOT_TOKEN=""
    if [ "$INITED" != "true" ]; then
      echo "  First run: init with awskms auto-unseal (recovery key, no unseal key)..."
      # Init may fail until floci+alias can wrap the root key — retry.
      INIT_OUTPUT=""; n=0
      until echo "$INIT_OUTPUT" | grep -q "Recovery Key 1:"; do
        INIT_OUTPUT=$(BAO_ADDR="$POD0" bao operator init -recovery-shares=1 -recovery-threshold=1 2>&1)
        echo "$INIT_OUTPUT" | grep -q "Recovery Key 1:" && break
        n=$((n + 1)); [ "$n" -ge 20 ] && { echo "ERROR: init failed:"; echo "$INIT_OUTPUT"; exit 1; }
        echo "    init not ready (KMS wrap?), retry 5s..."; sleep 5
      done
      RECOVERY_KEY=$(echo "$INIT_OUTPUT" | grep "Recovery Key 1:" | awk '{print $NF}')
      ROOT_TOKEN=$(echo "$INIT_OUTPUT" | grep "Initial Root Token:" | awk '{print $NF}')

      echo "  Storing recovery key + (transient) root token in '$INIT_SECRET'..."
      RK_B64=$(printf '%s' "$RECOVERY_KEY" | base64 | tr -d '\n')
      RT_B64=$(printf '%s' "$ROOT_TOKEN" | base64 | tr -d '\n')
      CREATE_BODY="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"$INIT_SECRET\",\"namespace\":\"$NAMESPACE\",\"labels\":{\"app.kubernetes.io/managed-by\":\"openbao-bootstrap\"}},\"data\":{\"recovery_key\":\"$RK_B64\",\"root_token\":\"$RT_B64\"}}"
      wget -qO- --timeout=15 \
        --header="Authorization: Bearer $SA_TOKEN" \
        --header="Content-Type: application/json" \
        --no-check-certificate \
        --post-data="$CREATE_BODY" \
        "$K8S_API/api/v1/namespaces/$NAMESPACE/secrets" > /dev/null 2>&1 || \
        echo "  Warning: Secret create returned error (may already exist)."
      echo "  Recovery key stored (break-glass); root token is transient (revoked below)."
    else
      echo "  Already initialized: reading transient root token (if config unfinished)..."
      ROOT_TOKEN=$(echo "$SECRET_RESPONSE" \
        | sed -n 's/.*"root_token": *"\([^"]*\)".*/\1/p' \
        | base64 -d 2>/dev/null || true)
    fi

    # ------------------------------------------------------------------ #
    # Phase 3 - auto-unseal (awskms via floci) — no manual unseal loop    #
    # Nodes self-unseal at boot by wrapping/unwrapping the root key with   #
    # the floci KMS key; we just wait for openbao-0 to report sealed:false.#
    # ------------------------------------------------------------------ #
    echo ""
    echo "=== Phase 3: Waiting for awskms auto-unseal ==="

    # Gate: prefer openbao-0 (stable) — Service may have no Ready endpoints briefly after cold start.
    # JSON may be minified or pretty; allow whitespace around ":" (see readinessProbe query params in Helm).
    HEALTH_QS="v1/sys/health?standbycode=200&sealedcode=200&uninitcode=200"
    echo "  Waiting for sealed:false on openbao-0 (max ~10 min)..."
    MAX_WAIT=200
    w=0
    while [ "$w" -lt "$MAX_WAIT" ]; do
      POD0_BODY=$(wget -qO- --timeout=5 "$POD0/$HEALTH_QS" 2>/dev/null || echo "")
      if echo "$POD0_BODY" | grep -qE '"sealed"[[:space:]]*:[[:space:]]*false'; then
        echo "  openbao-0 reports sealed:false — continuing."
        break
      fi
      w=$((w + 1))
      sleep 3
    done
    if [ "$w" -ge "$MAX_WAIT" ]; then
      LAST=$(wget -qO- --timeout=5 "$POD0/$HEALTH_QS" 2>/dev/null || echo "(wget failed)")
      echo "ERROR: Timed out waiting for sealed:false on openbao-0."
      echo "  Last health from openbao-0 (truncated): $(echo "$LAST" | head -c 500)"
      echo "  Check: kubectl exec -n openbao openbao-0 -- bao status"
      echo "  Manual unseal: use key from Secret $INIT_SECRET then re-run Job."
      exit 1
    fi

    echo "  Confirming Service URL ($BAO_ADDR) reports sealed:false (optional, max ~2 min)..."
    w2=0
    while [ "$w2" -lt 40 ]; do
      SVC_BODY=$(wget -qO- --timeout=5 "$BAO_ADDR/$HEALTH_QS" 2>/dev/null || echo "")
      if echo "$SVC_BODY" | grep -qE '"sealed"[[:space:]]*:[[:space:]]*false'; then
        echo "  Service reports sealed:false."
        break
      fi
      w2=$((w2 + 1))
      sleep 3
    done
    if [ "$w2" -ge 40 ]; then
      SVC_LAST=$(wget -qO- --timeout=5 "$BAO_ADDR/$HEALTH_QS" 2>/dev/null || echo "(wget failed)")
      echo "  Warning: Service not yet reporting sealed:false (endpoints may still be registering)."
      echo "  Last health from Service (truncated): $(echo "$SVC_LAST" | head -c 400)"
      echo "  Phase 4 uses $BAO_ADDR — if login fails, check: kubectl get endpoints -n openbao openbao"
    fi

    # ------------------------------------------------------------------ #
    # Phase 4 - configure: login, engines, auth, policies, seed secrets  #
    # ------------------------------------------------------------------ #
    echo ""
    echo "=== Phase 4: Configuring OpenBAO ==="

    echo "  Logging in..."
    # Idempotency gate: the root token is transient (revoked at the end of a successful
    # run). If it no longer authenticates, this cluster was already bootstrapped → done.
    if [ -z "$ROOT_TOKEN" ] || ! bao login "$ROOT_TOKEN" > /dev/null 2>&1; then
      echo "  Root token absent/revoked → OpenBAO already bootstrapped. Nothing to do."
      bao status 2>/dev/null | grep -iE 'seal type|initialized|sealed' || true
      exit 0
    fi

    echo "  Enabling audit logging (stdout -> Vector -> VictoriaLogs)..."
    bao audit enable file file_path=stdout 2>/dev/null || echo "  Audit already enabled."

    echo "  Enabling KV v2 at secret/..."
    bao secrets enable -path=secret -version=2 kv 2>/dev/null || echo "  KV already enabled."

    echo "  Enabling Kubernetes auth method..."
    bao auth enable kubernetes 2>/dev/null || echo "  K8s auth already enabled."

    echo "  Configuring Kubernetes auth..."
    # Do NOT pass token_reviewer_jwt: that pins a 1h projected SA token from this
    # bootstrap pod and OpenBAO cannot refresh it, breaking ALL future logins
    # once it expires. Leaving it unset makes OpenBAO use its own pod's SA token
    # for the TokenReview call, which kubelet auto-rotates.
    bao write auth/kubernetes/config \
      kubernetes_host="https://${KUBERNETES_PORT_443_TCP_ADDR}:443" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      disable_local_ca_jwt=false

    # Write policies via printf to temp file (avoids YAML heredoc indentation conflicts)
    echo "  Writing eso-read policy..."
    printf '%s\n' \
      'path "secret/data/local/databases/*" { capabilities = ["read", "list"] }' \
      'path "secret/metadata/local/databases/*" { capabilities = ["read", "list"] }' \
      'path "secret/data/local/infra/*" { capabilities = ["read", "list"] }' \
      'path "secret/metadata/local/infra/*" { capabilities = ["read", "list"] }' \
      'path "secret/data/local/services/*" { capabilities = ["read", "list"] }' \
      'path "secret/metadata/local/services/*" { capabilities = ["read", "list"] }' \
      'path "secret/data/local/auth/*" { capabilities = ["read", "list"] }' \
      'path "secret/metadata/local/auth/*" { capabilities = ["read", "list"] }' \
      > "$WORK_DIR/eso-read.hcl"
    bao policy write eso-read "$WORK_DIR/eso-read.hcl"

    echo "  Writing devops-admin policy..."
    printf '%s\n' \
      'path "*" { capabilities = ["create", "read", "update", "patch", "delete", "list", "sudo"] }' \
      > "$WORK_DIR/devops-admin.hcl"
    bao policy write devops-admin "$WORK_DIR/devops-admin.hcl"

    echo "  Creating ESO Kubernetes auth role (eso-reader)..."
    bao write auth/kubernetes/role/eso-reader \
      bound_service_account_names=external-secrets \
      bound_service_account_namespaces=external-secrets-system \
      policies=eso-read \
      ttl=1h

    # --- Seed KV secrets ---------------------------------------------- #
    echo ""
    echo "=== Seeding KV secrets ==="

    echo "  Seeding product-db credentials..."
    bao kv put secret/local/databases/product-db/product \
      username="product" \
      password="Pr0duct-R0t8-2026!"

    bao kv put secret/local/databases/product-db/cart \
      username="cart" \
      password="C4rt-R0t8-2026!"

    bao kv put secret/local/databases/product-db/order \
      username="order" \
      password="0rd3r-R0t8-2026!"

    # NOTE: adding a seed here does NOT run it on a live cluster — the bootstrap
    # Job is run-once. Activate with:
    #   kubectl delete job openbao-bootstrap -n openbao
    #   flux reconcile kustomization secrets-local --with-source
    # then force the ExternalSecrets to sync (or wait out refreshInterval: 1h).
    bao kv put secret/local/databases/product-db/payment \
      username="payment" \
      password="P4ym3nt-R0t8-2026!"

    bao kv put secret/local/databases/product-db/checkout \
      username="checkout" \
      password="Ch3ck0ut-R0t8-2026!"

    echo "  Seeding auth-db credentials..."
    bao kv put secret/local/databases/auth-db/auth \
      username="auth" \
      password="4uth-R0t8-2026!"

    echo "  Seeding shared-db credentials..."
    bao kv put secret/local/databases/shared-db/user \
      username="user" \
      password="Us3r-R0t8-2026!"

    bao kv put secret/local/databases/shared-db/notification \
      username="notification" \
      password="N0t1fy-R0t8-2026!"

    bao kv put secret/local/databases/shared-db/shipping \
      username="shipping" \
      password="Sh1pp1ng-R0t8-2026!"

    bao kv put secret/local/databases/shared-db/review \
      username="review" \
      password="R3v1ew-R0t8-2026!"

    echo "  Seeding platform-db temporal credentials..."
    bao kv put secret/local/databases/platform-db/temporal \
      username="temporal" \
      password="T3mp0r4l-R0t8-2026!"

    # Shared HMAC secret: mockpay signs webhooks with it, payment verifies.
    bao kv put secret/local/services/payment/webhook-hmac \
      secret="whsec_K1nd-2026_payment"

    echo "  Seeding RustFS root credentials..."
    # Single source of truth for RustFS root credentials. The RustFS
    # HelmRelease consumes this via Secret/rustfs-credentials (synced by
    # ExternalSecret). Backups reuse the same root creds so existing
    # buckets remain accessible across the local cluster.
    bao kv put secret/local/infra/rustfs/root \
      access_key="rustfs_root" \
      secret_key="Rustfs-R00t-K1nd-2026!"

    echo "  Seeding RustFS S3 backup credentials..."
    bao kv put secret/local/infra/rustfs/backup-cnpg \
      access_key_id="rustfs_root" \
      secret_access_key="Rustfs-R00t-K1nd-2026!"

    echo "  Seeding ClickHouse admin credentials (RFC-0019 Phase B OLAP)..."
    # default user for the OTel logs+traces OLAP store; consumed by the CHI
    # default user, the Collector clickhouse exporter, and the Grafana datasource.
    bao kv put secret/local/infra/clickhouse/admin \
      username="default" \
      password="Cl1ckh0use-K1nd-2026!"

    bao kv put secret/local/test/hello \
      message="Hello from OpenBAO!" \
      timestamp="$(date -Iseconds)"

    echo "  Seeding Cloudflare API token (dev placeholder)..."
    # DEV-ONLY placeholder so the cert-manager/cloudflare-api-token ExternalSecret
    # syncs and does not block secrets-local. Local Kind has no real DNS zone, so
    # the letsencrypt ClusterIssuers' DNS-01 challenge will fail — that's fine
    # locally (Kong uses a self-signed cert-manager cert). Prod: rotate with
    #   bao kv put secret/local/infra/cloudflare/api-token api_token=<real-token>
    bao kv put secret/local/infra/cloudflare/api-token \
      api_token="dev-cloudflare-placeholder"

    echo "  Seeding auth JWT signing key (RFC-0009 Phase 4 edge JWT)..."
    # DEV/bootstrap RS256 keypair — stored as base64 of the PEM and decoded here
    # so the multi-line PEM survives this YAML block scalar. auth signs access
    # tokens with private_key (via ESO -> JWT_PRIVATE_KEY_PEM); Kong's jwt
    # consumer verifies with public_key (via ESO). Rotate out of the bootstrap
    # into a KMS-backed secret for a real cluster.
    JWT_PRIV_B64=""
    JWT_PUB_B64=""
    bao kv put secret/local/auth/jwt-signing \
      private_key="$(printf %s "$JWT_PRIV_B64" | base64 -d)" \
      public_key="$(printf %s "$JWT_PUB_B64" | base64 -d)"

    # ------------------------------------------------------------------ #
    # Revoke the root token (RFC-0008 / ADR-024). Must be LAST — after     #
    # this the script can no longer authenticate. Day-2 admin ops use the  #
    # break-glass recovery key via `bao operator generate-root`.           #
    # ------------------------------------------------------------------ #
    echo ""
    echo "=== Revoking root token ==="
    bao token revoke -self > /dev/null 2>&1 && \
      echo "  Root token revoked (the copy in $INIT_SECRET is now inert)." || \
      echo "  Warning: root token revoke returned an error."

    echo ""
    echo "============================================"
    echo " Bootstrap Complete!"
    echo "============================================"
    echo ""
    echo "  Engine   : KV v2 at secret/"
    echo "  Auth     : kubernetes (role: eso-reader)"
    echo "  Policy   : eso-read, devops-admin"
    echo "  Store    : ClusterSecretStore/openbao"
    echo "  Unseal   : awskms auto-unseal via floci (alias/openbao-unseal)"
    echo "  Root     : revoked; break-glass = recovery_key in $INIT_SECRET"
    echo ""
    echo "  For EKS/GKE: point seal awskms at a real cloud KMS (swap endpoint)."
    echo ""
    bao status
