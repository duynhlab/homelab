# floci-kms-init — create the KMS key + alias/openbao-unseal in floci BEFORE OpenBAO
# starts (RFC-0008 / ADR-024). OpenBAO's `seal "awskms"` resolves this alias at server
# startup (DescribeKey), so it must exist independently of OpenBAO — otherwise a deadlock:
# OpenBAO waits for the alias while openbao-bootstrap waits for OpenBAO. This Job depends
# only on floci. Idempotent (skips if the alias already exists). floci is zero-auth, so
# unsigned AWS-JSON over wget is accepted.
apiVersion: batch/v1
kind: Job
metadata:
  name: floci-kms-init
  namespace: openbao
  labels:
    app.kubernetes.io/name: floci-kms-init
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci-kms-init
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kms-init
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              set -e
              FLOCI="http://floci.openbao.svc.cluster.local:4566"
              kms() { wget -qO- --timeout=10 \
                --header="X-Amz-Target: TrentService.$1" \
                --header="Content-Type: application/x-amz-json-1.1" \
                --post-data="$2" "$FLOCI/" 2>/dev/null; }
              echo "Waiting for floci + ensuring alias/openbao-unseal..."
              i=0
              until kms DescribeKey '{"KeyId":"alias/openbao-unseal"}' | grep -q '"KeyId"'; do
                KEYID=$(kms CreateKey '{}' | sed -n 's/.*"KeyId"[": ]*"\([^"]*\)".*/\1/p' | head -1)
                if [ -n "$KEYID" ]; then
                  kms CreateAlias "{\"AliasName\":\"alias/openbao-unseal\",\"TargetKeyId\":\"$KEYID\"}" >/dev/null 2>&1
                  echo "Created KMS key $KEYID + alias/openbao-unseal."
                  break
                fi
                i=$((i + 1)); [ "$i" -ge 40 ] && { echo "ERROR: floci not ready after 120s"; exit 1; }
                echo "  floci not ready, retry 3s..."; sleep 3
              done
              echo "alias/openbao-unseal is present."
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
