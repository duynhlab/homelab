# OpenBAO Bootstrap Job
# Runs after OpenBAO pods start to:
#   1. Initialize the Raft cluster (first run)
#   2. Unseal all 3 nodes
#   3. Configure KV engine, Kubernetes auth, ESO policy, seed secrets
#
# Idempotent: re-run safely. Keys stored in openbao-init-keys Secret.
# Re-run after script/config change: kubectl delete job openbao-bootstrap -n openbao
# then: flux reconcile kustomization secrets-local -n flux-system --with-source
# (Do NOT use kustomize.toolkit.fluxcd.io/force on Job — it recreates the Job every
# Flux reconcile and races with OpenBAO unseal / ESO.)
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-bootstrap
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-bootstrap
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: openbao-bootstrap
      restartPolicy: OnFailure

      # Init container: wait for openbao service port to be open
      initContainers:
        - name: wait-for-openbao
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for OpenBAO service on port 8200..."
              until nc -z openbao.openbao.svc.cluster.local 8200; do
                echo "  Not ready, retrying in 5s..."
                sleep 5
              done
              echo "OpenBAO service port is open!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: bootstrap
          # Align with HelmRelease server image (openbao chart 0.6.x → OpenBAO 2.5.x)
          image: openbao/openbao:2.5.3
          command:
            - sh
            - /scripts/bootstrap.sh
          env:
            - name: HOME
              value: /home/openbao
          volumeMounts:
            - name: home
              mountPath: /home/openbao
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            capabilities:
              drop:
                - ALL

      volumes:
        - name: home
          emptyDir: {}
        - name: scripts
          configMap:
            name: openbao-bootstrap-script
            defaultMode: 0755
