apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# OpenBAO bootstrap resources:
# RBAC (SA, ClusterRoleBinding, Role, RoleBinding) must be applied before Job
resources:
  - serviceaccount.yaml
  - clusterrolebinding.yaml
  - role.yaml
  - rolebinding.yaml
  - floci-kms-init.yaml  # create floci KMS key+alias before OpenBAO configures its seal
  - configmap.yaml
  - job.yaml
