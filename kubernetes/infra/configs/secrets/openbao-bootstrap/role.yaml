# Role: manage init-keys Secret and read pods in openbao namespace
# - secrets: create/get/update openbao-init-keys (stores unseal key + root token)
# - pods: get/list (wait for pod readiness before unsealing)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-bootstrap
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openbao-init-keys"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
