# RoleBinding: bind openbao-bootstrap SA to openbao-bootstrap Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-bootstrap
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-bootstrap
subjects:
  - kind: ServiceAccount
    name: openbao-bootstrap
    namespace: openbao
