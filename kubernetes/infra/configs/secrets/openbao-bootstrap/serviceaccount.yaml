# ServiceAccount for OpenBAO bootstrap Job
# Needs permissions to:
# 1. Call TokenReview API (system:auth-delegator) — for configuring K8s auth method
# 2. Read/Write Secrets in openbao namespace — for storing init keys (unseal key + root token)
# 3. Get pods in openbao namespace — for unseal readiness checks
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-bootstrap
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-bootstrap
    app.kubernetes.io/component: bootstrap
