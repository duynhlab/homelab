# OpenBAO Unsealer — periodic idempotent unseal for Kind/local clusters.
#
# Why: bootstrap Job runs once. After pod restarts (OOM, eviction, node
# reboot, Helm upgrade) OpenBAO re-seals because we use Shamir (no auto-unseal
# transit/KMS provider on local). This CronJob detects sealed pods every
# minute and unseals them using the unseal_key stored in the
# openbao-init-keys Secret (created by the bootstrap Job).
#
# Production: replace with transit-seal or cloud KMS auto-unseal — do NOT
# ship Shamir keys in a K8s Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-unsealer-script
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-unsealer
    app.kubernetes.io/component: bootstrap
data:
  unseal.sh: |
    #!/bin/sh
    set -e

    K8S_API="https://kubernetes.default.svc"
    SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    NAMESPACE="openbao"
    INIT_SECRET="openbao-init-keys"

    SECRET_RESPONSE=$(wget -qO- --timeout=10 \
      --header="Authorization: Bearer $SA_TOKEN" \
      --no-check-certificate \
      "$K8S_API/api/v1/namespaces/$NAMESPACE/secrets/$INIT_SECRET" 2>/dev/null || echo "NOT_FOUND")

    if echo "$SECRET_RESPONSE" | grep -q '"NotFound"\|NOT_FOUND'; then
      echo "Init-keys Secret not found — cluster not bootstrapped yet, exiting cleanly."
      exit 0
    fi

    UNSEAL_KEY=$(echo "$SECRET_RESPONSE" \
      | sed -n 's/.*"unseal_key": *"\([^"]*\)".*/\1/p' \
      | base64 -d 2>/dev/null || true)

    if [ -z "$UNSEAL_KEY" ]; then
      echo "ERROR: Could not read unseal_key from Secret $INIT_SECRET."
      exit 1
    fi

    for i in 0 1 2; do
      POD_ADDR="http://openbao-$i.openbao-internal.openbao.svc.cluster.local:8200"
      # Same query string as readinessProbe so 503-on-sealed still returns a JSON body.
      HEALTH=$(wget -qO- --timeout=5 \
        "$POD_ADDR/v1/sys/health?standbycode=200&sealedcode=200&uninitcode=200" 2>/dev/null || echo "")
      if [ -z "$HEALTH" ]; then
        echo "  openbao-$i unreachable, skipping."
        continue
      fi
      if echo "$HEALTH" | grep -qE '"sealed"[[:space:]]*:[[:space:]]*true'; then
        echo "  openbao-$i sealed — unsealing..."
        BAO_ADDR="$POD_ADDR" bao operator unseal "$UNSEAL_KEY" > /dev/null 2>&1 \
          && echo "  openbao-$i unsealed." \
          || echo "  WARN: unseal failed for openbao-$i"
      else
        echo "  openbao-$i already unsealed."
      fi
    done
