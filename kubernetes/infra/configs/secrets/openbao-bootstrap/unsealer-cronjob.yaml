# OpenBAO Unsealer CronJob — runs every minute.
# Re-unseals any sealed pod using key from openbao-init-keys Secret.
# See unsealer-configmap.yaml for the script and rationale.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openbao-unsealer
  namespace: openbao
  labels:
    app.kubernetes.io/name: openbao-unsealer
    app.kubernetes.io/component: bootstrap
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 60
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: openbao-unsealer
            app.kubernetes.io/component: bootstrap
        spec:
          serviceAccountName: openbao-bootstrap
          restartPolicy: OnFailure
          containers:
            - name: unsealer
              image: openbao/openbao:2.5.3
              command:
                - sh
                - /scripts/unseal.sh
              env:
                - name: HOME
                  value: /home/openbao
              volumeMounts:
                - name: home
                  mountPath: /home/openbao
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 100
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: home
              emptyDir: {}
            - name: scripts
              configMap:
                name: openbao-unsealer-script
                defaultMode: 0755
