# Payment <-> mockpay webhook HMAC (RFC-0010): mockpay signs each webhook with
# this shared secret; payment verifies the signature over the raw body. Both
# workloads run in the payment namespace and read the same synced Secret, so one
# ExternalSecret serves the pair (MOCKPAY_WEBHOOK_SECRET via secretKeyRef).
# OpenBAO path: secret/data/local/payment/webhook-hmac (seeded by openbao-bootstrap).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-webhook-hmac
  namespace: payment
  labels:
    app.kubernetes.io/name: payment-webhook-hmac
    app.kubernetes.io/component: payment
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: payment-webhook-hmac
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret
      remoteRef:
        key: secret/data/local/payment/webhook-hmac
        property: secret
