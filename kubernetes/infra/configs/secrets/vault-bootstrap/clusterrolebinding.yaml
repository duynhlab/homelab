# ClusterRoleBinding for Vault bootstrap Job
# Grants system:auth-delegator role for TokenReview API access
# Required for configuring Vault Kubernetes auth method
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-bootstrap-auth-delegator
  labels:
    app.kubernetes.io/name: vault-bootstrap
    app.kubernetes.io/component: bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: vault
