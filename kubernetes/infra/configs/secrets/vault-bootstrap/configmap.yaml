# Vault bootstrap script ConfigMap
# Contains idempotent script to configure Vault Kubernetes auth
# Runs on each Vault restart (dev mode loses state)
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-script
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-bootstrap
    app.kubernetes.io/component: bootstrap
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    echo "=== Vault Bootstrap Script ==="
    echo "Configuring Kubernetes auth for External Secrets Operator"

    # Wait for Vault to be ready
    echo "Waiting for Vault to be ready..."
    until vault status > /dev/null 2>&1; do
      echo "Vault not ready, waiting..."
      sleep 2
    done
    echo "Vault is ready!"

    # Login with root token (dev mode)
    echo "Logging in with root token..."
    vault login root

    # Enable audit logging to stdout (collected by Vector -> Loki)
    echo "Enabling audit logging..."
    vault audit enable file file_path=stdout 2>/dev/null || echo "Audit device already enabled"

    # Enable KV v2 secrets engine at secret/ (idempotent)
    echo "Enabling KV v2 secrets engine..."
    vault secrets enable -path=secret -version=2 kv 2>/dev/null || echo "KV engine already enabled"

    # Enable Kubernetes auth method (idempotent)
    echo "Enabling Kubernetes auth method..."
    vault auth enable kubernetes 2>/dev/null || echo "Kubernetes auth already enabled"

    # Configure Kubernetes auth method
    # Uses the in-cluster service account token and Kubernetes API
    echo "Configuring Kubernetes auth..."
    vault write auth/kubernetes/config \
      token_reviewer_jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
      kubernetes_host="https://$KUBERNETES_PORT_443_TCP_ADDR:443" \
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
      disable_local_ca_jwt=true

    # Create policy for External Secrets Operator
    # Allows read access to all secrets under secret/data/*
    echo "Creating ESO policy..."
    vault policy write external-secrets-read - <<EOF
    # Policy for External Secrets Operator (ESO)
    # Convention: secret/{env}/{category}/{service}/{resource}
    #
    # Dev mode: wildcard for simplicity
    path "secret/data/*" {
      capabilities = ["read", "list"]
    }
    path "secret/metadata/*" {
      capabilities = ["read", "list"]
    }
    #
    # Production: replace wildcard above with per-category policies:
    #
    # path "secret/data/+/databases/*" {
    #   capabilities = ["read", "list"]
    # }
    # path "secret/data/+/services/*" {
    #   capabilities = ["read", "list"]
    # }
    # path "secret/data/+/infra/*" {
    #   capabilities = ["read", "list"]
    # }
    # path "secret/metadata/+/databases/*" {
    #   capabilities = ["read", "list"]
    # }
    # path "secret/metadata/+/services/*" {
    #   capabilities = ["read", "list"]
    # }
    # path "secret/metadata/+/infra/*" {
    #   capabilities = ["read", "list"]
    # }
    EOF

    # Create Kubernetes auth role for ESO
    # Binds to external-secrets ServiceAccount in external-secrets-system namespace
    echo "Creating ESO Kubernetes auth role..."
    vault write auth/kubernetes/role/external-secrets \
      bound_service_account_names=external-secrets \
      bound_service_account_namespaces=external-secrets-system \
      policies=external-secrets-read \
      ttl=1h

    # Path convention: secret/{environment}/{category}/{service}/{resource}
    # See docs/secrets/secrets-management.md for full naming convention.

    # Write a test secret for verification (optional)
    echo "Writing test secret..."
    vault kv put secret/local/test/hello message="Hello from Vault!" timestamp="$(date -Iseconds)"

    # Seed database credentials
    echo ""
    echo "=== Seeding Database Credentials (databases/) ==="

    echo "Seeding product-db credentials..."
    vault kv put secret/local/databases/product/credentials \
      username="product" \
      password="postgres"

    echo "Seeding transaction-shared-db credentials for cart..."
    vault kv put secret/local/databases/cart/credentials \
      username="cart" \
      password="postgres"

    echo "Seeding transaction-shared-db credentials for order..."
    vault kv put secret/local/databases/order/credentials \
      username="cart" \
      password="postgres"

    # Seed pooler credentials
    # Note: PgDog/PgCat charts don't currently support secretRef
    echo ""
    echo "=== Seeding Pooler Credentials (databases/) ==="

    echo "Seeding pgdog-product credentials..."
    vault kv put secret/local/databases/pgdog-product/credentials \
      username="product" \
      password="postgres"

    echo "Seeding pgcat-transaction credentials..."
    vault kv put secret/local/databases/pgcat-transaction/credentials \
      admin_username="admin" \
      admin_password="admin" \
      db_username="cart" \
      db_password="postgres"

    # Seed infrastructure credentials
    echo ""
    echo "=== Seeding Infrastructure Credentials (infra/) ==="

    echo "Seeding RustFS S3 backup credentials (per-operator service accounts)..."
    vault kv put secret/local/infra/rustfs/backup-zalando \
      access_key_id="backup-zalando" \
      secret_access_key="backup-zalando-secret"
    vault kv put secret/local/infra/rustfs/backup-cnpg \
      access_key_id="backup-cnpg" \
      secret_access_key="backup-cnpg-secret"

    echo ""
    echo "=== Bootstrap Complete ==="
    echo "Vault Kubernetes auth configured successfully!"
    echo ""
    echo "ClusterSecretStore can now authenticate using:"
    echo "  - Role: external-secrets"
    echo "  - ServiceAccount: external-secrets"
    echo "  - Namespace: external-secrets-system"
    echo ""
    echo "Test secret available at: secret/local/test/hello"
