# Vault Bootstrap Job
# Configures Vault Kubernetes auth method for ESO
#
# This Job runs after Vault is deployed and configures:
# 1. KV v2 secrets engine
# 2. Kubernetes auth method
# 3. Policy for ESO read access
# 4. Role bound to ESO ServiceAccount
#
# The Job is idempotent and can be re-run safely.
# For dev mode, this needs to run on each Vault restart.
#
# To re-run bootstrap (e.g., after Vault restart):
#   kubectl delete job vault-bootstrap -n vault
#   kubectl apply -f job.yaml
# Or use Flux to reconcile.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: vault
  labels:
    app.kubernetes.io/name: vault-bootstrap
    app.kubernetes.io/component: bootstrap
  annotations:
    # Allow Flux to replace the Job on each reconcile
    # This ensures bootstrap runs after Vault restarts
    kustomize.toolkit.fluxcd.io/force: "enabled"
spec:
  # Don't retry on failure (manual intervention needed)
  backoffLimit: 3
  # Clean up completed Job after 1 hour
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-bootstrap
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: vault-bootstrap
      restartPolicy: OnFailure

      # Init container waits for Vault pod to be ready
      initContainers:
        - name: wait-for-vault
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vault service to be available..."
              until nc -z vault.vault.svc.cluster.local 8200; do
                echo "Vault not reachable, waiting..."
                sleep 5
              done
              echo "Vault service is reachable!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: bootstrap
          image: hashicorp/vault:1.21.2
          command:
            - sh
            - /scripts/bootstrap.sh
          env:
            - name: HOME
              value: /home/vault
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              value: "root"
          volumeMounts:
            - name: home
              mountPath: /home/vault
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            capabilities:
              drop:
                - ALL

      volumes:
        - name: home
          emptyDir: {}
        - name: scripts
          configMap:
            name: vault-bootstrap-script
            defaultMode: 0755
