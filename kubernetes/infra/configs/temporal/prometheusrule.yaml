# Temporal server alerts. Scraped via the operator-managed ServiceMonitor
# (spec.metrics.prometheus.scrapeConfig.serviceMonitor in cluster.yaml).
#
# The error-rate metric names (service_requests/service_errors,
# persistence_requests/persistence_error_with_type) are the Temporal server's documented
# Prometheus metrics, taken from the official dashboards
# (github.com/temporalio/dashboards, server/server-general.json). Ratios use
# clamp_min on the denominator so they never divide by zero / false-fire when
# idle. Final population check is on `make up` (Kind, operator-scraped).
#
# Worker-side (SDK) workflow/activity RED metrics are emitted by pkg/temporalx
# (OTel MetricsHandler) and arrive via OTLP push through the otel-collector
# (the order-worker PodMonitor was retired at RFC-0014 P3); the
# `temporal-worker` group below alerts on them. A Grafana dashboard adapted
# from the official server-general.json is the remaining follow-up — see
# docs/api/temporal-order-fulfillment.md.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: temporal
      interval: 30s
      rules:
        - alert: TemporalServerDown
          expr: up{job=~".*temporal.*"} == 0
          for: 5m
          labels:
            severity: critical
            category: platform
          annotations:
            summary: "Temporal server target down ({{ $labels.instance }})"
            description: "Temporal server target {{ $labels.instance }} (job {{ $labels.job }}) has been down for >5m — durable workflow execution is impaired."

        - alert: TemporalServiceErrorRateHigh
          expr: |
            sum(rate(service_errors[5m])) / clamp_min(sum(rate(service_requests[5m])), 1) > 0.05
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal service error rate high (>5%)"
            description: "Temporal frontend/service error ratio has exceeded 5% for >10m — RPCs into the cluster are failing; check the history/matching/frontend services and persistence."

        - alert: TemporalPersistenceErrorRateHigh
          expr: |
            sum(rate(persistence_error_with_type[5m])) / clamp_min(sum(rate(persistence_requests[5m])), 1) > 0.02
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal persistence error rate high (>2%)"
            description: "Temporal persistence error ratio has exceeded 2% for >10m — the temporal-db (CNPG) may be degraded; durable state writes are at risk."

    # Worker-side (SDK) RED metrics from the order-fulfillment worker, arriving
    # via OTLP push through the otel-collector (the order-worker PodMonitor was
    # retired at RFC-0014 P3). Names are the Temporal Go SDK OTel metrics
    # (pkg/temporalx) — note the SDK exports "counters" as gauges (no _total), so
    # rate() is applied to the cumulative gauges. Denominators use clamp_min so the
    # ratios never divide by zero / false-fire when the worker is idle.
    - name: temporal-worker
      interval: 30s
      rules:
        - alert: TemporalWorkflowFailureRateHigh
          expr: |
            sum(rate(temporal_workflow_failed[10m]))
              / clamp_min(sum(rate(temporal_workflow_completed[10m])) + sum(rate(temporal_workflow_failed[10m])), 1) > 0.05
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal workflow failure rate high (>5%)"
            description: "More than 5% of workflows reached a failed terminal state over 10m — the order-fulfillment saga is compensating/rolling back; check the worker logs and the activities it calls."

        - alert: TemporalActivityFailureRateHigh
          expr: |
            sum(rate(temporal_activity_execution_failed[10m]))
              / clamp_min(sum(rate(temporal_activity_execution_latency_seconds_count[10m])), 1) > 0.05
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal activity failure rate high (>5%)"
            description: "More than 5% of activity executions failed over 10m — a downstream call (product/shipping/notification/cart) is erroring; retries are firing and may exhaust."

        - alert: TemporalWorkerRequestErrorRateHigh
          expr: |
            sum(rate(temporal_request_failure[5m])) / clamp_min(sum(rate(temporal_request[5m])), 1) > 0.05
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal worker→server request error rate high (>5%)"
            description: "The worker's RPCs to the Temporal frontend are failing (>5% over 10m) — check connectivity to temporal-frontend and the server's health."

        - alert: TemporalWorkerTaskSlotsExhausted
          expr: |
            min(temporal_worker_task_slots_available) == 0
          for: 10m
          labels:
            severity: warning
            category: platform
          annotations:
            summary: "Temporal worker task slots exhausted"
            description: "A worker task-slot pool has been at zero available slots for >10m — the worker is saturated and cannot accept new workflow/activity tasks; consider raising concurrency or replicas."
