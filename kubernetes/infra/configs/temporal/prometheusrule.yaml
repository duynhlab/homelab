# Temporal server alerts. Scraped via the operator-managed ServiceMonitor
# (spec.metrics.prometheus.scrapeConfig.serviceMonitor in cluster.yaml).
#
# Kept to a target-down signal for now — richer alerts (persistence errors,
# task-queue backlog, workflow-failure rate) land in Phase 8 once the exact
# server metric names are confirmed from a live scrape, to avoid rules that
# reference metrics that never exist.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-alerts
  namespace: monitoring
  labels:
    prometheus: victoria-metrics
    role: alert-rules
spec:
  groups:
    - name: temporal
      interval: 30s
      rules:
        - alert: TemporalServerDown
          expr: up{job=~".*temporal.*"} == 0
          for: 5m
          labels:
            severity: critical
            category: platform
          annotations:
            summary: "Temporal server target down ({{ $labels.instance }})"
            description: "Temporal server target {{ $labels.instance }} (job {{ $labels.job }}) has been down for >5m — durable workflow execution is impaired."
