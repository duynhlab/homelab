# Valkey Single Node HelmRelease
# Chart: valkey/valkey (official)
# Docs: https://valkey.io/
#
# Valkey is a Redis-compatible, high-performance key/value datastore
# Used for caching Product service read-heavy endpoints
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: cache-system
spec:
  chart:
    spec:
      chart: valkey
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
      version: '0.9.3'
  interval: 10m
  timeout: 10m
  releaseName: valkey
  targetNamespace: cache-system
  values:
    # Service configuration
    service:
      type: ClusterIP
      port: 6379
    
    # Resource limits
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 128Mi
    
    # Authentication disabled for local dev (enable in production)
    auth:
      enabled: false
    
    # Persistence disabled for local dev (enable in production)
    dataStorage:
      enabled: false
    
    # Valkey configuration (valkey.conf content)
    # Set eviction policy to allkeys-lru for cache use case
    # This evicts least recently used keys when memory is full
    valkeyConfig: |
      maxmemory-policy allkeys-lru
    
    # Metrics for Prometheus scraping
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
