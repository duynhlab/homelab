# cert-manager — ACME / Let's Encrypt
# Chart: jetstack/cert-manager — https://cert-manager.io/docs/installation/helm/
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: "v1.20.2"
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    installCRDs: true
    global:
      leaderElection:
        namespace: cert-manager
    replicaCount: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    webhook:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    cainjector:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
    # Metrics — chart-native ServiceMonitor (controller/webhook/cainjector expose
    # /metrics on :9402). Replaces a hand-rolled ServiceMonitor for consistency
    # with the other charts (kong, kyverno, valkey, pyroscope). The VictoriaMetrics
    # operator converts it to a VMServiceScrape; VMAgent selectAllByDefault picks
    # it up. cert-manager also ships a podmonitor toggle — servicemonitor matches
    # the :9402 Service topology already verified in-cluster.
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        interval: 60s
