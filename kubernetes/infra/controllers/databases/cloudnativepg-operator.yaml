apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cloudnative-pg
spec:
  chart:
    spec:
      chart: cloudnative-pg
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      version: '>=0.22.0'
  interval: 10m
  releaseName: cloudnative-pg
  targetNamespace: cloudnative-pg
  timeout: 10m
  values:
    config:
      create: true
      data: {}
      name: cnpg-controller-manager-config
      secret: false
      clusterWide: true
      maxConcurrentReconciles: 10
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
      runAsGroup: 10001
      runAsUser: 10001
      seccompProfile:
        type: RuntimeDefault
    crds:
      create: true
    image:
      pullPolicy: IfNotPresent
      repository: ghcr.io/cloudnative-pg/cloudnative-pg
      tag: 1.28.0
    monitoring:
      podMonitorEnabled: false
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: 100m
        memory: 100Mi
      requests:
        cpu: 100m
        memory: 100Mi
    webhook:
      livenessProbe:
        initialDelaySeconds: 3
      mutating:
        create: true
        failurePolicy: Fail
      port: 9443
      readinessProbe:
        initialDelaySeconds: 3
      startupProbe:
        failureThreshold: 6
        periodSeconds: 5
      validating:
        create: true
        failurePolicy: Fail
