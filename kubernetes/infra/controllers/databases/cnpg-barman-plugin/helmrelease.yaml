# Barman Cloud Plugin for CloudNativePG (official Helm chart).
# Replaces the vendored upstream manifest. Chart hosts CRD + RBAC + controller
# Deployment + cert-manager Issuer/Certificates. Applied via its own Flux
# Kustomization (clusters/local/cnpg-barman-plugin.yaml) so it can depend on
# cert-manager before the CNPG clusters reference ObjectStore CRs.
#
# Names are pinned (fullnameOverride + service.name) so the rendered Service keeps
# label cnpg.io/pluginName: barman-cloud.cloudnative-pg.io and TLS secrets
# barman-cloud-{server,client}-tls — existing Clusters/ScheduledBackups that
# reference the plugin by name keep working without changes.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plugin-barman-cloud
  namespace: cloudnative-pg
spec:
  releaseName: barman-cloud
  targetNamespace: cloudnative-pg
  storageNamespace: cloudnative-pg
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.7.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
      interval: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: barman-cloud
    service:
      name: barman-cloud
      port: 9090
    # CRD ships as a normal chart template (not Helm's special crds/ dir) and
    # carries helm.sh/resource-policy: keep — it upgrades in place and survives
    # uninstall without cascade-deleting in-use ObjectStore CRs. (Flux
    # install/upgrade.crds policy only governs the special dir, so it's omitted.)
    crds:
      create: true
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
