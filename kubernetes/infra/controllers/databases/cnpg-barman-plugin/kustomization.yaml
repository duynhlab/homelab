apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Barman Cloud Plugin for CloudNativePG, installed via the official Helm chart.
# Applied via its own Flux Kustomization (clusters/local/cnpg-barman-plugin.yaml)
# so it can depend on cert-manager before the CNPG clusters reference ObjectStore CRs.
resources:
  - helmrelease.yaml
