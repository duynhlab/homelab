apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Barman Cloud Plugin for CloudNativePG (CRD + RBAC + controller Deployment +
# cert-manager Certificate/Issuer). Applied via its own Flux Kustomization
# (clusters/local/cnpg-barman-plugin.yaml) so it can depend on cert-manager
# before the CNPG clusters reference ObjectStore CRs.
resources:
  - barman-cloud-plugin.yaml
