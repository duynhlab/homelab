apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-operator
  namespace: postgres-operator
spec:
  chart:
    spec:
      chart: postgres-operator
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: postgres-operator
        namespace: flux-system
      version: v1.15.1
  interval: 10m
  releaseName: postgres-operator
  targetNamespace: postgres-operator
  timeout: 10m
  values:
    configAwsOrGcp:
      aws_region: us-east-1
      wal_s3_bucket: pg-backups
    configKubernetes:
      cluster_domain: cluster.local
      enable_cross_namespace_secret: true
      # WAL-G backup to RustFS - ConfigMap has non-sensitive config, Secret has credentials per cluster
      pod_environment_configmap: postgres-operator/zalando-walg-config
      pod_environment_secret: pg-backup-rustfs-credentials
    configConnectionPooler:
      connection_pooler_default_cpu_limit: "1"
      connection_pooler_default_cpu_request: 500m
      connection_pooler_default_memory_limit: 100Mi
      connection_pooler_default_memory_request: 100Mi
      connection_pooler_image: registry.opensource.zalan.do/acid/pgbouncer:master-32
      connection_pooler_max_db_connections: 60
      connection_pooler_mode: transaction
      connection_pooler_number_of_instances: 2
      connection_pooler_schema: pooler
      connection_pooler_user: pooler
    configGeneral:
      docker_image: ghcr.io/zalando/spilo-16:3.3-p2
      enable_teams_api: false
      workers: 8
    image:
      pullPolicy: IfNotPresent
      registry: ghcr.io
      repository: zalando/postgres-operator
      tag: v1.15.1
