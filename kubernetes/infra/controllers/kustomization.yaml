apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml # Apply namespaces FIRST (must live under controllers/ for default Kustomize load rules)
  - metrics/
  - logging/
  - tracing/
  - profiling/
  - databases/
  # caching/ — moved to its own Kustomization (caching-local) so it can dependsOn monitoring-local (ServiceMonitor CRD)
  # storage/ — moved to its own Kustomization (storage-local) so it can dependsOn secrets-local (ESO Secret rustfs-credentials)
  - secrets/
  - cert-manager/
  # kong/ — moved to its own Kustomization (kong-local) so it can dependsOn cert-manager-local
  - kyverno/
