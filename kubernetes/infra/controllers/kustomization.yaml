apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml # Apply namespaces FIRST (must live under controllers/ for default Kustomize load rules)
  - metrics/
  - logging/
  - databases/
  # tracing/ — moved to its own Kustomization (tracing-local) so it can dependsOn secrets-local + storage-local (Tempo needs tempo-rustfs-credentials ESO Secret + RustFS). Kept here would deadlock controllers-local (wait:true) ↔ secrets-local. See debugs.md Bug 6.
  # profiling/ — moved to its own Kustomization (profiling-local) for the same reason (Pyroscope needs pyroscope-rustfs-credentials + RustFS).
  # caching/ — moved to its own Kustomization (caching-local) so it can dependsOn monitoring-local (ServiceMonitor CRD)
  # storage/ — moved to its own Kustomization (storage-local) so it can dependsOn secrets-local (ESO Secret rustfs-credentials)
  - secrets/
  - cert-manager/
  - temporal/ # Temporal operator (TemporalCluster/TemporalNamespace CRDs + controller; webhook certs via cert-manager)
  # kong/ — moved to its own Kustomization (kong-local) so it can dependsOn cert-manager-local
  - kyverno/
