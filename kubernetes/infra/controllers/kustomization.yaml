apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml # Apply namespaces FIRST (must live under controllers/ for default Kustomize load rules)
  - metrics/
  - logging/
  - tracing/
  - profiling/
  - databases/
  - caching/
  - storage/
  - secrets/
  - cert-manager/
  # kong/ — moved to its own Kustomization (kong-local) so it can dependsOn cert-manager-local
  - kyverno/
