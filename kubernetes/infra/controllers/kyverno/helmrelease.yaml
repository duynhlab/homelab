# Kyverno — Kubernetes-native policy engine
# Chart: https://github.com/kyverno/kyverno/tree/main/charts/kyverno
#
# Adoption strategy: see docs/platform/kyverno.md
# - failurePolicy=Ignore by default during rollout (Tier 0/1 audit window)
# - background scan ON (catch resources applied before Kyverno was installed)
# - admission controller exempts flux-system to prevent reconciliation loops
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: kyverno
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      version: "3.3.4"
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Single-replica admission for KinD; bump to 3 for production HA
    admissionController:
      replicas: 1
      rbac:
        clusterRole:
          extraResources:
            # Allow Kyverno to read images from in-cluster registries (verifyImages)
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["get", "list", "watch"]
      # Webhook tuning — never block kube-system / flux-system to prevent
      # platform-wide outages during webhook unavailability.
      initContainer:
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
      container:
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }
    backgroundController:
      replicas: 1
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 300m, memory: 256Mi }
    cleanupController:
      replicas: 1
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 200m, memory: 128Mi }
    reportsController:
      replicas: 1
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits: { cpu: 300m, memory: 256Mi }
    # Exclude critical platform namespaces from admission webhooks.
    # Without this, a Kyverno outage can break Flux reconciliation,
    # cert-manager webhooks, or operator startup.
    config:
      excludeKyvernoNamespace: true
      resourceFilters:
        - "[Event,*,*]"
        - "[Node,*,*]"
        - "[Node/*,*,*]"
        - "[APIService,*,*]"
        - "[APIService/*,*,*]"
        - "[TokenReview,*,*]"
        - "[SubjectAccessReview,*,*]"
        - "[SelfSubjectAccessReview,*,*]"
        - "[Binding,*,*]"
        - "[Pod/binding,*,*]"
        - "[ReplicaSet,*,*]"
        - "[ReplicaSet/*,*,*]"
        - "[EphemeralReport,*,*]"
        - "[ClusterEphemeralReport,*,*]"
        # Platform namespaces — admission excluded (background scan still runs)
        - "[*,kube-system,*]"
        - "[*,kube-public,*]"
        - "[*,kube-node-lease,*]"
        - "[*,flux-system,*]"
        - "[*,kyverno,*]"
        - "[*,cert-manager,*]"
        - "[*,external-secrets-system,*]"
    # Observability — VMAgent scrapes the ServiceMonitor automatically
    # because PrometheusOperator CRDs are installed via VictoriaMetrics auto-conversion.
    metricsService:
      create: true
    serviceMonitor:
      enabled: true
      namespace: kyverno
