# VictoriaLogs MCP Server — AI-assisted log querying
# Chart: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-mcp
# Docs: https://docs.victoriametrics.com/helm/victoria-logs-mcp/
#
# Exposes VictoriaLogs APIs to AI assistants via MCP protocol.
# Capabilities: LogsQL queries, stream/field exploration,
# instance parameters, log statistics as metrics.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-mcp
  namespace: monitoring
spec:
  interval: 30m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: victoria-logs-mcp-oci
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    nameOverride: vlm

    mcp:
      mode: http
      heartbeatInterval: 30s
      disable:
        tools: []
        resources: false

    vl:
      entrypoint: "http://vlsingle-victoria-logs.monitoring.svc:9428"

    service:
      type: ClusterIP
      port: 8080

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi

    scrape:
      enabled: true
