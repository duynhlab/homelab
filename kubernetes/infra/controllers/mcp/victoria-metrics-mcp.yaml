# VictoriaMetrics MCP Server — AI-assisted metrics querying
# Chart: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-mcp
# Docs: https://docs.victoriametrics.com/helm/victoria-metrics-mcp/
#
# Exposes VictoriaMetrics APIs to AI assistants via MCP protocol.
# Capabilities: MetricsQL queries, cardinality analysis, alerting rules,
# relabeling debug, query tracing/explanation.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-mcp
  namespace: monitoring
spec:
  interval: 30m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-mcp-oci
    namespace: flux-system
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 3
  values:
    nameOverride: vmm

    mcp:
      mode: http
      heartbeatInterval: 30s
      disable:
        tools: []
        resources: false

    vm:
      type: single
      entrypoint: "http://vmsingle-victoria-metrics.monitoring.svc:8428"

    service:
      type: ClusterIP
      port: 8080

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    livenessProbe:
      httpGet:
        path: /health/liveness
        port: http
        scheme: HTTP
      initialDelaySeconds: 30
      timeoutSeconds: 5
      periodSeconds: 30
      failureThreshold: 10

    readinessProbe:
      httpGet:
        path: /health/readiness
        port: http
        scheme: HTTP
      initialDelaySeconds: 30
      timeoutSeconds: 5
      periodSeconds: 15
      failureThreshold: 10

    scrape:
      enabled: true
