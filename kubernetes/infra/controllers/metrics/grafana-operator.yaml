apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: monitoring
spec:
  interval: 10m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: grafana-operator-oci
    namespace: flux-system
  releaseName: grafana-operator
  values:
    crds:
      immutable: true
    image:
      registry: ghcr.io
      repository: grafana/grafana-operator
      tag: ""
    logging:
      level: info
    namespaceOverride: monitoring
    watchNamespaces: monitoring
