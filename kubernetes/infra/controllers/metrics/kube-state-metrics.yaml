apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: kube-system
spec:
  chart:
    spec:
      chart: kube-state-metrics
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      version: ">=5.0.0"
  interval: 10m
  releaseName: kube-state-metrics
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Homelab/Kind: nodes usually have no topology zone labels; enabling only adds empty kube_node_labels cardinality.
    # Production-ready: uncomment when nodes are labeled with topology.kubernetes.io/zone (multi-AZ) so
    # CNPG `cluster-zone_spread-warning` and Grafana panels using zone can use kube_node_labels.
    # metricLabelsAllowlist:
    #   - nodes=[topology.kubernetes.io/zone]
    prometheus:
      monitor:
        enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
