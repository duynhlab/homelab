apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  chart:
    spec:
      chart: metrics-server
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      version: '>=3.0.0'
  interval: 10m
  releaseName: metrics-server
  timeout: 5m
  values:
    args:
    - --kubelet-insecure-tls
    - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
    rbac:
      create: true
    serviceAccount:
      create: true

    resources:
      requests:
        cpu: 20m
        memory: 32Mi