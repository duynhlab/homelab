apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sloth
  namespace: monitoring
spec:
  chart:
    spec:
      chart: sloth
      sourceRef:
        kind: HelmRepository
        name: sloth
        namespace: flux-system
      version: '>=0.15.0'
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
    - name: grafana-operator
      namespace: monitoring
  interval: 10m
  releaseName: sloth
  targetNamespace: monitoring
  timeout: 5m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    global:
      imageRegistry: ""
    image:
      registry: ghcr.io
      repository: slok/sloth
      tag: v0.15.0
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 20m
        memory: 32Mi
    sloth:
      resyncInterval: "5m"
      workers: 2
      labelSelector: ""
      namespace: "monitoring"
      extraLabels:
        team: platform
      defaultSloPeriod: "30d"
      debug:
        enabled: true
      logger: default
    commonPlugins:
      enabled: false
      image:
        repository: registry.k8s.io/git-sync/git-sync
        tag: v4.5.0
      gitRepo:
        url: https://github.com/slok/sloth-common-sli-plugins
        branch: main
        resources:
          limits:
            cpu: 50m
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 50Mi
    metrics:
      enabled: true
      prometheusLabels: {}
    customSloConfig:
      enabled: false
