apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
  namespace: monitoring
spec:
  chart:
    spec:
      chart: grafana-operator
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      version: '>=v5.0.0'
  interval: 10m
  releaseName: grafana-operator
  timeout: 10m
  values:
    crds:
      immutable: true
    image:
      registry: ghcr.io
      repository: grafana/grafana-operator
      tag: ""
    logging:
      level: info
    namespaceOverride: monitoring
    watchNamespaces: monitoring
