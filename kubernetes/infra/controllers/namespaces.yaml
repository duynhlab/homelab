# Cluster-wide Namespace definitions (single source of truth).
# Lives under controllers/ so Kustomize can reference it without `../` (default
# load restrictor allows only files inside the kustomization root).
# Flux path `./controllers` includes this file first via kustomization.yaml.
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    environment: local
    platform.duynhlab/backup: "cnpg"
    platform.duynhlab.dev/needs-trust: "true"
    platform.duynhlab.dev/tier: app
  name: auth
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    environment: local
    platform.duynhlab/backup: "cnpg"
    platform.duynhlab.dev/tier: app
  name: cart
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    environment: local
    # No backup label: checkout's data lives on product-db in the product
    # namespace, which is already backed up (same reasoning as payment).
    platform.duynhlab.dev/tier: app
  name: checkout
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    environment: local
  name: cache-system
---
apiVersion: v1
