# External Secrets Operator HelmRelease
# Chart: external-secrets/external-secrets
# Docs: https://external-secrets.io/
#
# External Secrets Operator (ESO) synchronizes secrets from external
# providers (Vault, AWS Secrets Manager, etc.) into Kubernetes Secrets.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets-system
spec:
  chart:
    spec:
      chart: external-secrets
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      version: "2.3.0"
  interval: 10m
  timeout: 10m
  releaseName: external-secrets
  targetNamespace: external-secrets-system

  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3

  values:
    # Install CRDs with the chart
    installCRDs: true

    # Replicas for HA (1 for dev)
    replicaCount: 1

    # Resource limits
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    # ServiceAccount configuration
    serviceAccount:
      create: true
      name: external-secrets

    # Webhook configuration
    webhook:
      create: true
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

    # Cert controller for webhook certificates
    certController:
      create: true
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

    # Metrics for Prometheus
    metrics:
      service:
        enabled: true
        port: 8080

    # Pod security context
    podSecurityContext:
      runAsNonRoot: true

    # Container security context
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
