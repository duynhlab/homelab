# floci — free OSS AWS-KMS emulator, used as the OpenBAO auto-unseal KMS on Kind
# (RFC-0008 Slice 1 / ADR-024). Rehearses the production `seal "awskms"` path locally:
# OpenBAO wraps its root key with a KMS key held by floci, so pods self-unseal at boot
# — replacing the Shamir-key-in-a-Secret + unsealer CronJob.
#
# floci is a loose, zero-auth emulator (a parity/rehearsal tool, not real crypto) — it is
# fenced to OpenBAO by NetworkPolicy and never exposed on an Ingress. The KMS key persists
# on a PVC so pods re-unseal across restarts within a cluster life (`make down` wipes all,
# so OpenBAO simply re-bootstraps fresh — no brick risk).
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: floci-data
  namespace: openbao
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/component: kms-emulator
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: floci
  namespace: openbao
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/component: kms-emulator
spec:
  replicas: 1
  strategy:
    type: Recreate  # single RWO PVC — never two pods mounting it at once
  selector:
    matchLabels:
      app.kubernetes.io/name: floci
  template:
    metadata:
      labels:
        app.kubernetes.io/name: floci
        app.kubernetes.io/component: kms-emulator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001      # the image's `floci` user
        runAsGroup: 0
        fsGroup: 0           # /app/data is group-writable (group root)
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: floci
          image: floci/floci:1.5.27
          imagePullPolicy: IfNotPresent
          env:
            - name: FLOCI_STORAGE_MODE
              value: persistent
            - name: FLOCI_STORAGE_SERVICES_KMS_MODE
              value: persistent
            - name: FLOCI_STORAGE_PERSISTENT_PATH
              value: /app/data
          ports:
            - name: api
              containerPort: 4566
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            tcpSocket:
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4566
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: floci-data
---
apiVersion: v1
kind: Service
metadata:
  name: floci
  namespace: openbao
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/component: kms-emulator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: floci
  ports:
    - name: api
      port: 4566
      targetPort: 4566
      protocol: TCP
