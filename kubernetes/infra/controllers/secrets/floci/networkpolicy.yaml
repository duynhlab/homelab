# Fence the zero-auth floci KMS emulator: only pods in the `openbao` namespace
# (OpenBAO server + the bootstrap/KMS Jobs) may reach :4566. Anyone able to reach
# floci can decrypt OpenBAO's root key, so this is the access boundary in lieu of
# floci auth. Note: NetworkPolicy is inert on kindnet (documents intent; enforced on
# an enforcing CNI).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: floci-allow-openbao
  namespace: openbao
  labels:
    app.kubernetes.io/name: floci
    app.kubernetes.io/component: kms-emulator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: floci
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # any pod in the openbao namespace (server + bootstrap Jobs)
      ports:
        - protocol: TCP
          port: 4566
