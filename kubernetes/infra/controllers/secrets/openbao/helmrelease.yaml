# OpenBAO HelmRelease — HA mode with Raft Integrated Storage
# Chart: openbao/openbao
# Docs: https://openbao.org/docs/platform/k8s/helm/
#
# Replaces HashiCorp Vault (dev mode). Production-ready configuration:
# - 3-node HA cluster with Raft consensus
# - Persistent storage (10Gi PVC per node)
# - Kubernetes service registration for leader election
# - TLS disabled for local Kind (enable via cert-manager for EKS/GKE)
#
# Auto-unseal: Shamir (1 share, stored in openbao-init-keys Secret)
# For EKS/GKE: replace seal block with awskms or gcpckms
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
spec:
  chart:
    spec:
      chart: openbao
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
      version: ">=0.6.0 <1.0.0"
  interval: 10m
  timeout: 10m
  releaseName: openbao
  targetNamespace: openbao

  install:
    crds: Skip
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    crds: Skip
    remediation:
      retries: 3

  values:
    global:
      # TLS disabled for local Kind cluster.
      # Production (EKS/GKE): set tlsDisable=false and mount cert-manager certificate.
      tlsDisable: true

    server:
      # HA mode with 3 replicas + Raft integrated storage
      ha:
        enabled: true
        replicas: 3

        raft:
          enabled: true
          setNodeId: true

          config: |
            ui = true

            listener "tcp" {
              tls_disable     = 1
              address         = "[::]:8200"
              cluster_address = "[::]:8201"
            }

            storage "raft" {
              path = "/openbao/data"

              retry_join {
                leader_api_addr = "http://openbao-0.openbao-internal.openbao.svc.cluster.local:8200"
              }
              retry_join {
                leader_api_addr = "http://openbao-1.openbao-internal.openbao.svc.cluster.local:8200"
              }
              retry_join {
                leader_api_addr = "http://openbao-2.openbao-internal.openbao.svc.cluster.local:8200"
              }
            }

            # Kubernetes service registration: enables leader election labels on pods
            # OpenBAO active pod gets label: vault-active=true
            service_registration "kubernetes" {}

      # Persistent storage for Raft (10Gi per node — survives pod restarts)
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: standard

      # Audit storage (logs go to stdout → Vector → Loki pipeline)
      auditStorage:
        enabled: false

      # Readiness: accept traffic from all states (unsealed check done by bootstrap)
      # OpenBAO 2.5.2 uses *code=<N> params (not *ok=true like HashiCorp Vault):
      # standbycode=200  → standby nodes return 200 (default 429)
      # sealedcode=200   → sealed nodes return 200 (default 503)
      # uninitcode=200   → uninitialized nodes return 200 (default 501)
      readinessProbe:
        enabled: true
        path: "/v1/sys/health?standbycode=200&sealedcode=200&uninitcode=200"

      # Liveness: keep pod alive even when sealed/uninitialized
      livenessProbe:
        enabled: true
        path: "/v1/sys/health?standbycode=200&sealedcode=200&uninitcode=200"
        initialDelaySeconds: 60

      # Standalone disabled (using HA mode)
      standalone:
        enabled: false

      # Auth delegator: allows OpenBAO to call K8s TokenReview API
      # Required for Kubernetes auth method (used by ESO)
      authDelegator:
        enabled: true

      service:
        type: ClusterIP
        port: 8200

      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # Vault Agent Injector — not needed (using ESO pattern)
    injector:
      enabled: false

    # CSI provider — not needed (using ESO pattern)
    csi:
      enabled: false

    # UI — enabled for operator access
    ui:
      enabled: true
      serviceType: ClusterIP
