# HashiCorp Vault HelmRelease (Dev Mode)
# Chart: hashicorp/vault
# Docs: https://developer.hashicorp.com/vault/docs/deploy/kubernetes/helm
#
# WARNING: Dev mode is for development/testing ONLY.
# - Data is stored in-memory (lost on restart)
# - Root token is set to "root" (insecure)
# - TLS is disabled
#
# For production, use HA mode with proper storage backend.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  chart:
    spec:
      chart: vault
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      version: "0.32.0"
  interval: 10m
  timeout: 10m
  releaseName: vault
  targetNamespace: vault

  install:
    crds: Skip
    createNamespace: false
    remediation:
      retries: 3

  upgrade:
    crds: Skip
    remediation:
      retries: 3

  values:
    global:
      # Disable TLS for dev mode (http instead of https)
      tlsDisable: true

    server:
      # Dev mode configuration
      dev:
        enabled: true
        # Root token for dev mode (DO NOT use in production)
        devRootToken: "root"

      # Service configuration
      service:
        type: ClusterIP
        port: 8200

      # Resource limits (dev mode, lightweight)
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

      # Readiness probe
      readinessProbe:
        enabled: true
        path: "/v1/sys/health?standbyok=true"

      # Liveness probe
      livenessProbe:
        enabled: true
        path: "/v1/sys/health?standbyok=true"
        initialDelaySeconds: 60

      # Standalone mode (dev mode uses in-memory storage)
      standalone:
        enabled: false

      # HA mode disabled for dev
      ha:
        enabled: false

      # Data storage disabled for dev mode (uses in-memory)
      dataStorage:
        enabled: false

      # Audit storage disabled for dev
      auditStorage:
        enabled: false

      # Auth delegator for Kubernetes auth method
      authDelegator:
        enabled: true

    # Vault UI
    ui:
      enabled: true
      serviceType: ClusterIP

    # Disable injector for this PoC (not needed for ESO pattern)
    injector:
      enabled: false

    # Disable CSI provider (not needed for ESO pattern)
    csi:
      enabled: false
