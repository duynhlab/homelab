# ExternalSecret: RustFS root credentials sourced from OpenBAO.
#
# Path:   secret/data/local/infra/rustfs/root
# Target: Secret/rustfs-credentials in namespace rustfs
# Keys:   RUSTFS_ACCESS_KEY, RUSTFS_SECRET_KEY
#
# Consumed by the rustfs HelmRelease via secret.existingSecret=rustfs-credentials.
# The chart references the Secret as envFrom (RUSTFS_* keys are required by the
# rustfs container), so the key names must match the chart's defaults.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rustfs-credentials
  namespace: rustfs
  labels:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/component: storage
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: rustfs-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: rustfs
          app.kubernetes.io/component: storage
          app.kubernetes.io/managed-by: external-secrets
  data:
    - secretKey: RUSTFS_ACCESS_KEY
      remoteRef:
        key: secret/data/local/infra/rustfs/root
        property: access_key
    - secretKey: RUSTFS_SECRET_KEY
      remoteRef:
        key: secret/data/local/infra/rustfs/root
        property: secret_key
