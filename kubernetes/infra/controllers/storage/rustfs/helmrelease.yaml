apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: rustfs
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: flux-system
      version: "0.8.0"
  releaseName: rustfs
  targetNamespace: rustfs
  
  # Force clean install on failures
  install:
    crds: Skip
    createNamespace: true
    remediation:
      retries: 3
  
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  
  values:
    # Standalone mode
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false
    
    # CRITICAL: Disable ingress completely
    ingress:
      enabled: false
      traefikAnnotations: {}  # Explicitly clear Traefik annotations
    
    # Disable Gateway API (might also create Traefik resources)
    # CRITICAL: Chart 0.0.82 creates TraefikService when gatewayClass=traefik
    # regardless of gatewayApi.enabled. Set gatewayClass to nginx to avoid
    # "no matches for kind TraefikService" error when cluster has no Traefik CRDs.
    gatewayApi:
      enabled: false
      gatewayClass: nginx
    
    # Service config
    service:
      type: ClusterIP
      endpoint:
        port: 9000
      console:
        port: 9001
    
    # Credentials — sourced from OpenBAO via ExternalSecret (see external-secret.yaml).
    # The chart rejects the well-known default rustfsadmin/rustfsadmin since v0.3.0;
    # we keep credentials in OpenBAO and reference the synced Secret by name.
    secret:
      existingSecret: rustfs-credentials
    
    # Storage (Kind cluster uses "standard" StorageClass, not "local-path")
    storageclass:
      name: standard
      dataStorageSize: 1Gi
      logStorageSize: 256Mi
    
    # Resources. The old 100m/128Mi limits starved the S3 storage engine under
    # concurrent Pyroscope block.bin + Tempo trace PUTs — request handling stalled
    # past the liveness deadline ("context deadline exceeded") and kubelet killed
    # the container in a CrashLoop. Bumped to give headroom for object writes. (Bug 18)
    resources:
      requests:
        cpu: 250m
        memory: 128Mi
      limits:
        # 500m chronically throttled → Pyroscope 422s + slow backups. Raised to
        # 1.5 CPU, but the Zalando->CNPG migration added 3 CNPG clusters' Barman
        # WAL/backup traffic on top of Tempo + Pyroscope, re-saturating it (live
        # ~1281m/1500m → S3 PUT "context deadline exceeded" → Pyroscope 422 again).
        # Raise to 2.5 CPU (host has ample cores).
        cpu: "2500m"
        memory: 512Mi