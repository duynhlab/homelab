apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jaeger
  namespace: monitoring
spec:
  chart:
    spec:
      chart: jaeger
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: jaegertracing
        namespace: flux-system
      version: '>=3.0.0'
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
    - name: grafana-operator
      namespace: monitoring
  interval: 10m
  releaseName: jaeger
  timeout: 10m
  values:
    config:
      extensions:
        healthcheckv2:
          http:
            endpoint: 0.0.0.0:13133
          use_v2: true
        jaeger_query:
          storage:
            traces: primary_store
        jaeger_storage:
          backends:
            primary_store:
              memory:
                max_traces: 100000
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      service:
        extensions:
        - jaeger_storage
        - jaeger_query
        - healthcheckv2
        pipelines:
          traces:
            exporters:
            - jaeger_storage_exporter
            processors:
            - batch
            receivers:
            - otlp
            - jaeger
            - zipkin
    provisionDataStore:
      cassandra: false
      elasticsearch: false
      kafka: false
