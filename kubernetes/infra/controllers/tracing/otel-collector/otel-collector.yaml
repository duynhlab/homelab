apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: monitoring
spec:
  chart:
    spec:
      chart: opentelemetry-collector
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
      version: '<0.157.0'
  dependsOn:
    - name: victoria-metrics-operator
      namespace: monitoring
    - name: grafana-operator
      namespace: monitoring
  interval: 10m
  releaseName: otel-collector
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    affinity: {}
    config:
      exporters:
        debug:
          sampling_initial: 5
          sampling_thereafter: 200
          verbosity: basic
        otlp/jaeger:
          endpoint: jaeger.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlp/tempo:
          endpoint: tempo.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlphttp/victoriatraces:
          # VictoriaTraces OTLP-HTTP ingest (single port :10428). gRPC :4317 is
          # TLS-by-default, so use HTTP. Pilot: 3rd backend alongside Tempo + Jaeger.
          traces_endpoint: http://vtsingle-victoria-traces.monitoring.svc.cluster.local:10428/insert/opentelemetry/v1/traces
          tls:
            insecure: true
          compression: gzip
        otlphttp/victorialogs:
          # OTLP logs sink (RFC-0014 P4): the 9 Go services' otelzap tee AND
          # Kong's opentelemetry plugin post OTLP logs here; re-export to
          # VictoriaLogs. VL-Stream-Fields makes service.name the log-stream
          # identity; trace_id stays a queryable regular field.
          logs_endpoint: http://vlsingle-victoria-logs.monitoring.svc.cluster.local:9428/insert/opentelemetry/v1/logs
          headers:
            VL-Stream-Fields: "service.name"
          tls:
            insecure: true
          compression: gzip
        otlphttp/victoriametrics:
          # RFC-0014 P1: semconv app metrics (dual-emit) → vmagent's OTLP ingest,
          # NOT VMSingle direct — vmagent keeps the single choke point for
          # relabeling (service_name→app) and the RFC-0013 streamAggr pilot.
          # HTTP protobuf only (VM accepts neither OTLP/gRPC nor JSON).
          metrics_endpoint: http://vmagent-victoria-metrics.monitoring.svc.cluster.local:8429/opentelemetry/v1/metrics
          tls:
            insecure: true
          compression: gzip
        clickhouse:
          # RFC-0019 Phase B / ADR-023: long-retention SQL over OTel logs+traces.
          # 4th trace sink + 2nd log sink, fan-out alongside Tempo/Jaeger/
          # VictoriaTraces and VictoriaLogs. Metrics are NEVER routed here.
          # create_schema bootstraps the otel_logs/otel_traces MergeTree tables
          # (+ trace_id materialized view); TTL 90d (2160h) vs 7d ops. sending_queue
          # + retry_on_failure isolate ClickHouse *runtime* backpressure from the
          # other sinks — but create_schema runs DDL in start(), so an unreachable
          # ClickHouse fails the whole collector at startup. tracing-local therefore
          # dependsOn clickhouse-local (ordering); flip to create_schema:false + a
          # bootstrap Job to also survive a restart while ClickHouse is down.
          endpoint: tcp://clickhouse-clickhouse.monitoring.svc.cluster.local:9000?dial_timeout=10s
          database: otel
          username: default
          password: ${env:CLICKHOUSE_PASSWORD}
          create_schema: true
          ttl: 2160h
          logs_table_name: otel_logs
          traces_table_name: otel_traces
          async_insert: true
          compress: lz4
          timeout: 10s
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
          sending_queue:
            enabled: true
            num_consumers: 4
            queue_size: 1000
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        zpages:
          endpoint: 0.0.0.0:55679
      processors:
        batch:
          send_batch_max_size: 1024
          send_batch_size: 512
          timeout: 5s
        memory_limiter:
          # Bumped for the RFC-0019 clickhouse exporter (4th trace + 2nd log sink);
          # keep headroom below resources.limits.memory (1Gi) so backpressure trips
          # here, not the OOM killer.
          check_interval: 1s
          limit_mib: 800
          spike_limit_mib: 200
        # RFC-0014 D-5: defensive — cumulative is the SDK default, but a delta
        # sample stored in VM silently breaks rate().
        deltatocumulative:
          max_stale: 5m
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      service:
        extensions:
        - health_check
        - zpages
        pipelines:
          traces:
            exporters:
            - otlp/tempo
            - otlp/jaeger
            - otlphttp/victoriatraces
            - clickhouse
            processors:
            - memory_limiter
            - batch
            receivers:
            - otlp
          logs:
            exporters:
            - otlphttp/victorialogs
            - clickhouse
            processors:
            - memory_limiter
            - batch
            receivers:
            - otlp
          metrics:
            exporters:
            - otlphttp/victoriametrics
            processors:
            - memory_limiter
            - deltatocumulative
            - batch
            receivers:
            - otlp
        telemetry:
          logs:
            level: info
          metrics:
            address: 0.0.0.0:8888
    image:
      pullPolicy: IfNotPresent
      repository: otel/opentelemetry-collector-contrib
      tag: 0.152.0
    livenessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 10
      periodSeconds: 10
    mode: deployment
    nodeSelector: {}
    podAnnotations:
      app.kubernetes.io/component: apm
      app.kubernetes.io/part-of: apm-stack
    ports:
      metrics:
        containerPort: 8888
        enabled: true
        protocol: TCP
        servicePort: 8888
      otlp:
        containerPort: 4317
        enabled: true
        protocol: TCP
        servicePort: 4317
      otlp-http:
        containerPort: 4318
        enabled: true
        protocol: TCP
        servicePort: 4318
    readinessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 5
      periodSeconds: 5
    replicaCount: 1
    resources:
      limits:
        cpu: 200m
        memory: 1Gi
      requests:
        cpu: 50m
        memory: 256Mi
    # RFC-0019 Phase B: ClickHouse admin password for the clickhouse exporter
    # (${env:CLICKHOUSE_PASSWORD}), from the ESO-managed clickhouse-credentials Secret.
    extraEnvs:
      - name: CLICKHOUSE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: clickhouse-credentials
            key: password
    service:
      type: ClusterIP
    serviceAccount:
      create: true
      name: otel-collector
    tolerations: []

