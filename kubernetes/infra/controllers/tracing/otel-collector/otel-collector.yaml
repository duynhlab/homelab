apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: monitoring
spec:
  chart:
    spec:
      chart: opentelemetry-collector
      interval: 10m
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: flux-system
      version: '<0.157.0'
  dependsOn:
    - name: victoria-metrics-operator
      namespace: monitoring
    - name: grafana-operator
      namespace: monitoring
  interval: 10m
  releaseName: otel-collector
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    affinity: {}
    config:
      exporters:
        debug:
          sampling_initial: 5
          sampling_thereafter: 200
          verbosity: basic
        otlp/jaeger:
          endpoint: jaeger.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlp/tempo:
          endpoint: tempo.monitoring.svc.cluster.local:4317
          tls:
            insecure: true
        otlphttp/victoriatraces:
          # VictoriaTraces OTLP-HTTP ingest (single port :10428). gRPC :4317 is
          # TLS-by-default, so use HTTP. Pilot: 3rd backend alongside Tempo + Jaeger.
          traces_endpoint: http://vtsingle-victoria-traces.monitoring.svc.cluster.local:10428/insert/opentelemetry/v1/traces
          tls:
            insecure: true
          compression: gzip
        otlphttp/victorialogs:
          # OTel-logs pilot sink: Kong's opentelemetry plugin (logs_endpoint)
          # posts OTLP runtime logs; re-export to VictoriaLogs' OTLP ingest.
          # Runs alongside Vector (primary log shipper) for comparison.
          logs_endpoint: http://vlsingle-victoria-logs.monitoring.svc.cluster.local:9428/insert/opentelemetry/v1/logs
          tls:
            insecure: true
          compression: gzip
        otlphttp/victoriametrics:
          # RFC-0014 P1: semconv app metrics (dual-emit) → vmagent's OTLP ingest,
          # NOT VMSingle direct — vmagent keeps the single choke point for
          # relabeling (service_name→app) and the RFC-0013 streamAggr pilot.
          # HTTP protobuf only (VM accepts neither OTLP/gRPC nor JSON).
          metrics_endpoint: http://vmagent-victoria-metrics.monitoring.svc.cluster.local:8429/opentelemetry/v1/metrics
          tls:
            insecure: true
          compression: gzip
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133
        zpages:
          endpoint: 0.0.0.0:55679
      processors:
        batch:
          send_batch_max_size: 1024
          send_batch_size: 512
          timeout: 5s
        memory_limiter:
          check_interval: 1s
          limit_mib: 400
          spike_limit_mib: 100
        # RFC-0014 D-5: defensive — cumulative is the SDK default, but a delta
        # sample stored in VM silently breaks rate().
        deltatocumulative:
          max_stale: 5m
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      service:
        extensions:
        - health_check
        - zpages
        pipelines:
          traces:
            exporters:
            - otlp/tempo
            - otlp/jaeger
            - otlphttp/victoriatraces
            processors:
            - memory_limiter
            - batch
            receivers:
            - otlp
          logs:
            exporters:
            - otlphttp/victorialogs
            processors:
            - memory_limiter
            - batch
            receivers:
            - otlp
          metrics:
            exporters:
            - otlphttp/victoriametrics
            processors:
            - memory_limiter
            - deltatocumulative
            - batch
            receivers:
            - otlp
        telemetry:
          logs:
            level: info
          metrics:
            address: 0.0.0.0:8888
    image:
      pullPolicy: IfNotPresent
      repository: otel/opentelemetry-collector-contrib
      tag: 0.152.0
    livenessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 10
      periodSeconds: 10
    mode: deployment
    nodeSelector: {}
    podAnnotations:
      app.kubernetes.io/component: apm
      app.kubernetes.io/part-of: apm-stack
    ports:
      metrics:
        containerPort: 8888
        enabled: true
        protocol: TCP
        servicePort: 8888
      otlp:
        containerPort: 4317
        enabled: true
        protocol: TCP
        servicePort: 4317
      otlp-http:
        containerPort: 4318
        enabled: true
        protocol: TCP
        servicePort: 4318
    readinessProbe:
      httpGet:
        path: /
        port: 13133
      initialDelaySeconds: 5
      periodSeconds: 5
    replicaCount: 1
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
      requests:
        cpu: 50m
        memory: 128Mi
    service:
      type: ClusterIP
    serviceAccount:
      create: true
      name: otel-collector
    tolerations: []

