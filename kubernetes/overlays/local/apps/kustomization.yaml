---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base apps (9 HelmReleases + 1 ResourceSet)
resources:
  - ../../../base/apps

# Local environment labels
labels:
  - pairs:
      environment: local
      cluster: mop

# Patches for 9 backend services + 1 K6 (HelmRelease + Kustomize pattern)
# Frontend uses ResourceSet, no patch needed here (configured via ResourceSetInputProvider)
# Each service has its own patch file in patches/services/ for better maintainability
patches:
  - path: patches/services/auth.yaml
    target:
      kind: HelmRelease
      name: auth
  - path: patches/services/user.yaml
    target:
      kind: HelmRelease
      name: user
  - path: patches/services/product.yaml
    target:
      kind: HelmRelease
      name: product
  - path: patches/services/cart.yaml
    target:
      kind: HelmRelease
      name: cart
  - path: patches/services/order.yaml
    target:
      kind: HelmRelease
      name: order
  - path: patches/services/review.yaml
    target:
      kind: HelmRelease
      name: review
  - path: patches/services/notification.yaml
    target:
      kind: HelmRelease
      name: notification
  - path: patches/services/shipping.yaml
    target:
      kind: HelmRelease
      name: shipping
  - path: patches/services/shipping-v2.yaml
    target:
      kind: HelmRelease
      name: shipping-v2
  - path: patches/services/k6.yaml
    target:
      kind: HelmRelease
      name: k6
