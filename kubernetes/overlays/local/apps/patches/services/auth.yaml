---
# Auth Service - Local environment overrides
# Pattern: HelmRelease patches with FULL env list (strategic merge replaces entire env array)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auth
  namespace: auth
spec:
  values:
    replicaCount: 1  # Local: 1 replica (chart default: 2)
    
    resources:
      requests:
        memory: "32Mi"  # Local: 32Mi (chart default: 64Mi)
        cpu: "25m"      # Local: 25m (chart default: 50m)
      limits:
        memory: "64Mi"  # Local: 64Mi (chart default: 128Mi)
        cpu: "50m"      # Local: 50m (chart default: 100m)
    
    # FULL env list for local environment
    env:
      - name: SERVICE_NAME
        value: "auth"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "local"  # Changed from "production"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "1.0"  # Local: 100% sampling (chart default: 0.1)
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "debug"  # Local: debug (chart default: info)
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      - name: DB_HOST
        value: "auth-db-pooler.auth.svc.cluster.local"
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: "auth"
      - name: DB_USER
        value: "auth"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: auth.auth-db.credentials.postgresql.acid.zalan.do
            key: password
      - name: DB_SSLMODE
        value: "require"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "10"  # Local: 10 (chart default: 25)
      - name: DB_POOL_MODE
        value: "transaction"
      - name: SHUTDOWN_TIMEOUT
        value: "10s"
