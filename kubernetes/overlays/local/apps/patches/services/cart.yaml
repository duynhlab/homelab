#############################################################################
# Cart Service - Local overrides
#############################################################################
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cart
  namespace: cart
spec:
  values:
    replicaCount: 1
    
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "64Mi"
        cpu: "50m"
    
    env:
      - name: SERVICE_NAME
        value: "cart"
      - name: PORT
        value: "8080"
      - name: ENV
        value: "local"
      - name: OTEL_COLLECTOR_ENDPOINT
        value: "otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318"
      - name: OTEL_SAMPLE_RATE
        value: "1.0"
      - name: PYROSCOPE_ENDPOINT
        value: "http://pyroscope.monitoring.svc.cluster.local:4040"
      - name: LOG_LEVEL
        value: "debug"
      - name: LOG_FORMAT
        value: "json"
      - name: TRACING_ENABLED
        value: "true"
      - name: PROFILING_ENABLED
        value: "true"
      - name: METRICS_ENABLED
        value: "true"
      - name: DB_HOST
        value: "transaction-db-pooler.cart.svc.cluster.local"
      - name: DB_PORT
        value: "5432"
      - name: DB_NAME
        value: "cart"
      - name: DB_USER
        value: "cart"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: cart.transaction-db.credentials.postgresql.acid.zalan.do
            key: password
      - name: DB_SSLMODE
        value: "require"
      - name: DB_POOL_MAX_CONNECTIONS
        value: "10"
      - name: DB_POOL_MODE
        value: "transaction"
      - name: SHUTDOWN_TIMEOUT
        value: "10s"

