---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base infrastructure manifests
resources:
  - ../../../base/infrastructure

# Local environment labels
labels:
  - pairs:
      environment: local
      cluster: mop

# Infrastructure components use base configuration (no patches needed for local)
# Why no patches?
# - Monitoring (Prometheus, Grafana, Metrics Server): Base HelmRelease values already suitable for Kind
# - APM (Tempo, Loki, Pyroscope, Jaeger, Vector, OTel): Base Deployment/HelmRelease configs optimized for local
# - Databases (Operators, Clusters, Poolers): Base CRDs use minimal resources for dev
# - SLO (Sloth Operator, PrometheusServiceLevel CRDs): Base configuration sufficient
#
# Note: Only apps/ overlay has patches (reduce replicas/memory for microservices)

# Configuration for local Kind cluster
configMapGenerator:
  - name: cluster-config
    namespace: flux-system
    literals:
      - cluster_name=mop
      - environment=local
      - registry_url=localhost:5050
