---
# Production Apps Overlay
# TODO: Add production-specific patches for applications
# Example: higher replica counts, increased resources, production secrets

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/apps

patches:
  - path: patches/.gitkeep
    target:
      kind: HelmRelease

# Production-specific labels
labels:
  - pairs:
      environment: production
