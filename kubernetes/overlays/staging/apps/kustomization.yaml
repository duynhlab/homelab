---
# Staging Apps Overlay
# TODO: Add staging-specific patches for applications
# Example: different replica counts, resource limits, environment variables

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/apps

patches:
  - path: patches/.gitkeep
    target:
      kind: HelmRelease

# Staging-specific labels
labels:
  - pairs:
      environment: staging
