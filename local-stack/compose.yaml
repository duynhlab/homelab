# Local end-to-end test stack for the duynhlab e-commerce platform.
#
# Brings up: Postgres (8 DBs) + Redis cache + per-service golang-migrate migrations
# + 8 Go services + a Temporal dev server + the order-fulfillment worker + a
# Kong DB-less gateway (mirrors the in-cluster Kong) + the React frontend.
#
# Build contexts point at sibling repos (../../<service>), so all repos must be
# checked out next to homelab/. Run from this directory:
#   docker compose up -d --build
# Then open the SPA at http://localhost:3000 (API gateway at http://localhost:8080,
# Temporal UI at http://localhost:8233).
#
# A checkout starts the OrderFulfillmentWorkflow: it reserves stock (product),
# creates a shipment (shipping), confirms the order, notifies, and clears the
# cart — with reverse-order compensation on failure. Watch it in the Temporal UI.
#
# Tracing fans into VictoriaTraces (via an OTel Collector) — audit it in Grafana
# at http://localhost:3002 (Explore → VictoriaTraces). Profiling is enabled — each
# service pushes pprof to the local Pyroscope (:4040, Grafana → Explore → Pyroscope);
# auth uses the real opaque-token login flow (demo login: alice / password123).

x-svc-env: &svc-env
  ENV: development
  TRACING_ENABLED: "true"
  OTEL_COLLECTOR_ENDPOINT: otel-collector:4318 # host:port; the OTLP-HTTP SDK appends /v1/traces
  OTEL_SAMPLE_RATE: "1.0"                       # sample everything locally (prod default 0.1)
  PROFILING_ENABLED: "true"                     # local Pyroscope (disable to skip profiling)
  PYROSCOPE_ENDPOINT: http://pyroscope:4040
  METRICS_ENABLED: "true"
  LOG_LEVEL: info
  LOG_FORMAT: json
  PORT: "8080"
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_SSLMODE: disable
  # Local JWKS for service-side JWT verification (authmw.MiddlewareJWT). Issuer and
  # audience use the auth-service defaults (https://gateway.duynh.me /
  # duynhlab-platform), so only the URL needs overriding from the cluster default.
  AUTH_JWKS_URL: http://auth:8080/auth/v1/public/jwks

x-svc-healthcheck: &svc-healthcheck
  test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
  interval: 10s
  timeout: 3s
  retries: 12
  start_period: 15s

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  cache:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Temporal dev server (in-memory; drives the order-fulfillment saga) ----
  # `server start-dev` bundles frontend (:7233) + Web UI (:8233) in one container
  # and auto-registers the `mop` namespace. In-memory persistence (ephemeral).
  temporal:
    image: temporalio/temporal:1.7.2
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--namespace", "mop", "--log-level", "warn"]
    ports:
      - "7233:7233" # frontend gRPC
      - "8233:8233" # Web UI (http://localhost:8233)
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233", "--namespace", "mop"]
      interval: 5s
      timeout: 5s
      retries: 30

  # ---- Observability: traces → VictoriaTraces; span-derived RED metrics → VictoriaMetrics ----
  # Services emit OTLP-HTTP to the collector (:4318). The collector (a) re-exports traces to
  # VictoriaTraces' custom ingest path (the std OTLP SDK can't target it directly, so the
  # collector is required), and (b) runs the spanmetrics connector to derive RED metrics
  # (calls/duration by service) which it remote-writes to VictoriaMetrics. Audit traces in
  # Grafana Explore → VictoriaTraces; view the RED dashboard backed by VictoriaMetrics.
  # Mirrors the in-cluster topology (services → otel-collector → VictoriaTraces/Grafana),
  # with spanmetrics standing in for Tempo's metrics-generator locally.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.0 # contrib: spanmetrics connector lives here
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318" # OTLP-HTTP (also handy for a host-side telemetrygen smoke test)
    depends_on:
      victoria-traces: { condition: service_started }
      victoria-metrics: { condition: service_started }

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.6.0
    command:
      - "-httpListenAddr=:10428"
      - "-storageDataPath=/victoria-traces-data"
      - "-retentionPeriod=7d"
    volumes:
      - victoria-traces-data:/victoria-traces-data
    ports:
      - "10428:10428" # OTLP ingest + Jaeger query API + LogsQL + vmui

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.146.0
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=7d"
    volumes:
      - victoria-metrics-data:/victoria-metrics-data
    ports:
      - "8428:8428" # remote-write (/api/v1/write) + PromQL + vmui

  # ---- Continuous profiling: Pyroscope (single-binary, ephemeral local storage) ----
  # The 8 services push pprof data here (PROFILING_ENABLED=true + PYROSCOPE_ENDPOINT
  # in x-svc-env). View flame graphs in Grafana → Explore → Pyroscope.
  pyroscope:
    image: grafana/pyroscope:2.1.0
    ports:
      - "4040:4040" # Pyroscope UI/API; services reach it in-network at pyroscope:4040
    volumes:
      - pyroscope-data:/data

  grafana:
    image: grafana/grafana:12.4.4
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3002:3000" # http://localhost:3002 → Explore (traces) + RED dashboard
    depends_on:
      victoria-traces: { condition: service_started }
      victoria-metrics: { condition: service_started }
      pyroscope: { condition: service_started }

  # ---- golang-migrate migrations (one-shot, per service DB; app image `migrate`) ----
  auth-migrate:
    build: { context: ../../auth-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: auth, DB_NAME: auth }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  # Dev-only demo users (alice/password123). Seeding lives OUTSIDE the migration
  # chain (prod never seeds); local-stack applies it explicitly after migrate.
  auth-seed:
    build: { context: ../../auth-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: auth, DB_NAME: auth }
    depends_on:
      postgres: { condition: service_healthy }
      auth-migrate: { condition: service_completed_successfully }
    restart: "no"
  user-migrate:
    build: { context: ../../user-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: user, DB_NAME: user }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  product-migrate:
    build: { context: ../../product-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: product, DB_NAME: product }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  cart-migrate:
    build: { context: ../../cart-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: cart, DB_NAME: cart }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  order-migrate:
    build: { context: ../../order-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: order, DB_NAME: order }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  review-migrate:
    build: { context: ../../review-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: review, DB_NAME: review }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  shipping-migrate:
    build: { context: ../../shipping-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: shipping, DB_NAME: shipping }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"
  notification-migrate:
    build: { context: ../../notification-service }
    command: ["migrate"]
    environment: { <<: *svc-env, SERVICE_NAME: notification, DB_NAME: notification }
    depends_on: { postgres: { condition: service_healthy } }
    restart: "no"

  # ---- Dev-only demo seeds (one-shot). Seeding lives OUTSIDE the migration
  # chain (prod never seeds); each runs its service's `seed` subcommand after
  # that service's migrate. ----
  user-seed:
    build: { context: ../../user-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: user, DB_NAME: user }
    depends_on:
      postgres: { condition: service_healthy }
      user-migrate: { condition: service_completed_successfully }
    restart: "no"
  product-seed:
    build: { context: ../../product-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: product, DB_NAME: product }
    depends_on:
      postgres: { condition: service_healthy }
      product-migrate: { condition: service_completed_successfully }
    restart: "no"
  cart-seed:
    build: { context: ../../cart-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: cart, DB_NAME: cart }
    depends_on:
      postgres: { condition: service_healthy }
      cart-migrate: { condition: service_completed_successfully }
    restart: "no"
  order-seed:
    build: { context: ../../order-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: order, DB_NAME: order }
    depends_on:
      postgres: { condition: service_healthy }
      order-migrate: { condition: service_completed_successfully }
    restart: "no"
  review-seed:
    build: { context: ../../review-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: review, DB_NAME: review }
    depends_on:
      postgres: { condition: service_healthy }
      review-migrate: { condition: service_completed_successfully }
    restart: "no"
  shipping-seed:
    build: { context: ../../shipping-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: shipping, DB_NAME: shipping }
    depends_on:
      postgres: { condition: service_healthy }
      shipping-migrate: { condition: service_completed_successfully }
    restart: "no"
  notification-seed:
    build: { context: ../../notification-service }
    command: ["seed"]
    environment: { <<: *svc-env, SERVICE_NAME: notification, DB_NAME: notification }
    depends_on:
      postgres: { condition: service_healthy }
      notification-migrate: { condition: service_completed_successfully }
    restart: "no"

  # ---- Backend services ----
  auth:
    build: { context: ../../auth-service }
    # gRPC AuthService.GetMe always runs on :9090 for east-west /me validation;
    # HTTP :8080 is unchanged. Consumers reach it at dns:///auth:9090.
    environment:
      <<: *svc-env
      SERVICE_NAME: auth
      OTEL_SERVICE_NAME: auth
      DB_NAME: auth
      GRPC_PORT: "9090"
      # Edge JWT (RFC-0009 Phase 4): stable DEV-ONLY RS256 signing key so the
      # gateway's jwt consumer credential (kong.yml holds the matching public
      # half) stays valid across restarts. In the cluster this key comes from
      # OpenBAO via ESO. iss/aud match the Kong jwt_secret key and authmw.
      JWT_ISSUER: https://gateway.duynh.me
      JWT_AUDIENCE: duynhlab-platform
      JWT_PRIVATE_KEY_PEM: |
        -----BEGIN PRIVATE KEY-----
        MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQDtVNmPLaVYsR0q
        7epFZfj4Fvi4s/AQnw9+u59ywbzsbItKk6qGU0oAColkGG91gKDWWZ9GRS266fVU
        k9t8mju5wAoo4eztoIN0RRQoYHDxREI0B1jJAUSJanLrmneGeeCP8H5eT1pqRiVP
        gQe9L0ZRWGVL6emMH6xXz+eI8vMu7og4tXBLyIBLmUEn6NzuJgQNje/8gQP2puxQ
        b56prNQUVFqTFbD4gI4+YJwh6B2UgYQeFb5l69BtuixfOLl2aSs6BdYxU0xDk0dL
        yC/qv7UexnzonLe4suNb6oCDxMRkPetvfbyNv/02qNFUVkbaLN8cwqzLT38JCaoU
        lVoN0a5VAgMBAAECggEAHSgBo0aZC9SUb//y+iwdIkNWMoC+kxgrY+ciX0uATW5H
        TXXnKuHkEy24M8ERvlZ7S+IOQGiCxfX0kvuoKP5crIT0apHY1NeVlqze3Vf9wBIh
        7PjjFiyO8i/O5vVezjk+VoiVybnHcotkDYidPgdnBNrOdP1LWRDSECalO+yW5hKg
        tS7yk+axl60TxYVsLR4HCTvcADAjuAya7zFBTyCwuEqwC8p5X6Wjp/OZYlB1HgUn
        ac+WSbRni810pksH8kRAWPUvxbGwsjnbbq+ciqjEYJnv71aTxSVmFGsTxe/IvtQB
        UDaEyN/vHKYI+WWsZXyN8Ye4c1OPTm9kYjNwEsMUuQKBgQD/VCfXnpicPNPk0GWQ
        jeSuJOmiywpNC8Va3pG+EiIXytOoWP/IL0dqoQ0sxUxE2as1nAVmYJ4dXJL0dm/U
        2ybWFz4511vYMxWpP84pX8GSuQ7EnKdErz8BIhzPcPVjVY9p4INYTkwcwedlNMtU
        6VA1I2aHSOQ7JeFSi5kt4PrhyQKBgQDt9JTagfOMs5TpqlQAxWSNlW8njYaFLpzj
        fl9eIqy07UXEU98qsB6ei0wYZMcLR1ovGCyXehPIUPXbLOkYVGD9D7d9m7LfSsuj
        9aNrzDBtUEjutxyooWTWPIhw8qVzLXv8NrmPGs7zJEhKWYjWUhi8w1MqKH2jpF6V
        kRU4JecOLQKBgBHK9IfTFoF0v7NnTlyXdsMn8VwV2B7sXhFqBy/+pX+Q89T8dr6l
        hM2KcZeYHCuEG6k9uSacPwh+xgLhKgPkTb2Hmx9+wXi8fprvxlcdxCiMWtoarJFd
        wP88OFPAZGlKshbHvX9u3WD3pj9oQW8mXx+E2wU8cCMrDZup/L+0uOb5AoGAIJ+M
        nNx+IIcqXlK8y5JEc+jN4XVUwQOf/MyBlK1aUj/Jdd4t1XNp70CXwSxn4ZL5uUUu
        L+JLvgXjfxYMKwq+dVNnS7BB+L0PaD4wFoJbDVGZfijao//kjD6mUh3iMwVEX1K9
        Y/I/9zO9OXxG92MwAwkgaMI+X2YUlZrbduQzZk0CgYEAsyXPJdPNUNIZu/fQBZVB
        +66gXGbuXoSE8Ad76+7diPPbfAmKvUPXnd5HEfD1bd1pNcppp+bJIVGIpp7iRj26
        IpN3u+E3f9+nsYgffNb/9eR4HUdJ0B2s1sezanHunJfJ1gzp0YdM56qLlaE5Vwnd
        alsBBTTqdRNCDXK3HEuCYwM=
        -----END PRIVATE KEY-----
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      auth-migrate: { condition: service_completed_successfully }
      auth-seed: { condition: service_completed_successfully }

  user:
    build: { context: ../../user-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: user
      OTEL_SERVICE_NAME: user
      DB_NAME: user
      AUTH_GRPC_ADDR: dns:///auth:9090
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      user-migrate: { condition: service_completed_successfully }
      user-seed: { condition: service_completed_successfully }
      auth: { condition: service_healthy }

  shipping:
    build: { context: ../../shipping-service }
    # gRPC ShippingService always runs on :9090; HTTP :8080 is unchanged.
    # order reaches it at dns:///shipping:9090.
    environment: { <<: *svc-env, SERVICE_NAME: shipping, OTEL_SERVICE_NAME: shipping, DB_NAME: shipping, GRPC_PORT: "9090" }
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      shipping-migrate: { condition: service_completed_successfully }
      shipping-seed: { condition: service_completed_successfully }

  review:
    build: { context: ../../review-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: review
      OTEL_SERVICE_NAME: review
      DB_NAME: review
      AUTH_GRPC_ADDR: dns:///auth:9090
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      review-migrate: { condition: service_completed_successfully }
      review-seed: { condition: service_completed_successfully }
      auth: { condition: service_healthy }

  notification:
    build: { context: ../../notification-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: notification
      OTEL_SERVICE_NAME: notification
      DB_NAME: notification
      AUTH_GRPC_ADDR: dns:///auth:9090
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      notification-migrate: { condition: service_completed_successfully }
      notification-seed: { condition: service_completed_successfully }
      auth: { condition: service_healthy }

  product:
    build: { context: ../../product-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: product
      OTEL_SERVICE_NAME: product
      DB_NAME: product
      CACHE_ENABLED: "true"
      CACHE_HOST: cache
      CACHE_PORT: "6379"
      REVIEW_GRPC_ADDR: dns:///review:9090
      # product serves the saga's ReserveStock/ReleaseStock on gRPC :9090.
      GRPC_PORT: "9090"
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      product-migrate: { condition: service_completed_successfully }
      product-seed: { condition: service_completed_successfully }
      cache: { condition: service_healthy }
      review: { condition: service_healthy }

  cart:
    build: { context: ../../cart-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: cart
      OTEL_SERVICE_NAME: cart
      DB_NAME: cart
      AUTH_GRPC_ADDR: dns:///auth:9090
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      cart-migrate: { condition: service_completed_successfully }
      cart-seed: { condition: service_completed_successfully }
      auth: { condition: service_healthy }

  order:
    build: { context: ../../order-service }
    environment:
      <<: *svc-env
      SERVICE_NAME: order
      OTEL_SERVICE_NAME: order
      DB_NAME: order
      AUTH_GRPC_ADDR: dns:///auth:9090
      CART_SERVICE_URL: http://cart:8080
      SHIPPING_SERVICE_URL: http://shipping:8080
      # When set, order calls shipping over gRPC (Phase 1 pilot); unset = REST fallback.
      SHIPPING_GRPC_ADDR: dns:///shipping:9090
      NOTIFICATION_GRPC_ADDR: dns:///notification:9090
      # CreateOrder commits the order (pending) then starts the Temporal saga,
      # which drives confirm + notification + cart-clear. The worker runs in the
      # order-worker service below.
      TEMPORAL_HOSTPORT: temporal:7233
      TEMPORAL_NAMESPACE: mop
      TASK_QUEUE: order-fulfillment
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      order-migrate: { condition: service_completed_successfully }
      order-seed: { condition: service_completed_successfully }
      auth: { condition: service_healthy }
      cart: { condition: service_healthy }
      shipping: { condition: service_healthy }
      temporal: { condition: service_healthy }

  # ---- Order fulfillment worker (Temporal: runs the saga's activities) ----
  order-worker:
    build: { context: ../../order-service }
    command: ["worker"]
    environment:
      <<: *svc-env
      SERVICE_NAME: order
      OTEL_SERVICE_NAME: order
      DB_NAME: order
      CART_SERVICE_URL: http://cart:8080
      SHIPPING_GRPC_ADDR: dns:///shipping:9090
      NOTIFICATION_GRPC_ADDR: dns:///notification:9090
      PRODUCT_GRPC_ADDR: dns:///product:9090
      TEMPORAL_HOSTPORT: temporal:7233
      TEMPORAL_NAMESPACE: mop
      TASK_QUEUE: order-fulfillment
    healthcheck: *svc-healthcheck
    depends_on:
      postgres: { condition: service_healthy }
      order-migrate: { condition: service_completed_successfully }
      temporal: { condition: service_healthy }
      product: { condition: service_healthy }
      shipping: { condition: service_healthy }
      notification: { condition: service_healthy }
      cart: { condition: service_healthy }

  # ---- Gateway (pass-through + CORS) ----
  gateway:
    # Kong DB-less — same gateway as the cluster (replaces the old nginx
    # stand-in). Declarative config in ./gateway/kong.yml mirrors the
    # in-cluster Kong (routing + CORS + correlation-id + security headers +
    # rate/size limits) so local e2e exercises the real gateway behaviour.
    image: kong:3.9
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "off"
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      KONG_PLUGINS: bundled
      # Edge tracing: generate spans and propagate W3C traceparent so a trace
      # starts at the gateway (not the service). Exported via the opentelemetry
      # plugin (kong.yml) to the collector. Sample everything locally.
      KONG_TRACING_INSTRUMENTATIONS: all
      KONG_TRACING_SAMPLING_RATE: "1.0"
      # Drop server_tokens (Server/Via fingerprint), keep latency debug headers
      KONG_HEADERS: latency_tokens
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
    volumes:
      - ./gateway/kong.yml:/kong/kong.yml:ro
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      cache: { condition: service_healthy }
      auth: { condition: service_healthy }
      user: { condition: service_healthy }
      product: { condition: service_healthy }
      cart: { condition: service_healthy }
      order: { condition: service_healthy }
      review: { condition: service_healthy }
      shipping: { condition: service_healthy }
      notification: { condition: service_healthy }

  # ---- Frontend (built with the gateway origin baked in) ----
  frontend:
    build:
      context: ../../frontend
      args:
        API_BASE_URL: http://localhost:8080
    ports:
      - "3001:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      gateway: { condition: service_healthy }

volumes:
  victoria-traces-data:
  victoria-metrics-data:
  pyroscope-data:
