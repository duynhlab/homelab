# Local API gateway — Kong DB-less (declarative), mirroring the in-cluster Kong.
#
# Same shape as the cluster (kubernetes/infra/configs/kong/): Variant A
# pass-through routing /{service}/v1/... -> {service}:8080 (no rewrite), the
# same plugin set, so local e2e exercises the real gateway, not an nginx stand-in.
#
# Differences from the cluster (intentional, local-only):
#   - HTTP on :8000 (no TLS locally) -> no HSTS header, no https-redirect.
#   - rate-limiting uses `policy: redis` against the Valkey `cache` container
#     (mirrors the cluster's shared counter). Kong here is 3.9 (matching the
#     cluster), so it uses the nested `redis:` block — same as the cluster.
#   - CORS origin is the local SPA (http://localhost:3001).
_format_version: "3.0"

# Edge resilience (mirrors the cluster KongUpstreamPolicy + Service annotations):
#   - Bounded timeouts + retries per service (fail fast, no 60s hang / retry storm).
#   - Each service routes through a named upstream with active (/health probe) +
#     passive (eject on 5xx/timeout bursts = OSS circuit-breaking) health-checks.
# NOTE: `trusted_ips` tightening (roadmap #3) is cluster-only — local is plain
# HTTP with no X-Forwarded-* dependency, so narrowing it here has no effect.
services:
  - name: auth
    host: auth.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: auth, paths: ["/auth/"], strip_path: false }]
  - name: user
    host: user.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: user, paths: ["/user/"], strip_path: false }]
  - name: product
    host: product.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: product, paths: ["/product/"], strip_path: false }]
  - name: cart
    host: cart.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: cart, paths: ["/cart/"], strip_path: false }]
  - name: order
    host: order.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: order, paths: ["/order/"], strip_path: false }]
  - name: review
    host: review.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: review, paths: ["/review/"], strip_path: false }]
  - name: shipping
    host: shipping.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: shipping, paths: ["/shipping/"], strip_path: false }]
  - name: notification
    host: notification.upstream
    port: 8080
    protocol: http
    connect_timeout: 3000
    read_timeout: 15000
    write_timeout: 15000
    retries: 2
    routes: [{ name: notification, paths: ["/notification/"], strip_path: false }]

# Upstreams with health-checks. The `&hc` anchor is reused (identical policy).
upstreams:
  - name: auth.upstream
    healthchecks: &hc
      active:
        type: http
        http_path: /health
        healthy: { interval: 5, successes: 2 }
        unhealthy: { interval: 5, http_failures: 3, timeouts: 3, tcp_failures: 3 }
      passive:
        healthy: { successes: 2 }
        unhealthy: { http_failures: 5, timeouts: 3, tcp_failures: 3 }
    targets:
      - target: auth:8080
  - name: user.upstream
    healthchecks: *hc
    targets: [{ target: user:8080 }]
  - name: product.upstream
    healthchecks: *hc
    targets: [{ target: product:8080 }]
  - name: cart.upstream
    healthchecks: *hc
    targets: [{ target: cart:8080 }]
  - name: order.upstream
    healthchecks: *hc
    targets: [{ target: order:8080 }]
  - name: review.upstream
    healthchecks: *hc
    targets: [{ target: review:8080 }]
  - name: shipping.upstream
    healthchecks: *hc
    targets: [{ target: shipping:8080 }]
  - name: notification.upstream
    healthchecks: *hc
    targets: [{ target: notification:8080 }]

# Global plugins (apply to every route) — mirror the cluster KongClusterPlugins.
plugins:
  - name: cors
    config:
      origins: ["http://localhost:3001"]
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Content-Type, Authorization, X-Request-ID]
      exposed_headers: [X-Request-ID, RateLimit-Limit, RateLimit-Remaining, RateLimit-Reset]
      credentials: true
      max_age: 3600
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
  - name: response-transformer   # security headers (HSTS omitted — local is HTTP)
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "Referrer-Policy:strict-origin-when-cross-origin"
          - "X-Frame-Options:DENY"
      remove:
        headers: ["Server"]
  - name: rate-limiting
    config:
      second: 5
      minute: 100
      hour: 2500
      policy: redis
      redis:
        host: cache
        port: 6379
        database: 1
        timeout: 2000
      fault_tolerant: true
      hide_client_headers: false
      error_code: 429
      error_message: "Rate limit exceeded. Please slow down."
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false
  # Edge tracing — export Kong's spans to the collector so distributed traces
  # begin at the gateway. propagation.inject=[w3c] FORCES a W3C traceparent onto
  # every upstream request (the default `preserve` injects nothing when the
  # inbound request has no trace header, e.g. a browser call — which left ~40% of
  # traces unlinked). Requires Kong >= 3.5 (the propagation block).
  - name: opentelemetry
    config:
      traces_endpoint: http://otel-collector:4318/v1/traces
      resource_attributes:
        service.name: kong
      propagation:
        default_format: w3c
        extract: [w3c, b3, jaeger, ot]
        inject: [w3c]
