# Local pass-through API gateway (stands in for Kong).
# Routes /{service}/v1/... -> http://{service}:8080 with NO path rewriting,
# and adds permissive CORS for the SPA served at http://localhost:3001.
server {
    listen 80;
    server_name _;

    # --- CORS (browser SPA at localhost:3001) ---
    # Server-level add_header applies to every response, including the 204
    # returned for the OPTIONS preflight below. (add_header is NOT allowed
    # inside a server-level `if`, so the preflight just returns 204.)
    add_header Access-Control-Allow-Origin  "http://localhost:3001" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # The gateway is the single CORS authority (like Kong). Strip any CORS
    # headers a backend emits on its own (product-service sets them too),
    # otherwise responses carry duplicate Access-Control-Allow-Origin values
    # and browsers reject them with "Failed to fetch".
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;

    # Pass-through routes (path forwarded unchanged, Variant A).
    location /auth/     { proxy_pass http://auth:8080; }
    location /user/     { proxy_pass http://user:8080; }
    location /product/  { proxy_pass http://product:8080; }
    location /cart/     { proxy_pass http://cart:8080; }
    location /order/    { proxy_pass http://order:8080; }
    location /review/   { proxy_pass http://review:8080; }
    location /shipping/ { proxy_pass http://shipping:8080; }
    location /notification/ { proxy_pass http://notification:8080; }

    # Gateway's own health.
    location = /gateway/health { return 200 "ok\n"; }

    location / { return 404; }
}
