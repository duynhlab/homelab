# OTel Collector for the local stack (contrib distro — needed for the spanmetrics connector).
# Receives standard OTLP-HTTP from the 8 Go services (otlptracehttp posts to :4318/v1/traces) and:
#   1. re-exports traces to VictoriaTraces' non-standard ingest path, and
#   2. derives RED metrics (calls + latency histogram, by service) via the spanmetrics connector
#      and remote-writes them to VictoriaMetrics for the RED dashboard.
# Locally this stands in for Tempo's metrics-generator (which produces span_metrics in-cluster).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  # OTel-recommended default in every pipeline — batches spans/metrics before export.
  batch: {}
  # RFC-0014 D-5: defensive — the Go SDK exports cumulative temporality, but any
  # delta sample that slips through stores in VM as-is and silently breaks rate().
  deltatocumulative:
    max_stale: 5m

connectors:
  spanmetrics:
    namespace: spanmetrics # → metric names spanmetrics_calls_total / spanmetrics_duration_*
    histogram:
      explicit:
        buckets: [1ms, 2ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s]
    # service.name, span.name, span.kind, status.code are built-in dimensions — don't repeat them.
    dimensions:
      - name: http.method
      - name: http.route
    exemplars:
      enabled: true
    metrics_flush_interval: 15s

exporters:
  otlphttp/victoriatraces:
    traces_endpoint: http://victoria-traces:10428/insert/opentelemetry/v1/traces
    tls:
      insecure: true
    compression: gzip
  # OTLP logs sink (RFC-0014 P4): the 9 Go services' otelzap tee AND Kong's
  # opentelemetry plugin post OTLP logs here; re-export to VictoriaLogs'
  # OTLP ingest path. VL-Stream-Fields makes service.name a log-STREAM field
  # (indexed stream identity) instead of a regular field — one stream per
  # service, and trace_id stays a queryable regular field.
  otlphttp/victorialogs:
    logs_endpoint: http://victoria-logs:9428/insert/opentelemetry/v1/logs
    headers:
      VL-Stream-Fields: "service.name"
    tls:
      insecure: true
    compression: gzip
  # RFC-0014 P1: app OTLP metrics go to VictoriaMetrics' native OTLP ingest
  # (HTTP protobuf only — VM accepts neither OTLP/gRPC nor JSON). Semconv →
  # PromQL naming happens in VM via -opentelemetry.usePrometheusNaming.
  otlphttp/victoriametrics:
    metrics_endpoint: http://victoria-metrics:8428/opentelemetry/v1/metrics
    tls:
      insecure: true
    compression: gzip
  prometheusremotewrite:
    endpoint: http://victoria-metrics:8428/api/v1/write
    resource_to_telemetry_conversion:
      enabled: true # keep service.name etc. as labels on the derived metrics
  # RFC-0019 Phase B: long-retention SQL over OTel logs+traces. Fans out ALONGSIDE
  # VictoriaLogs/VictoriaTraces (supplementary OLAP, not a replacement); metrics stay
  # on VictoriaMetrics. ClickHouse native protocol :9000; the contrib exporter
  # auto-creates the otel_logs / otel_traces MergeTree tables (create_schema).
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    username: default
    password: otel # dev password (matches compose CLICKHOUSE_PASSWORD); cluster injects via secret
    create_schema: true
    ttl: 2160h # 90 days — the long-retention analytics payoff (vs 7d ops primaries)
    async_insert: true
    compress: lz4
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000
  # Logs span counts to `docker logs otel-collector` so ingest is easy to confirm.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victoriatraces, spanmetrics, debug, clickhouse]
    # spanmetrics-derived RED metrics keep their remote-write path unchanged.
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheusremotewrite]
    # RFC-0014 P1: semconv app metrics pushed by the services (otelgin, otelgrpc,
    # runtime, Temporal SDK via obsx SetupObservability) — dual-emit next to the
    # scraped /metrics endpoint until the P3 cutover.
    metrics/apps:
      receivers: [otlp]
      processors: [deltatocumulative, batch]
      exporters: [otlphttp/victoriametrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/victorialogs, debug, clickhouse]
