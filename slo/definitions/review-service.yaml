# SLO Definitions for ReviewService
# Generated using Sloth (https://sloth.dev)
# This file defines SLOs for review-service following Google SRE best practices

version: "prometheus/v1"
service: "review-service"
labels:
  team: "platform"
  env: "demo"
  service: "review-service"
  namespace: "review"

slos:
  - name: "availability"
    objective: 99.5
    description: "Availability measures the ratio of successful requests (non-5xx) to total requests"
    sli:
      events:
        error_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices",
            code=~"5.."
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices"
          }[{{.window}}]))
    alerting:
      name: ReviewServiceHighErrorRate
      labels:
        severity: critical
        category: availability
        service: "review-service"
      annotations:
        summary: "High 5xx error rate detected on review-service"
        description: "Availability SLO is at risk. Current error rate is impacting ReviewService."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"

  - name: "latency"
    objective: 95.0
    description: "Latency measures the ratio of requests faster than 500ms to total requests"
    sli:
      events:
        error_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices"
          }[{{.window}}]))
          -
          sum(rate(request_duration_seconds_bucket{
            app="review-service",
            namespace="review",
            job=~"microservices",
            le="0.5"
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices"
          }[{{.window}}]))
    alerting:
      name: ReviewServiceHighLatency
      labels:
        severity: warning
        category: latency
        service: "review-service"
      annotations:
        summary: "High latency detected on review-service"
        description: "More than 5% of requests are slower than 500ms threshold."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"

  - name: "error-rate"
    objective: 99.0
    description: "Error rate measures the ratio of successful requests (non-4xx/5xx) to total requests"
    sli:
      events:
        error_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices",
            code=~"4..|5.."
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app="review-service",
            namespace="review",
            job=~"microservices"
          }[{{.window}}]))
    alerting:
      name: ReviewServiceHighOverallErrorRate
      labels:
        severity: warning
        category: errors
        service: "review-service"
      annotations:
        summary: "High overall error rate (4xx + 5xx) on review-service"
        description: "More than 1% of requests are returning errors."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"
