          and
          max(slo:sli_error:ratio_rate1h{sloth_id="product-service-latency", sloth_service="product-service", sloth_slo="latency"} > (14.4 * 0.05)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate30m{sloth_id="product-service-latency", sloth_service="product-service", sloth_slo="latency"} > (6 * 0.05)) without (sloth_window)
          and
