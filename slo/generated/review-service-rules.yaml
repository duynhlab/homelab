- name: sloth-slo-alerts-review-service-error-rate
  rules:
  - alert: ReviewServiceHighOverallErrorRate
    expr: |
      (
          max(slo:sli_error:ratio_rate5m{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (14.4 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate1h{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (14.4 * 0.01)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate30m{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (6 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate6h{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (6 * 0.01)) without (sloth_window)
      )
    labels:
      category: errors
      channel: '#alerts'
      service: review-service
      severity: page
      sloth_severity: page
    annotations:
      description: More than 1% of requests are returning errors.
      summary: High overall error rate (4xx + 5xx) on review-service
      title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
        burn rate is too fast.
  - alert: ReviewServiceHighOverallErrorRate
    expr: |
      (
          max(slo:sli_error:ratio_rate2h{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (3 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate1d{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (3 * 0.01)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate6h{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (1 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate3d{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"} > (1 * 0.01)) without (sloth_window)
      )
    labels:
      category: errors
      channel: '#incidents'
      service: review-service
      severity: ticket
      sloth_severity: ticket
    annotations:
      description: More than 1% of requests are returning errors.
      summary: High overall error rate (4xx + 5xx) on review-service
      title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
        burn rate is too fast.
