      sloth_id: review-service-error-rate
      sloth_service: review-service
      sloth_slo: error-rate
      team: platform
  - record: slo:time_period:days
    expr: vector(30)
    labels:
      env: demo
      namespace: review
      service: review-service
      sloth_id: review-service-error-rate
      sloth_service: review-service
      sloth_slo: error-rate
      team: platform
  - record: slo:current_burn_rate:ratio
    expr: |
      slo:sli_error:ratio_rate5m{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"}
      / on(sloth_id, sloth_slo, sloth_service) group_left
      slo:error_budget:ratio{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"}
    labels:
      env: demo
      namespace: review
      service: review-service
      sloth_id: review-service-error-rate
      sloth_service: review-service
      sloth_slo: error-rate
      team: platform
  - record: slo:period_burn_rate:ratio
    expr: |
      slo:sli_error:ratio_rate30d{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"}
      / on(sloth_id, sloth_slo, sloth_service) group_left
      slo:error_budget:ratio{sloth_id="review-service-error-rate", sloth_service="review-service", sloth_slo="error-rate"}
    labels:
