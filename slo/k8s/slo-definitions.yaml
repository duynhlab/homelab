# SLO Definitions for Go REST API Monitoring
# Compatible with sloth (https://sloth.dev)
# This defines Service Level Indicators (SLIs) and their target SLOs

version: "prometheus/v1"
service: "go-api"
labels:
  team: "platform"
  env: "demo"

slos:
  # ============================================================================
  # 1. AVAILABILITY SLI
  # ============================================================================
  - name: "availability"
    objective: 99.5  # 99.5% availability target (30-day)
    description: "Availability measures the ratio of successful requests (non-5xx) to total requests"
    sli:
      events:
        error_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*",
            code=~"5.."
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*"
          }[{{.window}}]))
    alerting:
      name: HighErrorRate
      labels:
        severity: critical
        category: availability
      annotations:
        summary: "High 5xx error rate detected"
        description: "Availability SLO is at risk. Current error rate is impacting user experience."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"

  # ============================================================================
  # 2. LATENCY SLI
  # ============================================================================
  - name: "latency"
    objective: 95.0  # 95% of requests should be fast
    description: "Latency measures the ratio of requests faster than 500ms to total requests"
    sli:
      events:
        # Good events: requests faster than 500ms
        error_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*"
          }[{{.window}}]))
          -
          sum(rate(request_duration_seconds_bucket{
            app=~"demo-go-api.*",
            le="0.5"
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*"
          }[{{.window}}]))
    alerting:
      name: HighLatency
      labels:
        severity: warning
        category: latency
      annotations:
        summary: "High latency detected"
        description: "More than 5% of requests are slower than 500ms threshold."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"

  # ============================================================================
  # 3. ERROR RATE SLI
  # ============================================================================
  - name: "error-rate"
    objective: 99.0  # 99% of requests should succeed (no 4xx/5xx)
    description: "Error rate measures the ratio of successful requests (non-4xx/5xx) to total requests"
    sli:
      events:
        error_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*",
            code=~"4..|5.."
          }[{{.window}}]))
        total_query: |
          sum(rate(request_duration_seconds_count{
            app=~"demo-go-api.*"
          }[{{.window}}]))
    alerting:
      name: HighOverallErrorRate
      labels:
        severity: warning
        category: errors
      annotations:
        summary: "High overall error rate (4xx + 5xx)"
        description: "More than 1% of requests are returning errors."
      page_alert:
        labels:
          severity: page
          channel: "#alerts"
      ticket_alert:
        labels:
          severity: ticket
          channel: "#incidents"

