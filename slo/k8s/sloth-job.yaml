apiVersion: v1
kind: ConfigMap
metadata:
  name: sloth-slo-config
  namespace: monitoring-demo
data:
  slo-definitions.yaml: |
    # This will be populated from slo/k8s/slo-definitions.yaml
    # Use: kubectl create configmap sloth-slo-config --from-file=slo-definitions.yaml -n monitoring-demo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sloth-generate-slo
  namespace: monitoring-demo
  labels:
    app: sloth
    component: slo-generator
spec:
  ttlSecondsAfterFinished: 3600  # Clean up after 1 hour
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: sloth
        component: slo-generator
    spec:
      restartPolicy: OnFailure
      containers:
      - name: sloth
        image: ghcr.io/slok/sloth:v0.11.0
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting sloth SLO generation..."
          sloth generate \
            --input /config/slo-definitions.yaml \
            --out /output/slo-recording-rules.yaml \
            --slo-period 30d \
            --default-slo-period 30d
          
          echo "Generated recording rules:"
          cat /output/slo-recording-rules.yaml
          
          echo "Applying recording rules to Prometheus..."
          # In production, this would push to ConfigMap or Prometheus Operator
          # For now, we'll output the rules for manual application
          
          echo "Done! Recording rules saved to /output/slo-recording-rules.yaml"
        volumeMounts:
        - name: slo-config
          mountPath: /config
        - name: output
          mountPath: /output
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: slo-config
        configMap:
          name: sloth-slo-config
      - name: output
        emptyDir: {}
---
# Note: To run this job and capture output:
#
# 1. Create ConfigMap from local file:
#    kubectl create configmap sloth-slo-config --from-file=slo-definitions.yaml=slo/k8s/slo-definitions.yaml -n monitoring-demo --dry-run=client -o yaml | kubectl apply -f -
#
# 2. Run the job:
#    kubectl apply -f slo/k8s/sloth-job.yaml
#
# 3. View logs to see generated rules:
#    kubectl logs -f job/sloth-generate-slo -n monitoring-demo
#
# 4. Extract generated rules:
#    kubectl logs job/sloth-generate-slo -n monitoring-demo | sed -n '/---/,$p' > slo/k8s/generated-slo-rules.yaml

